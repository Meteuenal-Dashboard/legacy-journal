<script>
  window.MY_CUSTOM_APP_ICON = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23f59e0b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20'/%3E%3C/svg%3E";
  
  function initManifest() {
      let appName = "Legacy Vision";
      let shortName = "Legacy";
      let iconUrl = window.MY_CUSTOM_APP_ICON;
      let isSvg = true;

      try {
          let userData = null;
          const injectedEl = document.getElementById('legacy-injected-data');
          if (injectedEl && injectedEl.textContent && injectedEl.textContent.trim() !== 'null') {
              const data = JSON.parse(injectedEl.textContent);
              if (data && data.user) userData = data.user;
          } else {
              const savedStr = localStorage.getItem('legacy_user');
              if (savedStr) userData = JSON.parse(savedStr);
          }

          if (userData) {
              if (userData.appName && userData.appName.trim() !== "") {
                  appName = userData.appName.trim();
                  shortName = userData.appName.trim();
              }
              if (userData.avatar) {
                  iconUrl = userData.avatar;
                  isSvg = false;
              }
          }
      } catch(e) {}

      const iconType = isSvg ? "image/svg+xml" : "image/png";
      const manifest = {
          "id": "legacy-vision-journal",
          "name": appName,
          "short_name": shortName,
          "start_url": window.location.pathname,
          "display": "standalone",
          "background_color": "#ffffff",
          "theme_color": "#f59e0b",
          "icons": [
            { "src": iconUrl, "sizes": "192x192", "type": iconType, "purpose": "any maskable" },
            { "src": iconUrl, "sizes": "512x512", "type": iconType, "purpose": "any maskable" }
          ]
      };

      const manifestString = JSON.stringify(manifest);
      const manifestURL = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(manifestString);
      
      let manifestEl = document.getElementById('dynamic-manifest') || document.createElement('link');
      manifestEl.rel = 'manifest'; 
      manifestEl.id = 'dynamic-manifest'; 
      manifestEl.href = manifestURL;
      
      if(!document.getElementById('dynamic-manifest')) {
          document.head.appendChild(manifestEl);
      }
  }
  initManifest();
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const safeStorageGet = (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } };
const safeStorageSet = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };

const createSafeHtml = (htmlStr) => {
  return { __html: window.DOMPurify ? window.DOMPurify.sanitize(htmlStr, { ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'u', 'br', 'div', 'span', 'blockquote', 'p', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'img', 'font'], ALLOWED_ATTR: ['style', 'class', 'dir', 'src', 'alt', 'color', 'width', 'height', 'onclick'] }) : htmlStr };
};

// --- Web Crypto API Helper (100% untouched) ---
const encHelper = new TextEncoder();
const decHelper = new TextDecoder();
const cryptoKeyCache = {}; 

const getCryptoKey = async (pin, saltStr) => {
    const cacheKey = pin + saltStr;
    if (cryptoKeyCache[cacheKey]) return cryptoKeyCache[cacheKey];
    const keyMaterial = await window.crypto.subtle.importKey("raw", encHelper.encode(pin), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]);
    const salt = Uint8Array.from(atob(saltStr), c => c.charCodeAt(0));
    const key = await window.crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
    cryptoKeyCache[cacheKey] = key; return key;
};

const encryptData = async (text, pin) => {
    try {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const saltStr = btoa(String.fromCharCode(...salt));
        const ivStr = btoa(String.fromCharCode(...iv));
        const key = await getCryptoKey(pin, saltStr);
        const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encHelper.encode(text));
        return { cipher: btoa(String.fromCharCode(...new Uint8Array(encrypted))), iv: ivStr, salt: saltStr };
    } catch(e) { return null; }
};

const decryptData = async (encryptedObj, pin) => {
    if (!encryptedObj || !pin) return null;
    try {
        const key = await getCryptoKey(pin, encryptedObj.salt);
        const iv = Uint8Array.from(atob(encryptedObj.iv), c => c.charCodeAt(0));
        const cipher = Uint8Array.from(atob(encryptedObj.cipher), c => c.charCodeAt(0));
        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, cipher);
        return decHelper.decode(decrypted);
    } catch(e) { return null; }
};

const pcmToWav = (pcmBase64, sampleRate = 24000) => {
  const pcmData = Uint8Array.from(atob(pcmBase64), c => c.charCodeAt(0)).buffer;
  const wavHeader = new ArrayBuffer(44); const view = new DataView(wavHeader);
  view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + pcmData.byteLength, true); 
  view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false); 
  view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); 
  view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); 
  view.setUint16(32, 2, true); view.setUint16(34, 16, true); 
  view.setUint32(36, 0x64617461, false); view.setUint32(40, pcmData.byteLength, true); 
  return URL.createObjectURL(new Blob([wavHeader, pcmData], { type: 'audio/wav' }));
};

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  render() {
    if (this.state.hasError) {
      return (
        <div className="min-h-screen flex items-center justify-center bg-black text-white p-8 text-center">
          <div><h1 className="text-2xl font-bold mb-4">Ein Moment bitte...</h1><p className="opacity-70 mb-8">Die App hat sich verschluckt.</p><button type="button" onClick={() => window.location.reload()} className="px-6 py-3 bg-white text-black font-bold rounded-full">Neu laden</button></div>
        </div>
      );
    }
    return this.props.children;
  }
}

const Icon = ({ name, size = 24, className = '', ...props }) => {

  useEffect(() => {
    const renderIcon = () => {
      if (spanRef.current && window.lucide) {
        spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
        window.lucide.createIcons({ root: spanRef.current });
        const svg = spanRef.current.querySelector('svg');
        if (svg) { svg.setAttribute('width', size); svg.setAttribute('height', size); if (className) svg.setAttribute('class', `lucide lucide-${name} ${className}`); }
      }
    };
    if (window.lucide) renderIcon(); else setTimeout(renderIcon, 100);
  }, [name, size, className]);
  return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} {...props}></span>;
};

const isDarkColor = (color) => {
  if (!color) return true;
  const hex = color.replace('#', '');
  if (hex.length === 6) {
    const r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
    return ((r * 299 + g * 587 + b * 114) / 1000) < 128;
  }
  return true; 
};

const getSubtleBorderColor = (hexColor, isDark) => {
    if (!hexColor) return isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
    const cleanHex = hexColor.replace('#', '');
    if (cleanHex.length === 6) {
        const r = parseInt(cleanHex.slice(0, 2), 16), g = parseInt(cleanHex.slice(2, 4), 16), b = parseInt(cleanHex.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${isDark ? 0.15 : 0.25})`;
    }
    return isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

const initDB = () => {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('LegacyVisionDB', 4);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('entries')) db.createObjectStore('entries', { keyPath: 'id' });
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
};

        <div className="max-w-sm w-full space-y-10 animate-slide-up z-10">
