<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const safeStorageSet = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };

// Helper zur Bereinigung von HTML-Eingaben
const createSafeHtml = (htmlStr) => {
    return { __html: window.DOMPurify ? window.DOMPurify.sanitize(htmlStr, { ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'u', 'br', 'div', 'span', 'blockquote', 'p', 'ul', 'ol', 'li', 'h1', 'h2', 'h3'], ALLOWED_ATTR: ['style', 'class', 'dir'] }) : htmlStr };
};

// --- Web Crypto API Helper ---
const encHelper = new TextEncoder();
const decHelper = new TextDecoder();
const cryptoKeyCache = {}; 

const getCryptoKey = async (pin, saltStr) => {
    const cacheKey = pin + saltStr;
    if (cryptoKeyCache[cacheKey]) return cryptoKeyCache[cacheKey];
    const keyMaterial = await window.crypto.subtle.importKey(
        "raw", encHelper.encode(pin), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]
    );
    const salt = Uint8Array.from(atob(saltStr), c => c.charCodeAt(0));
    const key = await window.crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
    );
    cryptoKeyCache[cacheKey] = key;
    return key;
};

const encryptData = async (text, pin) => {
    try {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const saltStr = btoa(String.fromCharCode(...salt));
        const ivStr = btoa(String.fromCharCode(...iv));
        
        const key = await getCryptoKey(pin, saltStr);
        const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encHelper.encode(text));
        
        return {
            cipher: btoa(String.fromCharCode(...new Uint8Array(encrypted))),
            iv: ivStr,
            salt: saltStr
        };
    } catch(e) { console.error(e); return null; }
};

const decryptData = async (encryptedObj, pin) => {
    if (!encryptedObj || !pin) return null;
    try {
        const key = await getCryptoKey(pin, encryptedObj.salt);
        const iv = Uint8Array.from(atob(encryptedObj.iv), c => c.charCodeAt(0));
        const cipher = Uint8Array.from(atob(encryptedObj.cipher), c => c.charCodeAt(0));
        
        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, cipher);
        return decHelper.decode(decrypted);
    } catch(e) { 
        return null; 
    }
};

const pcmToWav = (pcmBase64, sampleRate = 24000) => {
  const pcmData = Uint8Array.from(atob(pcmBase64), c => c.charCodeAt(0)).buffer;
  const wavHeader = new ArrayBuffer(44);
  const view = new DataView(wavHeader);
  
  view.setUint32(0, 0x52494646, false); 
  view.setUint32(4, 36 + pcmData.byteLength, true); 
  view.setUint32(8, 0x57415645, false); 
  view.setUint32(12, 0x666d7420, false); 
  view.setUint32(16, 16, true); 
  view.setUint16(20, 1, true); 
  view.setUint16(22, 1, true); 
  view.setUint32(24, sampleRate, true); 
  view.setUint32(28, sampleRate * 2, true); 
  view.setUint16(32, 2, true); 
  view.setUint16(34, 16, true); 
  view.setUint32(36, 0x64617461, false); 
  view.setUint32(40, pcmData.byteLength, true); 
  
  const blob = new Blob([wavHeader, pcmData], { type: 'audio/wav' });
  return URL.createObjectURL(blob);
};

  constructor(props) { super(props); this.state = { hasError: false, error: null }; }

}

const isDarkColor = (color) => {
  if (!color) return true;
  const hex = color.replace('#', '');
  if (hex.length === 6) {
    const r = parseInt(hex.substr(0, 2), 16);
    const g = parseInt(hex.substr(2, 2), 16);
    const b = parseInt(hex.substr(4, 2), 16);
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    return brightness < 128;
  }
  return true; 
};

const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

const getDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371e3;
  const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
  const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
};

const initDB = () => {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('LegacyVisionDB', 3);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('entries')) db.createObjectStore('entries', { keyPath: 'id' });
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
};

  // Firebase Setup
  useEffect(() => {
    const initFB = async () => {
       try {
          if (typeof __firebase_config === 'undefined') return;
          const config = JSON.parse(__firebase_config);
          
          // Umgehung von Babel, das import() in require() umwandelt
          const nativeImport = new Function('url', 'return import(url)');
          
          const { initializeApp } = await nativeImport('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
          const { getAuth, signInWithCustomToken, signInAnonymously } = await nativeImport('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
          const { getFirestore, collection, doc, setDoc, deleteDoc, getDocs, getDoc } = await nativeImport('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
          
          const app = initializeApp(config);
          const auth = getAuth(app);
          const firestoreDb = getFirestore(app);
          
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
             await signInWithCustomToken(auth, __initial_auth_token);
          } else {
             await signInAnonymously(auth);
          }
          setFb({ db: firestoreDb, auth, doc, setDoc, deleteDoc, getDocs, getDoc, collection });
       } catch(e) { console.error("Firebase Init Error", e); }
    };
    initFB();
  }, []);

  const syncSingleEntryToCloud = async (entry) => {
      if (!fb || !fb.auth.currentUser || !user.cloudSync || !user.pin) return;
      const appId = typeof __app_id !== 'undefined' ? __app_id : 'legacy-vision';
      const userId = fb.auth.currentUser.uid;
      try {
          const payload = JSON.stringify(entry);
          const encrypted = await encryptData(payload, user.pin);
          if (encrypted) {
              if (encrypted.cipher.length > 900000) {
                  setAutoSaveStatus('Warnung: Zu groß für Cloud!');
                  setTimeout(() => setAutoSaveStatus(''), 4000);
                  return;
              }
              const docRef = fb.doc(fb.db, 'artifacts', appId, 'users', userId, 'entries', entry.id);
              await fb.setDoc(docRef, { id: entry.id, encryptedData: encrypted, timestamp: Date.now() });
          }
      } catch(e) { console.error("Cloud Save Error", e); }
  };

  const deleteSingleEntryFromCloud = async (id) => {
      if (!fb || !fb.auth.currentUser || !user.cloudSync) return;
      const appId = typeof __app_id !== 'undefined' ? __app_id : 'legacy-vision';
      const userId = fb.auth.currentUser.uid;
      try {
          const docRef = fb.doc(fb.db, 'artifacts', appId, 'users', userId, 'entries', id);
          await fb.deleteDoc(docRef);
      } catch(e) { console.error("Cloud Delete Error", e); }
  };

  const syncProfileToCloud = async (userData) => {
      if (!fb || !fb.auth.currentUser || !userData.cloudSync || !userData.pin) return;
      const appId = typeof __app_id !== 'undefined' ? __app_id : 'legacy-vision';
      const userId = fb.auth.currentUser.uid;
      try {
          const payload = JSON.stringify(userData);
          const encrypted = await encryptData(payload, userData.pin);
          if (encrypted) {
              const docRef = fb.doc(fb.db, 'artifacts', appId, 'users', userId, 'profile', 'data');
              await fb.setDoc(docRef, { encryptedData: encrypted, timestamp: Date.now() });
          }
      } catch(e) {}
  };

  const performCloudSync = async () => {
      if (!fb || !fb.auth.currentUser) return;
      if (!user.pin) {
          showDialog({ title: 'PIN fehlt', message: 'Bitte lege zuerst deine Tresor-PIN fest, um die Daten zu entschlüsseln.', icon: 'lock' });
          return;
      }

      setSyncingCloud(true);
      const appId = typeof __app_id !== 'undefined' ? __app_id : 'legacy-vision';
      const userId = fb.auth.currentUser.uid;

      try {
          // Restore Profile
          try {
              const profileRef = fb.doc(fb.db, 'artifacts', appId, 'users', userId, 'profile', 'data');
              const profileSnap = await fb.getDoc(profileRef);
              if (profileSnap.exists()) {
                  const profileData = profileSnap.data();
                  if (profileData.encryptedData) {
                      const decProfile = await decryptData(profileData.encryptedData, user.pin);
                      if (decProfile) {
                          const parsedProfile = JSON.parse(decProfile);
                          setUser({ ...user, ...parsedProfile, cloudSync: true });
                      }
                  }
              }
          } catch(e) {}

          // Restore Entries
          const cloudRef = fb.collection(fb.db, 'artifacts', appId, 'users', userId, 'entries');
          const cloudSnap = await fb.getDocs(cloudRef);
          
          const cloudEntries = [];
          cloudSnap.forEach(doc => cloudEntries.push(doc.data()));
          
          if (cloudEntries.length === 0) {
              showDialog({ title: 'Cloud leer', message: 'Es wurden keine Einträge in class Cloud gefunden.', icon: 'cloud-off' });
              setSyncingCloud(false);
              return;
          }

          let recoveredCount = 0;
          let failedDecrypt = 0;
          const tx = db.transaction('entries', 'readwrite');
          const store = tx.objectStore('entries');

          for (let cloudDoc of cloudEntries) {
              if (cloudDoc.encryptedData) {
                  try {
                      const decryptedStr = await decryptData(cloudDoc.encryptedData, user.pin);
                      if (decryptedStr) {
                          const parsed = JSON.parse(decryptedStr);
                          
                          let dbItem = { ...parsed };
                          if (dbItem.locked) {
                              const payload = JSON.stringify({ text: dbItem.text || '', title: dbItem.title || '' });
                              dbItem.encryptedData = await encryptData(payload, user.pin);
                              dbItem.text = '';
                              dbItem.title = 'Verschlüsselter Eintrag';
                          }
                          store.put(dbItem);
                          recoveredCount++;
                      } else {
                          failedDecrypt++;
                      }
                  } catch(e) { failedDecrypt++; }
              }
          }

          tx.oncomplete = () => {
              const readTx = db.transaction('entries', 'readonly');
              const req = readTx.objectStore('entries').getAll();
              req.onsuccess = async () => {
                  let loadedEntries = req.result || [];
                  loadedEntries = loadedEntries.map(e => ({ ...e, images: e.images || (e.image ? [e.image] : []) }));
                  if (user.pin) {
                      loadedEntries = await Promise.all(loadedEntries.map(async (e) => {
                          if (e.locked && e.encryptedData) {
                              const decStr = await decryptData(e.encryptedData, user.pin);
                              if (decStr) {
                                  try {
                                      const parsed = JSON.parse(decStr);
                                      return { ...e, text: parsed.text, title: parsed.title };
                                  } catch(err){}
                              }
                          }
                          return e;
                      }));
                  }
                  setEntries(loadedEntries.sort((a,b) => new Date(b.orderTimestamp || b.date) - new Date(a.orderTimestamp || a.date)));
                  
                  if (failedDecrypt > 0) {
                      showDialog({ title: 'Entschlüsselung unvollständig', message: `${failedDecrypt} Einträge konnten nicht geladen werden. Hast du auf dem alten Gerät eine andere PIN verwendet? Ändere die PIN entsprechend und versuche es erneut.`, icon: 'shield-alert', iconColor: 'text-rose-500' });
                  } else {
                      showDialog({ title: 'Wiederhergestellt', message: `${recoveredCount} Einträge wurden erfolgreich aus der sicheren Cloud geladen und entschlüsselt.`, icon: 'check', iconColor: 'text-emerald-500' });
                  }
              }
          };
      } catch(e) {
          showDialog({ title: 'Verbindungsfehler', message: 'Die Cloud konnte nicht erreicht werden.', icon: 'wifi-off', iconColor: 'text-rose-500' });
      } finally {
          setSyncingCloud(false);
          hasSyncedRef.current = true;
      }
  };

  // PWA Icon Sync
  useEffect(() => {
    const manifestEl = document.getElementById('dynamic-manifest');
    if (manifestEl) {
      const iconSrc = user.avatar || window.MY_CUSTOM_APP_ICON || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23f59e0b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20'/%3E%3C/svg%3E";
      const iconType = iconSrc.startsWith('data:image/jpeg') ? 'image/jpeg' : 'image/svg+xml';
      const startUrl = window.location.href.split('?')[0];
      const manifestObj = {
        "id": "legacy-vision-journal",

        "start_url": startUrl,

        "background_color": user.appBgColor || (user.isDark ? "#09090b" : "#ffffff"),
        "theme_color": user.nameColor || "#f59e0b",
        "icons": [
          { "src": iconSrc, "sizes": "192x192", "type": iconType, "purpose": "any maskable" },
          { "src": iconSrc, "sizes": "512x512", "type": iconType, "purpose": "any maskable" }
        ]
      };
      const manifestUrl = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifestObj));
      manifestEl.setAttribute('href', manifestUrl);
    }
  }, [user.avatar, user.appBgColor, user.nameColor, user.isDark]);

  // PeerJS P2P Empfänger Logik
  useEffect(() => {
    if (importId && isLoaded) {
      setSyncStatus('Bereite Datenübertragung vor...');
      const peer = new window.Peer();
      peer.on('open', () => {
        setSyncStatus(`Verbinde mit altem Gerät...`);
        const conn = peer.connect(importId);
        conn.on('open', () => {
          setSyncStatus('Verbunden! Empfange Daten...');
          conn.send('request_data');
        });
        conn.on('data', async (data) => {
          try {
            const parsed = JSON.parse(data);
            if (parsed.entries) {
               setSyncStatus('Daten werden sicher verarbeitet und verschlüsselt...');
               if (db) {
                 const pinToUse = parsed.user ? parsed.user.pin : user.pin;
                 const entriesToSave = await Promise.all(parsed.entries.map(async (e) => {
                     let dbE = { ...e };
                     dbE.images = dbE.images || (dbE.image ? [dbE.image] : []);
                     if (dbE.locked && pinToUse) {
                         const payload = JSON.stringify({ text: dbE.text || '', title: dbE.title || '' });
                         dbE.encryptedData = await encryptData(payload, pinToUse);
                         dbE.text = '';
                         dbE.title = 'Verschlüsselter Eintrag';
                         return dbE;
                     }
                     return dbE;
                 }));
                 
                 const tx = db.transaction('entries', 'readwrite');
                 const store = tx.objectStore('entries');
                 entriesToSave.forEach(e => store.put(e));
                 tx.oncomplete = () => {
                   if (parsed.user) safeStorageSet('legacy_user', JSON.stringify(parsed.user));
                   setSyncStatus('Erfolgreich übertragen! Tagebuch wird geöffnet...');
                   setTimeout(() => {
                     window.location.href = window.location.origin + window.location.pathname;
                   }, 2000);
                 };
               }
            }
          } catch(e) {
            setSyncStatus('Fehler beim Lesen der Daten.');
          }
        });
        conn.on('error', (err) => setSyncStatus('Verbindungsfehler: ' + err));
      });
      peer.on('error', (err) => setSyncStatus('Verbindungsfehler: Das alte Gerät ist nicht bereit.'));
    }
  }, [importId, isLoaded, db]);

  useEffect(() => {
    if (isLoaded) {
      safeStorageSet('legacy_view', view);
      safeStorageSet('legacy_viewing_id', viewingEntry ? viewingEntry.id : '');
      safeStorageSet('legacy_editing_id', editingId || '');
      safeStorageSet('legacy_show_editor', showEditor ? 'true' : 'false');
    }
  }, [view, viewingEntry, showEditor, editingId, isLoaded]);

  const showDialog = (options) => { setDialog({ type: 'alert', confirmLabel: 'Verstanden', ...options }); };

  const closeEditor = (savedEntry = null) => {
    setShowEditor(false);
    if (isRecording) stopRecording();
    
    if (savedEntry && (savedEntry.title || savedEntry.text || (savedEntry.images && savedEntry.images.length > 0) || savedEntry.image || savedEntry.audio)) {
      setViewingEntry(savedEntry);
    } else if (editingIdRef.current) {
      const existing = entriesRef.current.find(e => e.id === editingIdRef.current);
      setViewingEntry(existing || null);
    } else {
      setViewingEntry(null);
    }
  };

  useEffect(() => {
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone || document.referrer.includes('android-app://');
    if (!isStandalone) {
      if (window.location.protocol.includes('file') || window.location.protocol.includes('content')) {
        setInstallHint("Tipp: Du hast diese Datei direkt aus dem Speicher deines Handys geöffnet. Handys blockieren hierbei das 'Zum Startbildschirm hinzufügen'. Lade die App über den originalen Web-Link auf deinen Startbildschirm und nutze danach die 'Importieren'-Funktion in den Einstellungen!");
      }
    }
  }, []);

  useEffect(() => {
    if (!isLoaded) return;
    window.history.pushState({ locked: true }, '');

    const handlePopState = (e) => {
      window.history.pushState({ locked: true }, '');
      if (viewingEntryRef.current) {
        setViewingEntry(null);
      } else if (editorRefState.current) {
        closeEditor();
      } else if (viewRef.current !== 'dashboard' && viewRef.current !== 'loading' && viewRef.current !== 'onboarding') {
        setView('dashboard');
      } else if (viewRef.current === 'dashboard') {
        showDialog({
          type: 'confirm', title: 'Journal verlassen?', message: 'Möchtest du das Vermächtnis wirklich verlassen?',
          icon: 'log-out', iconColor: 'text-rose-500', confirmLabel: 'Verlassen', confirmColor: 'bg-rose-600',
          onConfirm: () => { window.location.href = "about:blank"; }
        });
      }
    };
    window.addEventListener('popstate', handlePopState);
    return () => window.removeEventListener('popstate', handlePopState);
  }, [isLoaded]);

  useEffect(() => {
    const loadApp = async () => {
      try {
        let currentUser = { name: '', motto: '', pin: '', avatar: null, nameColor: '#f59e0b', testamentId: null, isDark: true, appBgColor: null, cloudSync: false };
        
        const database = await initDB();
        setDb(database);

        // --- APP-KLON (SHARE) WIEDERHERSTELLUNG ---
        const injectedScript = document.getElementById('legacy-injected-data');
        let injectedEntries = null;
        if (injectedScript && injectedScript.textContent && injectedScript.textContent.trim() !== 'null') {
          try {
            const injectedData = JSON.parse(injectedScript.textContent);
            if (injectedData && injectedData.user && injectedData.entries) {
              currentUser = { ...currentUser, ...injectedData.user };
              safeStorageSet('legacy_user', JSON.stringify(currentUser));
              injectedEntries = injectedData.entries;
              
              const tx = database.transaction('entries', 'readwrite');
              const store = tx.objectStore('entries');
              
              const pinToUse = currentUser.pin;
              const entriesToSave = await Promise.all(injectedEntries.map(async (e) => {
                 let dbE = { ...e };
                 // Kompatibilität: Einzelbild zu Bilder-Array migrieren falls nötig
                 dbE.images = dbE.images || (dbE.image ? [dbE.image] : []);
                 if (dbE.locked && pinToUse) {
                     const payload = JSON.stringify({ text: dbE.text || '', title: dbE.title || '' });
                     dbE.encryptedData = await encryptData(payload, pinToUse);
                     dbE.text = '';
                     dbE.title = 'Verschlüsselter Eintrag';
                     return dbE;
                 }
                 return dbE;
              }));
              
              entriesToSave.forEach(entry => store.put(entry));
              await new Promise(resolve => { tx.oncomplete = resolve; });
              
              injectedScript.textContent = 'null';
              showDialog({ title: 'App wiederhergestellt', message: 'Das Journal wurde erfolgreich mit all seinen Daten aus der HTML-Datei geladen!', icon: 'check', iconColor: 'text-emerald-500' });
            }
          } catch (e) {
            console.error("Error parsing injected data", e);
          }
        }
        
        const savedUser = safeStorageGet('legacy_user');
        if (savedUser && !injectedEntries) {
          const parsed = JSON.parse(savedUser);
          currentUser = { ...currentUser, ...parsed };
        }
        setUser(currentUser);

        const transaction = database.transaction('entries', 'readonly');
        const request = transaction.objectStore('entries').getAll();

        request.onsuccess = async () => {
          let loadedEntries = request.result || [];
          
          // Kompatibilität: Einzelbild zu Bilder-Array migrieren falls nötig
          loadedEntries = loadedEntries.map(e => ({
            ...e,
            images: e.images || (e.image ? [e.image] : []) // Migriere intern Einzelbild zu Liste
          }));

          // CRYPTO-UPDATE: Datenbank-Inhalte in den Speicher laden & entschlüsseln
          if (currentUser.pin) {
              loadedEntries = await Promise.all(loadedEntries.map(async (e) => {
                  if (e.locked && e.encryptedData) {
                      const decStr = await decryptData(e.encryptedData, currentUser.pin);
                      if (decStr) {
                          try {
                              const parsed = JSON.parse(decStr);
                              return { ...e, text: parsed.text, title: parsed.title };
                          } catch(err){}
                      }
                  }
                  return e;
              }));
          }
          
          const lastActiveStr = safeStorageGet('legacy_last_active');
          const lastActive = lastActiveStr ? new Date(lastActiveStr) : new Date();
          const daysInactive = (new Date() - lastActive) / (1000 * 60 * 60 * 24);

          safeStorageSet('legacy_last_active', new Date().toISOString());
          
          const sortedEntries = loadedEntries.sort((a,b) => new Date(b.orderTimestamp || b.date) - new Date(a.orderTimestamp || a.date));
          setEntries(sortedEntries);
          setIsLoaded(true);

          if (!currentUser.name) {
            setView('onboarding');
          } else if (currentUser.testamentId && daysInactive > 365) {
            setView('testament');
          } else {
            const storedView = safeStorageGet('legacy_view');
            const storedViewingId = safeStorageGet('legacy_viewing_id');
            const storedEditingId = safeStorageGet('legacy_editing_id');
            const storedShowEditor = safeStorageGet('legacy_show_editor') === 'true';

            if (storedView && storedView !== 'loading' && storedView !== 'onboarding') setView(storedView);
            else setView('dashboard');

            if (storedViewingId) {
              const vEntry = sortedEntries.find(e => e.id === storedViewingId);
              if (vEntry) setViewingEntry(vEntry);
            }

            if (storedShowEditor && storedEditingId) {
              const eEntry = sortedEntries.find(e => e.id === storedEditingId);
              if (eEntry) {
                setEditingId(eEntry.id); 
                setTitle(eEntry.title || ''); 
                setText(eEntry.text || '');
                setSelectedColor(eEntry.color || (currentUser.isDark ? COLORS[8] : COLORS[0]));
                setSelectedImages(eEntry.images || (eEntry.image ? [eEntry.image] : [])); // Bilder laden
                setSelectedVideo(eEntry.video || null);
                setIsLocked(eEntry.locked || false); setAudioUrl(eEntry.audio || null);
                setIsManifested(eEntry.manifested || false); setUnlockDate(eEntry.unlockDate || '');
                setUnlockLocation(eEntry.unlockLocation || null); setEntryType(eEntry.type || 'vision');
                setCategory(eEntry.category || CATEGORIES[0]); setMood(eEntry.mood || null);
                setLocation(eEntry.location || null); setParentId(eEntry.parentId || '');
                setInheritedFrom(eEntry.inheritedFrom || null); setPillarGuidance(null);
                setShowEditor(true);
                setTimeout(() => { savedDataRef.current = getCurrentDataString(); }, 100);
              }
            } else if (storedShowEditor && !storedEditingId) {
               setShowEditor(true); 
               setTimeout(() => { savedDataRef.current = getCurrentDataString(); }, 100);
            }

            checkDailyAffirmation(sortedEntries); 
          }
        };
      } catch (e) {
        setIsLoaded(true);
        setView('onboarding');
      }
    };

      const MAX_SIZE = 1200; 
      
      const processedImagesPromises = files.map(file => {
          return new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = (event) => {
                  const img = new Image();
                  img.onload = () => {
                      const canvas = document.createElement('canvas');
                      let width = img.width; 
                      let height = img.height;
                      
                      if (width > height) { 
                          if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                      } else { 
                          if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } 
                      }
                      
                      canvas.width = width; 
                      canvas.height = height;
                      const ctx = canvas.getContext('2d'); 
                      ctx.drawImage(img, 0, 0, width, height);
                      resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                  };
                  img.src = event.target.result;
              };
              reader.readAsDataURL(file);
          });
      });

    isDirtyRef.current = false;
    if (entry && entry.id) {
      setEditingId(entry.id); 
      setTitle(entry.title || '');
      let initialText = entry.text || '';
      if (initialText && !initialText.includes('<') && (initialText.includes('**') || initialText.includes('*'))) {
        initialText = initialText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/\n/g, '<br>');
      }
      setText(initialText); 
      setSelectedColor(entry.color); 
      setSelectedImages(entry.images || (entry.image ? [entry.image] : [])); 
      setSelectedVideo(entry.video);
      setIsLocked(entry.locked || false); 
      setAudioUrl(entry.audio); 
      setIsManifested(entry.manifested || false);
      setUnlockDate(entry.unlockDate || ''); 
      setUnlockLocation(entry.unlockLocation || null);
      setEntryType(entry.type || 'vision'); 
      setCategory(entry.category || CATEGORIES[0]);
      setMood(entry.mood || null); 
      setLocation(entry.location || null);
      setParentId(entry.parentId || ''); 
      setInheritedFrom(entry.inheritedFrom || null);
      setPillarGuidance(null);
    } else {
      setEditingId(null); 
      setTitle(pillar ? pillar.title : ''); 
      setText('');
      setSelectedColor(user.isDark ? COLORS[8] : COLORS[1]); 
      setSelectedImages([]); 
      setSelectedVideo(null); 
      setIsLocked(view === 'vault');
      setAudioUrl(null); 
      setIsManifested(false); 
      setUnlockDate(''); 
      setUnlockLocation(null);
      setEntryType('vision'); 
      setCategory(pillar ? 'Weisheit' : (activeCategory === 'Alle' ? CATEGORIES[0] : activeCategory));
      setMood(null); 
      setLocation(null); 
      setParentId(''); 
      setInheritedFrom(null);
      setPillarGuidance(pillar ? pillar.desc : null);
    }
    setZenMode(false); 
    setShowEditor(true);
  };

  const startNewChapter = (parent) => {
    isDirtyRef.current = false;
    const isParentLocked = parent.locked || false; 
    setViewingEntry(null);
    setEditingId(null); 
    setTitle(parent.title || ''); 
    setText('');
    setSelectedColor(user.isDark ? COLORS[8] : COLORS[1]);
    setSelectedImages([]); setSelectedVideo(null); 
    setIsLocked(isParentLocked); 
    setAudioUrl(null); setIsManifested(false); setUnlockDate(''); setUnlockLocation(null);
    setEntryType('vision'); setCategory(parent.category || CATEGORIES[0]);
    setMood(null); setLocation(null); 
    setParentId(parent.id); 
    setInheritedFrom(null);
    setZenMode(false); setShowEditor(true);
  };

  const getLastPageOfBook = (rootEntry) => {
    let current = rootEntry;
    while(true) {
      const children = entries.filter(e => e.parentId === current.id).sort((a,b) => new Date(a.date) - new Date(b.date));
      if (children.length > 0) {
        current = children[children.length - 1];
      } else {
        break;
      }
    }
    return current;
  };

  const handleBookClick = (entry) => {
    if (searchQuery) {
        setViewingEntry(entry);
    } else {
        const lastPage = getLastPageOfBook(entry);
        setViewingEntry(lastPage);
    }
  };

  const handleVaultClick = async (entry) => {
    if (entry.unlockLocation) {
      if (!("geolocation" in navigator)) { showDialog({ title: 'Fehler', message: 'Ortung nicht verfügbar.', icon: 'x' }); return; }
      navigator.geolocation.getCurrentPosition((pos) => {
        const dist = getDistance(pos.coords.latitude, pos.coords.longitude, entry.unlockLocation.lat, entry.unlockLocation.lng);
        if (dist > 200) { showDialog({ title: 'Blockiert', message: 'Das Orts-Siegel hält stand. Du bist zu weit entfernt. Gehe an den Ursprungsort zurück.', icon: 'lock', iconColor: 'text-rose-500' }); return; }
        else { triggerUnlock(entry); }
      }, () => { showDialog({ title: 'Fehler', message: 'Dein Ort konnte nicht ermittelt werden.', icon: 'x' }); });
    } else { triggerUnlock(entry); }
  };

  const triggerUnlock = (entry) => {
    if (!user.pin) { showDialog({ title: 'Hinweis', message: 'Bitte richte zuerst eine PIN in den Einstellungen ein.', icon: 'key-round' }); setView('settings'); return; }
    setUnlockTarget(entry); setPinInput(''); setPinError(false);
  };

  const submitPin = () => {
    if (pinInput === user.pin) { 
      handleBookClick(unlockTarget); 
      setUnlockTarget(null); 
      setPinInput('');
    }
    else { setPinError(true); setTimeout(() => setPinError(false), 800); setPinInput(''); }
  };

  const getBookLength = (rootId) => {
    let count = 1;
    let currentId = rootId;
    while (true) {
      const child = entries.find(e => e.parentId === currentId);
      if (child) {
        count++;
        currentId = child.id;
      } else {
        break;
      }
    }
    return count;
  };

  const now = new Date();
  
  const visibleEntries = useMemo(() => {
    return entries.filter(e => {
      const q = searchQuery.toLowerCase();
      const matchesSearch = e.title.toLowerCase().includes(q) || (e.text && e.text.toLowerCase().includes(q));
      
      if (searchQuery && !matchesSearch) return false;
      if (!searchQuery && e.parentId) return false;

      const matchesCategory = activeCategory === 'Alle' || e.category === activeCategory;
      if (!searchQuery && !matchesCategory) return false;
      
      if (view === 'dashboard') return !e.locked && !e.archived;
      if (view === 'vault') return e.locked && !e.archived;
      if (view === 'archive') return e.archived;
      return false;
    });
  }, [entries, searchQuery, activeCategory, view]);

  const renderEntries = visibleEntries;

  const highlightText = (text, query) => {
      if (!text) return { __html: '' };
      let safeText = text.replace(/<img[^>]*>/g, '[Bild]');
      
      safeText = window.DOMPurify ? window.DOMPurify.sanitize(safeText, { ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'u', 'br', 'div', 'span', 'blockquote', 'p', 'ul', 'ol', 'li', 'h1', 'h2', 'h3'], ALLOWED_ATTR: ['style', 'class', 'dir'] }) : safeText;
      
      if (!query) return { __html: safeText };
      const plainText = safeText.replace(/<[^>]*>?/gm, '');
      const parts = plainText.split(new RegExp(`(${query})`, 'gi'));
      
      const highlighted = parts.map((part, i) => 
          part.toLowerCase() === query.toLowerCase() ? `<span class="search-highlight" key="${i}">${part}</span>` : part
      ).join('');
      
      return { __html: highlighted };
  };

  const allQuotes = useMemo(() => {
     if (view !== 'quotes') return [];
     let quotes = [];
     entries.filter(e => !e.archived).forEach(entry => {
         if(!entry.text) return;
         const blockquoteRegex = /<blockquote[^>]*>([\s\S]*?)<\/blockquote>/gi;
         let match;
         while ((match = blockquoteRegex.exec(entry.text)) !== null) {
             const rawText = match[1].replace(/<[^>]*>?/gm, '').trim();
             if(rawText) {
                 quotes.push({ text: rawText, date: entry.date, title: entry.title, id: entry.id + match.index, entryId: entry.id });
             }
         }
     });
     return quotes.sort((a,b) => new Date(b.date) - new Date(a.date));
  }, [entries, view]);

  const heatmapData = useMemo(() => {
    return Array.from({ length: 30 }).map((_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (29 - i));
      const dateStr = d.toDateString();
      const count = entries.filter(e => new Date(e.date).toDateString() === dateStr).length;
      return { date: dateStr, count };
    });
  }, [entries]);

  const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
  const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

  const today = new Date();
  
  const timeMachineEntry = useMemo(() => {
    const todayStr = today.getDate() + '-' + today.getMonth();
    const match = entries.find(e => {
      if (e.locked || e.archived || e.parentId) return false;
      const eDate = new Date(e.date);
      return eDate.getDate() + '-' + eDate.getMonth() === todayStr && eDate.getFullYear() < today.getFullYear();
    });
    return match || null;
  }, [entries]);

  const { completedPillars, totalPillars, progressPercent } = useMemo(() => {
    const completed = PILLARS.filter(p => entries.some(e => e.title === p.title)).length;
    const total = PILLARS.length;
    const percent = Math.round((completed / total) * 100);
    return { completedPillars: completed, totalPillars: total, progressPercent: percent };
  }, [entries]);

  const onTouchStart = (e) => {
    setTouchEndPos({x: null, y: null});
    setTouchStartPos({x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY});
  };

  const onTouchMove = (e) => {
    setTouchEndPos({x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY});
  };

  const onTouchEnd = (swipeNext, swipePrev) => {
    if (!touchStartPos.x || !touchEndPos.x) return;
    const xDistance = touchStartPos.x - touchEndPos.x;
    const yDistance = Math.abs(touchStartPos.y - touchEndPos.y);
    
    if (yDistance < 60 && Math.abs(xDistance) > 50) {
      if (xDistance > 0 && swipeNext) {
        setViewingEntry(swipeNext); 
      } else if (xDistance < 0 && swipePrev) {
        setViewingEntry(swipePrev);
      }
    }
  };

  // Verhindert, dass der Handy-Browser beim Scrollen das gesamte Fenster verschiebt
  useEffect(() => {
    if (showEditor || viewingEntry || unlockTarget || dialog || picker || showTimeline) {
      document.body.classList.add('modal-open');
    } else {
      document.body.classList.remove('modal-open');
    }
    return () => document.body.classList.remove('modal-open');
  }, [showEditor, viewingEntry, unlockTarget, dialog, picker, showTimeline]);

  if (importId && !isLoaded) {
    return <div className="min-h-screen flex items-center justify-center bg-slate-900"><div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div></div>;
  }
  if (importId && isLoaded) {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-slate-900 text-white text-center">
        <Icon name="smartphone" size={64} className="text-emerald-500 mb-6 animate-pulse" />
        <h1 className="text-3xl font-bold font-serif mb-4">Geräte-Kopplung</h1>
        <p className="opacity-80 text-lg mb-8 max-w-sm">{syncStatus || "Initialisiere..."}</p>
        {(syncStatus.includes('Fehler') || syncStatus.includes('erfolgreich')) && (
          <button type="button" onClick={() => window.location.href = window.location.origin + window.location.pathname} className="px-8 py-4 bg-white text-slate-900 font-bold rounded-xl mt-4 shadow-lg hover:scale-105 transition-transform">Zurück zum Start</button>
        )}
      </div>
    );
  }

  if (view === 'loading') return <div className="min-h-screen flex items-center justify-center" style={{ backgroundColor: user.appBgColor || (user.isDark ? '#09090b' : '#ffffff') }}><div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div></div>;

  if (view === 'onboarding') {
    return (
      <div className="min-h-screen flex items-center justify-center p-6 relative" style={{ backgroundColor: user.appBgColor || (user.isDark ? '#09090b' : '#f8fafc'), color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : (user.isDark ? '#ffffff' : '#0f172a') }}>
        <div className="max-w-md w-full space-y-8 animate-slide-up z-10">
          <div className="text-center space-y-2">
            <Icon name="book-open" size={48} className="mx-auto mb-6" style={{ color: user.nameColor || '#f59e0b' }} />
            <h1 className="text-4xl font-extrabold font-serif">Dein Vermächtnis</h1>
            <p className="text-lg opacity-60 font-light">Ein Ort für deine tiefsten Visionen.</p>
          </div>
          <div className="p-8 rounded-[2rem] shadow-xl border bg-white border-slate-200 dark:bg-graphite-900 dark:border-white/10">
            <div className="space-y-6">
              <div>
                <label className="block text-xs font-bold opacity-70 mb-3 uppercase tracking-widest">Wie lautet dein Name?</label>
                <input type="text" value={user.name} onChange={(e) => setUser({...user, name: e.target.value})} className="w-full p-4 rounded-xl border outline-none text-lg bg-slate-50 border-slate-200 dark:bg-black/20 dark:border-transparent text-slate-900 dark:text-white" placeholder="Schreibe hier..." style={{ borderColor: user.nameColor }} />
              </div>
              <button type="button" onClick={() => user.name.trim() ? setView('dashboard') : showDialog({ title: 'Name fehlt', message: 'Bitte gib deinen Namen ein.', icon: 'user' })} className="w-full py-4 rounded-xl font-bold text-lg hover:scale-[1.02] transition-transform shadow-md" style={{ backgroundColor: user.nameColor || '#18181b', color: isDarkColor(user.nameColor || '#18181b') ? '#ffffff' : '#000000' }}>
                Journal beginnen
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <ErrorBoundary>
      <div className="min-h-screen">

        {viewingEntry && !showEditor && (() => {
          const prevPage = viewingEntry.parentId ? entries.find(e => e.id === viewingEntry.parentId) : null;
          const children = entries.filter(e => e.parentId === viewingEntry.id).sort((a,b) => new Date(a.date) - new Date(b.date));
          const nextPage = children.length > 0 ? children[0] : null;

          let swipeNext = nextPage;
          let swipePrev = prevPage;
          let isHierarchical = viewingEntry.parentId || children.length > 0;
          
          if (!isHierarchical) {
              const visibleChronological = visibleEntries.sort((a,b) => new Date(b.orderTimestamp || b.date) - new Date(a.orderTimestamp || a.date));
              const currentIndex = visibleChronological.findIndex(e => e.id === viewingEntry.id);
              if (currentIndex > 0) swipeNext = visibleChronological[currentIndex - 1];
              if (currentIndex < visibleChronological.length - 1) swipePrev = visibleChronological[currentIndex + 1];
          }

          const prevLabel = isHierarchical ? "Vorherige Seite" : "Neuerer Eintrag";
          const nextLabel = isHierarchical ? "Nächste Seite" : "Älterer Eintrag";

          const bookRoot = getBookRoot(viewingEntry.id);
          const allBookEntries = getAllBookEntries(bookRoot ? bookRoot.id : viewingEntry.id);

          const entryImages = viewingEntry.images || (viewingEntry.image ? [viewingEntry.image] : []);
          const hasMultipleImages = entryImages.length > 1;

          return (
            <div 
              className="fixed inset-0 z-[80] overflow-y-auto animate-fade-in custom-scrollbar flex flex-col overscroll-contain screen-only viewer-gallery-container" 
              style={{ backgroundColor: user.appBgColor || (user.isDark ? '#09090b' : '#ffffff'), color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
            >
              <div className="sticky top-0 z-50 flex justify-between items-center py-4 px-6 sm:px-12 bg-inherit shrink-0 no-print border-b" style={{ borderColor: 'rgba(150,150,150,0.1)' }}>
                <div className="flex gap-2">
                  <button type="button" onClick={handleViewerBack} className="p-3 rounded-full shadow-sm hover:scale-105 transition-transform" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}><Icon name="arrow-left" size={20}/></button>
                  
                  {allBookEntries.length > 1 && (
                    <button type="button" onClick={() => setShowTimeline(true)} className="p-3 rounded-full shadow-sm hover:scale-105 transition-transform" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: user.nameColor }} title="Inhaltsverzeichnis & Zeitreise">
                      <Icon name="list" size={20}/>
                    </button>
                  )}
                </div>
                
                <div className="flex gap-2">
                  <button type="button" onClick={exportText} className="p-3 rounded-full shadow-sm hover:scale-105 transition-transform" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }} title="Gesamtes Buch drucken">
                    <Icon name="printer" size={20}/>
                  </button>
                  <button type="button"
                    onClick={() => handleReadAloud(viewingEntry)} 
                    className={`px-5 py-2.5 rounded-full font-bold text-sm flex items-center gap-2 transition-all ${isSpeaking ? 'audio-active' : 'hover:scale-105 transition-transform'}`}
                    style={{ backgroundColor: isSpeaking ? 'rgba(245, 158, 11, 0.1)' : 'rgba(150,150,150,0.1)', color: 'inherit' }}
                  >
                    <Icon name={isSpeaking ? "volume-2" : "volume-1"} size={18}/>
                    <span className="hidden sm:inline">{isSpeaking ? "Stopp" : "Vorlesen"}</span>
                  </button>
                  <button type="button" onClick={() => { const e = viewingEntry; setViewingEntry(null); openEditor(e); }} className="px-5 py-2.5 rounded-full font-bold text-sm hover:scale-105 transition-transform" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}>Bearbeiten</button>
                </div>
              </div>

              <div 
                className="max-w-2xl w-full mx-auto min-h-screen flex flex-col px-6 sm:px-12 pb-12"
                onTouchStart={onTouchStart}
                onTouchMove={onTouchMove}
                onTouchEnd={() => onTouchEnd(swipeNext, swipePrev)}
              >
                <div className="flex-1 mt-4">
                  
                  {entryImages.length > 0 && (
                      <div className="relative w-full rounded-[2rem] mb-10 overflow-hidden shadow-lg border no-print group aspect-[16/10]" style={{ borderColor: 'rgba(150,150,150,0.1)', backgroundColor: 'rgba(0,0,0,0.03)' }}>
                          <img src={entryImages[currentViewerImgIdx]} className="w-full h-full object-contain" alt={`Vision ${currentViewerImgIdx+1}`} />
                          
                          {hasMultipleImages && (
                              <>
                                  <div className="absolute inset-0 flex justify-between items-center px-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                      <button type="button" onClick={(e) => { e.stopPropagation(); setCurrentViewerImgIdx(prev => (prev - 1 + entryImages.length) % entryImages.length); }} className="p-3 bg-black/50 text-white rounded-full backdrop-blur-sm hover:scale-110"><Icon name="chevron-left" /></button>
                                      <button type="button" onClick={(e) => { e.stopPropagation(); setCurrentViewerImgIdx(prev => (prev + 1) % entryImages.length); }} className="p-3 bg-black/50 text-white rounded-full backdrop-blur-sm hover:scale-110"><Icon name="chevron-right" /></button>
                                  </div>
                                  
                                  <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 p-2 bg-black/30 rounded-full backdrop-blur-sm">
                                      {entryImages.map((_, index) => (
                                          <div key={index} className={`w-2 h-2 rounded-full transition-all ${currentViewerImgIdx === index ? 'bg-white' : 'bg-white/40'}`} />
                                      ))}
                                  </div>
                              </>
                          )}
                      </div>
                  )}

                  <h1 className="text-4xl sm:text-5xl font-bold mb-6 leading-tight font-serif">{viewingEntry.title}</h1>
                  <div className="flex flex-wrap gap-4 mb-10 text-xs font-bold uppercase tracking-widest opacity-60">
                    <span className="flex items-center gap-1"><Icon name="calendar" size={14}/> {new Date(viewingEntry.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })}</span>
                    <span>•</span><span>{viewingEntry.category}</span>
                    {viewingEntry.mood && (() => {
                      const moodObj = MOODS.find(m=>m.label===viewingEntry.mood);
                      if (!moodObj) return null;
                      return <><span className="mx-2">•</span><span className={`flex items-center gap-1`}><Icon name={moodObj.iconName} size={14}/> {viewingEntry.mood}</span></>
                    })()}
                  </div>
                  <div className="text-lg sm:text-xl leading-relaxed legacy-editor-content pb-10" dangerouslySetInnerHTML={createSafeHtml(viewingEntry.text)} />
                  {viewingEntry.audio && <div className="mt-8 mb-10 p-4 rounded-2xl border no-print" style={{ backgroundColor: 'rgba(150,150,150,0.05)', borderColor: 'rgba(150,150,150,0.1)' }}><audio src={viewingEntry.audio} controls className="w-full" /></div>}
                </div>
                <div className="flex flex-col gap-6 mt-12 pt-8 border-t pb-20 shrink-0 no-print" style={{ borderColor: 'rgba(150,150,150,0.2)' }}>
                  
                  {!nextPage && (
                    <button type="button" onClick={() => startNewChapter(viewingEntry)} className="w-full py-4 rounded-2xl font-bold text-base hover:scale-[1.02] transition-transform shadow-md flex items-center justify-center gap-2" style={{ backgroundColor: user.nameColor || '#18181b', color: isDarkColor(user.nameColor || '#18181b') ? '#ffffff' : '#000000' }}>
                      <Icon name="plus" size={20}/> Neue Seite anfügen
                    </button>
                  )}

                  <div className="flex justify-between items-center w-full">
                    {swipePrev ? (
                      <button type="button" onClick={() => setViewingEntry(swipePrev)} className="flex items-center gap-3 text-left group flex-1">
                        <div className="p-3 rounded-full shadow-sm border border-transparent group-hover:scale-105 transition-transform" style={{ backgroundColor: 'rgba(150,150,150,0.05)', color: 'inherit' }}><Icon name="chevron-left" size={20} /></div>
                        <div className="overflow-hidden">
                          <p className="text-[10px] uppercase tracking-widest font-bold opacity-50">{prevLabel}</p>
                          <p className="text-sm font-medium truncate w-full">{swipePrev.title}</p>
                        </div>
                      </button>
                    ) : <div className="flex-1" />}
                    
                    {swipeNext ? (
                      <button type="button" onClick={() => setViewingEntry(swipeNext)} className="flex items-center justify-end gap-3 text-right group flex-1">
                        <div className="overflow-hidden">
                          <p className="text-[10px] uppercase tracking-widest font-bold opacity-50">{nextLabel}</p>
                          <p className="text-sm font-medium truncate w-full">{swipeNext.title}</p>
                        </div>
                        <div className="p-3 rounded-full shadow-sm border border-transparent group-hover:scale-105 transition-transform" style={{ backgroundColor: 'rgba(150,150,150,0.05)', color: 'inherit' }}><Icon name="chevron-right" size={20} /></div>
                      </button>
                    ) : <div className="flex-1" />}
                  </div>
                </div>
              </div>
            </div>
          );
        })()}

        {viewingEntry && !showEditor && (
          <div className="print-only w-full max-w-4xl mx-auto p-8">
            {getAllBookEntries(getBookRoot(viewingEntry.id)?.id || viewingEntry.id).map((entry) => (
              <div key={entry.id} className="mb-16 page-break-after">
                <div className="text-center mb-8 pb-4 border-b border-black/10">
                  <h1 className="text-4xl font-serif font-bold mb-2">{entry.title}</h1>
                  <p className="opacity-60 font-bold uppercase tracking-widest text-xs">
                    {new Date(entry.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })} • {entry.category}
                  </p>
                </div>
                
                {(entry.images || (entry.image ? [entry.image] : [])).map((img, idx) => (
                    <img key={idx} src={img} className="w-full object-contain mb-8 rounded-2xl" alt={`Vision ${idx+1}`} />
                ))}

                <div className="text-lg leading-relaxed legacy-editor-content" dangerouslySetInnerHTML={createSafeHtml(entry.text)}></div>
              </div>
            ))}
          </div>
        )}

        {showTimeline && viewingEntry && !showEditor && (() => {
           const bookRoot = getBookRoot(viewingEntry.id);
           const bookEntries = getAllBookEntries(bookRoot?.id || viewingEntry.id);
           
           const filteredEntries = bookEntries.filter(e => {
               const matchesSearch = timelineSearchQuery ? (e.title.toLowerCase().includes(timelineSearchQuery.toLowerCase()) || (e.text && e.text.toLowerCase().includes(timelineSearchQuery.toLowerCase()))) : true;
               const matchesDate = timelineSelectedDate ? new Date(e.date).toDateString() === timelineSelectedDate : true;
               return matchesSearch && matchesDate;
           });

           const grouped = {};
           filteredEntries.forEach(entry => {
              const d = new Date(entry.date);
              const y = d.getFullYear();
              const m = d.toLocaleDateString('de-DE', { month: 'long' });
              if (!grouped[y]) grouped[y] = {};
              if (!grouped[y][m]) grouped[y][m] = [];
              grouped[y][m].push(entry);
           });

           const daysInMonth = getDaysInMonth(timelineMonth.getFullYear(), timelineMonth.getMonth());
           const firstDay = (getFirstDayOfMonth(timelineMonth.getFullYear(), timelineMonth.getMonth()) + 6) % 7; 

           return (
             <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex justify-end animate-fade-in no-print" onClick={() => setShowTimeline(false)}>
                <div 
                   className="w-full max-w-md h-full shadow-2xl animate-slide-up flex flex-col" 
                   style={{ backgroundColor: user.appBgColor || (user.isDark ? '#18181b' : '#ffffff'), color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
                   onClick={e=>e.stopPropagation()}
                >
                   
                   <div className="p-6 border-b space-y-4" style={{ borderColor: 'rgba(150,150,150,0.1)', backgroundColor: 'rgba(150,150,150,0.05)' }}>
                      <div className="flex justify-between items-center">
                         <h3 className="font-serif font-bold text-xl flex items-center gap-2" style={{ color: user.nameColor }}><Icon name="calendar-days" /> Zeitreise</h3>
                         <button type="button" onClick={()=>setShowTimeline(false)} className="p-2 rounded-full" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}><Icon name="x" size={20}/></button>
                      </div>
                      
                      <div className="relative">
                         <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 opacity-50" style={{ color: 'inherit' }} />
                         <input 
                            type="text" 
                            placeholder="In diesem Buch suchen..." 
                            value={timelineSearchQuery}
                            onChange={(e) => setTimelineSearchQuery(e.target.value)}
                            className="w-full pl-10 pr-4 py-3 rounded-xl border outline-none focus:ring-2 text-sm"
                            style={{ backgroundColor: 'rgba(150,150,150,0.1)', borderColor: 'transparent', '--tw-ring-color': user.nameColor, color: 'inherit' }}
                         />
                      </div>
                   </div>

                   <div className="flex-1 overflow-y-auto custom-scrollbar" style={{ color: 'inherit' }}>
                      
                      <div className="p-6 border-b" style={{ borderColor: 'rgba(150,150,150,0.1)', backgroundColor: 'rgba(150,150,150,0.02)' }}>
                          <div className="flex justify-between items-center mb-4">
                             <button type="button" onClick={() => {const d = new Date(timelineMonth); d.setMonth(d.getMonth()-1); setTimelineMonth(d);}} className="p-2 rounded-full" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}><Icon name="chevron-left" size={18}/></button>
                             <span className="font-bold text-sm uppercase tracking-widest">{timelineMonth.toLocaleDateString('de-DE', { month: '2-digit', year: 'numeric' })}</span>
                             <button type="button" onClick={() => {const d = new Date(timelineMonth); d.setMonth(d.getMonth()+1); setTimelineMonth(d);}} className="p-2 rounded-full" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}><Icon name="chevron-right" size={18}/></button>
                          </div>
                          
                          <div className="grid grid-cols-7 gap-1 text-center">
                             {['Mo','Di','Mi','Do','Fr','Sa','So'].map(d => <div key={d} className="text-[10px] font-bold opacity-50 py-2">{d}</div>)}
                             {Array(firstDay).fill(null).map((_, i) => <div key={`empty-${i}`} />)}
                             {Array(daysInMonth).fill(null).map((_, i) => {
                                 const day = i + 1;
                                 const dateStr = new Date(timelineMonth.getFullYear(), timelineMonth.getMonth(), day).toDateString();
                                 const hasEntry = bookEntries.some(e => new Date(e.date).toDateString() === dateStr);
                                 const isSelected = timelineSelectedDate === dateStr;
                                 
                                 return (
                                     <button type="button"
                                         key={day} 
                                         onClick={() => setTimelineSelectedDate(isSelected ? null : dateStr)}
                                         className={`relative p-2 text-sm rounded-full transition-all flex items-center justify-center aspect-square ${isSelected ? 'shadow-md font-bold' : ''} ${hasEntry && !isSelected ? 'font-bold' : ''}`}
                                         style={isSelected ? { backgroundColor: user.nameColor, color: isDarkColor(user.nameColor) ? '#ffffff' : '#000000' } : { backgroundColor: 'transparent', color: 'inherit' }}
                                     >
                                         <span>{day}</span>
                                         {hasEntry && !isSelected && <div className="absolute bottom-1 w-1 h-1 rounded-full" style={{ backgroundColor: user.nameColor }}></div>}
                                     </button>
                                 );
                             })}
                          </div>
                          {timelineSelectedDate && (
                             <div className="mt-4 text-center">
                                <button type="button" onClick={() => setTimelineSelectedDate(null)} className="text-[10px] uppercase font-bold tracking-widest opacity-60 hover:opacity-100">Filter aufheben</button>
                             </div>
                          )}
                      </div>

                      <div className="p-6">
                        {Object.keys(grouped).length === 0 ? (
                           <p className="text-center opacity-50 text-sm mt-8">Keine Einträge für diesen Filter gefunden.</p>
                        ) : Object.keys(grouped).sort((a,b)=>b-a).map(year => (
                           <div key={year} className="mb-4 border-b pb-4 last:border-0" style={{ borderColor: 'rgba(150,150,150,0.1)' }}>
                              <button type="button" onClick={() => setExpandedNodes(p => ({...p, [year]: !p[year]}))} className="w-full flex justify-between items-center text-left py-2 hover:opacity-70 transition-opacity">
                                 <h4 className="font-black text-3xl opacity-80" style={{ color: 'inherit' }}>{year}</h4>
                                 <Icon name={expandedNodes[year] ? "chevron-up" : "chevron-down"} size={24} />
                              </button>
                              
                              {expandedNodes[year] && (
                                <div className="mt-4">
                                  {Object.keys(grouped[year]).map(month => {
                                     const monthKey = `${year}-${month}`;
                                     return (
                                     <div key={month} className="mb-4 pl-4 border-l-2" style={{ borderColor: `${user.nameColor}40` }}>
                                        <button type="button" onClick={() => setExpandedNodes(p => ({...p, [monthKey]: !p[monthKey]}))} className="w-full flex justify-between items-center text-left py-2 hover:opacity-70 transition-opacity">
                                          <h5 className="font-bold text-sm uppercase tracking-widest" style={{ color: user.nameColor }}>{month}</h5>
                                          <Icon name={expandedNodes[monthKey] ? "chevron-up" : "chevron-down"} size={18} style={{ color: user.nameColor }} />
                                        </button>

                                        {expandedNodes[monthKey] && (
                                        <div className="space-y-3 mt-4">
                                           {grouped[year][month].map(e => {
                                              const eImg = e.images?.[0] || e.image;
                                              return (
                                              <button type="button" key={e.id} onClick={() => { setViewingEntry(e); setShowTimeline(false); }} className={`w-full text-left p-4 rounded-xl transition-colors flex items-center gap-4 ${viewingEntry.id === e.id ? 'shadow-sm' : ''}`} style={viewingEntry.id === e.id ? { backgroundColor: `${user.nameColor}20`, border: `1px solid ${user.nameColor}50`, color: 'inherit' } : { backgroundColor: 'rgba(150,150,150,0.05)', color: 'inherit' }}>
                                                 {eImg && <img src={eImg} className="w-14 h-14 rounded-lg object-cover shrink-0 shadow-sm" alt="Thumbnail" />}
                                                 <div className="flex-1 min-w-0">
                                                    <div className="font-bold text-base truncate mb-1">{e.title}</div>
                                                    <div className="text-[10px] opacity-60 mt-1">{new Date(e.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })}</div>
                                                 </div>
                                              </button>
                                              );
                                           })}
                                        </div>
                                        )}
                                     </div>
                                     );
                                  })}
                                </div>
                              )}
                           </div>
                        ))}
                      </div>
                   </div>
                </div>
             </div>
           );
        })()}

        {dialog && (
          <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-xl animate-fade-in no-print" onClick={() => { if(dialog.type === 'alert') setDialog(null); }}>
            <div 
              className="w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl border animate-scale-in" 
              style={{ backgroundColor: user.appBgColor || (user.isDark ? '#18181b' : '#ffffff'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)', color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
              onClick={e => e.stopPropagation()}
            >
              {dialog.icon && (
                <div className="w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-6 shadow-inner" style={{ backgroundColor: 'rgba(150,150,150,0.1)' }}>
                  <Icon name={dialog.icon} size={36} className={dialog.iconColor || 'text-indigo-500'} style={!dialog.iconColor ? {color: user.nameColor} : {}} />
                </div>
              )}
              <h3 className="text-2xl font-bold leading-tight mb-4 font-serif" style={{ color: 'inherit' }}>{dialog.title}</h3>
              <p className="text-base opacity-70 mb-8 leading-relaxed px-2 whitespace-pre-wrap" style={{ color: 'inherit' }}>{dialog.message}</p>
              <div className="flex flex-col gap-3 w-full">
                <button type="button"
                  className="w-full py-4 text-white rounded-2xl font-bold shadow-md text-base transition-transform active:scale-95"
                  style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#18181b'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#18181b')) ? '#ffffff' : '#000000' }}
                  onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); else setDialog(null); }}
                >{dialog.confirmLabel || 'Verstanden'}</button>
                {dialog.type !== 'alert' && (
                  <button type="button"
                    className="w-full py-4 rounded-2xl font-bold text-base transition-colors active:scale-95"
                    style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}
                    onClick={() => { if(dialog.onCancel) dialog.onCancel(); else setDialog(null); }}
                  >{dialog.cancelLabel || 'Abbrechen'}</button>
                )}
              </div>
            </div>
          </div>
        )}

        {picker && (
          <div className="fixed inset-0 z-[250] flex items-end sm:items-center justify-center p-4 sm:p-6 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-xl animate-fade-in no-print" onClick={() => setPicker(null)}>
            <div 
              className="w-full max-w-sm rounded-[2.5rem] shadow-2xl border overflow-hidden animate-slide-up flex flex-col max-h-[80vh]" 
              style={{ backgroundColor: user.appBgColor || (user.isDark ? '#18181b' : '#ffffff'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)', color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
              onClick={e => e.stopPropagation()}
            >
              <div className="p-6 border-b flex justify-between items-center shrink-0" style={{ borderColor: 'rgba(150,150,150,0.1)', backgroundColor: 'rgba(150,150,150,0.05)' }}>
                <h3 className="font-bold text-xl font-serif" style={{ color: 'inherit' }}>{picker.title}</h3>
                <button type="button" onClick={() => setPicker(null)} className="p-2 rounded-full hover:scale-110 transition-transform" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}><Icon name="x" size={20}/></button>
              </div>
              <div className="overflow-y-auto custom-scrollbar p-3 space-y-1 overscroll-contain">
                {picker.options.map(opt => (
                  <button type="button"
                    key={opt.value}
                    onClick={() => { picker.onSelect(opt.value); setPicker(null); }}
                    className="w-full text-left p-4 rounded-2xl transition-all font-bold text-base flex justify-between items-center"
                    style={picker.currentValue === opt.value ? { backgroundColor: user.nameColor, color: isDarkColor(user.nameColor) ? '#ffffff' : '#000000', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.1)' } : { color: 'inherit', backgroundColor: 'transparent' }}
                  >
                    <span className="truncate">{opt.label}</span>
                    {picker.currentValue === opt.value && <Icon name="check" size={18} />}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {unlockTarget && (
          <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 no-print">
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={() => { setUnlockTarget(null); }} />
            <div 
              className="relative w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl animate-scale-in border z-10"
              style={{ backgroundColor: user.appBgColor || (user.isDark ? '#18181b' : '#ffffff'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)', color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
            >
              <div className="flex flex-col items-center w-full animate-fade-in">
                <div className="w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-inner" style={{ backgroundColor: 'rgba(150,150,150,0.1)' }}>
                  <Icon name="lock" size={28} style={{ color: user.nameColor || '#f59e0b' }} />
                </div>
                <h3 className="text-2xl font-bold mb-2 font-serif" style={{ color: 'inherit' }}>Tresor Entsperren</h3>
                <p className="text-sm opacity-60 mb-6 truncate w-full" style={{ color: 'inherit' }}>"{unlockTarget.title}"</p>
                <input type="password" inputMode="numeric" pattern="[0-9]*" autoFocus value={pinInput} onChange={(e) => setPinInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && submitPin()} 
                       className="w-full p-4 text-center text-2xl tracking-[1em] rounded-xl border-2 outline-none focus:ring-2"
                       style={{ backgroundColor: 'rgba(150,150,150,0.1)', borderColor: pinError ? '#ef4444' : 'transparent', '--tw-ring-color': user.nameColor || '#f59e0b', color: 'inherit' }}
                       placeholder="••••" />
                <div className="flex gap-3 w-full mt-6">
                  <button type="button" onClick={() => setUnlockTarget(null)} className="flex-1 py-3 font-medium opacity-60 rounded-xl transition-colors hover:opacity-100" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}>Abbrechen</button>
                  <button type="button" onClick={submitPin} className="flex-1 py-3 rounded-xl font-bold shadow-md hover:opacity-90" style={{ backgroundColor: user.nameColor || '#f59e0b', color: isDarkColor(user.nameColor || '#f59e0b') ? '#ffffff' : '#000000' }}>Öffnen</button>
                </div>
              </div>
            </div>
          </div>
        )}

        <header 
          className="sticky top-0 z-30 backdrop-blur-xl border-b px-4 py-3 sm:px-6 sm:py-4 transition-colors duration-500 flex justify-between items-center relative no-print"
          style={{ backgroundColor: user.appBgColor ? `${user.appBgColor}E6` : (user.isDark ? 'rgba(24, 24, 27, 0.8)' : 'rgba(255, 255, 255, 0.9)'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)', color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
        >
          <div className="flex items-center gap-3 flex-1 overflow-hidden z-10">
            {view === 'settings' ? <h1 className="text-xl font-bold tracking-tight font-serif" style={{ color: 'inherit' }}>Einstellungen</h1> :
             view === 'menu' ? <h1 className="text-xl font-bold tracking-tight font-serif" style={{ color: 'inherit' }}>Entdecken</h1> :
             view === 'quotes' ? <h1 className="text-xl font-bold tracking-tight font-serif" style={{color: user.nameColor}}>Erkenntnisse</h1> :
             view === 'wisdom' ? <h1 className="text-xl font-bold tracking-tight font-serif" style={{ color: 'inherit' }}>Buch der Weisheit</h1> :
             view === 'burn' ? <h1 className="text-xl font-bold tracking-tight font-serif text-rose-500">Katharsis</h1> :
            (
              <>
                {user.avatar && <img src={user.avatar} alt="Profil" className="w-10 h-10 rounded-full object-cover border-2 shadow-sm shrink-0" style={{ borderColor: user.nameColor || '#f59e0b' }} />}
                <div className="flex flex-col overflow-hidden w-full">
                  <h1 className="text-xl font-bold tracking-tight truncate font-serif" style={{ color: user.nameColor || '#f59e0b' }}>
                    {view === 'archive' ? 'Archiv' : user.name}
                  </h1>
                  {view === 'vault' && <p className="text-xs mt-0.5 font-medium flex items-center gap-1 text-rose-500"><Icon name="shield-check" size={14} /> Sicherer Tresor</p>}
                  {view === 'dashboard' && user.motto && <p className="text-[10px] sm:text-xs mt-1 italic font-medium whitespace-normal leading-snug opacity-70 w-full pr-4" style={{ color: 'inherit' }}>"{user.motto}"</p>}
                </div>
              </>
            )}
          </div>
          <div className="flex gap-1 items-center z-10 relative">
            {view === 'dashboard' && (
              <>
                <div className="relative flex items-center">
                  <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Tagebuch durchsuchen..." 
                         className={`absolute right-full mr-2 transition-all duration-300 border focus:ring-0 text-sm rounded-full backdrop-blur-md shadow-xl ${isSearchOpen ? 'w-[60vw] sm:w-64 px-4 py-2 opacity-100 pointer-events-auto' : 'w-0 p-0 border-transparent opacity-0 pointer-events-none'}`} 
                         style={{ backgroundColor: user.appBgColor ? `${user.appBgColor}F2` : (user.isDark ? 'rgba(15, 23, 42, 0.95)' : 'rgba(255, 255, 255, 0.95)'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)', color: 'inherit' }}
                  />
                  <button type="button" onClick={() => setIsSearchOpen(!isSearchOpen)} className={`relative z-10 p-2.5 rounded-full transition-colors hover:scale-105`} style={{ backgroundColor: (isSearchOpen || searchQuery) ? 'rgba(245, 158, 11, 0.2)' : 'rgba(150,150,150,0.1)', color: (isSearchOpen || searchQuery) ? '#f59e0b' : 'inherit' }}><Icon name="search" size={18}/></button>
                </div>
                <button type="button" onClick={() => setView('menu')} className="p-2.5 rounded-full transition-colors hover:scale-105" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}><Icon name="menu" size={18}/></button>
              </>
            )}
            {(view === 'settings' || view === 'menu' || view === 'archive' || view === 'wisdom' || view === 'burn' || view === 'quotes') && <button type="button" onClick={() => setView('dashboard')} className="p-2.5 rounded-full border border-transparent transition-colors hover:scale-105" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}><Icon name="x" size={18} /></button>}
          </div>

          {isSearchOpen && searchQuery && (
            <div 
              className="absolute top-full left-4 right-4 mt-2 border rounded-2xl shadow-2xl max-h-[60vh] overflow-y-auto custom-scrollbar z-[100]"
              style={{ backgroundColor: user.appBgColor || (user.isDark ? '#1e293b' : '#ffffff'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)' }}
            >
              {renderEntries.length === 0 ? (
                <div className="p-4 text-center opacity-50 text-sm font-medium" style={{ color: 'inherit' }}>Keine Einträge gefunden.</div>
              ) : (
                renderEntries.map(entry => (
                  <button type="button"
                    key={entry.id} 
                    onClick={() => { handleBookClick(entry); setIsSearchOpen(false); setSearchQuery(''); }} 
                    className="w-full text-left p-4 border-b last:border-0 transition-colors flex flex-col gap-1"
                    style={{ borderColor: user.isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)', color: 'inherit' }}
                  >
                    <div className="font-bold text-sm" style={{ color: 'inherit' }} dangerouslySetInnerHTML={highlightText(entry.title, searchQuery)}></div>
                    <div className="text-xs opacity-70 line-clamp-2" style={{ color: 'inherit' }} dangerouslySetInnerHTML={highlightText(entry.text, searchQuery)}></div>
                    <div className="text-[10px] text-amber-500 font-bold uppercase tracking-widest mt-1">
                      {new Date(entry.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })} {entry.parentId && '• Gefunden auf Unterseite'}
                    </div>
                  </button>
                ))
              )}
            </div>
          )}
        </header>

        <main className="p-4 sm:p-6 max-w-4xl mx-auto min-h-[60vh] relative z-10 pb-24 no-print">

          {installHint && view !== 'onboarding' && view !== 'loading' && (
            <div className="mb-6 p-4 bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-200 rounded-2xl text-xs font-bold leading-relaxed border border-amber-200 dark:border-amber-800/50 flex items-start gap-3 shadow-sm no-print">
               <Icon name="info" size={20} className="shrink-0 mt-0.5" />
               <p>{installHint}</p>
            </div>
          )}

          {view === 'quotes' && (() => {
             const allQuotes = typeof getExtractedQuotes !== 'undefined' ? getExtractedQuotes() : []; // Fallback safety
             return (
               <div className="animate-slide-up space-y-6 no-print">
                 <div className="text-center mb-10">
                   <h2 className="text-3xl font-serif font-bold mb-3" style={{ color: 'inherit' }}>Deine Erkenntnisse</h2>
                   <p className="opacity-60 max-w-xl mx-auto" style={{ color: 'inherit' }}>Alle von dir hervorgehobenen Zitate und Gedanken, gesammelt aus der Tiefe deines Journals.</p>
                 </div>
                 {allQuotes.length === 0 ? (
