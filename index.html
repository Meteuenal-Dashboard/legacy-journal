<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const safeStorageGet = (key) => { 
    try { return localStorage.getItem(key); } catch(e) { return null; } 
};
const safeStorageSet = (key, val) => { 
    try { localStorage.setItem(key, val); } catch(e) {} 
};

// --- ROBUSTER DATUMS PARSER ---
const safeParseDate = (dInput) => {
    if (!dInput) return new Date(0);
    if (dInput instanceof Date) {
        if (isNaN(dInput.getTime())) return new Date(0);
        return dInput;
    }
    if (typeof dInput === 'number') return new Date(dInput);
    
    let dStr = String(dInput).trim();
    
    // ISO-Strings direkt verarbeiten
    if (/^\d{4}-\d{2}-\d{2}/.test(dStr)) {
        let time = new Date(dStr).getTime();
        if (isNaN(time)) time = new Date(dStr + 'Z').getTime();
        return isNaN(time) ? new Date(0) : new Date(time);
    }
    
    // Fängt deutsches Format ab: TT.MM.JJJJ (z.B. 01.04.2026)
    const deMatch = dStr.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
    if (deMatch) {
        const timeMatch = dStr.match(/\s(\d{2}:\d{2}:\d{2})/);
        const timePart = timeMatch ? timeMatch[1] : '12:00:00';
        return new Date(`${deMatch[3]}-${deMatch[2].padStart(2, '0')}-${deMatch[1].padStart(2, '0')}T${timePart}Z`);
    }
    
    let time = new Date(dStr).getTime();
    if (isNaN(time)) time = new Date(dStr + 'Z').getTime();
    if (isNaN(time)) time = new Date(dStr.replace(' ', 'T') + 'Z').getTime();
    
    return isNaN(time) ? new Date(0) : new Date(time);
};

// ZENTRALE SORTIERUNG: Das Neueste IMMER zuerst! (Strikt nach Kalendertag!)
const sortEntriesChronological = (a, b) => {
    const timeA = safeParseDate(a.date).getTime();
    const timeB = safeParseDate(b.date).getTime();
    
    const dateA = new Date(timeA);
    const dateB = new Date(timeB);
    
    // Wir löschen die Uhrzeit für den Vergleich, um strikt den TAG zu priorisieren
    const dayA = new Date(dateA.getFullYear(), dateA.getMonth(), dateA.getDate()).getTime();
    const dayB = new Date(dateB.getFullYear(), dateB.getMonth(), dateB.getDate()).getTime();
    
    if (dayA !== dayB) {
        return dayB - dayA; // Wenn es unterschiedliche Tage sind, gewinnt IMMER der neuere Tag
    }
    
    // Wenn es derselbe Tag ist, nutzen wir orderTimestamp für die manuelle Sortierung (Up/Down)
    const orderA = safeParseDate(a.orderTimestamp || a.date).getTime();
    const orderB = safeParseDate(b.orderTimestamp || b.date).getTime();
    
    if (orderA === orderB) {
        return timeB - timeA;
    }
    return orderB - orderA;
};

const getLocalISO = () => new Date().toISOString();

const createSafeHtml = (htmlStr) => {
  const safeStr = htmlStr || '';
  return { 
      __html: window.DOMPurify ? window.DOMPurify.sanitize(safeStr, { 
          ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'u', 'br', 'div', 'span', 'blockquote', 'p', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'img', 'font'], 
          ALLOWED_ATTR: ['style', 'class', 'dir', 'src', 'alt', 'color', 'width', 'height', 'contenteditable'] 
      }) : safeStr 
  };
};

const highlightText = (text, query, isTitle = false) => {
  const safeStr = text || '';
  if (!safeStr) return { __html: '' };
  
  if (!query) {
      const safeHTML = window.DOMPurify ? window.DOMPurify.sanitize(safeStr.replace(/<img[^>]*>/g, ' [Bild] '), { 
          ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'u', 'br', 'div', 'span', 'blockquote', 'p', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'img', 'font'], 
          ALLOWED_ATTR: ['style', 'class', 'dir', 'src', 'alt', 'color', 'width', 'height', 'contenteditable'] 
      }) : safeStr;
      return { __html: safeHTML };
  }

  const plainText = safeStr.replace(/<img[^>]*>/g, ' [Bild] ').replace(/<[^>]*>?/gm, '').replace(/\s+/g, ' ').trim();
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  
  if (!isTitle) {
      const match = regex.exec(plainText);
      if (match) {
         const start = Math.max(0, match.index - 60);
         const end = Math.min(plainText.length, match.index + query.length + 60);
         let snippet = plainText.substring(start, end);
         if (start > 0) snippet = '...' + snippet;
         if (end < plainText.length) snippet = snippet + '...';
         
         const highlightedSnippet = snippet.split(regex).map((part, i) => 
             part.toLowerCase() === query.toLowerCase() ? `<span class="search-highlight" key="${i}">${part}</span>` : part
         ).join('');
         return { __html: highlightedSnippet };
      }
  }

  const highlighted = plainText.split(regex).map((part, i) =>
      part.toLowerCase() === query.toLowerCase() ? `<span class="search-highlight" key="${i}">${part}</span>` : part
  ).join('');
  return { __html: highlighted };
};

// --- INTELLIGENTE BILD-ERKENNUNG (COVER) ---
const getCoverImage = (entry) => {
    if (!entry) return null;
    if (entry.images && entry.images.length > 0) return entry.images[0];
    if (entry.text) {
        const match = entry.text.match(/<img[^>]+src="([^">]+)"/);
        if (match) return match[1];
    }
    return null;
};

const encHelper = new TextEncoder();
const decHelper = new TextDecoder();
const cryptoKeyCache = {}; 

const getCryptoKey = async (pin, saltStr) => {
    const cacheKey = pin + saltStr;
    if (cryptoKeyCache[cacheKey]) return cryptoKeyCache[cacheKey];
    const keyMaterial = await window.crypto.subtle.importKey("raw", encHelper.encode(pin), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]);
    const salt = Uint8Array.from(atob(saltStr), c => c.charCodeAt(0));
    const key = await window.crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
    cryptoKeyCache[cacheKey] = key; 
    return key;
};

const encryptData = async (text, pin) => {
    try {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const saltStr = btoa(String.fromCharCode.apply(null, salt));
        const ivStr = btoa(String.fromCharCode.apply(null, iv));
        const key = await getCryptoKey(pin, saltStr);
        const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encHelper.encode(text));
        
        const bytes = new Uint8Array(encrypted);
        let binary = '';
        const chunkSize = 8192;
        for (let i = 0; i < bytes.length; i += chunkSize) {
            binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
        }
        
        return { cipher: btoa(binary), iv: ivStr, salt: saltStr };
    } catch(e) { 
        console.error("Encryption failed", e); 
        return null; 
    }
};

const decryptData = async (encryptedObj, pin) => {
    if (!encryptedObj || !pin) return null;
    try {
        const salt = Uint8Array.from(atob(encryptedObj.salt), c => c.charCodeAt(0));
        const iv = Uint8Array.from(atob(encryptedObj.iv), c => c.charCodeAt(0));
        const atobCipher = atob(encryptedObj.cipher);
        const cipher = new Uint8Array(atobCipher.length);
        for (let i = 0; i < atobCipher.length; i++) {
            cipher[i] = atobCipher.charCodeAt(i);
        }
        const keyMaterial = await window.crypto.subtle.importKey("raw", encHelper.encode(pin), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]);
        const key = await window.crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, cipher);
        return decHelper.decode(decrypted);
    } catch(e) { 
        return null; 
    }
};

class ErrorBoundary extends React.Component {
  constructor(props) { 
      super(props); 
      this.state = { hasError: false, error: null }; 
  }
  
  static getDerivedStateFromError(error) { 
      return { hasError: true, error }; 
  }
  
  render() {
    if (this.state.hasError) {
      return (
        <div className="min-h-screen flex items-center justify-center bg-black text-white p-8 text-center">
          <div>
              <h1 className="text-2xl font-bold mb-4">Ein Moment bitte...</h1>
              <p className="opacity-70 mb-8">Die App hat sich verschluckt.</p>
              <button type="button" onClick={() => window.location.reload()} className="px-6 py-3 bg-white text-black font-bold rounded-full">Neu laden</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const Icon = ({ name, size = 24, className = '', ...props }) => {
  const spanRef = useRef(null);
  
  useEffect(() => {
    const renderIcon = () => {
      if (spanRef.current && window.lucide) {
        spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
        window.lucide.createIcons({ root: spanRef.current });
        const svg = spanRef.current.querySelector('svg');
        if (svg) { 
            svg.setAttribute('width', size); 
            svg.setAttribute('height', size); 
            if (className) svg.setAttribute('class', `lucide lucide-${name} ${className}`); 
        }
      }
    };
    if (window.lucide) renderIcon(); 
    else setTimeout(renderIcon, 100);
  }, [name, size, className]);
  
  return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} {...props}></span>;
};

const isDarkColor = (color) => {
  if (!color) return true;
  const hex = color.replace('#', '');
  if (hex.length === 6) {
    const r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
    return ((r * 299 + g * 587 + b * 114) / 1000) < 128;
  }
  return true; 
};

const getSubtleBorderColor = (hexColor, isDark) => {
    if (!hexColor) return isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
    const cleanHex = hexColor.replace('#', '');
    if (cleanHex.length === 6) {
        const r = parseInt(cleanHex.slice(0, 2), 16), g = parseInt(cleanHex.slice(2, 4), 16), b = parseInt(cleanHex.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${isDark ? 0.15 : 0.25})`;
    }
    return isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
};

const initDB = () => {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('LegacyVisionDB', 4);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('entries')) db.createObjectStore('entries', { keyPath: 'id' });
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
};

const TimelineSwipeableEntry = ({ entry, onClick, onArchivePrompt, onTrashPrompt }) => {
    const [offsetX, setOffsetX] = useState(0);
    const startX = useRef(null);
    const dragged = useRef(false);

    const handleTouchStart = (evt) => {
        startX.current = evt.touches[0].clientX;
        dragged.current = false;
    };

    const handleTouchMove = (evt) => {
        if (startX.current === null) return;
        const diff = evt.touches[0].clientX - startX.current;
        if (Math.abs(diff) > 10) dragged.current = true;
        if (diff > 100) setOffsetX(100);
        else if (diff < -100) setOffsetX(-100);
        else setOffsetX(diff);
    };

    const handleTouchEnd = () => {
        if (offsetX > 60) {
            onArchivePrompt(entry);
        } else if (offsetX < -60) {
            onTrashPrompt(entry);
        }
        setOffsetX(0);
        startX.current = null;
        setTimeout(() => { dragged.current = false; }, 100);
    };

    const coverUrl = getCoverImage(entry);

    return (
        <div className="relative w-full rounded-2xl overflow-hidden bg-slate-200 dark:bg-zinc-800 shrink-0 border border-slate-100 dark:border-zinc-800/50">
            <div className="absolute inset-0 flex justify-between items-center px-4">
                <div className="text-emerald-600 font-bold flex items-center gap-2 opacity-80 text-sm"><Icon name="archive" size={16}/> Archiv</div>
                <div className="text-rose-600 font-bold flex items-center gap-2 opacity-80 text-sm">Löschen <Icon name="trash-2" size={16}/></div>
            </div>
            <button 
                onTouchStart={handleTouchStart}
                onTouchMove={handleTouchMove}
                onTouchEnd={handleTouchEnd}
                onClick={(e) => {
                    if (dragged.current) { e.preventDefault(); return; }
                    onClick(entry);
                }} 
                style={{ transform: `translateX(${offsetX}px)`, transition: startX.current === null ? 'transform 0.2s ease-out' : 'none' }}
                className="relative z-10 w-full text-left p-3 flex items-center gap-4 bg-white dark:bg-zinc-900/90 shadow-sm"
            >
                {coverUrl ? (
                    <img src={coverUrl} className="w-14 h-14 rounded-xl object-cover shrink-0 pointer-events-none" />
                ) : (
                    <div className="w-14 h-14 rounded-xl bg-slate-100 dark:bg-zinc-800 flex items-center justify-center shrink-0 pointer-events-none">
                        <Icon name="book" size={24} className="opacity-40" />
                    </div>
                )}
                <div className="flex-1 overflow-hidden pointer-events-none">
                    <h4 className="font-bold text-sm text-accent truncate mb-1">{entry.title || 'Ohne Titel'}</h4>
                    <p className="text-[10px] opacity-60 font-bold tracking-widest uppercase">{safeParseDate(entry.orderTimestamp || entry.date).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})} UHR</p>
                </div>
            </button>
        </div>
    );
};

  const downloadFullApp = () => { const cloneDocument = document.cloneNode(true); const rootDiv = cloneDocument.getElementById('root'); if (rootDiv) rootDiv.innerHTML = ''; const existingInjected = cloneDocument.getElementById('legacy-injected-data'); if (existingInjected) existingInjected.remove(); const data = { user, entries }; const scriptEl = cloneDocument.createElement('script'); scriptEl.id = 'legacy-injected-data'; scriptEl.type = 'application/json'; scriptEl.textContent = JSON.stringify(data); cloneDocument.head.appendChild(scriptEl); const htmlContent = "<!DOCTYPE html>\n" + cloneDocument.documentElement.outerHTML; const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Legacy_${new Date().toISOString().split('T')[0]}.html`; a.click(); URL.revokeObjectURL(a.href); showDialog({ title: 'Erledigt!', message: 'App als HTML-Backup gespeichert.', icon: 'download' }); };

  const importBackup = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async (e) => { try { let data = null; if (file.name.toLowerCase().endsWith('.html')) { const doc = new DOMParser().parseFromString(e.target.result, 'text/html'); const script = doc.getElementById('legacy-injected-data'); if (script && script.textContent && script.textContent !== 'null') data = JSON.parse(script.textContent); else throw new Error("Keine Daten"); } else data = JSON.parse(e.target.result); if (data && data.entries && db) { const tx = db.transaction('entries', 'readwrite'); const store = tx.objectStore('entries'); let mergedCount = 0; const pinToUse = data.user ? data.user.pin : user.pin; const entriesToSave = await Promise.all(data.entries.map(async (en) => { let dbE = { ...en }; dbE.images = dbE.images || (dbE.image ? [dbE.image] : []); return dbE; })); entriesToSave.forEach(en => { if (!entries.find(ex => ex && ex.id === en.id)) { if (data.user && data.user.name !== user.name) en.inheritedFrom = data.user.name; store.put(en); mergedCount++; } }); const req = store.getAll(); req.onsuccess = async () => { let loadedEntries = req.result || []; loadedEntries = loadedEntries.filter(e => e != null); if (user.pin) loadedEntries = await Promise.all(loadedEntries.map(async (en) => { if (en.encryptedData) { const decStr = await decryptData(en.encryptedData, user.pin); if (decStr) { try { const parsed = JSON.parse(decStr); return { ...en, text: parsed.text, title: parsed.title }; } catch(err){} } } return en; })); setEntries(loadedEntries.sort(sortEntriesChronological)); showDialog({ title: 'Erfolg', message: `${mergedCount} neue Seiten importiert.`, icon: 'check' }); }; } } catch (err) { showDialog({ title: 'Fehler', message: 'Ungültige Datei.', icon: 'x' }); } }; reader.readAsText(file); };

      <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 dark:bg-black text-slate-900 dark:text-white">
        <div className="max-w-sm w-full space-y-8 animate-slide-up text-center">
          <Icon name="sparkles" size={48} className="mx-auto mb-2 opacity-80" />
          <h1 className="text-3xl font-extrabold tracking-tight">Willkommen</h1>
          <p className="opacity-60 font-medium">Wie möchtest du in deinem Journal genannt werden?</p>
          <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-zinc-800">
            <input type="text" value={user.name} onChange={(e) => setUser({...user, name: e.target.value})} className="w-full p-4 rounded-2xl outline-none text-lg font-bold text-center bg-slate-100 dark:bg-zinc-800 border-none focus:ring-2 focus:ring-slate-300 dark:focus:ring-zinc-600 transition-colors mb-6 placeholder:opacity-30" placeholder="Dein Name" />
            <button type="button" onClick={() => { if(user.name.trim()) { safeStorageSet('legacy_user', JSON.stringify(user)); setView('dashboard'); } }} className="w-full py-4 rounded-2xl font-bold text-base bg-black dark:bg-white text-white dark:text-black hover:scale-[1.02] active:scale-95 transition-all shadow-md">Journal beginnen</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <ErrorBoundary>
      <div className="min-h-screen pb-safe relative">
        <header className="sticky top-0 z-30 bg-white/80 dark:bg-black/80 backdrop-blur-2xl border-b border-slate-200/50 dark:border-zinc-800/50 px-6 py-4 flex justify-between items-center transition-colors duration-300 no-print">
          <div className="flex items-center gap-3 overflow-hidden">
            {view === 'archive' ? <h1 className="text-2xl font-extrabold tracking-tight">Archiv</h1> :
             view === 'trash' ? <h1 className="text-2xl font-extrabold tracking-tight text-rose-500">Papierkorb</h1> :
             view === 'menu' ? <h1 className="text-2xl font-extrabold tracking-tight">Entdecken</h1> :
             view === 'wisdom' ? <h1 className="text-2xl font-extrabold tracking-tight">Säulen</h1> :
             view === 'burn' ? <h1 className="text-2xl font-extrabold tracking-tight text-rose-500">Katharsis</h1> :
             view === 'quotes' ? <h1 className="text-2xl font-extrabold tracking-tight">Erkenntnisse</h1> :
             view === 'map' ? <h1 className="text-2xl font-extrabold tracking-tight text-amber-500">Lebenskarte</h1> :
             view === 'settings' ? <h1 className="text-2xl font-extrabold tracking-tight flex items-center gap-2">Einstellungen</h1> :
            (
              <>
                <div className="w-10 h-10 rounded-full bg-slate-100 dark:bg-zinc-800 flex items-center justify-center shrink-0 shadow-sm overflow-hidden" style={{ borderColor: user.nameColor, borderWidth: '2px' }}>
                  {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover"/> : <Icon name="user" size={20} className="opacity-50 text-slate-900 dark:text-white"/>}
                </div>
                <div className="flex flex-col">
                  <h1 className="text-lg font-bold tracking-tight leading-tight">{user.name}</h1>
                  {user.motto && <p className="text-[10px] font-medium opacity-60 truncate max-w-[150px]">{user.motto}</p>}
                </div>
              </>
            )}
          </div>
          <div className="flex gap-2 items-center">
            {/* Timeline / Calendar Button */}
            <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setShowTimeline(true); }} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="calendar-days" size={18}/></button>
            
            {view === 'dashboard' && (
              <>
                <button type="button" onClick={() => setIsSearchOpen(!isSearchOpen)} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="search" size={18}/></button>
                <button type="button" onClick={() => setView('menu')} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="menu" size={18}/></button>
              </>
            )}
            {view !== 'dashboard' && <button type="button" onClick={handleBackNavigation} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="x" size={18} /></button>}
          </div>
          {isSearchOpen && view === 'dashboard' && (
            <div className="absolute top-full left-0 right-0 p-4 bg-white/90 dark:bg-black/90 backdrop-blur-2xl border-b border-slate-200/50 dark:border-zinc-800/50 shadow-xl z-50">
              <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Suchen..." autoFocus className="w-full p-4 rounded-2xl bg-slate-100 dark:bg-zinc-900 border-none outline-none font-medium focus:ring-2 focus:ring-slate-300 dark:focus:ring-zinc-700 transition-shadow" />
            </div>
          )}
        </header>

        <main className={`p-4 sm:p-6 max-w-2xl mx-auto min-h-[70vh] relative z-10 no-print ${view === 'map' ? 'h-[85vh] floating-nav-spacing flex flex-col' : 'floating-nav-spacing'}`}>
          {view === 'menu' && (
            <div className="grid grid-cols-2 gap-4 sm:gap-6 animate-slide-up">
              <button onClick={() => setView('wisdom')} className="p-6 rounded-[2rem] flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-[1.02] active:scale-95 transition-transform"><Icon name="book-open" size={32} className="text-amber-500" /><span className="font-bold text-sm">Weisheit</span></button>
              <button onClick={() => setView('map')} className="p-6 rounded-[2rem] flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-[1.02] active:scale-95 transition-transform"><Icon name="map" size={32} className="text-emerald-500" /><span className="font-bold text-sm">Lebenskarte</span></button>
              <button onClick={() => setView('burn')} className="p-6 rounded-[2rem] flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-[1.02] active:scale-95 transition-transform"><Icon name="flame" size={32} className="text-rose-500" /><span className="font-bold text-sm">Katharsis</span></button>
              <button onClick={() => setView('quotes')} className="p-6 rounded-[2rem] flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-[1.02] active:scale-95 transition-transform"><Icon name="quote" size={32} className="text-indigo-500" /><span className="font-bold text-sm">Erkenntnisse</span></button>
              <button onClick={() => setView('archive')} className="p-6 rounded-[2rem] flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-[1.02] active:scale-95 transition-transform"><Icon name="archive" size={32} className="opacity-50" /><span className="font-bold text-sm">Archiv</span></button>
              <button onClick={() => setView('trash')} className="p-6 rounded-[2rem] flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-[1.02] active:scale-95 transition-transform"><Icon name="trash-2" size={32} className="text-rose-400" /><span className="font-bold text-sm text-rose-500">Papierkorb</span></button>
              <button onClick={() => setView('settings')} className="col-span-2 p-6 rounded-[2rem] flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-[1.02] active:scale-95 transition-transform"><Icon name="settings" size={32} className="opacity-50" /><span className="font-bold text-sm">Einstellungen</span></button>
            </div>
          )}

          {view === 'archive' && (
              <div className="space-y-4 animate-slide-up pb-24">
                  <div className="flex justify-between items-center p-6 bg-slate-100 dark:bg-zinc-900 rounded-[2rem] mb-6 border border-slate-200 dark:border-zinc-800 shadow-sm">
                      <div>
                          <h2 className="text-xl font-extrabold flex items-center gap-2"><Icon name="archive" size={24}/> Archiv</h2>
                          <p className="text-xs opacity-70 font-medium mt-1">{visibleEntries.length} archivierte Einträge</p>
                      </div>
                  </div>
                  {visibleEntries.length === 0 ? (
                      <div className="text-center py-20 opacity-40"><Icon name="archive" size={48} className="mx-auto mb-4"/><p className="font-bold">Archiv ist leer.</p></div>
                  ) : (
                      <div className="grid gap-4">
                          {visibleEntries.map(e => (
                              <div key={e.id} className="p-5 bg-white dark:bg-zinc-900 rounded-[2rem] shadow-sm border border-slate-100 dark:border-zinc-800 flex justify-between items-center gap-4">
                                  <div className="overflow-hidden flex-1 cursor-pointer" onClick={() => handleOpenEntry(e, true)}>
                                      <h4 className="font-bold truncate text-lg hover:text-accent transition-colors">{e.title || 'Ohne Titel'}</h4>
                                      <p className="text-xs font-bold uppercase tracking-widest opacity-50 mt-1">{safeParseDate(e.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })} • {e.category}</p>
                                  </div>
                                  <div className="flex gap-2 shrink-0">
                                      <button onClick={() => saveToDB({...e, archived: false})} className="w-12 h-12 flex items-center justify-center bg-emerald-50 dark:bg-emerald-500/10 text-emerald-500 rounded-full hover:scale-110 active:scale-90 transition-transform shadow-sm" title="Wiederherstellen"><Icon name="rotate-ccw" size={20}/></button>
                                      <button onClick={() => {
                                          showDialog({ title: 'Endgültig löschen?', message: `"${e.title || 'Ohne Titel'}" wird für immer gelöscht.`, icon: 'trash-2', iconColor: 'text-rose-500', onConfirm: () => deleteFromDB(e.id) });
                                      }} className="w-12 h-12 flex items-center justify-center bg-rose-50 dark:bg-rose-500/10 text-rose-500 rounded-full hover:scale-110 active:scale-90 transition-transform shadow-sm" title="Endgültig löschen"><Icon name="x" size={20}/></button>
                                  </div>
                              </div>
                          ))}
                      </div>
                  )}
              </div>
          )}

          {view === 'trash' && (
              <div className="space-y-4 animate-slide-up pb-24">
                  <div className="flex justify-between items-center p-6 bg-rose-50 dark:bg-rose-500/10 rounded-[2rem] mb-6 text-rose-500 border border-rose-100 dark:border-rose-900/30 shadow-sm">
                      <div>
                          <h2 className="text-xl font-extrabold flex items-center gap-2"><Icon name="trash-2" size={24}/> Papierkorb</h2>
                          <p className="text-xs opacity-70 font-medium mt-1">{visibleEntries.length} gelöschte Einträge</p>
                      </div>
                      {visibleEntries.length > 0 && (
                          <button onClick={() => {
                              showDialog({ title: 'Papierkorb leeren', message: 'Möchtest du alle Einträge unwiderruflich löschen?', icon: 'alert-triangle', iconColor: 'text-rose-500', onConfirm: async () => { for (const e of visibleEntries) { await deleteFromDB(e.id); } } });
                          }} className="px-5 py-3 bg-rose-500 text-white rounded-xl font-bold text-sm uppercase tracking-widest shadow-md hover:scale-105 active:scale-95 transition-transform">Leeren</button>
                      )}
                  </div>
                  {visibleEntries.length === 0 ? (
                      <div className="text-center py-20 opacity-40"><Icon name="trash" size={48} className="mx-auto mb-4"/><p className="font-bold">Papierkorb ist leer.</p></div>
                  ) : (
                      <div className="grid gap-4">
                          {visibleEntries.map(e => (
                              <div key={e.id} className="p-5 bg-white dark:bg-zinc-900 rounded-[2rem] shadow-sm border border-slate-100 dark:border-zinc-800 flex justify-between items-center gap-4">
                                  <div className="overflow-hidden flex-1 cursor-pointer" onClick={() => handleOpenEntry(e, true)}>
                                      <h4 className="font-bold truncate text-lg hover:text-accent transition-colors">{e.title || 'Ohne Titel'}</h4>
                                      <p className="text-xs font-bold uppercase tracking-widest opacity-50 mt-1">{safeParseDate(e.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })} • {e.category}</p>
                                  </div>
                                  <div className="flex gap-2 shrink-0">
                                      <button onClick={() => saveToDB({...e, trashed: false})} className="w-12 h-12 flex items-center justify-center bg-emerald-50 dark:bg-emerald-500/10 text-emerald-500 rounded-full hover:scale-110 active:scale-90 transition-transform shadow-sm" title="Wiederherstellen"><Icon name="rotate-ccw" size={20}/></button>
                                      <button onClick={() => {
                                          showDialog({ title: 'Endgültig löschen?', message: `"${e.title || 'Ohne Titel'}" wird für immer gelöscht.`, icon: 'trash-2', iconColor: 'text-rose-500', onConfirm: () => deleteFromDB(e.id) });
                                      }} className="w-12 h-12 flex items-center justify-center bg-rose-50 dark:bg-rose-500/10 text-rose-500 rounded-full hover:scale-110 active:scale-90 transition-transform shadow-sm" title="Endgültig löschen"><Icon name="x" size={20}/></button>
                                  </div>
                              </div>
                          ))}
                      </div>
                  )}
              </div>
          )}

          {view === 'settings' && (
             <div className="animate-slide-up space-y-6 pb-48">
                <div className="p-8 rounded-[2.5rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                   <h2 className="text-lg font-bold mb-6 flex items-center gap-2"><Icon name="user" size={20}/> Profil</h2>
                   <div className="flex flex-col sm:flex-row items-center gap-6 mb-8">
                       <div className="relative shrink-0">
                           <div className="w-24 h-24 rounded-full overflow-hidden border-4 shadow-sm flex items-center justify-center bg-slate-100 dark:bg-zinc-800" style={{ borderColor: user.nameColor }}>
                               {user.avatar ? <img src={user.avatar} alt="Avatar" className="w-full h-full object-cover scale-[1.02]" /> : <Icon name="user" size={40} className="opacity-30 text-slate-900 dark:text-white" />}
                           </div>
                           {user.avatar && (
                               <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); const updated = {...user, avatar: null}; setUser(updated); safeStorageSet('legacy_user', JSON.stringify(updated)); syncProfileToCloud(updated); }} className="absolute top-0 right-0 w-7 h-7 flex items-center justify-center bg-rose-500 text-white rounded-full shadow-md hover:scale-110 active:scale-95 transition-transform z-10 border-2 border-white dark:border-zinc-900"><Icon name="x" size={12}/></button>
                           )}
                       </div>
                       <label className="w-full sm:flex-1 py-4 px-4 rounded-2xl cursor-pointer shadow-sm font-bold text-sm text-center border border-slate-200 dark:border-zinc-700 bg-slate-50 dark:bg-zinc-800 hover:scale-[1.02] active:scale-95 transition-transform">
                           Profilbild ändern <input type="file" accept="image/*" onChange={(e) => handleAvatarUpload(e)} className="hidden" />
                       </label>
                   </div>
                   <input type="text" value={user.name} onChange={e=>setUser({...user, name: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-transparent outline-none font-bold text-lg mb-4 focus:border-slate-300 dark:focus:border-zinc-700 transition-colors" placeholder="Dein Name" />
                   <textarea value={user.motto} onChange={e=>setUser({...user, motto: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-transparent outline-none font-medium text-sm resize-none h-24 focus:border-slate-300 dark:focus:border-zinc-700 transition-colors" placeholder="Lebensmotto..." />
                </div>

                <div className="p-8 rounded-[2.5rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                   <h2 className="text-lg font-bold mb-6 flex items-center gap-2"><Icon name="moon" size={20}/> Design & Farben</h2>
                   <div className="flex p-1 bg-slate-100 dark:bg-zinc-950 rounded-2xl mb-8 border border-slate-200/50 dark:border-zinc-800">
                      <button onClick={() => setUser({...user, isDark: false})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-colors ${!user.isDark ? 'bg-white shadow-sm text-black' : 'text-slate-500'}`}>Hell</button>
                      <button onClick={() => setUser({...user, isDark: true})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-colors ${user.isDark ? 'bg-zinc-800 shadow-sm text-white' : 'text-slate-500'}`}>Dunkel</button>
                   </div>
                   <span className="text-xs font-bold uppercase tracking-widest opacity-60 mb-3 block">Hintergrund (App)</span>
                   <div className="flex flex-wrap gap-3 mb-8">
                      <button onClick={() => setUser({...user, appBgColor: null})} className={`w-10 h-10 rounded-full border-2 transition-transform flex items-center justify-center ${!user.appBgColor ? 'border-slate-400 dark:border-zinc-500 scale-110 shadow-md' : 'border-transparent hover:scale-110'}`} style={{ backgroundColor: user.isDark ? '#000000' : '#f8fafc' }}><Icon name="slash" size={16} className="opacity-50" /></button>
                      {COLORS.map(color => <ColorBtn key={color} color={color} isBg={true} user={user} setUser={setUser}/>)}
                   </div>
                   <span className="text-xs font-bold uppercase tracking-widest opacity-60 mb-3 block">Schriftfarbe</span>
                   <div className="flex flex-wrap gap-3 mb-8">
                      <button onClick={() => setUser({...user, textColor: null})} className={`w-10 h-10 rounded-full border-2 transition-transform flex items-center justify-center ${!user.textColor ? 'border-slate-400 dark:border-zinc-500 scale-110 shadow-md' : 'border-transparent hover:scale-110'}`} style={{ backgroundColor: user.isDark ? '#ffffff' : '#0f172a' }}><Icon name="slash" size={16} className={user.isDark ? 'text-black' : 'text-white'} /></button>
                      {COLORS.map(color => <ColorBtn key={color} color={color} isBg={false} user={user} setUser={setUser}/>)}
                   </div>
                   <span className="text-xs font-bold uppercase tracking-widest opacity-60 mb-3 block">Darstellungsgröße</span>
                   <div className="flex gap-2">
                      <button onClick={() => setUser({...user, uiScale: 0.9})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-colors ${user.uiScale === 0.9 ? 'bg-black dark:bg-white text-white dark:text-black shadow-sm' : 'bg-slate-100 dark:bg-zinc-950 text-slate-500'}`}>A-</button>
                      <button onClick={() => setUser({...user, uiScale: 1})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-colors ${user.uiScale === 1 || !user.uiScale ? 'bg-black dark:bg-white text-white dark:text-black shadow-sm' : 'bg-slate-100 dark:bg-zinc-950 text-slate-500'}`}>Normal</button>
                      <button onClick={() => setUser({...user, uiScale: 1.1})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-colors ${user.uiScale === 1.1 ? 'bg-black dark:bg-white text-white dark:text-black shadow-sm' : 'bg-slate-100 dark:bg-zinc-950 text-slate-500'}`}>A+</button>
                   </div>
                </div>

                <div className="p-8 rounded-[2.5rem] bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-100 dark:border-indigo-500/20 shadow-sm">
                   <h2 className="text-lg font-bold mb-2 flex items-center gap-2 text-indigo-600 dark:text-indigo-400"><Icon name="archive" size={20}/> Ewigkeits-Archiv (ZIP)</h2>
                   <p className="text-sm font-medium opacity-70 mb-6">Exportiert alle deine Einträge als simple, für immer lesbare Textdateien (.md) und extrahiert alle Bilder.</p>
                   <button onClick={exportEternityArchive} className="w-full p-4 rounded-2xl font-bold text-base bg-indigo-600 text-white active:scale-95 shadow-sm transition-transform flex items-center justify-center gap-2 mb-3"><Icon name="folder-down" size={20}/> Als ZIP speichern</button>
                </div>

                <div className="p-8 rounded-[2.5rem] bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-100 dark:border-emerald-500/20 shadow-sm">
                   <h2 className="text-lg font-bold mb-2 flex items-center gap-2 text-emerald-600 dark:text-emerald-400"><Icon name="smartphone" size={20}/> P2P Transfer (Ohne Cloud)</h2>
                   <p className="text-sm font-medium opacity-70 mb-6">Scanne einen QR Code mit deinem neuen Handy, um Daten direkt zu senden.</p>
                   {!peerId ? (
                      <button onClick={() => {
                         const peer = new window.Peer(); setSyncStatus('WebRTC wird vorbereitet...');
                         peer.on('open', (id) => { setPeerId(id); setSyncStatus('Scanne den Code mit dem neuen Gerät.'); });
                         peer.on('connection', (c) => { setSyncStatus('Verbunden! Sende...'); c.on('data', (d) => { if(d==='request_data'){c.send(JSON.stringify({user,entries})); setSyncStatus('Erledigt!'); setTimeout(()=>{setPeerId(null);}, 4000);} }); });
                         setPeerInstance(peer);
                      }} className="w-full p-4 rounded-2xl font-bold text-base bg-emerald-600 text-white active:scale-95 shadow-sm transition-transform flex items-center justify-center gap-2"><Icon name="qr-code" size={20}/> QR-Code generieren</button>
                   ) : (
                      <div className="bg-white dark:bg-zinc-900 p-6 rounded-[2rem] flex flex-col items-center">
                         <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?import=' + peerId)}`} className="w-48 h-48 mb-4 rounded-xl" />
                         <p className="text-sm font-bold text-emerald-600 mb-4 animate-pulse">{syncStatus}</p>
                         <button onClick={()=>{peerInstance?.destroy(); setPeerId(null); setSyncStatus('');}} className="text-sm font-bold opacity-50 px-4 py-2 bg-slate-100 dark:bg-zinc-800 rounded-lg">Abbrechen</button>
                      </div>
                   )}
                </div>

                <div className="p-8 rounded-[2.5rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                   <h2 className="text-lg font-bold mb-6 flex items-center gap-2"><Icon name="key" size={20}/> Sicherheit & PIN</h2>
                   {!user.pin ? (
                       <div className="space-y-4">
                           <p className="text-sm font-medium opacity-70">Lege eine PIN fest, um den App-Start abzusichern & Cloud-Daten zu verschlüsseln.</p>
                           <input type="password" inputMode="numeric" value={newPinInput} onChange={e=>setNewPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-transparent outline-none font-bold text-center tracking-[1em] focus:border-slate-300 dark:focus:border-zinc-700 transition-colors" placeholder="Neue PIN" />
                           <input type="password" inputMode="numeric" value={confirmPinInput} onChange={e=>setConfirmPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-transparent outline-none font-bold text-center tracking-[1em] focus:border-slate-300 dark:focus:border-zinc-700 transition-colors" placeholder="Wiederholen" />
                           <button onClick={handleSavePin} className="w-full py-4 rounded-2xl font-bold active:scale-95 transition-transform" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}>PIN speichern</button>
                       </div>
                   ) : (
                       isChangingPin ? (
                           <div className="space-y-4">
                               <input type="password" inputMode="numeric" value={oldPinInput} onChange={e=>setOldPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-transparent outline-none font-bold text-center tracking-[1em] focus:border-slate-300 dark:focus:border-zinc-700 transition-colors" placeholder="Alte PIN" />
                               <input type="password" inputMode="numeric" value={newPinInput} onChange={e=>setNewPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-transparent outline-none font-bold text-center tracking-[1em] focus:border-slate-300 dark:focus:border-zinc-700 transition-colors" placeholder="Neue PIN" />
                               <input type="password" inputMode="numeric" value={confirmPinInput} onChange={e=>setConfirmPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-transparent outline-none font-bold text-center tracking-[1em] focus:border-slate-300 dark:focus:border-zinc-700 transition-colors" placeholder="Wiederholen" />
                               <div className="flex gap-2">
                                   <button onClick={() => setIsChangingPin(false)} className="flex-1 py-4 rounded-2xl font-bold bg-slate-100 dark:bg-zinc-800 active:scale-95 transition-transform">Abbrechen</button>
                                   <button onClick={handleSavePin} className="flex-1 py-4 rounded-2xl font-bold active:scale-95 transition-transform" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}>Speichern</button>
                               </div>
                           </div>
                       ) : (
                           <div className="flex justify-between items-center p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950">
                               <div className="flex items-center gap-3">
                                   <Icon name="check-circle" size={20} className="text-emerald-500" />
                                   <span className="font-bold text-sm">PIN Aktiv</span>
                               </div>
                               <button onClick={() => setIsChangingPin(true)} className="px-4 py-2 rounded-lg font-bold text-xs bg-white dark:bg-zinc-800 shadow-sm active:scale-95 transition-transform" style={{ color: user.nameColor }}>Ändern</button>
                           </div>
                       )
                   )}
                   {window.PublicKeyCredential && user.pin && !isChangingPin && (
                       <div className="flex justify-between items-center mt-6 p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-slate-100 dark:border-zinc-800">
                           <div className="flex items-center gap-3">
                               <Icon name="fingerprint" size={20} className={user.biometric ? 'text-indigo-500' : 'text-slate-400'}/>
                               <div>
                                   <div className="font-bold text-sm">Biometrie</div>
                                   <div className="text-[10px] opacity-60">TouchID / FaceID</div>
                               </div>
                           </div>
                           <button onClick={toggleBiometric} className={`w-12 h-6 rounded-full transition-colors relative ${user.biometric ? 'bg-indigo-500' : 'bg-slate-300 dark:bg-zinc-700'}`}>
                               <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${user.biometric ? 'left-7' : 'left-1'}`} />
                           </button>
                       </div>
                   )}
                </div>

                <div className="p-8 rounded-[2.5rem] bg-rose-50 dark:bg-rose-500/10 border border-rose-100 dark:border-rose-500/20 shadow-sm flex flex-col items-center text-center">
                   <h2 className="text-lg font-bold mb-2 text-rose-600 dark:text-rose-400 flex items-center gap-2"><Icon name="log-out" size={20}/> Abmelden</h2>
                   <p className="text-sm font-medium opacity-70 mb-6 text-rose-600 dark:text-rose-400">Beende deine aktuelle Sitzung sicher auf diesem Gerät.</p>
                   <button onClick={handleLogout} className="w-full py-4 rounded-2xl font-bold text-base bg-rose-600 text-white active:scale-95 shadow-sm transition-transform flex items-center justify-center gap-2">Jetzt abmelden</button>
                </div>
             </div>
          )}

          {view === 'map' && (
             <div className="flex-1 flex flex-col gap-4 animate-fade-in pb-24 h-full">
                <div className="flex-1 relative rounded-[2rem] overflow-hidden shadow-lg border border-slate-200 dark:border-zinc-800 bg-slate-100 dark:bg-zinc-900">
                    <div ref={mapRef} className="absolute inset-0 w-full h-full"></div>
                </div>
                <div className="p-4 bg-white/90 dark:bg-black/90 backdrop-blur-md rounded-2xl shadow-sm border border-slate-200 dark:border-zinc-800 flex justify-between items-center shrink-0">
                    <div className="font-bold text-sm">Orte deines Lebens</div>
                    <div className="text-xs opacity-70 font-bold">{entries.filter(e => e && e.location && !e.trashed).length} Markierungen</div>
                </div>
             </div>
          )}

          {view === 'burn' && (
            <div className="flex flex-col items-center justify-center min-h-[50vh] text-center animate-fade-in relative">
              {isBurning && <div className="absolute inset-0 bg-rose-500/10 animate-pulse rounded-[3rem] pointer-events-none" />}
              <Icon name="flame" size={64} className={`mb-6 ${isBurning ? 'text-rose-500 animate-flame' : 'text-slate-300 dark:text-zinc-700'}`} />
              <p className="opacity-60 mb-8 max-w-sm text-sm">Schreibe auf, was dich belastet. Wir übergeben es den Flammen. Es wird nirgendwo gespeichert.</p>
              <textarea value={burnText} onChange={e=>setBurnText(e.target.value)} disabled={isBurning} className="w-full p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 focus:border-rose-500 h-56 outline-none resize-none transition-all text-xl font-medium shadow-sm" placeholder="Lass es los..." />
              <button onClick={triggerBurn} disabled={!burnText || isBurning} className="mt-8 px-10 py-5 bg-rose-600 text-white rounded-2xl font-bold text-lg shadow-lg shadow-rose-600/20 active:scale-95 transition-transform disabled:opacity-50 flex items-center justify-center gap-3">
                {isBurning ? 'Verbrennt...' : <><Icon name="flame" size={24}/> Dem Feuer übergeben</>}
              </button>
            </div>
          )}

          {view === 'wisdom' && (
             <div className="animate-slide-up space-y-8 pb-32">
                <div className="p-8 rounded-[2.5rem] border text-center shadow-sm" style={{ backgroundColor: `${user.nameColor}15`, borderColor: `${user.nameColor}30` }}>
                   <h3 className="font-extrabold text-xl mb-3" style={{ color: user.nameColor }}>Fortschritt deines Vermächtnisses</h3>
                   <div className="flex justify-between text-sm font-bold opacity-70 mb-4" style={{ color: user.nameColor }}><span>{completedPillars} von {totalPillars}</span><span>{progressPercent}%</span></div>
                   <div className="w-full h-3 rounded-full overflow-hidden" style={{ backgroundColor: `${user.nameColor}30` }}><div className="h-full transition-all duration-1000" style={{width:`${progressPercent}%`, backgroundColor: user.nameColor }}></div></div>
                </div>
                {['Fundament', 'Kommunikation', 'Struktur', 'Tiefe', 'Anpassung'].map(phase => (
                   <div key={phase} className="space-y-4">
                      <h4 className="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-zinc-500 ml-4 mb-2">{phase}</h4>
                      {PILLARS.filter(p=>p.phase===phase).map(pillar => {
                         const isCompleted = entries.some(e => e && e.title === pillar.title && !e.trashed);
                         return (
                           <button key={pillar.id} onClick={() => openEditor(null, pillar)} className="w-full text-left p-6 rounded-3xl bg-white dark:bg-zinc-900 border shadow-sm flex items-start gap-5 hover:scale-[1.02] active:scale-95 transition-transform" style={{ borderColor: getSubtleBorderColor(user.nameColor, user.isDark) }}>
                              <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-sm ${isCompleted ? 'text-white' : 'bg-slate-100 dark:bg-zinc-800 text-slate-400'}`} style={isCompleted ? { backgroundColor: user.nameColor } : {}}><Icon name={isCompleted?"check":"pen-tool"} size={18}/></div>
                              <div><div className="font-bold text-lg leading-tight mb-2 text-slate-900 dark:text-white">{pillar.title}</div><div className="text-sm font-medium opacity-60 line-clamp-2 leading-relaxed">{pillar.desc}</div></div>
                           </button>
                         )
                      })}
                   </div>
                ))}
             </div>
          )}

          {view === 'quotes' && (
             <div className="animate-slide-up space-y-6 pb-32">
                {allQuotes.length === 0 ? (
                   <div className="text-center py-20 opacity-40"><Icon name="quote" size={56} className="mx-auto mb-6"/><p className="font-bold text-lg">Noch keine Erkenntnisse zitiert.</p></div>
                ) : (
                   allQuotes.map(q => (
                      <div key={q.id} onClick={()=>{const e=entries.find(x=>x && x.id===q.entryId); if(e){ handleOpenEntry(e, true);}}} className="p-8 rounded-[2.5rem] bg-white dark:bg-zinc-900 border shadow-sm cursor-pointer hover:-translate-y-1 hover:shadow-md transition-all relative overflow-hidden" style={{ borderColor: getSubtleBorderColor(user.nameColor, user.isDark) }}>
                         <div className="flex gap-4 items-start">
                             <div className="shrink-0 mt-1" style={{ color: user.nameColor }}><Icon name="quote" size={28} /></div>
                             <div className="flex-1">
                                 <p className="text-[1.05rem] leading-[1.8] font-medium legacy-content text-slate-800 dark:text-slate-200 mb-4 opacity-90">{q.text}</p>
                                 <div className="text-xs font-bold uppercase tracking-widest opacity-40 text-slate-500">{q.title} • {safeParseDate(q.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })}</div>
                             </div>
                         </div>
                      </div>
                   ))
                )}
             </div>
          )}

          {['dashboard', 'archive'].includes(view) && visibleEntries.length === 0 && !searchQuery && (
            <div className="flex flex-col items-center justify-center py-32 text-center opacity-40 animate-fade-in delay-300">
              <Icon name="book-open" size={64} className="mb-6"/>
              <p className="text-2xl font-bold font-serif">{view === 'archive' ? 'Archiv leer.' : 'Noch keine Einträge.'}</p>
            </div>
          )}

          {['dashboard', 'archive'].includes(view) && (
            <div className={`grid gap-6 pb-32 ${isGridView && view === 'dashboard' ? 'grid-cols-2' : 'grid-cols-1'}`}>
              {renderEntries.map((entry, idx) => (
                 <EntryCard 
                     key={entry.id} 
                     entry={entry} 
                     onClick={handleOpenEntry} 
                     isGridView={isGridView && view === 'dashboard'} 
                     userColor={user.nameColor} 
                     isDarkTheme={user.isDark} 
                     searchQuery={searchQuery}
                     onMoveUp={(e) => moveEntryUp(e, idx)}
                     onMoveDown={(e) => moveEntryDown(e, idx)}
                     showMoveControls={view === 'dashboard' && !searchQuery && activeCategory === 'Alle'}
                 />
              ))}
            </div>
          )}
        </main>

        <nav className={`floating-nav transition-opacity duration-300 ${viewingEntry || showEditor || !['dashboard', 'menu'].includes(view) ? 'opacity-0 pointer-events-none hidden' : 'opacity-100'}`}>
          <div className="relative flex justify-between items-center h-[72px] px-6">
            <button onClick={() => { setViewingEntry(null); if(view==='dashboard') setIsGridView(!isGridView); else setView('dashboard'); }} className={`p-2 transition-all rounded-full ${view === 'dashboard' && !viewingEntry ? 'text-accent scale-110' : 'text-slate-400 opacity-60 hover:opacity-100 hover:scale-105'}`} style={view === 'dashboard' && !viewingEntry ? { color: user.nameColor || '#000000' } : { color: 'inherit' }}>
              <Icon name={isGridView && view === 'dashboard' ? "list" : "layout-grid"} size={26} />
            </button>
            <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
                <button onClick={() => { setViewingEntry(null); openEditor(); }} className="w-16 h-16 rounded-[1.5rem] text-white dark:text-black shadow-xl flex items-center justify-center hover:scale-110 active:scale-90 transition-transform border-[4px] border-white dark:border-zinc-800" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000') }}>
                  <Icon name="plus" size={32} />
                </button>
            </div>
            <button onClick={() => { setViewingEntry(null); setView('settings'); }} className={`p-2 transition-all rounded-full ${view === 'settings' && !viewingEntry ? 'text-slate-900 dark:text-white scale-110 shadow-inner bg-slate-100 dark:bg-zinc-800' : 'text-slate-400 hover:text-slate-900 dark:hover:text-white hover:scale-105'}`}>
              <Icon name="settings" size={26} />
            </button>
          </div>
        </nav>

        {/* --- TIMELINE / CALENDAR MODAL --- */}
        <div className={`fixed inset-0 z-[150] bg-slate-50 dark:bg-[#0a0a0a] flex-col ${showTimeline ? 'flex' : 'hidden'}`}>
          <header className="flex-none p-4 sm:p-6 pt-safe flex justify-between items-center">
             <div className="flex items-center gap-3">
                <Icon name="calendar-days" size={28} className="text-accent" />
                <h2 className="text-2xl font-extrabold tracking-tight text-accent">Zeitreise</h2>
             </div>
             <button onClick={() => setShowTimeline(false)} className="p-2.5 bg-slate-200/50 dark:bg-zinc-800/50 rounded-full hover:scale-105 active:scale-95 transition-transform"><Icon name="x" size={20}/></button>
          </header>

          <div className="flex-auto overflow-y-auto custom-scrollbar pb-safe">
             <div className="max-w-2xl mx-auto">
                 {/* Month Nav */}
                 <div className="flex justify-between items-center px-6 py-2 mb-4">
                     <button onClick={() => setTimelineMonth(new Date(timelineMonth.getFullYear(), timelineMonth.getMonth() - 1, 1))} className="p-2.5 bg-slate-200/50 dark:bg-zinc-800/50 rounded-full hover:scale-105 active:scale-95 transition-transform"><Icon name="chevron-left" size={20}/></button>
                     <h3 className="font-bold text-lg tracking-widest uppercase">{timelineMonth.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' })}</h3>
                     <button onClick={() => setTimelineMonth(new Date(timelineMonth.getFullYear(), timelineMonth.getMonth() + 1, 1))} className="p-2.5 bg-slate-200/50 dark:bg-zinc-800/50 rounded-full hover:scale-105 active:scale-95 transition-transform"><Icon name="chevron-right" size={20}/></button>
                 </div>

                 {/* Days Header */}
                 <div className="grid grid-cols-7 gap-2 px-6 mb-3 text-center text-xs font-bold opacity-60">
                     {['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'].map(d => <div key={d}>{d}</div>)}
                 </div>

                 {/* Calendar Grid */}
                 <div className="grid grid-cols-7 gap-y-4 gap-x-2 px-6 mb-8">
                     {getCalendarDays(timelineMonth).map((day, i) => {
                         if (!day) return <div key={`empty-${i}`} className="w-10 h-10 sm:w-12 sm:h-12 mx-auto"></div>;
                         
                         const dayEntries = entriesByDate[day.dateStr] || [];
                         const hasEntries = dayEntries.length > 0;
                         const isSelected = timelineSelectedDate === day.dateStr;
                         
                         let coverUrl = null;
                         const entryWithCoverThisDay = dayEntries.find(e => getCoverImage(e));
                         if (entryWithCoverThisDay) {
                             coverUrl = getCoverImage(entryWithCoverThisDay);
                         } else {
                             const targetTimeEnd = safeParseDate(`${day.dateStr}T23:59:59Z`).getTime();
                             const pastEntryWithCover = allEntriesSortedDesc.find(e => safeParseDate(e.date).getTime() <= targetTimeEnd && getCoverImage(e));
                             if (pastEntryWithCover) {
                                 coverUrl = getCoverImage(pastEntryWithCover);
                             }
                         }

                         return (
                             <button
                                 key={day.dateStr}
                                 onClick={() => setTimelineSelectedDate(day.dateStr)}
                                 className={`relative w-10 h-10 sm:w-12 sm:h-12 mx-auto rounded-full flex items-center justify-center font-bold text-sm sm:text-base transition-transform hover:scale-110 active:scale-95 overflow-hidden shadow-sm
                                 ${isSelected ? 'ring-2 ring-accent ring-offset-2 ring-offset-slate-50 dark:ring-offset-[#0a0a0a]' : ''}
                                 ${!hasEntries && !coverUrl ? 'bg-slate-200 dark:bg-zinc-800 text-slate-500' : ''}`}
                             >
                                 {coverUrl ? (
                                     <>
                                         <img src={coverUrl} className="absolute inset-0 w-full h-full object-cover" />
                                         <div className="absolute inset-0 bg-black/40"></div>
                                         <span className="relative z-10 text-white drop-shadow-md">{day.day}</span>
                                         {hasEntries && <div className="absolute bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-accent rounded-full shadow-sm border border-black/50"></div>}
                                     </>
                                 ) : (
                                     <>
                                        <span className="relative z-10">{day.day}</span>
                                        {hasEntries && <div className="absolute bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-accent rounded-full"></div>}
                                     </>
                                 )}
                             </button>
                         )
                     })}
                 </div>

                 {/* Filter Clear */}
                 <div className="flex justify-center mb-8 h-10">
                     {timelineSelectedDate && (
                         <button onClick={() => setTimelineSelectedDate(null)} className="px-5 py-2.5 bg-slate-200/50 dark:bg-zinc-800/50 rounded-full font-bold text-[10px] tracking-widest uppercase hover:bg-slate-300/50 dark:hover:bg-zinc-700/50 transition-colors">Filter Aufheben</button>
                     )}
                 </div>

                 {/* Entries List */}
                 {timelineSelectedDate && (
                     <div className="px-6 space-y-3 pb-12 animate-fade-in">
                         {(entriesByDate[timelineSelectedDate] || []).map(e => (
                             <TimelineSwipeableEntry 
                                 key={e.id}
                                 entry={e}
                                 onClick={() => { setShowTimeline(false); handleOpenEntry(e, true); }}
                                 onArchivePrompt={promptArchiveTimeline}
                                 onTrashPrompt={promptTrashTimeline}
                             />
                         ))}
                         <button onClick={() => {
                             setShowTimeline(false);
                             openEditor(null, null, timelineSelectedDate);
                         }} className="w-full flex items-center justify-center gap-2 p-4 mt-6 bg-white dark:bg-zinc-900/60 rounded-2xl cursor-pointer hover:scale-[1.02] transition-transform font-bold text-sm text-accent border border-slate-100 dark:border-zinc-800/50 shadow-sm">
                             <Icon name="plus" size={18} /> Neuer Eintrag für diesen Tag
                         </button>
                     </div>
                 )}
             </div>
          </div>
        </div>

        {/* --- LESE-FENSTER (VIEWER) --- */}
        {viewingEntry && (
           <div className={`fixed inset-0 z-[80] overflow-y-auto bg-white dark:bg-black custom-scrollbar flex-col screen-only ${showEditor ? 'hidden' : 'flex'}`} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
             
             {(() => {
                 const bookRoot = getBookRoot(viewingEntry.id);
                 const unsortedEntries = getAllBookEntries(bookRoot?.id || viewingEntry.id);
                 const allBookEntries = [...unsortedEntries].sort(sortEntriesChronological);
                 const cIdx = allBookEntries.findIndex(ex => ex && ex.id === viewingEntry.id);
                 const prevPage = cIdx > 0 ? allBookEntries[cIdx - 1] : null;
                 const nextPage = cIdx < allBookEntries.length - 1 ? allBookEntries[cIdx + 1] : null;
                 
                 return (
                     <>
                         {prevPage && <button onClick={() => setViewingEntry(prevPage)} className="hidden sm:flex absolute left-4 top-1/2 -translate-y-1/2 p-4 bg-white/50 dark:bg-black/50 backdrop-blur-md shadow-sm rounded-full hover:scale-110 active:scale-95 transition-transform z-50 text-slate-800 dark:text-white"><Icon name="chevron-left" size={24}/></button>}
                         {nextPage && <button onClick={() => setViewingEntry(nextPage)} className="hidden sm:flex absolute right-4 top-1/2 -translate-y-1/2 p-4 bg-white/50 dark:bg-black/50 backdrop-blur-md shadow-sm rounded-full hover:scale-110 active:scale-95 transition-transform z-50 text-slate-800 dark:text-white"><Icon name="chevron-right" size={24}/></button>}

                         <div className="sticky top-0 z-40 flex justify-between items-center py-4 px-6 md:px-10 bg-white/90 dark:bg-black/90 backdrop-blur-xl border-b border-slate-100 dark:border-zinc-900 shrink-0 no-print transition-colors">
                           <div className="flex gap-3">
                             <button onClick={() => {setViewingEntry(null); setCurrentViewerImgIdx(0);}} className="p-3 rounded-2xl bg-slate-100 dark:bg-zinc-900 hover:scale-105 active:scale-95 transition-transform"><Icon name="arrow-left" size={22}/></button>
                           </div>
                           <div className="flex gap-2 sm:gap-3">
                             <button onClick={() => window.print()} className="p-3 rounded-2xl bg-slate-100 dark:bg-zinc-900 hover:scale-105 active:scale-95 transition-transform text-slate-500"><Icon name="printer" size={22}/></button>
                             <button onClick={() => handleReadAloud(viewingEntry)} className={`p-3 rounded-2xl transition-transform ${isSpeaking ? 'text-white animate-pulse shadow-md' : 'bg-slate-100 dark:bg-zinc-900 hover:scale-105 active:scale-95'}`} style={isSpeaking ? { backgroundColor: user.nameColor } : {}}><Icon name={isSpeaking ? "volume-2" : "volume-1"} size={22}/></button>
                             
                             <label className="px-4 py-3 rounded-2xl bg-slate-100 dark:bg-zinc-900 hover:scale-105 active:scale-95 transition-transform font-bold text-sm cursor-pointer flex items-center justify-center gap-2" style={{ color: user.nameColor }} title="Hauptcover ändern">
                                 <Icon name="image" size={18}/> <span className="hidden sm:inline">Cover ändern</span>
                                 <input type="file" accept="image/*" onChange={(e) => handleBookCoverUpload(e, viewingEntry.id, 0)} className="hidden" />
                             </label>

                             <button onClick={() => { openEditor(viewingEntry); }} className="px-4 sm:px-6 py-3 rounded-2xl font-bold text-sm bg-slate-100 dark:bg-zinc-900 hover:scale-105 active:scale-95 transition-transform" style={{ color: user.nameColor }}>Bearbeiten</button>
                           </div>
                         </div>

                         <div className="max-w-3xl w-full mx-auto p-6 sm:p-12 pb-32 screen-only flex-1 flex flex-col">
                            {viewingEntry.images && viewingEntry.images.length > 0 && (
                              <div className="relative w-full aspect-video rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 dark:border-zinc-800 mb-10 group bg-slate-100 dark:bg-zinc-900 flex items-center justify-center">
                                  <img src={viewingEntry.images[currentViewerImgIdx]} className="w-full h-full object-contain transition-transform duration-700" alt="Cover" />
                                  
                                  <label className="absolute top-4 right-4 w-12 h-12 bg-black/60 text-white rounded-full flex items-center justify-center shadow-xl cursor-pointer z-[60] hover:bg-black/80 transition-colors border-2 border-white/20" title="Dieses Bild ändern">
                                      <Icon name="image" size={20}/>
                                      <input type="file" accept="image/*" onChange={(e) => handleBookCoverUpload(e, viewingEntry.id, currentViewerImgIdx)} className="hidden" />
                                  </label>

                                  {viewingEntry.images.length > 1 && (
                                      <>
                                          <button onClick={(e) => { e.stopPropagation(); setCurrentViewerImgIdx(p => (p - 1 + viewingEntry.images.length) % viewingEntry.images.length); }} className="absolute left-6 top-1/2 -translate-y-1/2 bg-black/50 text-white p-4 rounded-full opacity-0 group-hover:opacity-100 transition-opacity no-print backdrop-blur-md hover:bg-black/70"><Icon name="chevron-left" size={24}/></button>
                                          <button onClick={(e) => { e.stopPropagation(); setCurrentViewerImgIdx(p => (p + 1) % viewingEntry.images.length); }} className="absolute right-6 top-1/2 -translate-y-1/2 bg-black/50 text-white p-4 rounded-full opacity-0 group-hover:opacity-100 transition-opacity no-print backdrop-blur-md hover:bg-black/70"><Icon name="chevron-right" size={24}/></button>
                                          <div className="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2 bg-black/40 px-4 py-2 rounded-full backdrop-blur-md no-print">
                                              {viewingEntry.images.map((_, i) => <div key={i} className={`w-2.5 h-2.5 rounded-full transition-colors shadow-sm ${i === currentViewerImgIdx ? 'bg-white' : 'bg-white/40'}`} />)}
                                          </div>
                                      </>
                                  )}
                              </div>
                            )}

                            {(!viewingEntry.images || viewingEntry.images.length === 0) && (
                                <label className="mb-8 w-fit px-6 py-3 rounded-full bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-slate-300 font-bold text-sm cursor-pointer hover:bg-slate-200 dark:hover:bg-zinc-700 transition-colors flex items-center gap-2 border border-slate-200 dark:border-zinc-700 shadow-sm" title="Cover hinzufügen">
                                    <Icon name="image" size={18}/> Cover hinzufügen
                                    <input type="file" accept="image/*" onChange={(e) => handleBookCoverUpload(e, viewingEntry.id, 0)} className="hidden" />
                                </label>
                            )}

                            <h1 className="text-4xl sm:text-6xl font-extrabold mb-8 tracking-tighter leading-[1.1] text-slate-900 dark:text-white">{viewingEntry.title || 'Ohne Titel'}</h1>
                            <div className="flex gap-4 mb-6 text-xs font-bold uppercase tracking-widest opacity-50 flex-wrap">
                              <span>{safeParseDate(viewingEntry.date || getLocalISO()).toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' })}</span>
                            </div>
                            
                            <div className="flex flex-wrap gap-2 mb-12 no-print">
                                {viewingEntry.tags && viewingEntry.tags.split(',').map(t => t.trim()).filter(t=>t).map((t, i) => (
                                    <span key={i} className="px-4 py-1.5 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl text-xs font-bold flex items-center gap-1.5"><Icon name="tag" size={14}/> {t}</span>
                                ))}
                                {viewingEntry.people && viewingEntry.people.split(',').map(p => p.trim()).filter(p=>p).map((p, i) => (
                                    <span key={i} className="px-4 py-1.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-xl text-xs font-bold flex items-center gap-1.5"><Icon name="user" size={14}/> {p}</span>
                                ))}
                                {viewingEntry.weather && (
                                    <span className="px-4 py-1.5 bg-orange-50 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 rounded-xl text-xs font-bold flex items-center gap-1.5 w-full sm:w-auto"><Icon name="sun" size={14}/> {viewingEntry.weather}</span>
                                )}
                                {viewingEntry.locations && viewingEntry.locations.length > 0 ? viewingEntry.locations.map((loc, i) => (
                                    <span key={`loc-view-${i}`} className="px-4 py-1.5 bg-emerald-100 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-400 rounded-xl text-xs font-bold flex items-center gap-1.5"><Icon name="map-pin" size={14}/> {loc.name} • {loc.time} {loc.weather ? `• ${loc.weather}` : ''}</span>
                                )) : (viewingEntry.location && (
                                    <span className="px-4 py-1.5 bg-emerald-100 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-400 rounded-xl text-xs font-bold flex items-center gap-1.5"><Icon name="map-pin" size={14}/> {viewingEntry.location.name ? `${viewingEntry.location.name} (${viewingEntry.location.time})` : 'GPS-Siegel'}</span>
                                ))}
                                {viewingEntry.rating > 0 && (
                                    <div className="flex items-center gap-1 ml-auto bg-amber-50 dark:bg-amber-900/30 px-4 py-1.5 rounded-xl">
                                        {[1,2,3,4,5].map(star => <Icon key={star} name="star" size={16} className={viewingEntry.rating >= star ? 'text-amber-500 fill-amber-500' : 'text-amber-200 dark:text-amber-900'} />)}
                                    </div>
                                )}
                            </div>

                            <div className="text-[1.05rem] leading-[1.8] font-medium legacy-content text-slate-800 dark:text-slate-200 opacity-90" dangerouslySetInnerHTML={createSafeHtml(viewingEntry.text)} />
                            {viewingEntry.audio && <div className="mt-12 p-6 rounded-[2rem] bg-slate-50 dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm no-print"><span className="text-xs font-bold uppercase tracking-widest opacity-50 mb-4 block">Audio-Log</span><audio src={viewingEntry.audio} controls className="w-full" /></div>}
                            
                            <div className="mt-20 pt-10 border-t border-slate-100 dark:border-zinc-800 flex justify-center no-print">
                                <button onClick={() => startNewChapter(viewingEntry)} className="px-8 py-4 font-bold rounded-full flex items-center gap-3 hover:scale-105 active:scale-95 transition-transform shadow-lg text-lg" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}><Icon name="plus" size={24}/> Neues Kapitel anfügen</button>
                            </div>

                            {allBookEntries.length > 1 && (
                                <div className="flex justify-between items-center mt-16 pt-8 border-t border-slate-100 dark:border-zinc-800 no-print pb-24">
                                    {prevPage ? (
                                        <button onClick={() => setViewingEntry(prevPage)} className="flex items-center gap-2 font-bold text-sm opacity-60 hover:opacity-100 transition-colors" style={{ color: user.nameColor }}><Icon name="arrow-left" size={18}/> Vorherige Seite</button>
                                    ) : <div/>}
                                    <span className="text-xs font-bold opacity-30 uppercase tracking-widest">Seite {cIdx + 1} von {allBookEntries.length}</span>
                                    {nextPage ? (
                                        <button onClick={() => setViewingEntry(nextPage)} className="flex items-center gap-2 font-bold text-sm opacity-60 hover:opacity-100 transition-colors" style={{ color: user.nameColor }}>Nächste Seite <Icon name="arrow-right" size={18}/></button>
                                    ) : <div/>}
                                </div>
                            )}
                         </div>
                     </>
                 );
             })()}
           </div>
        )}

        {/* --- PRINT VIEW ONLY --- */}
        {viewingEntry && !showEditor && (() => {
          const bookRoot = getBookRoot(viewingEntry.id);
          const chronologicalBookEntries = [...getAllBookEntries(bookRoot?.id || viewingEntry.id)].sort(sortEntriesChronological);
          return (
          <div className="print-only w-full max-w-4xl mx-auto p-8">
            <div className="print-title-page page-break-after">
               <h1 style={{fontSize: '56px', marginBottom: '20px', fontFamily: 'Inter, sans-serif'}}>{user.appName || 'Legacy Vision Journal'}</h1>
               <h3 style={{fontSize: '24px', opacity: 0.6}}>Verfasst von {user.name}</h3>
               {user.motto && <p style={{marginTop: '40px', fontStyle: 'italic'}}>{user.motto}</p>}
               <p style={{position: 'absolute', bottom: '40px', left: '0', right: '0', textAlign: 'center'}}>Generiert am {new Date().toLocaleDateString('de-DE')}</p>
            </div>
            
            <div className="print-toc page-break-after">
               <h2 style={{fontSize: '32px', marginBottom: '30px', borderBottom: '1px solid #000', paddingBottom: '10px', fontFamily: 'Inter, sans-serif'}}>Inhaltsverzeichnis</h2>
               <ul style={{listStyle: 'none', padding: 0}}>
                   {chronologicalBookEntries.map((e, idx) => (
                       <li key={idx} style={{marginBottom: '15px', fontSize: '18px'}}><strong>{idx+1}.</strong> {e.title || 'Ohne Titel'}</li>
                   ))}
               </ul>
            </div>

            <div className="print-book-content">
               {chronologicalBookEntries.map((e, idx) => (
