<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// --- UTILITY FUNKTIONEN (Außerhalb von React zur Performance-Optimierung) ---

const safeStorageGet = (key) => { try { return localStorage.getItem(key); } catch(e) { console.error('Storage Read Error:', e); return null; } };
const safeStorageSet = (key, val) => { try { localStorage.setItem(key, val); } catch(e) { console.error('Storage Write Error:', e); } };

const safeParseDate = (dInput) => {
    if (!dInput) return new Date(0);
    if (dInput instanceof Date) { if (isNaN(dInput.getTime())) return new Date(0); return dInput; }
    if (typeof dInput === 'number') return new Date(dInput);
    
    let dStr = String(dInput).trim();
    if (/^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}/.test(dStr)) dStr = dStr.replace(' ', 'T') + 'Z';

    let time = new Date(dStr).getTime();
    if (isNaN(time)) time = new Date(dStr + 'Z').getTime();
    if (isNaN(time)) time = new Date(dStr.replace(' ', 'T')).getTime();
    if (isNaN(time)) time = new Date(dStr.replace(' ', 'T') + 'Z').getTime();
    
    if (isNaN(time)) {
        const deMatch = dStr.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
        if (deMatch) {
            const timePart = dStr.match(/\s(\d{2}:\d{2}:\d{2})/) ? dStr.match(/\s(\d{2}:\d{2}:\d{2})/)[1] : '12:00:00';
            time = new Date(`${deMatch[3]}-${deMatch[2].padStart(2, '0')}-${deMatch[1].padStart(2, '0')}T${timePart}Z`).getTime();
        }
    }
    return isNaN(time) ? new Date(0) : new Date(time);
};

const sortEntriesDashboard = (a, b) => (safeParseDate(b.orderTimestamp || b.date).getTime() || 0) - (safeParseDate(a.orderTimestamp || a.date).getTime() || 0);
const sortEntriesChronological = (a, b) => {
    const dA = safeParseDate(a.date);
    const dB = safeParseDate(b.date);
    const dayA = new Date(dA.getFullYear(), dA.getMonth(), dA.getDate()).getTime();
    const dayB = new Date(dB.getFullYear(), dB.getMonth(), dB.getDate()).getTime();
    if (dayA !== dayB) return dayB - dayA; 
    return (safeParseDate(b.orderTimestamp || b.date).getTime() || 0) - (safeParseDate(a.orderTimestamp || a.date).getTime() || 0);
};
const sortEntriesAscending = (a, b) => safeParseDate(a.orderTimestamp || a.date).getTime() - safeParseDate(b.orderTimestamp || b.date).getTime();

const getLocalISO = () => new Date().toISOString();

const createSafeHtml = (htmlStr) => {
  const safeStr = htmlStr || '';
  return { __html: window.DOMPurify ? window.DOMPurify.sanitize(safeStr, { ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'u', 'br', 'div', 'span', 'blockquote', 'p', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'img', 'font'], ALLOWED_ATTR: ['style', 'class', 'dir', 'src', 'alt', 'color', 'width', 'height', 'contenteditable'] }) : safeStr };
};

const getCoverImage = (entry) => {
    if (!entry) return null;
    if (entry.images && entry.images.length > 0) return entry.images[0];
    if (entry.text) { const match = entry.text.match(/<img[^>]+src="([^">]+)"/); if (match) return match[1]; }
    return null;
};

const getCoverImageForCard = (entry, allEntries) => {
    if (!entry) return null;
    const bookEntries = [entry, ...allEntries.filter(e => !e.trashed && e.parentId === entry.id)].sort(sortEntriesDashboard);
    for (const e of bookEntries) {
        const cover = getCoverImage(e);
        if (cover) return cover;
    }
    return null;
};

const getBookRoot = (entryId, entries) => { 
    let current = entries.find(e => e && e.id === entryId && !e.trashed); 
    let safeGuard = 0; 
    const visited = new Set(); 
    while (current && current.parentId && safeGuard < 1000) { 
        if (visited.has(current.id)) break; 
        visited.add(current.id); 
        const p = entries.find(e => e && e.id === current.parentId && !e.trashed); 
        if (p && p.id !== current.id) current = p; else break; 
        safeGuard++; 
    } 
    return current; 
};

const getAllBookEntries = (rootId, entries) => { 
    const result = []; 
    const visited = new Set(); 
    const traverse = (id, depth=0) => { 
        if (depth > 1000 || visited.has(id)) return; 
        visited.add(id); 
        const entry = entries.find(e => e && e.id === id && !e.trashed); 
        if (entry && !result.find(r => r.id === entry.id)) { 
            result.push(entry); 
            entries.filter(e => e && e.parentId === id && !e.trashed).sort(sortEntriesChronological).forEach(c => traverse(c.id, depth+1)); 
        } 
    }; 
    traverse(rootId); 
    return result; 
};

// --- CRYPTO ---
const encHelper = new TextEncoder();
const decHelper = new TextDecoder();
const cryptoKeyCache = {}; 

const getCryptoKey = async (pin, saltStr) => {
    const cacheKey = pin + saltStr;
    if (cryptoKeyCache[cacheKey]) return cryptoKeyCache[cacheKey];
    const keyMaterial = await window.crypto.subtle.importKey("raw", encHelper.encode(pin), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]);
    const salt = Uint8Array.from(atob(saltStr), c => c.charCodeAt(0));
    const key = await window.crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
    cryptoKeyCache[cacheKey] = key; return key;
};

const encryptData = async (text, pin) => {
    try {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const saltStr = btoa(String.fromCharCode.apply(null, salt));
        const ivStr = btoa(String.fromCharCode.apply(null, iv));
        const key = await getCryptoKey(pin, saltStr);
        const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encHelper.encode(text));
        const bytes = new Uint8Array(encrypted);
        let binary = '';
        for (let i = 0; i < bytes.length; i += 8192) binary += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
        return { cipher: btoa(binary), iv: ivStr, salt: saltStr };
    } catch(e) { console.error('Encryption failed:', e); return null; }
};

const decryptData = async (encryptedObj, pin) => {
    if (!encryptedObj || !pin) return null;
    try {
        const salt = Uint8Array.from(atob(encryptedObj.salt), c => c.charCodeAt(0));
        const iv = Uint8Array.from(atob(encryptedObj.iv), c => c.charCodeAt(0));
        const atobCipher = atob(encryptedObj.cipher);
        const cipher = new Uint8Array(atobCipher.length);
        for (let i = 0; i < atobCipher.length; i++) cipher[i] = atobCipher.charCodeAt(i);
        const keyMaterial = await window.crypto.subtle.importKey("raw", encHelper.encode(pin), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]);
        const key = await window.crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, cipher);
        return decHelper.decode(decrypted);
    } catch(e) { console.error('Decryption failed:', e); return null; }
};

const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

const initDB = () => new Promise((resolve, reject) => { 
    const req = indexedDB.open('LegacyVisionDB', 4); 
    req.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains('entries')) db.createObjectStore('entries', { keyPath: 'id' }); }; 
    req.onsuccess = () => resolve(req.result); 
    req.onerror = () => { console.error("IndexedDB Init Error"); reject(req.error); }; 
});

// --- KOMPONENTEN ---

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, errorInfo) { console.error("ErrorBoundary caught an error", error, errorInfo); }
  render() {
    if (this.state.hasError) {
      return (
        <div className="min-h-screen flex items-center justify-center bg-black text-white p-8 text-center">
          <div><h1 className="text-2xl font-bold mb-4">Ein Fehler ist aufgetreten</h1><button type="button" onClick={() => window.location.reload()} className="px-6 py-3 bg-white text-black font-bold rounded-full">App neu laden</button></div>
        </div>
      );
    }
    return this.props.children;
  }
}

const Icon = ({ name, size = 24, className = '', ...props }) => {
  const spanRef = useRef(null);
  useEffect(() => {
    if (window.lucide && spanRef.current) {
        spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
        window.lucide.createIcons({ root: spanRef.current });
        const svg = spanRef.current.querySelector('svg');
        if (svg) { svg.setAttribute('width', size); svg.setAttribute('height', size); if (className) svg.setAttribute('class', `lucide lucide-${name} ${className}`); }
    }
  }, [name, size, className]);
  return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} {...props}></span>;
};

const COLORS = ['#ffffff', '#f8fafc', '#e4e4e7', '#a1a1aa', '#52525b', '#27272a', '#18181b', '#09090b', '#fef08a', '#fbbf24', '#f59e0b', '#d97706', '#fecdd3', '#fb7185', '#f43f5e', '#e11d48', '#bfdbfe', '#3b82f6', '#1d4ed8', '#a7f3d0', '#10b981', '#047857', '#e9d5ff', '#8b5cf6', '#6d28d9'];
const EDITOR_COLORS = ['#0f172a', '#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#a8a29e', '#ffffff'];
const isDarkColor = (c) => { if (!c) return true; const hex = c.replace('#', ''); if (hex.length === 6) { const r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16); return ((r * 299 + g * 587 + b * 114) / 1000) < 128; } return true; };
const getSubtleBorderColor = (c, isD) => { if (!c) return isD ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'; const clean = c.replace('#', ''); if (clean.length === 6) { const r = parseInt(clean.slice(0, 2), 16), g = parseInt(clean.slice(2, 4), 16), b = parseInt(clean.slice(4, 6), 16); return `rgba(${r}, ${g}, ${b}, ${isD ? 0.15 : 0.25})`; } return isD ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'; };
const CATEGORIES = ['Allgemein', 'Tagebuch', 'Ideen', 'Gesundheit', 'Vision', 'Ziele', 'Bücher', 'Familie'];
const PILLARS = [{ id: 'm1', phase: 'Fundament', title: '1. Das Nordstern-Manifest', desc: 'Definiere deine absoluten, unverhandelbaren Grundwerte.' }, { id: 'm2', phase: 'Fundament', title: '2. Der Zeitgeist-Stempel', desc: 'Historischer Kontext: Was passiert gerade auf der Welt?' }, { id: 'm3', phase: 'Fundament', title: '3. Das Geistige Testament', desc: 'Vererbe deinen Charakter. Welche Lebensweisheiten möchtest du weitergeben?' }, { id: 'm6', phase: 'Kommunikation', title: '6. Die Zeitkapsel', desc: 'Eine Botschaft an die Zukunft. Nutze die Datums-Siegelfunktion.' }, { id: 'm11', phase: 'Struktur', title: '11. Purer Text (Agnostisch)', desc: 'Schreibe in einfachen Sätzen rohe Fakten auf, völlig ohne Emotionen.' }, { id: 'm16', phase: 'Tiefe', title: '16. Emotionaler Farb-Code', desc: 'Vergib deiner aktuellen Lebensphase eine Farbe und erkläre, warum.' }, { id: 'm21', phase: 'Anpassung', title: '21. Der Pivot-Tracker', desc: 'Hebe Momente hervor, in denen du dein Leben radikal in eine neue Richtung gelenkt hast.' }, { id: 'm25', phase: 'Anpassung', title: '25. Raum für Unbegreifliches', desc: 'Platz für Konzepte und Lebensrealitäten, die es heute noch gar nicht gibt.' }];

const EdBtn = ({cmd, arg, icon, txt, onClick, isDirtyRef}) => (
    <button onMouseDown={e=>{ if(cmd){ e.preventDefault(); document.execCommand(cmd, false, arg); if(isDirtyRef) isDirtyRef.current=true; } }} onClick={onClick} className="p-2.5 bg-white dark:bg-zinc-900 rounded-xl text-slate-500 hover:text-accent transition-colors shadow-sm shrink-0 border border-slate-100 dark:border-zinc-800">
        {icon ? <Icon name={icon} size={18} /> : <span className="font-bold text-sm">{txt}</span>}
    </button>
);

const ColorBtn = ({color, isBg, user, setUser}) => (
   <button onClick={() => {
       const newUser = {...user};
       if (isBg) newUser.appBgColor = color;
       else { newUser.textColor = color; newUser.nameColor = color; }
       setUser(newUser);
       safeStorageSet('legacy_user', JSON.stringify(newUser));
   }} className={`w-10 h-10 rounded-full border-2 transition-transform ${ (isBg ? user.appBgColor : user.textColor) === color ? 'border-slate-400 dark:border-zinc-500 scale-125 shadow-md' : 'border-transparent hover:scale-110'}`} style={{ backgroundColor: color }} />
);

const TimelineSwipeableEntry = ({ entry, allEntries, onClick, onMoveUp, onMoveDown, onArchivePrompt, onTrashPrompt }) => {
    const [offsetX, setOffsetX] = useState(0);
    const startX = useRef(null);
    const dragged = useRef(false);

    const handleTouchStart = (evt) => { startX.current = evt.touches[0].clientX; dragged.current = false; };
    const handleTouchMove = (evt) => {
        if (startX.current === null) return;
        const diff = evt.touches[0].clientX - startX.current;
        if (Math.abs(diff) > 10) dragged.current = true;
        if (diff > 100) setOffsetX(100); else if (diff < -100) setOffsetX(-100); else setOffsetX(diff);
    };
    const handleTouchEnd = () => {
        if (offsetX > 60) onArchivePrompt(entry); else if (offsetX < -60) onTrashPrompt(entry);
        setOffsetX(0); startX.current = null; setTimeout(() => { dragged.current = false; }, 100);
    };

    const coverUrl = getCoverImageForCard(entry, allEntries);

    return (
        <div className="relative w-full rounded-2xl overflow-hidden bg-slate-200 dark:bg-zinc-800 shrink-0 border border-slate-100 dark:border-zinc-800/50">
            <div className="absolute inset-0 flex justify-between items-center px-4">
                <div className="text-emerald-600 font-bold flex items-center gap-2 opacity-80 text-sm"><Icon name="archive" size={16}/> Archiv</div>
                <div className="text-rose-600 font-bold flex items-center gap-2 opacity-80 text-sm">Löschen <Icon name="trash-2" size={16}/></div>
            </div>
            <div style={{ transform: `translateX(${offsetX}px)`, transition: startX.current === null ? 'transform 0.2s ease-out' : 'none' }} className="relative z-10 w-full bg-white dark:bg-zinc-900/90 shadow-sm flex items-center p-3">
                <button onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} onClick={(e) => { if (dragged.current) { e.preventDefault(); return; } onClick(); }} className="flex-1 flex items-center gap-4 text-left">
                    {coverUrl ? <img src={coverUrl} className="w-14 h-14 rounded-xl object-cover shrink-0 pointer-events-none" /> : <div className="w-14 h-14 rounded-xl bg-slate-100 dark:bg-zinc-800 flex items-center justify-center shrink-0 pointer-events-none"><Icon name="book" size={24} className="opacity-40" /></div>}
                    <div className="overflow-hidden pointer-events-none">
                        <h4 className="font-bold text-sm text-accent truncate mb-1">{entry.title || 'Ohne Titel'}</h4>
                        <p className="text-[10px] opacity-60 font-bold tracking-widest uppercase">{safeParseDate(entry.orderTimestamp || entry.date).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})} UHR</p>
                    </div>
                </button>
                <div className="flex gap-1 shrink-0 z-20 ml-2 pl-2 border-l border-slate-100 dark:border-zinc-800/50">
                    <button type="button" onTouchStart={(e) => e.stopPropagation()} onClick={(e) => { e.preventDefault(); e.stopPropagation(); if (onMoveUp) onMoveUp(e); }} className="w-10 h-10 bg-slate-50 dark:bg-zinc-800 rounded-full flex items-center justify-center text-slate-500 hover:text-accent transition-colors"><Icon name="chevron-up" size={20}/></button>
                    <button type="button" onTouchStart={(e) => e.stopPropagation()} onClick={(e) => { e.preventDefault(); e.stopPropagation(); if (onMoveDown) onMoveDown(e); }} className="w-10 h-10 bg-slate-50 dark:bg-zinc-800 rounded-full flex items-center justify-center text-slate-500 hover:text-accent transition-colors"><Icon name="chevron-down" size={20}/></button>
                </div>
            </div>
        </div>
    );
};

// ==========================================
// EIGENSTÄNDIGE EDITOR-KOMPONENTE
// ==========================================
const LegacyEditor = ({ config, onSave, onClose, user, showDialog }) => {
    // Isoliertes lokales State Management zur Verhinderung von App-Rerenders
    const [title, setTitle] = useState('');
    const [category, setCategory] = useState(CATEGORIES[0]);
    const [selectedColor, setSelectedColor] = useState(user.isDark ? COLORS[8] : COLORS[0]);
    const [selectedImages, setSelectedImages] = useState([]);
    const [audioUrl, setAudioUrl] = useState(null);
    const [isManifested, setIsManifested] = useState(false);
    const [unlockDate, setUnlockDate] = useState('');
    const [location, setLocation] = useState(null);
    const [locations, setLocations] = useState([]);
    const [rating, setRating] = useState(0);
    const [tags, setTags] = useState('');
    const [people, setPeople] = useState('');
    const [weather, setWeather] = useState('');
    
    // Non-UI States
    const [isDrawing, setIsDrawing] = useState(false);
    const [isRecording, setIsRecording] = useState(false);
    const [picker, setPicker] = useState(null);
    const [autoSaveStatus, setAutoSaveStatus] = useState('');
    
    const editorRef = useRef(null);
    const canvasRef = useRef(null);
    const isDirtyRef = useRef(false);
    const mediaRecorderRef = useRef(null);
    const audioChunksRef = useRef([]);
    
    // Persistent Storage for Data
    const entryIdRef = useRef(generateId());
    const dateRef = useRef(getLocalISO());
    const orderTimestampRef = useRef(getLocalISO());
    const initialContentRef = useRef('');
    const parentIdRef = useRef('');
    const inheritedFromRef = useRef(null);
    const pillarGuidanceRef = useRef(null);
    const moodRef = useRef(null);

    useEffect(() => {
        let initTitle = '';
        if (config.entry) {
            initTitle = config.entry.title || '';
            initialContentRef.current = config.entry.text || '';
            entryIdRef.current = config.entry.id;
            dateRef.current = config.entry.date || getLocalISO();
            orderTimestampRef.current = config.entry.orderTimestamp || config.entry.date || getLocalISO();
            setCategory(config.entry.category || CATEGORIES[0]);
            setSelectedColor(config.entry.color || (user.isDark ? COLORS[8] : COLORS[0]));
            setSelectedImages(config.entry.images || []);
            setIsManifested(config.entry.manifested || false);
            setAudioUrl(config.entry.audio || null);
            setUnlockDate(config.entry.unlockDate || '');
            setLocation(config.entry.location || null);
            setLocations(config.entry.locations || (config.entry.location ? [config.entry.location] : []));
            setRating(config.entry.rating || 0);
            setTags(config.entry.tags || '');
            setPeople(config.entry.people || '');
            setWeather(config.entry.weather || '');
            parentIdRef.current = config.entry.parentId || '';
            inheritedFromRef.current = config.entry.inheritedFrom || null;
            moodRef.current = config.entry.mood || null;
        } else if (config.parent) {
            initTitle = config.parent.title || '';
            parentIdRef.current = config.parent.id;
            setCategory(config.parent.category || CATEGORIES[0]);
        } else if (config.pillar) {
            initTitle = config.pillar.title;
            setCategory('Weisheit');
            pillarGuidanceRef.current = config.pillar.desc;
        }
        
        if (config.customDate) {
            const now = new Date(); const timeStr = now.toISOString().split('T')[1] || "12:00:00.000Z";
            dateRef.current = `${config.customDate}T${timeStr}`;
            orderTimestampRef.current = dateRef.current;
        }
        
        setTitle(initTitle);
    }, [config]);

    const handlePerformSave = (closeAfter = false) => {
        const currentText = editorRef.current ? editorRef.current.innerHTML : initialContentRef.current;
        const hasInlineImage = currentText.includes('<img');
        const isEmpty = !title.trim() && !currentText.replace(/<[^>]*>?/gm, '').trim() && !hasInlineImage && selectedImages.length === 0 && !audioUrl && !weather && !tags && !people;
        
        if (isEmpty) {
            if (closeAfter) onClose();
            return;
        }

        const newEntry = {
            id: entryIdRef.current, title: title.trim(), text: currentText, color: selectedColor, images: selectedImages, audio: audioUrl,
            archived: false, trashed: false, manifested: isManifested, category, mood: moodRef.current, unlockDate, location, locations,
            parentId: parentIdRef.current, inheritedFrom: inheritedFromRef.current, rating, tags, people, weather,
            date: dateRef.current, orderTimestamp: orderTimestampRef.current
        };

        onSave(newEntry);
        isDirtyRef.current = false;
        
        if (closeAfter) {
            onClose();
        } else {
            setAutoSaveStatus('Gespeichert');
            setTimeout(() => setAutoSaveStatus(''), 2000);
        }
    };

    // AutoSave Loop
    useEffect(() => {
        const timer = setInterval(() => {
            if (isDirtyRef.current) handlePerformSave(false);
        }, 3000);
        return () => {
            clearInterval(timer);
            // Save exactly ONCE on unmount to prevent data loss
            if (isDirtyRef.current) handlePerformSave(false);
        };
    }, [title, selectedColor, selectedImages, audioUrl, isManifested, category, unlockDate, location, locations, rating, tags, people, weather]);

    // Handle Hardware Back Button natively inside the Editor
    useEffect(() => {
        const popHandler = (e) => {
            e.preventDefault();
            handlePerformSave(true);
        };
        window.addEventListener('popstate', popHandler);
        return () => window.removeEventListener('popstate', popHandler);
    }, [title, selectedColor, selectedImages, audioUrl, isManifested, category, unlockDate, location, locations, rating, tags, people, weather]);


    const handleFileUpload = (e, type) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        if (type === 'image') {
            const MAX_SIZE = 800; 
            const processedPromises = files.map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width; let height = img.height;
                            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                            canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            });
            Promise.all(processedPromises).then(base64Images => {
                setSelectedImages(prev => [...prev, ...base64Images]);
                isDirtyRef.current = true;
            });
        }
        e.target.value = null; 
    };

    const wrapImage = (img) => {
        if (!img || !img.parentNode) return; 
        if (img.closest('.inline-img-wrapper')) return; 
        const wrapper = document.createElement('span'); wrapper.className = 'inline-img-wrapper'; wrapper.contentEditable = 'false';
        const delBtn = document.createElement('span'); delBtn.className = 'delete-img-btn'; delBtn.innerText = 'X';
        const clonedImg = img.cloneNode(true); clonedImg.removeAttribute('style'); clonedImg.style.width = '120px'; clonedImg.style.height = 'auto';
        wrapper.appendChild(clonedImg); wrapper.appendChild(delBtn);
        img.parentNode.replaceChild(wrapper, img);
        const space = document.createTextNode('\u00A0');
        if (wrapper.nextSibling) wrapper.parentNode.insertBefore(space, wrapper.nextSibling); else wrapper.parentNode.appendChild(space);
        isDirtyRef.current = true;
    };

    const handleEditorInput = () => {
        isDirtyRef.current = true;
        if (editorRef.current) {
            const nakedImgs = editorRef.current.querySelectorAll('img:not(.inline-img-wrapper img)');
            if (nakedImgs.length > 0) {
                nakedImgs.forEach(img => {
                    if (!img.src) return;
                    setTimeout(() => {
                        if (!img.isConnected || img.closest('.inline-img-wrapper')) return;
                        if (img.src.startsWith('blob:')) {
                            fetch(img.src).then(r => r.blob()).then(blob => {
                                const reader = new FileReader(); reader.onload = () => { img.src = reader.result; wrapImage(img); }; reader.readAsDataURL(blob);
                            }).catch(() => wrapImage(img));
                        } else { wrapImage(img); }
                    }, 100);
                });
            }
        }
    };

    const handleEditorPaste = (e) => {
        const clipboardData = e.clipboardData || window.clipboardData || (e.nativeEvent && e.nativeEvent.clipboardData);
        if (!clipboardData) return;
        if (clipboardData.items) {
            for (let i = 0; i < clipboardData.items.length; i++) {
                if (clipboardData.items[i].type.indexOf('image') !== -1) {
                    const blob = clipboardData.items[i].getAsFile();
                    if (!blob) continue;
                    e.preventDefault();
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const base64 = event.target.result;
                        if (editorRef.current) {
                            editorRef.current.focus(); document.execCommand('insertHTML', false, `<span class="inline-img-wrapper" contenteditable="false"><img src="${base64}" /><span class="delete-img-btn">X</span></span>&nbsp;`);
                            isDirtyRef.current = true;
                        }
                    };
                    reader.readAsDataURL(blob); break; 
                }
            }
        }
    };

    const handleEditorClick = (e) => {
        if (e.target.classList.contains('delete-img-btn')) {
            e.target.closest('.inline-img-wrapper').remove(); isDirtyRef.current = true;
        } else if (e.target.tagName === 'IMG' && e.target.closest('.inline-img-wrapper')) {
            const wrapper = e.target.closest('.inline-img-wrapper'); const img = wrapper.querySelector('img');
            setPicker({ title: 'Sticker / Bild anpassen', currentValue: null, options: [{label: 'Klein', value: '120px'}, {label: 'Mittel', value: '250px'}, {label: 'Groß', value: '100%'}], onSelect: (val) => { img.style.width = val; isDirtyRef.current = true; } });
        } else if (e.target.tagName === 'IMG' && !e.target.closest('.inline-img-wrapper')) {
            const img = e.target;
            setPicker({ title: 'Sticker / Bild anpassen', currentValue: null, options: [{label: 'Klein', value: '120px'}, {label: 'Mittel', value: '250px'}, {label: 'Groß', value: '100%'}, {label: '❌ Löschen', value: 'delete'}], onSelect: (val) => { if (val === 'delete') { img.remove(); } else { img.style.width = val; img.style.height = 'auto'; } isDirtyRef.current = true; } });
        }
    };

    const getCanvasCoordinates = (e) => {
        if (!canvasRef.current) return { x: 0, y: 0 };
        const rect = canvasRef.current.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) return { x: (e.touches[0].clientX - rect.left), y: (e.touches[0].clientY - rect.top) };
        return { x: (e.clientX - rect.left), y: (e.clientY - rect.top) };
    };
    const startDrawing = (e) => { if (!canvasRef.current) return; const {x, y} = getCanvasCoordinates(e); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); canvasRef.current.isPainting = true; };
    const draw = (e) => { if (!canvasRef.current?.isPainting) return; const {x, y} = getCanvasCoordinates(e); const ctx = canvasRef.current.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = user.isDark ? '#ffffff' : '#000000'; ctx.lineTo(x, y); ctx.stroke(); };
    const stopDrawing = () => { if (canvasRef.current) canvasRef.current.isPainting = false; };
    
    useEffect(() => { 
        let canvasEl = canvasRef.current; 
        const preventScroll = (e) => e.preventDefault(); 
        if (isDrawing && canvasEl) { 
            canvasEl.addEventListener('touchstart', preventScroll, { passive: false }); 
            canvasEl.addEventListener('touchmove', preventScroll, { passive: false }); 
            setTimeout(() => { 
                if (!canvasEl) return; 
                const rect = canvasEl.parentElement.getBoundingClientRect(); 
                const dpr = window.devicePixelRatio || 1;
                canvasEl.width = rect.width * dpr; canvasEl.height = rect.height * dpr; 
                const ctx = canvasEl.getContext('2d'); 
                ctx.scale(dpr, dpr);
                ctx.fillStyle = user.isDark ? '#18181b' : '#ffffff'; ctx.fillRect(0, 0, rect.width, rect.height); 
            }, 50); 
        } 
        return () => { if (canvasEl) { canvasEl.removeEventListener('touchstart', preventScroll); canvasEl.removeEventListener('touchmove', preventScroll); } }; 
    }, [isDrawing, user.isDark]);

    const startRecording = async () => { try { const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorderRef.current = new MediaRecorder(stream); audioChunksRef.current = []; mediaRecorderRef.current.ondataavailable = (e) => { if (e.data.size > 0) audioChunksRef.current.push(e.data); }; mediaRecorderRef.current.onstop = () => { const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' }); const reader = new FileReader(); reader.readAsDataURL(blob); reader.onloadend = () => { setAudioUrl(reader.result); isDirtyRef.current = true; }; }; mediaRecorderRef.current.start(); setIsRecording(true); } catch (err) { showDialog({ title: 'Fehler', message: 'Mikrofon verweigert.', icon: 'mic-off' }); } };
    const stopRecording = () => { if (mediaRecorderRef.current) { mediaRecorderRef.current.stop(); setIsRecording(false); } };

    return (
        <div className="fixed inset-0 z-[200] flex flex-col overflow-hidden bg-white dark:bg-black">
            <header className="flex-none flex justify-between items-center p-4 sm:p-6 shrink-0 z-50 pt-safe bg-white/95 dark:bg-black/95 border-b border-slate-100 dark:border-zinc-900">
                <button onClick={() => { handlePerformSave(true); window.history.back(); }} className="p-3 bg-slate-100 dark:bg-zinc-900 rounded-2xl text-slate-900 dark:text-white hover:scale-105 active:scale-95 transition-transform"><Icon name="arrow-left" size={22}/></button>
                <div className="flex items-center gap-4">
                    <span className="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">{autoSaveStatus}</span>
                    <button onClick={() => handlePerformSave(true)} className="px-6 py-3 bg-accent text-white rounded-2xl font-bold text-sm shadow-xl shadow-accent/20 hover:scale-105 active:scale-95 transition-transform" style={{ backgroundColor: user.nameColor || '#000000', color: isDarkColor(user.nameColor || '#000000') ? '#ffffff' : '#000000' }}>Fertig</button>
                </div>
            </header>

            <div className="flex-none px-4 sm:px-8 pt-6 pb-2 shrink-0 bg-white dark:bg-black z-40 border-b-[3px] border-slate-200 dark:border-zinc-800 focus-within:border-accent transition-colors">
              <input type="text" placeholder="Titel der Vision..." value={title} onChange={e=>{setTitle(e.target.value); isDirtyRef.current=true;}} className="w-full bg-transparent text-3xl sm:text-4xl font-extrabold tracking-tighter outline-none pb-3 placeholder-slate-300 dark:placeholder-zinc-700 text-slate-900 dark:text-white" />
            </div>

            <div className="flex-none flex items-center gap-2 p-2 px-4 overflow-x-auto hide-scrollbar border-b border-slate-100 dark:border-zinc-900 bg-slate-50 dark:bg-zinc-950 shrink-0 shadow-sm z-40">
                <EdBtn cmd="formatBlock" arg="H1" txt="H1" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="formatBlock" arg="H2" txt="H2" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="formatBlock" arg="P" txt="T" isDirtyRef={isDirtyRef} />
                <div className="w-px bg-slate-200 dark:bg-zinc-800 h-6 mx-1 shrink-0"></div>
                <EdBtn cmd="bold" icon="bold" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="italic" icon="italic" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="formatBlock" arg="blockquote" icon="quote" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="insertOrderedList" icon="list-ordered" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="insertUnorderedList" icon="list" isDirtyRef={isDirtyRef} />
                <div className="w-px bg-slate-200 dark:bg-zinc-800 h-6 mx-1 shrink-0"></div>
                <label className="p-2.5 bg-white dark:bg-zinc-900 rounded-xl text-slate-500 hover:text-accent transition-colors shadow-sm cursor-pointer flex items-center justify-center relative overflow-hidden shrink-0 border border-slate-100 dark:border-zinc-800" title="Bild einfügen"><Icon name="image" size={18} /><input type="file" accept="image/*" multiple onChange={e=>handleFileUpload(e,'image')} className="absolute opacity-0 w-[200%] h-[200%] top-0 left-0 cursor-pointer" /></label>
                <button onClick={() => setIsDrawing(true)} className="p-2.5 bg-white dark:bg-zinc-900 rounded-xl text-slate-500 hover:text-accent transition-colors shadow-sm shrink-0 border border-slate-100 dark:border-zinc-800"><Icon name="pen-tool" size={18} /></button>
                <button onClick={isRecording ? stopRecording : startRecording} className={`p-2.5 rounded-xl transition-colors shadow-sm shrink-0 border border-slate-100 dark:border-zinc-800 ${isRecording ? 'bg-rose-500 text-white animate-pulse' : 'bg-white dark:bg-zinc-900 text-slate-500 hover:text-accent'}`}>{isRecording ? <Icon name="square" size={18}/> : <Icon name="mic" size={18}/>}</button>
                <div className="w-px bg-slate-200 dark:bg-zinc-800 h-6 mx-1 shrink-0"></div>
                <button onClick={()=>{setIsManifested(!isManifested); isDirtyRef.current=true;}} className={`p-2.5 rounded-xl transition-colors shadow-sm shrink-0 border ${isManifested ? 'bg-amber-50 dark:bg-amber-500/10 text-amber-500 border-amber-200 dark:border-amber-900/50' : 'bg-white dark:bg-zinc-900 text-slate-500 hover:text-amber-500 border-slate-100 dark:border-zinc-800'}`}><Icon name="sparkles" size={18}/></button>
                <div className="w-px bg-slate-200 dark:bg-zinc-800 h-6 mx-1 shrink-0"></div>
                {EDITOR_COLORS.map(c => <button key={c} onMouseDown={e=>{e.preventDefault(); document.execCommand('foreColor', false, c); isDirtyRef.current=true;}} className="w-8 h-8 rounded-full border-2 shadow-sm shrink-0 transition-transform hover:scale-110 active:scale-95" style={{backgroundColor: c, borderColor: isDarkColor(c) ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.1)'}}></button> )}
            </div>
            
            <div className="flex-auto overflow-y-auto relative bg-white dark:bg-black custom-scrollbar">
              <div className="p-4 md:p-8 max-w-3xl mx-auto w-full flex flex-col">
                  {selectedImages.length > 0 && (
                      <div className="mb-8 w-full flex flex-col items-center">
                          <div className="relative w-full rounded-[2rem] overflow-hidden shadow-sm group border border-slate-200 dark:border-zinc-800 shrink-0 bg-slate-100 dark:bg-zinc-800 flex items-center justify-center">
                              <img src={selectedImages[0]} className="w-full h-auto block" />
                              <button onClick={()=>{setSelectedImages(prev=>prev.slice(1)); isDirtyRef.current=true;}} className="absolute top-4 right-4 p-3 bg-black/60 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-md"><Icon name="x" size={16}/></button>
                          </div>
                          {selectedImages.length > 1 && (
                              <div className="flex gap-3 mt-4 overflow-x-auto hide-scrollbar snap-x w-full max-w-full">
                                  {selectedImages.slice(1).map((img, i) => (
                                      <div key={i+1} className="relative w-24 h-24 rounded-2xl overflow-hidden shadow-sm shrink-0 snap-start group border border-slate-200 dark:border-zinc-800 bg-slate-100 dark:bg-zinc-800">
                                          <img src={img} className="w-full h-full object-contain" />
                                          <button onClick={()=>{setSelectedImages(prev=>prev.filter((_,idx)=>idx!==i+1)); isDirtyRef.current=true;}} className="absolute top-1 right-1 p-1 bg-black/60 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-md"><Icon name="x" size={10}/></button>
                                      </div>
                                  ))}
                              </div>
                          )}
                      </div>
                  )}

                  {pillarGuidanceRef.current && (
                      <div className="p-4 rounded-3xl bg-amber-50 dark:bg-amber-500/10 border border-amber-100 dark:border-amber-900/30 text-amber-700 dark:text-amber-400 font-medium text-sm mb-6 flex gap-4 leading-relaxed">
                          <Icon name="book-open" size={24} className="shrink-0 mt-0.5 opacity-80" /> {pillarGuidanceRef.current}
                      </div>
                  )}

                  {audioUrl && (
                      <div className="mb-6 p-4 rounded-2xl bg-slate-50 dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 relative w-full">
                         <span className="text-[10px] font-bold uppercase tracking-widest opacity-50 mb-3 block">Audio-Log</span>
                         <audio src={audioUrl} controls className="w-full" />
                         <button onClick={()=>{setAudioUrl(null); isDirtyRef.current=true;}} className="absolute top-4 right-4 p-2 bg-slate-200 dark:bg-zinc-800 rounded-full text-slate-500 hover:text-rose-500"><Icon name="x" size={14}/></button>
                      </div>
                  )}

                  <div 
                      ref={editorRef} 
                      contentEditable 
                      onClick={handleEditorClick}
                      onPaste={handleEditorPaste}
                      onInput={handleEditorInput} 
                      className="outline-none text-[1.05rem] leading-[1.8] font-medium legacy-editor-content text-slate-800 dark:text-slate-200 pb-8 min-h-full w-full" 
                      data-placeholder="Was wirst du hinterlassen? Text tippen oder Sticker einfügen..." 
                      dangerouslySetInnerHTML={{__html: initialContentRef.current}} 
                  />
              </div>
            </div>

            <div className="flex-none p-3 border-t border-slate-100 dark:border-zinc-900 bg-white/95 dark:bg-black/95 backdrop-blur-xl shrink-0 flex items-center gap-3 overflow-x-auto hide-scrollbar z-50 pb-safe shadow-[0_-4px_6px_rgba(0,0,0,0.02)]">
               <button onClick={()=>setPicker({title:'Kategorie', currentValue: category, options: CATEGORIES.map(c=>({label:c, value:c})), onSelect: (v)=>{setCategory(v); isDirtyRef.current=true;}})} className="h-10 px-4 rounded-xl bg-slate-50 dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 text-xs font-bold flex items-center gap-2 shrink-0">{category} <Icon name="chevron-down" size={12}/></button>
               <div className="h-10 flex items-center gap-1 bg-slate-50 dark:bg-zinc-900 px-3 rounded-xl border border-slate-200 dark:border-zinc-800 shrink-0">
                  {[1,2,3,4,5].map(star => <Icon key={star} name="star" size={14} className={`cursor-pointer transition-colors ${rating >= star ? 'text-amber-500 fill-amber-500' : 'text-slate-300 dark:text-zinc-700'}`} onClick={() => {setRating(rating === star ? 0 : star); isDirtyRef.current=true;}} />)}
               </div>
               <div className="h-10 flex items-center bg-slate-50 dark:bg-zinc-900 px-3 rounded-xl border border-slate-200 dark:border-zinc-800 shrink-0 min-w-[120px]">
                   <Icon name="tag" size={12} className="text-slate-400 mr-2 shrink-0" />
                   <input type="text" placeholder="Tags (Komma...)" value={tags} onChange={e=>{setTags(e.target.value); isDirtyRef.current=true;}} className="bg-transparent border-none outline-none text-xs font-bold placeholder:opacity-50 w-full text-slate-900 dark:text-white" />
               </div>
               <div className="h-10 flex items-center bg-slate-50 dark:bg-zinc-900 px-3 rounded-xl border border-slate-200 dark:border-zinc-800 shrink-0 min-w-[120px]">
                   <Icon name="user" size={12} className="text-slate-400 mr-2 shrink-0" />
                   <input type="text" placeholder="Personen..." value={people} onChange={e=>{setPeople(e.target.value); isDirtyRef.current=true;}} className="bg-transparent border-none outline-none text-xs font-bold placeholder:opacity-50 w-full text-slate-900 dark:text-white" />
               </div>
               <div className={`h-10 relative px-4 rounded-xl border text-xs font-bold flex items-center gap-2 shrink-0 cursor-pointer overflow-hidden ${unlockDate ? 'bg-indigo-50 dark:bg-indigo-500/10 border-indigo-200 dark:border-indigo-900/50 text-indigo-600 dark:text-indigo-400' : 'bg-slate-50 dark:bg-zinc-900 border-slate-200 dark:border-zinc-800 text-slate-900 dark:text-white'}`}>
                  <Icon name="calendar-clock" size={14}/> {unlockDate ? new Date(unlockDate).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }) : 'Zeitsiegel'}
                  <input type="date" value={unlockDate} onChange={e=>{setUnlockDate(e.target.value); isDirtyRef.current=true;}} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10" />
               </div>
               {locations.map((loc, idx) => (
                   <div key={idx} className="h-10 px-4 rounded-xl border border-emerald-300 dark:border-emerald-700/50 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-400 text-xs font-bold flex items-center gap-2 shrink-0">
                       <Icon name="map-pin" size={14}/> {loc.name} • {loc.time} {loc.weather ? `• ${loc.weather}` : ''}
                       <button onClick={(e) => { e.stopPropagation(); setLocations(prev => prev.filter((_, i) => i !== idx)); isDirtyRef.current=true; }} className="ml-1 opacity-60 hover:opacity-100 hover:text-rose-500 transition-colors"><Icon name="x" size={14}/></button>
                   </div>
               ))}
               <button onClick={async ()=>{
                   if(!("geolocation" in navigator)){showDialog({title:'Fehler', message:'Ortung nicht unterstützt.'}); return;}
                   navigator.geolocation.getCurrentPosition(async (p) => { 
                       const lat = p.coords.latitude; const lng = p.coords.longitude; let locName = "GPS Standort"; let formattedTime = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + " Uhr"; let wStr = "";
                       try { const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`); const geoData = await geoRes.json(); if(geoData && geoData.address) { locName = geoData.address.city || geoData.address.town || geoData.address.village || geoData.address.road || "Unbekannter Ort"; } } catch(e) { console.warn("Geocoding failed", e); }
                       try { const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`); const data = await res.json(); const temp = Math.round(data.current_weather.temperature); const wcode = data.current_weather.weathercode; wStr = `${temp}°C`; if (wcode === 0) wStr += ' ☀️'; else if (wcode <= 3) wStr += ' ⛅'; else if (wcode <= 48) wStr += ' ☁️'; else if (wcode <= 67) wStr += ' 🌧️'; else if (wcode <= 79) wStr += ' 🌨️'; else if (wcode <= 99) wStr += ' ⛈️'; } catch(e) { console.warn("Weather API failed", e); }
                       const newLoc = {lat, lng, name: locName, time: formattedTime, weather: wStr}; setLocations(prev => [...prev, newLoc]); isDirtyRef.current=true; 
                       showDialog({title:'GPS erfasst', message:`Ort (${locName}) und Wetter wurden gesichert.`, icon:'map-pin'}); 
                   }, ()=>showDialog({title:'Fehler', message:'Ortung fehlgeschlagen.'}));
               }} className={`h-10 px-4 rounded-xl border text-xs font-bold flex items-center gap-2 shrink-0 bg-slate-50 dark:bg-zinc-900 border-slate-200 dark:border-zinc-800 text-slate-900 dark:text-white hover:bg-slate-100 dark:hover:bg-zinc-800 transition-colors`}><Icon name="plus" size={14}/> GPS hinzufügen</button>
            </div>

            {/* Drawing Modal Inner */}
            {isDrawing && (
              <div className="fixed inset-0 z-[300] bg-slate-900 flex flex-col no-print">
                <header className="flex justify-between items-center p-4 bg-slate-950 text-white pt-safe border-b border-white/10">
                  <button onClick={() => setIsDrawing(false)} className="p-3 bg-white/10 rounded-2xl hover:bg-white/20 transition-colors"><Icon name="x"/></button>
                  <span className="font-bold">Zeichnen</span>
                  <button onClick={() => {
                      if(canvasRef.current) {
                          const base64 = canvasRef.current.toDataURL();
                          if (editorRef.current) {
                              editorRef.current.focus();
                              document.execCommand('insertHTML', false, `<span class="inline-img-wrapper" contenteditable="false"><img src="${base64}" /><span class="delete-img-btn">X</span></span>&nbsp;`);
                              isDirtyRef.current = true;
                              handlePerformSave(false);
                          }
                          setIsDrawing(false);
                      }
                  }} className="px-6 py-2 bg-accent text-black font-bold rounded-2xl">Fertig</button>
                </header>
                <div className="flex-1 bg-white relative touch-none">
                  <canvas ref={canvasRef} className="absolute inset-0 w-full h-full cursor-crosshair touch-none" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                </div>
                <div className="p-4 pb-safe bg-slate-950 flex justify-center border-t border-white/10">
                  <button onClick={() => {
                      if(canvasRef.current){
                          const ctx = canvasRef.current.getContext('2d');
                          ctx.fillStyle = user.isDark ? '#18181b' : '#ffffff';
                          ctx.fillRect(0,0,canvasRef.current.width, canvasRef.current.height);
                      }
                  }} className="p-4 bg-white/10 rounded-2xl text-white hover:bg-white/20"><Icon name="eraser"/></button>
                </div>
              </div>
            )}

            {/* Editor Image Picker */}
            {picker && (
              <div className="fixed inset-0 z-[250] flex items-end sm:items-center justify-center p-4 bg-black/60 backdrop-blur-xl animate-fade-in no-print" onClick={() => setPicker(null)}>
                <div className="w-full max-w-sm rounded-[2.5rem] shadow-2xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 animate-slide-up flex flex-col overflow-hidden max-h-[70vh]" onClick={e => e.stopPropagation()}>
                  <div className="p-6 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center">
                     <h3 className="font-extrabold text-xl tracking-tight">{picker.title}</h3>
                     <button onClick={()=>setPicker(null)} className="p-2 rounded-full bg-slate-100 dark:bg-zinc-800"><Icon name="x" size={20}/></button>
                  </div>
                  <div className="overflow-y-auto custom-scrollbar p-3 space-y-1">
                     {picker.options.map(opt => (
                        <button key={opt.value} onClick={()=>{picker.onSelect(opt.value); setPicker(null);}} className={`w-full text-left p-5 rounded-[1.5rem] font-bold text-sm flex justify-between items-center transition-all ${picker.currentValue===opt.value ? 'text-white dark:text-black shadow-md scale-[1.02]' : 'hover:bg-slate-50 dark:hover:bg-zinc-800'}`} style={picker.currentValue === opt.value ? { backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000') } : {}}>
                           {opt.label} {picker.currentValue===opt.value && <Icon name="check" size={18}/>}
                        </button>
                     ))}
                  </div>
                </div>
              </div>
            )}
        </div>
    );
};

// ==========================================
// EIGENSTÄNDIGE LESE-KOMPONENTE (VIEWER)
// ==========================================
const LegacyViewer = ({ entry, allEntries, onClose, onEdit, onStartChapter, user, showDialog, saveToDB }) => {
    const [currentViewerImgIdx, setCurrentViewerImgIdx] = useState(0);
    const [isSpeaking, setIsSpeaking] = useState(false);
    const touchStartX = useRef(null);
    const touchStartY = useRef(null);

    const bookRoot = getBookRoot(entry.id, allEntries);
    const unsortedEntries = getAllBookEntries(bookRoot?.id || entry.id, allEntries);
    const allBookEntries = [...unsortedEntries].sort(sortEntriesAscending);
    const cIdx = allBookEntries.findIndex(ex => ex && ex.id === entry.id);
    const prevPage = cIdx > 0 ? allBookEntries[cIdx - 1] : null;
    const nextPage = cIdx < allBookEntries.length - 1 ? allBookEntries[cIdx + 1] : null;

    useEffect(() => {
        // Handle Back Geste/Button im Viewer
        const popHandler = (e) => {
            e.preventDefault();
            onClose();
        };
        window.addEventListener('popstate', popHandler);
        return () => window.removeEventListener('popstate', popHandler);
    }, [onClose]);

    const handleTouchStartViewer = (e) => { 
        touchStartX.current = e.touches[0].clientX; 
        touchStartY.current = e.touches[0].clientY; 
    };

    const handleTouchEndViewer = (e) => {
        if (touchStartX.current === null || touchStartY.current === null || !entry) return;
        
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        
        const deltaX = touchStartX.current - touchEndX;
        const deltaY = touchStartY.current - touchEndY;
        
        if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY) * 1.2) {
            let swipeNext = null, swipePrev = null;
            if (allBookEntries.length > 1) {
                if (cIdx > 0) swipePrev = allBookEntries[cIdx - 1]; 
                if (cIdx < allBookEntries.length - 1) swipeNext = allBookEntries[cIdx + 1]; 
            }
            if (deltaX > 50 && swipeNext) { onEdit(swipeNext, true); setCurrentViewerImgIdx(0); }
            else if (deltaX < -50 && swipePrev) { onEdit(swipePrev, true); setCurrentViewerImgIdx(0); }
        }
        touchStartX.current = null; touchStartY.current = null;
    };

    const handleReadAloud = () => { 
        if (isSpeaking) { window.speechSynthesis.cancel(); setIsSpeaking(false); return; } 
        const plainText = ((entry.title || '') + ". " + (entry.text || '')).replace(/<[^>]*>?/gm, ''); 
        if (!plainText.trim()) return; 
        setIsSpeaking(true); 
        const utterance = new SpeechSynthesisUtterance(plainText); 
        utterance.lang = 'de-DE'; utterance.onend = () => setIsSpeaking(false); 
        window.speechSynthesis.speak(utterance); 
    };

    const handleMainCoverUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_SIZE = 800; let width = img.width; let height = img.height;
                if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const base64 = canvas.toDataURL('image/jpeg', 0.6);
                if (bookRoot) {
                    let newImages = [...(bookRoot.images || [])];
                    if (newImages.length === 0) newImages = [base64]; else newImages[0] = base64;
                    saveToDB({...bookRoot, images: newImages});
                    showDialog({ title: 'Hauptcover aktualisiert', message: 'Titelbild gespeichert.', icon: 'check' });
                }
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
        e.target.value = null;
    };

    const handleBookCoverUpload = (e, imgIndex) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_SIZE = 800; let width = img.width; let height = img.height;
                if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const base64 = canvas.toDataURL('image/jpeg', 0.6);
                let newImages = [...(entry.images || [])];
                if (newImages.length === 0) newImages = [base64]; else newImages[imgIndex] = base64;
                saveToDB({...entry, images: newImages});
                showDialog({ title: 'Bild aktualisiert', message: 'Erfolgreich geändert.', icon: 'check' });
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
        e.target.value = null;
    };

    return (
        <div className="fixed inset-0 z-[80] overflow-y-auto bg-white dark:bg-black custom-scrollbar flex flex-col screen-only" onTouchStart={handleTouchStartViewer} onTouchEnd={handleTouchEndViewer}>
            {prevPage && <button onClick={() => { onEdit(prevPage, true); setCurrentViewerImgIdx(0); }} className="hidden sm:flex absolute left-4 top-1/2 -translate-y-1/2 p-4 bg-white/50 dark:bg-black/50 backdrop-blur-md shadow-sm rounded-full hover:scale-110 active:scale-95 transition-transform z-50 text-slate-800 dark:text-white"><Icon name="chevron-left" size={24}/></button>}
            {nextPage && <button onClick={() => { onEdit(nextPage, true); setCurrentViewerImgIdx(0); }} className="hidden sm:flex absolute right-4 top-1/2 -translate-y-1/2 p-4 bg-white/50 dark:bg-black/50 backdrop-blur-md shadow-sm rounded-full hover:scale-110 active:scale-95 transition-transform z-50 text-slate-800 dark:text-white"><Icon name="chevron-right" size={24}/></button>}

            <div className="sticky top-0 z-40 flex justify-between items-center py-4 px-6 md:px-10 bg-white/90 dark:bg-black/90 backdrop-blur-xl border-b border-slate-100 dark:border-zinc-900 shrink-0 no-print transition-colors">
                <div className="flex gap-3">
                    <button onClick={() => { window.history.back(); onClose(); }} className="p-3 rounded-2xl bg-slate-100 dark:bg-zinc-900 hover:scale-105 active:scale-95 transition-transform"><Icon name="arrow-left" size={22}/></button>
                </div>
                <div className="flex gap-2 sm:gap-3 items-center">
                    <button onClick={() => window.print()} className="p-3 rounded-2xl bg-slate-100 dark:bg-zinc-900 hover:scale-105 active:scale-95 transition-transform text-slate-500"><Icon name="printer" size={22}/></button>
                    <button onClick={handleReadAloud} className={`p-3 rounded-2xl transition-transform ${isSpeaking ? 'text-white animate-pulse shadow-md' : 'bg-slate-100 dark:bg-zinc-900 hover:scale-105 active:scale-95'}`} style={isSpeaking ? { backgroundColor: user.nameColor } : {}}><Icon name={isSpeaking ? "volume-2" : "volume-1"} size={22}/></button>
                    
                    <label className="p-3 rounded-2xl bg-slate-100 dark:bg-zinc-900 hover:scale-105 active:scale-95 transition-transform cursor-pointer flex items-center justify-center text-slate-500" title="Hauptcover ändern">
                        <Icon name="image" size={22}/>
                        <input type="file" accept="image/*" onChange={handleMainCoverUpload} className="hidden" />
                    </label>

                    <button onClick={() => onEdit(entry)} className="px-4 sm:px-6 py-3 rounded-2xl font-bold text-sm bg-slate-100 dark:bg-zinc-900 hover:scale-105 active:scale-95 transition-transform" style={{ color: user.nameColor }}>Bearbeiten</button>
                </div>
            </div>

            <div className="max-w-3xl w-full mx-auto p-6 sm:p-12 pb-32 screen-only flex-1 flex flex-col">
                {entry.images && entry.images.length > 0 && (
                    <div className="relative w-full rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 dark:border-zinc-800 mb-10 group bg-slate-100 dark:bg-zinc-900 flex items-center justify-center">
                        <img src={entry.images[currentViewerImgIdx]} className="w-full h-auto block transition-transform duration-700" alt="Cover" />
                        
                        <label className="absolute top-4 right-4 w-12 h-12 bg-black/60 text-white rounded-full flex items-center justify-center shadow-xl cursor-pointer z-[60] hover:bg-black/80 transition-colors border-2 border-white/20" title="Dieses Bild ändern">
                            <Icon name="image" size={20}/>
                            <input type="file" accept="image/*" onChange={(e) => handleBookCoverUpload(e, currentViewerImgIdx)} className="hidden" />
                        </label>

                        {entry.images.length > 1 && (
                            <>
                                <button onClick={(e) => { e.stopPropagation(); setCurrentViewerImgIdx(p => (p - 1 + entry.images.length) % entry.images.length); }} className="absolute left-6 top-1/2 -translate-y-1/2 bg-black/50 text-white p-4 rounded-full opacity-0 group-hover:opacity-100 transition-opacity no-print backdrop-blur-md hover:bg-black/70"><Icon name="chevron-left" size={24}/></button>
                                <button onClick={(e) => { e.stopPropagation(); setCurrentViewerImgIdx(p => (p + 1) % entry.images.length); }} className="absolute right-6 top-1/2 -translate-y-1/2 bg-black/50 text-white p-4 rounded-full opacity-0 group-hover:opacity-100 transition-opacity no-print backdrop-blur-md hover:bg-black/70"><Icon name="chevron-right" size={24}/></button>
                                <div className="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2 bg-black/40 px-4 py-2 rounded-full backdrop-blur-md no-print">
                                    {entry.images.map((_, i) => <div key={i} className={`w-2.5 h-2.5 rounded-full transition-colors shadow-sm ${i === currentViewerImgIdx ? 'bg-white' : 'bg-white/40'}`} />)}
                                </div>
                            </>
                        )}
                    </div>
                )}

                {(!entry.images || entry.images.length === 0) && (
                    <label className="mb-8 w-fit px-6 py-3 rounded-full bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-slate-300 font-bold text-sm cursor-pointer hover:bg-slate-200 dark:hover:bg-zinc-700 transition-colors flex items-center gap-2 border border-slate-200 dark:border-zinc-700 shadow-sm" title="Cover hinzufügen">
                        <Icon name="image" size={18}/> Cover hinzufügen
                        <input type="file" accept="image/*" onChange={(e) => handleBookCoverUpload(e, 0)} className="hidden" />
                    </label>
                )}

                <h1 className="text-4xl sm:text-6xl font-extrabold mb-8 tracking-tighter leading-[1.1] text-slate-900 dark:text-white">{entry.title || 'Ohne Titel'}</h1>
                <div className="flex gap-4 mb-6 text-xs font-bold uppercase tracking-widest opacity-50 flex-wrap">
                    <span>{safeParseDate(entry.date || getLocalISO()).toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' })}</span>
                </div>
                
                <div className="flex flex-wrap gap-2 mb-12 no-print">
                    {entry.tags && entry.tags.split(',').map(t => t.trim()).filter(t=>t).map((t, i) => (
                        <span key={i} className="px-4 py-1.5 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl text-xs font-bold flex items-center gap-1.5"><Icon name="tag" size={14}/> {t}</span>
                    ))}
                    {entry.people && entry.people.split(',').map(p => p.trim()).filter(p=>p).map((p, i) => (
                        <span key={i} className="px-4 py-1.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-xl text-xs font-bold flex items-center gap-1.5"><Icon name="user" size={14}/> {p}</span>
                    ))}
                    {entry.weather && (
                        <span className="px-4 py-1.5 bg-orange-50 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 rounded-xl text-xs font-bold flex items-center gap-1.5 w-full sm:w-auto"><Icon name="sun" size={14}/> {entry.weather}</span>
                    )}
                    {entry.locations && entry.locations.length > 0 ? entry.locations.map((loc, i) => (
                        <span key={`loc-view-${i}`} className="px-4 py-1.5 bg-emerald-100 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-400 rounded-xl text-xs font-bold flex items-center gap-1.5"><Icon name="map-pin" size={14}/> {loc.name} • {loc.time} {loc.weather ? `• ${loc.weather}` : ''}</span>
                    )) : (entry.location && (
                        <span className="px-4 py-1.5 bg-emerald-100 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-400 rounded-xl text-xs font-bold flex items-center gap-1.5"><Icon name="map-pin" size={14}/> {entry.location.name ? `${entry.location.name} (${entry.location.time})` : 'GPS-Siegel'}</span>
                    ))}
                    {entry.rating > 0 && (
                        <div className="flex items-center gap-1 ml-auto bg-amber-50 dark:bg-amber-900/30 px-4 py-1.5 rounded-xl">
                            {[1,2,3,4,5].map(star => <Icon key={star} name="star" size={16} className={entry.rating >= star ? 'text-amber-500 fill-amber-500' : 'text-amber-200 dark:text-amber-900'} />)}
                        </div>
                    )}
                </div>

                <div className="text-[1.05rem] leading-[1.8] font-medium legacy-content text-slate-800 dark:text-slate-200 opacity-90" dangerouslySetInnerHTML={createSafeHtml(entry.text)} />
                {entry.audio && <div className="mt-12 p-6 rounded-[2rem] bg-slate-50 dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm no-print"><span className="text-xs font-bold uppercase tracking-widest opacity-50 mb-4 block">Audio-Log</span><audio src={entry.audio} controls className="w-full" /></div>}
                
                <div className="mt-20 pt-10 border-t border-slate-100 dark:border-zinc-800 flex justify-center no-print">
                    <button onClick={() => onStartChapter(entry)} className="px-8 py-4 font-bold rounded-full flex items-center gap-3 hover:scale-105 active:scale-95 transition-transform shadow-lg text-lg" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}><Icon name="plus" size={24}/> Neues Kapitel anfügen</button>
                </div>

                {allBookEntries.length > 1 && (
                    <div className="flex justify-between items-center mt-16 pt-8 border-t border-slate-100 dark:border-zinc-800 no-print pb-24">
                        {prevPage ? (
                            <button onClick={() => { onEdit(prevPage, true); setCurrentViewerImgIdx(0); }} className="flex items-center gap-2 font-bold text-sm opacity-60 hover:opacity-100 transition-colors" style={{ color: user.nameColor }}><Icon name="arrow-left" size={18}/> Vorherige Seite</button>
                        ) : <div/>}
                        <span className="text-xs font-bold opacity-30 uppercase tracking-widest">Seite {cIdx + 1} von {allBookEntries.length}</span>
                        {nextPage ? (
