                   <div className="text-center opacity-30 py-20" style={{ color: 'inherit' }}>
                     <Icon name="quote" size={64} className="mx-auto mb-4" />
                     <p className="font-serif text-lg font-bold">Noch keine Erkenntnisse markiert.</p>
                     <p className="text-sm">Nutze das Anführungszeichen (Zitieren) im Editor.</p>
                   </div>
                 ) : (
                   <div className="columns-1 sm:columns-2 gap-6 space-y-6">
                     {allQuotes.map(q => (
                        <div 
                           key={q.id} 
                           onClick={() => { const e = entries.find(x=>x.id===q.entryId); if(e) setViewingEntry(e); }} 
                           className="break-inside-avoid relative rounded-[2rem] p-8 shadow-sm hover:shadow-md transition-all cursor-pointer border group"
                           style={{ backgroundColor: user.appBgColor || (user.isDark ? '#0f172a' : '#ffffff'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)', color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
                        >
                           <Icon name="quote" size={24} className="absolute top-6 left-6 opacity-20" style={{ color: user.nameColor }} />
                           <p className="relative z-10 text-lg sm:text-xl font-serif italic leading-relaxed mt-6 mb-6" style={{ color: 'inherit' }}>"{q.text}"</p>
                           <div className="flex justify-between items-center border-t pt-4" style={{ borderColor: 'rgba(150,150,150,0.2)' }}>
                              <span className="text-[10px] font-bold uppercase tracking-widest opacity-50 truncate mr-4" style={{ color: 'inherit' }}>{q.title}</span>
                              <span className="text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-md shrink-0" style={{ color: user.nameColor, backgroundColor: 'rgba(150,150,150,0.1)' }}>{new Date(q.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })}</span>
                           </div>
                        </div>
                     ))}
                   </div>
                 )}
               </div>
             );
          })()}

          {view === 'menu' && (
            <div className="grid grid-cols-2 gap-4 sm:gap-6 animate-slide-up no-print">
              <button type="button" onClick={() => setView('wisdom')} className="p-6 sm:p-8 rounded-3xl flex flex-col items-center justify-center gap-4 text-center border transition-all active:scale-95 shadow-sm" style={{ backgroundColor: 'rgba(245, 158, 11, 0.1)', borderColor: 'rgba(245, 158, 11, 0.3)', color: 'inherit' }}>
                <Icon name="book-open" size={32} className="text-amber-500" />
                <span className="font-bold text-xs uppercase tracking-widest">Buch der Weisheit</span>
              </button>
              <button type="button" onClick={() => setView('burn')} className="p-6 sm:p-8 rounded-3xl flex flex-col items-center justify-center gap-4 text-center border transition-all active:scale-95 shadow-sm" style={{ backgroundColor: 'rgba(244, 63, 94, 0.1)', borderColor: 'rgba(244, 63, 94, 0.3)', color: 'inherit' }}>
                <Icon name="flame" size={32} className="text-rose-500" />
                <span className="font-bold text-xs uppercase tracking-widest">Katharsis</span>
              </button>
              <button type="button" onClick={() => setView('quotes')} className="p-6 sm:p-8 rounded-3xl flex flex-col items-center justify-center gap-4 text-center border transition-all active:scale-95 shadow-sm" style={{ backgroundColor: `${user.nameColor}15`, borderColor: `${user.nameColor}40`, color: 'inherit' }}>
                <Icon name="quote" size={32} style={{ color: user.nameColor }} />
                <span className="font-bold text-xs uppercase tracking-widest">Erkenntnisse</span>
              </button>
              <button type="button" onClick={() => setView('archive')} className="p-6 sm:p-8 rounded-3xl flex flex-col items-center justify-center gap-4 text-center border transition-all active:scale-95 shadow-sm" style={{ backgroundColor: 'rgba(150,150,150,0.05)', borderColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}>
                <Icon name="archive" size={32} className="opacity-50" />
                <span className="font-bold text-xs uppercase tracking-widest">Archiv</span>
              </button>
              <button type="button" onClick={() => setView('settings')} className="col-span-2 p-6 sm:p-8 rounded-3xl flex flex-col items-center justify-center gap-4 text-center border transition-all active:scale-95 shadow-sm" style={{ backgroundColor: 'rgba(150,150,150,0.05)', borderColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}>
                <Icon name="settings" size={32} className="opacity-50" />
                <span className="font-bold text-xs uppercase tracking-widest">Einstellungen</span>
              </button>
            </div>
          )}

          {view === 'wisdom' && (
            <div className="animate-slide-up space-y-8 no-print">
              <div className="text-center mb-8">
                <h2 className="text-3xl font-serif font-bold mb-3" style={{ color: 'inherit' }}>Die 25 Säulen deines Vermächtnisses</h2>
                <p className="opacity-60 max-w-xl mx-auto" style={{ color: 'inherit' }}>Dieser Blueprint ist dein Wegweiser. Wähle eine Säule aus, um sie zu füllen. Zusammen ergeben sie das zeitloseste Bild deines Lebens für die Generationen, die nach dir kommen.</p>
              </div>

              <div className="mb-8 p-6 rounded-[2rem] border" style={{ backgroundColor: 'rgba(245, 158, 11, 0.05)', borderColor: 'rgba(245, 158, 11, 0.2)' }}>
                 <div className="flex justify-between items-end mb-3">
                   <div>
                     <h3 className="font-bold text-amber-500 text-sm uppercase tracking-widest">Dein Vermächtnis wächst</h3>
                     <p className="text-xs opacity-70 mt-1" style={{ color: 'inherit' }}>{completedPillars} von {totalPillars} Säulen versiegelt</p>
                   </div>
                   <span className="text-2xl font-black text-amber-500">{progressPercent}%</span>
                 </div>
                 <div className="w-full h-3 rounded-full overflow-hidden" style={{ backgroundColor: 'rgba(245, 158, 11, 0.2)' }}>
                   <div className="bg-amber-500 h-full transition-all duration-1000" style={{width: `${progressPercent}%`}}></div>
                 </div>
              </div>
              
              {['Fundament', 'Kommunikation', 'Struktur', 'Tiefe', 'Anpassung'].map((phaseTitle, index) => (
                <div key={phaseTitle} className="mb-8">
                  <h3 className="text-sm font-bold uppercase tracking-widest text-amber-500 mb-4 pl-2 border-l-2 border-amber-500">Phase {index + 1}: {phaseTitle}</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {PILLARS.filter(p => p.phase === phaseTitle).map(pillar => {
                      const isCompleted = entries.some(e => e.title === pillar.title);
                      return (
                        <button 
                           type="button" 
                           key={pillar.id} 
                           onClick={() => openEditor(null, pillar)} 
                           className={`p-4 text-left rounded-[1.5rem] border transition-all hover:scale-[1.02] flex items-start gap-3`}
                           style={{ 
                             backgroundColor: isCompleted ? 'rgba(245, 158, 11, 0.1)' : (user.appBgColor || (user.isDark ? '#0f172a' : '#ffffff')), 
                             borderColor: isCompleted ? 'rgba(245, 158, 11, 0.3)' : (user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'),
                             color: 'inherit'
                           }}
                        >
                          <div className={`p-2 rounded-full shrink-0 ${isCompleted ? 'bg-amber-500 text-white' : 'opacity-50'}`} style={!isCompleted ? { backgroundColor: 'rgba(150,150,150,0.1)' } : {}}>
                            {isCompleted ? <Icon name="check" size={16} /> : <Icon name="pen-tool" size={16} />}
                          </div>
                          <div>
                            <h4 className="font-bold text-sm mb-1">{pillar.title}</h4>
                            <p className="text-xs opacity-60 line-clamp-2">{pillar.desc}</p>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}

          {view === 'burn' && (
            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center animate-fade-in relative overflow-hidden p-6 no-print">
              {isBurning && <div className="absolute inset-0 bg-rose-500/20 animate-pulse z-0 rounded-3xl" />}
              <Icon name="flame" size={64} className={`mb-6 ${isBurning ? 'text-rose-500 animate-flame' : 'text-slate-400'}`} />
              <h2 className="text-3xl font-serif font-bold mb-4 z-10" style={{ color: 'inherit' }}>Katharsis</h2>
              <p className="opacity-70 mb-8 z-10 max-w-md" style={{ color: 'inherit' }}>Schreibe auf, was dich belastet, wovor du Angst hast oder was dich wütend macht. Danach übergeben wir es gemeinsam den Flammen. Es wird <b>nirgendwo</b> gespeichert.</p>
              <textarea 
                value={burnText} 
                onChange={e=>setBurnText(e.target.value)} 
                disabled={isBurning} 
                className="w-full max-w-lg p-6 rounded-[2rem] border-2 focus:border-rose-500 h-48 outline-none resize-none z-10 transition-all shadow-inner font-serif text-lg" 
                style={{ backgroundColor: 'rgba(150,150,150,0.05)', borderColor: 'rgba(244, 63, 94, 0.2)', color: 'inherit' }}
                placeholder="Lass es hier los..." 
              />
              <button type="button"
                onClick={triggerBurn} 
                disabled={!burnText || isBurning} 
                className="mt-6 px-8 py-4 bg-rose-600 text-white rounded-full font-bold shadow-lg shadow-rose-600/30 hover:bg-rose-700 transition-colors z-10 disabled:opacity-50 flex items-center gap-2"
              >
                {isBurning ? 'Verbrennt...' : <><Icon name="flame" size={20}/> Dem Feuer übergeben</>}
              </button>
            </div>
          )}

          {view === 'settings' && (
            <div className="space-y-6 animate-slide-up max-w-md mx-auto no-print">
              <div 
                 className="p-6 rounded-[2rem] shadow-sm border"
                 style={{ backgroundColor: user.appBgColor || (user.isDark ? '#1e293b' : '#ffffff'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)', color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
              >
                <h2 className="text-lg font-bold mb-6 flex items-center gap-2 font-serif" style={{ color: 'inherit' }}><Icon name="user" size={20} className="text-amber-500" /> Profil</h2>
                <div className="flex items-center gap-5 mb-6">
                  <div className="relative shrink-0">
                    <div className={`w-20 h-20 rounded-full overflow-hidden border-[3px] shadow-sm flex items-center justify-center`} style={{ borderColor: user.avatar ? user.nameColor : 'rgba(150,150,150,0.2)', backgroundColor: 'rgba(150,150,150,0.1)' }}>
                      {user.avatar ? <img src={user.avatar} alt="Avatar" className="w-full h-full object-cover scale-[1.02]" /> : <Icon name="user" size={32} className="opacity-30" style={{ color: 'inherit' }} />}
                    </div>
                    <label className="absolute -bottom-1 -right-1 p-2 rounded-full cursor-pointer shadow-lg hover:scale-110 transition-transform" style={{ backgroundColor: user.isDark ? '#ffffff' : '#18181b', color: user.isDark ? '#18181b' : '#ffffff' }}><Icon name="camera" size={14} /><input type="file" accept="image/*" onChange={handleAvatarUpload} className="hidden" /></label>
                  </div>
                  <div className="flex-1 space-y-3">
                    <input type="text" value={user.name} onChange={(e) => setUser({...user, name: e.target.value})} className="w-full p-3 rounded-xl border-none focus:ring-2 focus:ring-amber-500 text-base font-bold outline-none" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }} placeholder="Dein Name" />
                    
                    <div className="flex gap-2 flex-wrap p-2 -m-2">
                      {['#f59e0b', '#ef4444', '#3b82f6', '#10b981', '#8b5cf6', '#1e293b'].map(color => (
                        <button type="button" key={color} onClick={() => setUser({...user, nameColor: color})} className={`w-6 h-6 rounded-full border-2 transition-transform ${user.nameColor === color ? 'border-slate-400 scale-125' : 'border-transparent hover:scale-110'}`} style={{ backgroundColor: color }} />
                      ))}
                    </div>
                  </div>
                </div>
                <textarea value={user.motto} onChange={(e) => setUser({...user, motto: e.target.value})} className="w-full p-4 rounded-xl border-none focus:ring-2 focus:ring-amber-500 h-20 resize-none text-sm outline-none italic" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }} placeholder="Dein Lebensmotto..." />
              </div>

              <div 
                 className="p-6 rounded-[2rem] shadow-sm border"
                 style={{ backgroundColor: user.appBgColor || (user.isDark ? '#1e293b' : '#ffffff'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)', color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
              >
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2 font-serif" style={{ color: 'inherit' }}><Icon name="sun" size={20} className="text-indigo-500" /> Erscheinungsbild</h2>
                
                <div className="mb-6">
                  <span className="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-2 block" style={{ color: 'inherit' }}>Modus</span>
                  <div className="flex justify-between items-center p-2 rounded-2xl" style={{ backgroundColor: 'rgba(150,150,150,0.1)' }}>
                    <button type="button" onClick={() => setUser({...user, isDark: false})} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-bold text-sm transition-all ${!user.isDark ? 'shadow-sm' : 'opacity-50 hover:opacity-100'}`} style={!user.isDark ? { backgroundColor: user.appBgColor || '#ffffff', color: isDarkColor(user.appBgColor || '#ffffff') ? '#ffffff' : '#18181b' } : { color: 'inherit' }}><Icon name="sun" size={18}/> Hell</button>
                    <button type="button" onClick={() => setUser({...user, isDark: true})} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-bold text-sm transition-all ${user.isDark ? 'shadow-sm' : 'opacity-50 hover:opacity-100'}`} style={user.isDark ? { backgroundColor: user.appBgColor || '#1e293b', color: isDarkColor(user.appBgColor || '#1e293b') ? '#ffffff' : '#18181b' } : { color: 'inherit' }}><Icon name="moon" size={18}/> Dunkel</button>
                  </div>
                </div>

                <div>
                  <span className="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-2 block" style={{ color: 'inherit' }}>Hintergrundfarbe</span>
                  <div className="flex gap-3 overflow-x-auto hide-scrollbar p-2 -m-2">
                    <button type="button"
                      onClick={() => setUser({...user, appBgColor: null})} 
                      className={`w-10 h-10 rounded-full border-2 shrink-0 flex items-center justify-center transition-transform ${!user.appBgColor ? 'scale-110 border-indigo-500' : 'border-slate-300 opacity-50 hover:opacity-100'}`}
                      style={{ background: user.isDark ? '#09090b' : '#ffffff' }}
                    >
                      {!user.appBgColor && <Icon name="check" size={16} className={user.isDark ? 'text-white' : 'text-slate-900'} />}
                    </button>
                    {COLORS.map((c) => (
                      <button type="button"
                        key={c} 
                        onClick={() => setUser({...user, appBgColor: c})} 
                        className={`w-10 h-10 rounded-full border-2 shrink-0 flex items-center justify-center transition-transform ${user.appBgColor === c ? 'scale-110 border-current z-10' : 'border-transparent shadow-sm opacity-50 hover:opacity-100 hover:scale-105'}`} 
                        style={{ backgroundColor: c, color: isDarkColor(c) ? '#ffffff' : '#000000' }}
                      >
                        {user.appBgColor === c && <Icon name="check" size={16} />}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              <div className="p-6 rounded-[2rem] shadow-sm border bg-white dark:bg-slate-900 border-slate-200 dark:border-white/10">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2 font-serif" style={{ color: user.nameColor }}><Icon name="key-round" size={20} /> Tresor PIN</h2>
                {!user.pin ? (
                  <div>
                    <input type="password" inputMode="numeric" pattern="[0-9]*" value={newPinInput} onChange={(e) => setNewPinInput(e.target.value)} placeholder="Neue PIN (z.B. 4 Zahlen)" className="w-full p-4 rounded-xl border-none focus:ring-2 tracking-[0.5em] text-center text-xl mb-4 outline-none" style={{ backgroundColor: 'rgba(150,150,150,0.1)', '--tw-ring-color': user.nameColor, color: 'inherit' }} />
                    <button type="button" onClick={() => { if(newPinInput.length >= 4) { setUser({...user, pin: newPinInput}); setNewPinInput(''); } else showDialog({ title: 'PIN zu kurz', message: 'Die PIN muss mindestens 4 Zeichen lang sein.', icon: 'x' }); }} className="w-full py-3 rounded-xl font-bold text-sm transition-transform shadow-md hover:scale-[1.02]" style={{ backgroundColor: user.nameColor, color: isDarkColor(user.nameColor) ? '#fff' : '#000' }}>PIN speichern</button>
                  </div>
                ) : isChangingPin ? (
                  <div className="space-y-3">
                    <input type="password" inputMode="numeric" pattern="[0-9]*" value={oldPinInput} onChange={(e) => setOldPinInput(e.target.value)} placeholder="Alte PIN" className="w-full p-3 rounded-xl text-center tracking-[0.5em] text-lg outline-none" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }} />
                    <input type="password" inputMode="numeric" pattern="[0-9]*" value={newPinInput} onChange={(e) => setNewPinInput(e.target.value)} placeholder="Neue PIN" className="w-full p-3 rounded-xl text-center tracking-[0.5em] text-lg outline-none" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }} />
                    <div className="flex gap-3">
                      <button type="button" onClick={() => setIsChangingPin(false)} className="flex-1 py-3 rounded-xl text-sm font-bold" style={{ backgroundColor: 'rgba(150,150,150,0.1)', color: 'inherit' }}>Abbrechen</button>
                      <button type="button" onClick={() => { if (oldPinInput === user.pin) { setUser({...user, pin: newPinInput}); setIsChangingPin(false); showDialog({ title: 'Erfolg', message: 'PIN erfolgreich geändert.', icon: 'check', iconColor: 'text-emerald-500' }); } else showDialog({ title: 'Fehler', message: 'Die alte PIN ist falsch.', icon: 'x', iconColor: 'text-rose-500' }); }} className="flex-1 py-3 rounded-xl text-sm font-bold shadow-md" style={{ backgroundColor: user.nameColor, color: isDarkColor(user.nameColor) ? '#fff' : '#000' }}>Speichern</button>
                    </div>
                  </div>
                ) : (
                  <div className="flex justify-between items-center p-2 rounded-2xl" style={{ backgroundColor: 'rgba(150,150,150,0.1)' }}>
                    <span className="font-bold text-sm pl-2" style={{ color: 'inherit' }}>PIN Aktiv</span>
                    <button type="button" onClick={() => setIsChangingPin(true)} className="px-4 py-2 shadow-sm transition-colors rounded-lg font-bold text-xs" style={{ backgroundColor: user.appBgColor || (user.isDark ? '#1e293b' : '#ffffff'), color: user.nameColor }}>Ändern</button>
                  </div>
                )}
              </div>

              {/* NEU: Cloud-Tresor Settings */}
              <div className="p-6 rounded-[2rem] shadow-sm border bg-blue-50 dark:bg-blue-950/20 border-blue-200 dark:border-blue-900/50">
                <h2 className="text-base font-bold mb-4 flex items-center gap-2 text-blue-600 dark:text-blue-400">
                  <Icon name="cloud" size={18} /> Cloud-Tresor (Auto-Backup)
                </h2>
                <p className="text-xs opacity-70 mb-6 text-slate-800 dark:text-slate-300 leading-relaxed">
                  Sichere dein Vermächtnis ausfallsicher in der Cloud. <b>100% Ende-zu-Ende verschlüsselt.</b> Niemand, nicht einmal die Entwickler, können deine Einträge lesen. Nur deine Tresor-PIN ist der Schlüssel.
                </p>

                <div className="flex justify-between items-center p-4 rounded-2xl mb-4 shadow-sm border bg-white dark:bg-slate-900 border-slate-200 dark:border-white/10">
                  <span className="font-bold text-sm text-slate-900 dark:text-white flex items-center gap-2">
                      <Icon name="refresh-cw" size={16} className={user.cloudSync && syncingCloud ? 'animate-spin text-blue-500' : ''} /> Auto-Sync
                  </span>
                  <button type="button" onClick={() => {
                      if (!user.pin) {
                          showDialog({ title: 'PIN fehlt', message: 'Bitte richte im Menüpunkt darüber zuerst eine Tresor-PIN ein, um deine Daten verschlüsselt in die Cloud zu laden.', icon: 'lock' });
                          return;
                      }
                      const nextState = !user.cloudSync;
                      setUser({...user, cloudSync: nextState});
                      if (nextState) {
                         showDialog({ title: 'Cloud-Tresor aktiv', message: 'Deine Daten werden ab sofort automatisch und verschlüsselt gesichert.', icon: 'cloud-lightning', iconColor: 'text-blue-500' });
                         entries.forEach(e => syncSingleEntryToCloud(e));
                         syncProfileToCloud({...user, cloudSync: nextState});
                      }
                  }} className={`px-4 py-2 shadow-sm transition-colors rounded-lg font-bold text-xs ${user.cloudSync ? 'bg-blue-500 text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300'}`}>
                    {user.cloudSync ? 'Aktiviert' : 'Aus'}
                  </button>
                </div>

                <button type="button" onClick={performCloudSync} className="w-full flex items-center justify-center gap-2 p-4 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-md hover:bg-blue-700 transition-transform hover:scale-[1.02]">
                  <Icon name="cloud-download" size={18} className={syncingCloud && !user.cloudSync ? 'animate-bounce' : ''}/> {syncingCloud ? 'Synchronisiert...' : 'Aus der Cloud wiederherstellen'}
                </button>
              </div>

              <div className="p-6 rounded-[2rem] shadow-sm border bg-emerald-50 dark:bg-emerald-950/20 border-emerald-200 dark:border-emerald-900/50">
                <h2 className="text-base font-bold mb-4 flex items-center gap-2 text-emerald-600 dark:text-emerald-400"><Icon name="smartphone" size={18} /> P2P Geräte-Transfer</h2>
                <p className="text-xs opacity-70 mb-6 text-slate-800 dark:text-slate-300 leading-relaxed">
                  Generiere einen sicheren QR-Code. Scanne ihn mit der normalen Handykamera deines <b>neuen</b> Smartphones, um alle Tagebucheinträge direkt (ohne Cloud) zu übertragen.
                </p>

                {!peerId ? (
                  <button type="button" onClick={() => {
                    const peer = new window.Peer();
                    setSyncStatus('Sichere WebRTC Verbindung wird vorbereitet...');
                    peer.on('open', (id) => {
                      setPeerId(id);
                      setSyncStatus('Bereit! Scanne diesen Code mit dem neuen Handy.');
                    });
                    peer.on('connection', (conn) => {
                      setSyncStatus('Neues Handy verbunden. Sende Daten...');
                      conn.on('data', (data) => {
                        if (data === 'request_data') {
                          conn.send(JSON.stringify({ user, entries }));
                          setSyncStatus('Übertragung erfolgreich abgeschlossen!');
                          setTimeout(() => { setPeerId(null); setPeerInstance(null); }, 5000);
                        }
                      });
                    });
                    setPeerInstance(peer);
                  }} className="w-full flex items-center justify-center gap-2 p-4 bg-emerald-600 text-white rounded-xl text-sm font-bold shadow-md hover:bg-emerald-700 transition-transform hover:scale-[1.02]">
                    <Icon name="qr-code" size={18}/> QR-Code generieren
                  </button>
                ) : (
                  <div className="flex flex-col items-center p-6 rounded-2xl shadow-inner border" style={{ backgroundColor: 'rgba(150,150,150,0.1)', borderColor: 'rgba(150,150,150,0.2)' }}>
                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?import=' + peerId)}`} alt="Sync QR" className="w-48 h-48 mb-4 rounded-lg shadow-sm" />
                    <p className="text-[10px] font-bold text-center text-emerald-600 uppercase tracking-widest mb-1">Status</p>
                    <p className="text-xs font-bold text-center text-slate-800 dark:text-slate-200 animate-pulse">{syncStatus}</p>
                    <button type="button" onClick={() => { peerInstance?.destroy(); setPeerId(null); setPeerInstance(null); setSyncStatus(''); }} className="mt-4 px-4 py-2 rounded-lg text-xs font-bold transition-colors" style={{ backgroundColor: 'rgba(150,150,150,0.2)', color: 'inherit' }}>Abbrechen</button>
                  </div>
                )}
              </div>

              <div className="p-6 rounded-[2rem] shadow-sm border bg-indigo-50 dark:bg-indigo-950/20 border-indigo-200 dark:border-indigo-900/50">
                <h2 className="text-base font-bold mb-4 flex items-center gap-2 text-indigo-600"><Icon name="archive" size={18} /> Manuelles Datei-Backup</h2>
                
                <p className="text-xs opacity-70 mb-5 text-slate-800 dark:text-slate-300 leading-relaxed">
                  Lade dein komplettes Journal (inklusive Bilder) als HTML-Datei herunter, um ein lokales Backup aufzubewahren oder per WhatsApp zu teilen.
                </p>

                <button type="button" onClick={downloadFullApp} className="w-full flex items-center justify-center gap-2 p-4 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-md hover:bg-indigo-700 transition-transform hover:scale-[1.02] mb-3">
                  <Icon name="download" size={18}/> Datei herunterladen
                </button>

                <div className="flex gap-2">
                  <label className="flex-1 flex items-center justify-center gap-1.5 p-3 rounded-xl text-xs font-bold cursor-pointer border shadow-sm transition-colors" style={{ backgroundColor: 'rgba(255,255,255,0.8)', borderColor: 'rgba(0,0,0,0.1)', color: '#1e293b' }}>
                    <Icon name="upload" size={14}/> Datei Importieren <input type="file" accept=".html,.legacy,.json" onChange={importBackup} className="hidden" />
                  </label>
                </div>
              </div>
            </div>
          )}

          {['dashboard', 'vault', 'archive'].includes(view) && (
            <>
              {/* Heatmap Neural Network */}
              {view === 'dashboard' && !searchQuery && (
                <div 
                   className="mb-6 p-6 rounded-[2rem] shadow-sm border flex flex-col justify-center animate-fade-in no-print"
                   style={{ backgroundColor: user.appBgColor || (user.isDark ? '#1e293b' : '#ffffff'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)', color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
                >
                  <div className="flex justify-between items-center mb-4">
                    <span className="font-bold text-xs uppercase tracking-widest opacity-70" style={{ color: 'inherit' }}>Aktivität (30 Tage)</span>
                    <Icon name="activity" size={16} style={{ color: user.nameColor || '#f59e0b' }} />
                  </div>
                  <div className="flex gap-1.5 justify-between items-end h-16">
                    {heatmapData.map((d, i) => (
                      <div key={i} className="heatmap-cell flex-1 rounded-sm transition-all hover:opacity-100" style={{ 
                        height: d.count === 0 ? '20%' : `${Math.min(100, 20 + (d.count * 40))}%`, 
                        backgroundColor: d.count === 0 ? 'rgba(150,150,150,0.1)' : (user.nameColor || '#f59e0b'),
                        opacity: d.count === 0 ? 0.5 : 0.6 + (d.count*0.2),
                        boxShadow: d.count > 0 ? `0 0 10px ${user.nameColor || '#f59e0b'}80` : 'none'
                      }} title={`${d.count} Einträge am ${d.date}`} />
                    ))}
                  </div>
                </div>
              )}

              {view === 'dashboard' && timeMachineEntry && !searchQuery && (
                <div onClick={() => handleBookClick(timeMachineEntry)} className="mb-6 p-5 rounded-[2rem] border cursor-pointer flex items-center gap-4 hover:scale-[1.02] transition-transform shadow-sm bg-indigo-50 dark:bg-indigo-900/20 border-indigo-200 dark:border-indigo-500/30">
                  <div className="p-3 text-white rounded-full shrink-0 shadow-md" style={{ backgroundColor: user.nameColor || '#f59e0b' }}><Icon name="history" size={24}/></div>
                  <div className="overflow-hidden">
                    <h4 className="font-bold text-xs uppercase tracking-widest mb-1" style={{ color: user.nameColor || '#f59e0b' }}>Heute vor {today.getFullYear() - new Date(timeMachineEntry.date).getFullYear()} {today.getFullYear() - new Date(timeMachineEntry.date).getFullYear() === 1 ? 'Jahr' : 'Jahren'}</h4>
                    <p className="font-medium text-slate-900 dark:text-white truncate w-full text-lg font-serif">{timeMachineEntry.title}</p>
                  </div>
                </div>
              )}

              {view === 'dashboard' && (
                <div className="flex overflow-x-auto gap-3 pb-4 mb-6 custom-scrollbar snap-x no-print">
                  {['Alle', ...CATEGORIES].map(cat => (
                    <button type="button"
                      key={cat} onClick={() => setActiveCategory(cat)}
                      className={`px-5 py-2.5 rounded-full whitespace-nowrap snap-start text-sm font-bold transition-all ${activeCategory === cat ? 'shadow-md' : 'border opacity-70 hover:opacity-100'}`}
                      style={activeCategory === cat ? 
                         { backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#18181b'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#18181b')) ? '#ffffff' : '#000000', borderColor: 'transparent' } : 
                         { backgroundColor: 'rgba(150,150,150,0.1)', borderColor: 'rgba(150,150,150,0.2)', color: 'inherit' }}
                    >
                      {cat}
                    </button>
                  ))}
                </div>
              )}

              {visibleEntries.length === 0 && view !== 'menu' && view !== 'settings' && !searchQuery && (
                <div className="flex flex-col items-center justify-center py-32 text-center opacity-30 animate-fade-in" style={{ color: 'inherit' }}>
                  {view === 'vault' ? <Icon name="shield-check" size={64} className="mb-6"/> : view === 'archive' ? <Icon name="archive" size={64} className="mb-6"/> : <Icon name="book-open" size={64} className="mb-6"/>}
                  <p className="text-xl font-bold font-serif">
                    {view === 'vault' ? 'Tresor leer.' : view === 'archive' ? 'Archiv leer.' : 'Dein Buch ist noch leer.'}
                  </p>
                </div>
              )}

              <div className="columns-1 sm:columns-2 gap-6 space-y-6 pb-20">
                {!searchQuery && renderEntries.map(entry => {
                  const isCapsuleLocked = entry.unlockDate && new Date(entry.unlockDate) > now;
                  const isGeoLocked = entry.unlockLocation;
                  const pagesCount = getBookLength(entry.id);

                  const isDarkTheme = user.isDark;
                  const entryColor = entry.color || (isDarkTheme ? COLORS[8] : COLORS[0]);
                  let cardBg = entryColor;
                  if (isDarkTheme && entryColor === '#ffffff') cardBg = '#18181b';
                  if (!isDarkTheme && entryColor === '#0f172a') cardBg = '#ffffff';
                  const borderStyle = isDarkTheme ? (cardBg === '#18181b' ? 'border-white/10' : 'border-white/5') : 'border-slate-200';
                  
                  const entryImagesList = entry.images || (entry.image ? [entry.image] : []);
                  const hasImages = entryImagesList.length > 0;

                  return (
                    <div
                      key={entry.id} 
                      onClick={() => {
                        if (isCapsuleLocked) {
                          showDialog({ title: 'Zeitkapsel versiegelt', message: `Dieses Dokument öffnet sich erst am ${new Date(entry.unlockDate).toLocaleDateString('de-DE')}.`, icon: 'calendar-clock', iconColor: 'text-indigo-500' });
                          return;
                        }
                        if (entry.locked || isGeoLocked) {
                          handleVaultClick(entry);
                          return;
                        }
                        handleBookClick(entry);
                      }}
                      className={`break-inside-avoid group relative rounded-[2.5rem] shadow-sm hover:shadow-md transition-all duration-300 overflow-hidden cursor-pointer border ${borderStyle} ${entry.manifested ? 'ring-2 ring-amber-400/50' : ''}`}
                      style={{ backgroundColor: cardBg, color: isDarkColor(cardBg) ? '#f8fafc' : '#0f172a' }}
                    >
                      {entry.inheritedFrom && (
                        <div className="absolute top-4 left-4 z-30 bg-black/80 text-amber-400 text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full shadow-lg flex items-center gap-1 backdrop-blur-md no-print">
                          <Icon name="git-merge" size={12}/> Von {entry.inheritedFrom.split(' ')[0]}
                        </div>
                      )}
                      
                      {/* NEU: Tresor/Siegel Badge auf dem normalen Cover */}
                      {(entry.locked || isCapsuleLocked || isGeoLocked) && (
                        <div className={`absolute left-4 z-30 bg-slate-900/90 text-white text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full shadow-lg flex items-center gap-1 backdrop-blur-md no-print ${entry.inheritedFrom ? 'top-12' : 'top-4'}`}>
                          {isCapsuleLocked ? <Icon name="calendar-clock" size={12}/> : isGeoLocked ? <Icon name="map-pin" size={12}/> : <Icon name="lock" size={12}/>}
                          {isCapsuleLocked ? `Öffnet ${new Date(entry.unlockDate).toLocaleDateString('de-DE')}` : isGeoLocked ? 'Orts-Siegel' : 'Tresor'}
                        </div>
                      )}

                      {entry.manifested && (
                        <div className="absolute top-4 right-4 z-30 bg-amber-500 text-slate-900 text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full shadow-lg flex items-center gap-1 no-print">
                          <Icon name="sparkles" size={12}/> Manifestiert
                        </div>
                      )}

                      {hasImages && (
                        <div className="w-full relative overflow-hidden flex justify-center items-center min-h-[200px]" style={{ backgroundColor: 'rgba(150,150,150,0.1)' }}>
                          <img src={entryImagesList[0]} alt="Vision Cover" className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-1000" />
                          
                          {entryImagesList.length > 1 && (
                              <div className="absolute bottom-2 right-2 z-20 bg-black/50 text-white text-[10px] font-bold px-2 py-1 rounded-md backdrop-blur-sm flex items-center gap-1 no-print">
                                  <Icon name="images" size={12} /> +{entryImagesList.length - 1}
                              </div>
                          )}

                          <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent z-10 pointer-events-none no-print" />
                          <h3 className="absolute bottom-6 left-6 right-6 z-20 font-bold text-2xl text-white drop-shadow-md leading-snug line-clamp-2 font-serif" dangerouslySetInnerHTML={highlightText(entry.title, searchQuery)} />
                        </div>
                      )}

                      <div className="p-6 sm:p-8 flex-1 flex flex-col relative z-20">
                        {!hasImages && <h3 className={`font-bold text-2xl leading-tight mb-4 line-clamp-2 font-serif`} dangerouslySetInnerHTML={highlightText(entry.title, searchQuery)} />}
                        {entry.category === 'Weisheit' && <div className="mb-4 text-[10px] font-bold uppercase tracking-widest opacity-50 flex items-center gap-1 text-amber-500"><Icon name="book-open" size={12}/> Säule der Weisheit</div>}

                        {entry.text && (
                          <div className={`text-sm leading-relaxed mb-6 font-medium line-clamp-4 legacy-content opacity-80`} dangerouslySetInnerHTML={highlightText(entry.text, searchQuery)} />
                        )}

                        <div className={`flex flex-wrap items-center justify-between pt-4 border-t mt-auto ${isDarkTheme ? 'border-white/10' : 'border-black/10'}`}>
                          <div className="flex flex-col">
                            <span className={`text-[10px] font-bold uppercase tracking-widest opacity-60`}>
                              {new Date(entry.date).toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' })}
                            </span>
                          </div>
                          <div className="flex gap-2 items-center opacity-60 no-print">
                            {view === 'dashboard' && !entry.parentId && (
                              <button type="button" onClick={(e) => { e.stopPropagation(); moveToTop(entry); }} className="p-2 rounded-full transition-colors" style={{ backgroundColor: 'rgba(150,150,150,0.1)' }} title="Nach oben schieben">
                                <Icon name="arrow-up-circle" size={16} />
                              </button>
                            )}

                            {pagesCount > 1 && !searchQuery && (
                              <span className="flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-md mr-1" style={{ backgroundColor: 'rgba(150,150,150,0.1)' }}>
                                <Icon name="layers" size={12} /> {pagesCount}
                              </span>
                            )}
                            {entry.mood && (() => {
                              const moodObj = MOODS.find(m=>m.label===entry.mood);
                              if (!moodObj) return null;
                              return <Icon name={moodObj.iconName} size={16} className={moodObj.color} />;
                            })()}
                            {entry.location && <Icon name="map-pin" size={16} />}
                            {(entry.audio || entry.video) && <Icon name="mic" size={16} />}
                            {view === 'archive' && (
                              <div className="flex gap-2 ml-2">
                                <button type="button" onClick={(e) => { e.stopPropagation(); setEntries(prev => prev.map(ex => ex.id === entry.id ? { ...ex, archived: false } : ex)); }} className={`p-2 rounded-full`} style={{ backgroundColor: 'rgba(150,150,150,0.1)' }}><Icon name="rotate-ccw" size={16} /></button>
                                <button type="button" onClick={(e) => { e.stopPropagation(); confirmArchiveDelete(entry.id); }} className="p-2 rounded-full bg-rose-500/10 text-rose-500"><Icon name="trash-2" size={16} /></button>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </main>

        {showEditor && (
          <div className="fixed inset-0 z-[100] flex flex-col sm:items-center sm:justify-center bg-transparent sm:bg-slate-900/40 sm:dark:bg-slate-950/80 sm:backdrop-blur-md no-print sm:p-6">
            <div className="hidden sm:block absolute inset-0 bg-transparent" onClick={() => checkSaveEntry(true)} />
            <div 
              className="relative w-full h-full sm:h-[90dvh] sm:max-w-3xl mx-auto flex flex-col shadow-2xl transition-colors sm:rounded-[2.5rem] border-0 sm:border sm:border-slate-200 sm:dark:border-white/10 overflow-hidden"
              style={{ backgroundColor: zenMode ? 'transparent' : (user.appBgColor || (user.isDark ? '#18181b' : '#ffffff')), color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
            >
              <div className={`flex justify-between items-center px-4 py-3 sm:px-6 sm:py-5 border-b shrink-0 ${zenMode ? 'border-transparent' : 'border-black/5 dark:border-white/5'}`}>
                
                {/* ZURUECK BUTTON (Jetzt als klarer Pfeil nach Links) */}
                <button type="button" onClick={handleEditorBack} className={`p-2 rounded-full transition-colors ${isDarkColor(selectedColor) ? 'text-white hover:bg-white/10' : 'text-slate-900 hover:bg-black/5'}`}>
                  <Icon name="arrow-left" size={28}/>
                </button>

                {!zenMode && (
                  <div className="flex gap-1 sm:gap-2 overflow-x-auto hide-scrollbar items-center min-w-[100px] justify-end">
                    <span className={`flex items-center text-[10px] sm:text-xs font-bold text-emerald-500 transition-opacity duration-300 ${autoSaveStatus ? 'opacity-100' : 'opacity-0'} mr-1 sm:mr-2`}><Icon name="check" size={14} className="mr-1"/> {autoSaveStatus || 'Gespeichert'}</span>
                    
                    {editingId && <button type="button" onClick={() => confirmDelete(editingId)} className="p-2 sm:p-2.5 rounded-full hover:bg-rose-500/10 text-slate-400 hover:text-rose-500 transition-colors" title="Seite herausreißen"><Icon name="trash-2" size={20}/></button>}
                    {editingId && <button type="button" onClick={() => {
                      const entryToArchive = {
                        id: editingId || generateId(),
                        title: title || 'Neue Seite', text: editorRef.current ? editorRef.current.innerHTML : text, color: selectedColor,
                        images: selectedImages,
                        video: selectedVideo, audio: audioUrl,
                        locked: isLocked, archived: true, manifested: isManifested,
                        unlockDate, unlockLocation, type: entryType, category, mood, location, parentId, inheritedFrom,
                        date: editingId ? (entries.find(e => e.id === editingId)?.date || new Date().toISOString()) : new Date().toISOString(),
                        orderTimestamp: editingId ? (entries.find(e => e.id === editingId)?.orderTimestamp || new Date().toISOString()) : new Date().toISOString(),
                      };
                      saveToDB(entryToArchive);
                      closeEditor(null);
                    }} className="p-2 sm:p-2.5 rounded-full transition-colors text-slate-400 hover:text-indigo-500 hover:bg-indigo-500/10" title="Ins Archiv"><Icon name="archive" size={20}/></button>}
                    <button type="button" onClick={() => setZenMode(true)} className={`p-2 sm:p-2.5 rounded-full transition-colors text-slate-400 ${isDarkColor(selectedColor) ? 'hover:text-white hover:bg-white/10' : 'hover:text-slate-900 hover:bg-black/5'}`} title="Fokus Modus"><Icon name="maximize-2" size={20}/></button>
                    <button type="button" onClick={() => { setIsManifested(!isManifested); isDirtyRef.current = true; }} className={`p-2 sm:p-2.5 rounded-full transition-colors ${isManifested ? 'bg-amber-500/20 text-amber-500' : 'text-slate-400 hover:text-amber-500 hover:bg-amber-500/10'}`} title="Manifestieren (Stern)"><Icon name="sparkles" size={20}/></button>
                    <button type="button" onClick={() => { setIsLocked(!isLocked); isDirtyRef.current = true; }} className={`p-2 sm:p-2.5 rounded-full transition-colors ${isLocked ? 'bg-rose-500/20 text-rose-500' : 'text-slate-400 hover:text-rose-500 hover:bg-rose-500/10'}`} title="PIN-Schutz (Tresor)"><Icon name="lock" size={20}/></button>
                  </div>
                )}
                {zenMode && <button type="button" onClick={() => setZenMode(false)} className="text-current opacity-50 hover:opacity-100"><Icon name="minimize-2" size={24}/></button>}
                
                {!zenMode && (
                  <button type="button" onClick={() => checkSaveEntry(false)} className={`flex items-center gap-1 px-4 sm:px-6 py-2 sm:py-2.5 rounded-full font-bold shadow-md hover:scale-105 transition-transform text-sm ${isDarkColor(selectedColor) ? 'bg-white text-slate-900' : 'bg-slate-900 text-white'}`} title="Speichern & bleiben">
                    <Icon name="check" size={16} className="sm:hidden" />
                    <span className="hidden sm:inline">Sichern</span>
                  </button>
                )}
              </div>

              {/* FIXED TITLE AND FORMATTING TOOLBAR */}
              <div className="flex flex-col shrink-0 z-40 shadow-sm border-b px-4 sm:px-10 pt-4 sm:pt-6 pb-2 sm:pb-3" style={{ backgroundColor: user.appBgColor ? `${user.appBgColor}F2` : (user.isDark ? 'rgba(24, 24, 27, 0.85)' : 'rgba(255, 255, 255, 0.85)'), borderColor: user.isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' }}>
                  <input type="text" placeholder="Titel..." value={title || ''} onChange={(e) => { setTitle(e.target.value); isDirtyRef.current = true; }} className="w-full shrink-0 bg-transparent text-current text-3xl sm:text-5xl font-bold placeholder-current opacity-90 border-none focus:ring-0 p-0 focus:outline-none font-serif relative z-10 mb-4" style={{ color: 'inherit', '::placeholder': { opacity: 0.3 } }} />
                  
                  {!zenMode && (
                    <div className="flex gap-2 w-full">
                      <button type="button" onMouseDown={(e) => { e.preventDefault(); document.execCommand('bold', false, null); isDirtyRef.current = true; }} className="flex-1 flex justify-center p-2.5 rounded-xl bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-colors text-current" title="Fett"><Icon name="bold" size={20}/></button>
                      <button type="button" onMouseDown={(e) => { e.preventDefault(); document.execCommand('italic', false, null); isDirtyRef.current = true; }} className="flex-1 flex justify-center p-2.5 rounded-xl bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-colors text-current" title="Kursiv"><Icon name="italic" size={20}/></button>
                      <button type="button" onMouseDown={(e) => { e.preventDefault(); document.execCommand('insertUnorderedList', false, null); isDirtyRef.current = true; }} className="flex-1 flex justify-center p-2.5 rounded-xl bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-colors text-current"><Icon name="list-todo" size={20}/></button>
                      <button type="button" onMouseDown={(e) => { e.preventDefault(); document.execCommand('formatBlock', false, 'blockquote'); isDirtyRef.current = true; }} className="flex-1 flex justify-center p-2.5 rounded-xl bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-colors text-current" title="Zitat / Weisheit"><Icon name="quote" size={20}/></button>
                    </div>
                  )}
              </div>

              <div id="editor-scroll-container" className="flex-1 overflow-y-auto p-4 sm:p-10 flex flex-col gap-4 w-full overscroll-contain relative">
              
                {/* Bilder-Liste im Editor */}
                {!zenMode && selectedImages.length > 0 && (
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 shrink-0 pb-4 no-print relative z-10">
                    {selectedImages.map((imgSrc, index) => (
                      <div key={index} className="relative w-full aspect-square rounded-[1rem] overflow-hidden shadow-md bg-black/5 dark:bg-white/5 shrink-0 border border-slate-200 dark:border-white/10 flex items-center justify-center group">
                        <img src={imgSrc} alt={`Preview ${index+1}`} className="w-full h-full object-cover rounded-2xl" />
                        <button type="button" onClick={() => { setSelectedImages(prev => prev.filter((_,i) => i !== index)); isDirtyRef.current = true; }} className="absolute top-2 right-2 bg-black/70 backdrop-blur-md p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10 shadow-lg text-white">
                          <Icon name="x" size={14}/>
                        </button>
                      </div>
                    ))}
                  </div>
                )}

                {pillarGuidance && !zenMode && (
                  <div className="bg-amber-500/10 border border-amber-500/30 text-amber-600 dark:text-amber-400 p-3 sm:p-4 rounded-2xl flex gap-3 shrink-0 relative z-10">
                    <Icon name="book-open" size={20} className="shrink-0 mt-0.5" />
                    <p className="line-clamp-2 text-xs sm:text-sm font-medium">{pillarGuidance}</p>
                  </div>
                )}

                {!zenMode && (
                  <div className="flex flex-wrap gap-3 text-xs font-bold uppercase tracking-widest opacity-60 shrink-0 relative z-10">
                    <button type="button" onClick={() => setPicker({
                      title: 'Kategorie', currentValue: category, options: CATEGORIES.map(c => ({label: c, value: c})), onSelect: (val) => { setCategory(val); isDirtyRef.current = true; }
                    })} className="bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 transition-colors px-3 py-1.5 rounded-lg flex items-center gap-2">
                      {category} <Icon name="chevron-down" size={14} className="shrink-0"/>
                    </button>
                    <button type="button" onClick={() => setPicker({
                      title: 'Art des Eintrags', currentValue: entryType, options: [{label: 'Vision', value: 'vision'}, {label: 'Brief an die Zukunft', value: 'letter'}], onSelect: (val) => { setEntryType(val); isDirtyRef.current = true; }
                    })} className="bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 transition-colors px-3 py-1.5 rounded-lg flex items-center gap-2">
                      {entryType === 'vision' ? 'Vision' : 'Brief'} <Icon name="chevron-down" size={14} className="shrink-0"/>
                    </button>
                  </div>
                )}

                <div
                  ref={editorRef}
                  contentEditable={true}
                  suppressContentEditableWarning={true}
                  data-placeholder="Schreibe deine Gedanken auf diese leere Seite..."
                  onInput={handleEditorInput}
                  className="w-full flex-1 bg-transparent text-lg sm:text-xl leading-relaxed focus:outline-none font-medium empty:before:content-[attr(data-placeholder)] empty:before:cursor-text legacy-editor-content pb-64 relative z-10 mt-2"
                  style={{ color: 'inherit', '::before': { opacity: 0.3 } }}
                />

                {!zenMode && audioUrl && (
                  <div className="space-y-4 shrink-0 pb-6 relative z-10">
                    <div className="relative p-4 rounded-2xl shadow-sm border border-current border-opacity-20 flex flex-col">
                      <span className="text-xs font-bold uppercase tracking-widest mb-2 opacity-60">Sprachnachricht</span>
                      <audio src={audioUrl} controls className="w-full" />
                      <button type="button" onClick={() => { setAudioUrl(null); isDirtyRef.current = true; }} className="absolute top-4 right-4 text-current opacity-50 hover:opacity-100"><Icon name="x" size={16}/></button>
                    </div>
                  </div>
                )}
              </div>

              {!zenMode && (
                <div className="border-t border-black/5 dark:border-white/5 bg-white/50 dark:bg-black/40 backdrop-blur-2xl p-3 sm:p-6 flex flex-col gap-4 pb-[env(safe-area-inset-bottom,16px)] shrink-0 shadow-lg relative z-20">
                    <div className="flex justify-between items-center overflow-x-auto hide-scrollbar gap-4">
                      <div className="flex gap-2 shrink-0">
                        {/* WICHTIG: multiple Attribut hinzugefügt für Mehrfach-Bildauswahl */}
                        <label className={`p-3.5 rounded-full shadow-sm cursor-pointer transition-colors ${isDarkColor(selectedColor) ? 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white hover:bg-slate-50 text-slate-800 border border-slate-200'}`} title="Bilder hinzufügen"><Icon name="image" size={20}/><input type="file" accept="image/*" multiple onChange={(e)=>handleFileUpload(e,'image')} className="hidden" /></label>
                        <button type="button" onClick={() => setIsDrawing(true)} className={`p-3.5 rounded-full shadow-sm transition-colors ${isDarkColor(selectedColor) ? 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white hover:bg-slate-50 text-slate-800 border border-slate-200'}`} title="Zeichnen"><Icon name="pen-tool" size={20}/></button>
                        <button type="button" onClick={isRecording ? stopRecording : startRecording} className={`p-3.5 rounded-full shadow-sm transition-colors ${isRecording ? 'bg-rose-500 text-white animate-pulse' : isDarkColor(selectedColor) ? 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white hover:bg-slate-50 text-slate-800 border border-slate-200'}`} title="Sprache aufnehmen">
                          {isRecording ? <Icon name="square" size={20}/> : <Icon name="mic" size={20}/>}
                        </button>
                      </div>
                      <div className={`flex gap-2 shrink-0 border-l pl-4 ${isDarkColor(selectedColor) ? 'border-white/10' : 'border-black/10'}`}>
                        <label className={`relative p-3.5 rounded-full shadow-sm flex items-center justify-center cursor-pointer overflow-hidden transition-colors ${unlockDate ? 'bg-indigo-500 text-white' : isDarkColor(selectedColor) ? 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white hover:bg-slate-50 text-slate-800 border border-slate-200'}`} title="Datums-Siegel (Zeitkapsel)">
                          <Icon name="calendar-clock" size={20}/>
                          <input type="date" value={unlockDate} onChange={e=>{setUnlockDate(e.target.value); isDirtyRef.current = true;}} className="absolute opacity-0 w-[200%] h-[200%] -top-1/2 -left-1/2 cursor-pointer" />
                        </label>
                      </div>
                    </div>

                    <div className={`flex justify-between items-center overflow-x-auto hide-scrollbar gap-6 border-t pt-3 ${isDarkColor(selectedColor) ? 'border-white/5' : 'border-black/5'}`}>
                      <div className="flex gap-2 shrink-0">
                        {MOODS.map(m => (
                          <button type="button" key={m.id} onClick={()=> { setMood(m.label===mood ? null : m.label); isDirtyRef.current = true; }} className={`p-2.5 rounded-full transition-all ${mood===m.label ? 'bg-slate-800 dark:bg-white shadow-lg scale-110 ' + m.color : 'opacity-40 hover:opacity-100 text-current'}`}>
                            <Icon name={m.iconName} size={20} />
                          </button>
                        ))}
                      </div>
                      <div className="flex gap-2 shrink-0">
                        {COLORS.slice(0, 18).map((c) => (
                          <button type="button" key={c} onClick={() => { setSelectedColor(c); isDirtyRef.current = true; }} className={`w-8 h-8 rounded-full shadow-sm border-2 transition-transform ${selectedColor === c ? 'scale-110 border-current z-10' : 'border-transparent opacity-60 hover:opacity-100 hover:scale-105'}`} style={{ backgroundColor: c }} />
                        ))}
                      </div>
                    </div>
                </div>
              )}
            </div>
          </div>
        )}

        {isDrawing && (
          <div className="fixed inset-0 z-[120] flex flex-col bg-slate-900 text-white no-print">
            <div className="flex justify-between items-center p-6 border-b border-white/10 bg-slate-950">
              <button type="button" onClick={() => setIsDrawing(false)} className="p-3 text-white/70 hover:text-white bg-white/5 rounded-full"><Icon name="x" size={24} /></button>
              <span className="font-bold text-xl font-serif">Skizze</span>
              <button type="button"
                onClick={() => { if(canvasRef.current) { setSelectedImages(prev => [...prev, canvasRef.current.toDataURL()]); setIsDrawing(false); isDirtyRef.current = true; } }}
                className="bg-amber-500 text-slate-900 px-6 py-3 rounded-full font-bold flex gap-2 items-center shadow-lg"
              ><Icon name="check" size={18}/> Fertig</button>
            </div>
            <div className="flex-1 relative bg-white touch-none">
              <canvas
                ref={canvasRef}
                className="absolute inset-0 w-full h-full cursor-crosshair touch-none"
                onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
                onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing}
              />
            </div>
            <div className="p-4 bg-slate-950 flex justify-center">
              <button type="button" onClick={() => {
                if (!canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.fillStyle = user.isDark ? '#18181b' : '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.restore();
              }} className="p-3 bg-white/10 rounded-full hover:bg-white/20 text-white"><Icon name="eraser" size={24}/></button>
            </div>
          </div>
        )}

        <nav 
          className="fixed bottom-0 left-0 right-0 backdrop-blur-3xl border-t z-40 transition-colors duration-500 pb-[env(safe-area-inset-bottom,0px)] no-print"
          style={{ backgroundColor: user.appBgColor ? `${user.appBgColor}E6` : (user.isDark ? 'rgba(24, 24, 27, 0.9)' : 'rgba(255, 255, 255, 0.9)'), borderColor: user.isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)', color: user.appBgColor ? (isDarkColor(user.appBgColor) ? '#ffffff' : '#18181b') : undefined }}
        >
          <div className="flex justify-between items-center h-20 max-w-md mx-auto px-8">
            <button type="button" onClick={() => setView('dashboard')} className={`flex flex-col items-center justify-center h-full space-y-1 transition-all hover:opacity-100 ${view === 'dashboard' ? 'scale-105' : 'opacity-50'}`} style={view === 'dashboard' ? { color: user.nameColor || '#f59e0b' } : { color: 'inherit' }}><Icon name="layout-grid" size={24} /><span className="text-[10px] font-bold uppercase tracking-widest">Buch</span></button>
            <div className="relative -top-6">
              <button type="button" onClick={() => openEditor()} className="w-16 h-16 rounded-full shadow-xl flex items-center justify-center hover:scale-105 active:scale-95 border-[4px] transition-transform duration-300" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#18181b'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#18181b')) ? '#ffffff' : '#000000', borderColor: user.appBgColor || (user.isDark ? '#09090b' : '#f8fafc') }}><Icon name="plus" size={32} /></button>
            </div>
            <button type="button" onClick={() => setView('vault')} className={`flex flex-col items-center justify-center h-full space-y-1 transition-all hover:opacity-100 ${view === 'vault' ? 'scale-105' : 'opacity-50'}`} style={view === 'vault' ? { color: '#6366f1' } : { color: 'inherit' }}><Icon name="lock" size={24} /><span className="text-[10px] font-bold uppercase tracking-widest">Tresor</span></button>
          </div>
        </nav>

      </div>
    </ErrorBoundary>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
