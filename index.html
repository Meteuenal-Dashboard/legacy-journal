<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const safeStorageGet = (key) => { 
    try { return localStorage.getItem(key); } catch(e) { return null; } 
};
const safeStorageSet = (key, val) => { 
    try { localStorage.setItem(key, val); } catch(e) {} 
};

const safeParseDate = (dInput) => {
    if (!dInput) return new Date(0);
    if (dInput instanceof Date) {
        if (isNaN(dInput.getTime())) return new Date(0);
        return dInput;
    }
    if (typeof dInput === 'number') return new Date(dInput);
    
    let dStr = String(dInput).trim();
    if (/^\d{4}-\d{2}-\d{2}/.test(dStr)) {
        let time = new Date(dStr).getTime();
        if (isNaN(time)) time = new Date(dStr + 'Z').getTime();
        return isNaN(time) ? new Date(0) : new Date(time);
    }
    const deMatch = dStr.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
    if (deMatch) {
        const timeMatch = dStr.match(/\s(\d{2}:\d{2}:\d{2})/);
        const timePart = timeMatch ? timeMatch[1] : '12:00:00';
        return new Date(`${deMatch[3]}-${deMatch[2].padStart(2, '0')}-${deMatch[1].padStart(2, '0')}T${timePart}Z`);
    }
    let time = new Date(dStr).getTime();
    if (isNaN(time)) time = new Date(dStr + 'Z').getTime();
    if (isNaN(time)) time = new Date(dStr.replace(' ', 'T') + 'Z').getTime();
    return isNaN(time) ? new Date(0) : new Date(time);
};

// SORTIERUNG: Chronologisch, aber OrderTimestamp bricht Gleichstand bei Tagen
const sortEntriesChronological = (a, b) => {
    const timeA = safeParseDate(a.date).getTime() || 0;
    const timeB = safeParseDate(b.date).getTime() || 0;
    const dayA = new Date(timeA).setHours(0,0,0,0);
    const dayB = new Date(timeB).setHours(0,0,0,0);
    
    if (dayA !== dayB) return dayB - dayA;
    const orderA = safeParseDate(a.orderTimestamp || a.date).getTime() || 0;
    const orderB = safeParseDate(b.orderTimestamp || b.date).getTime() || 0;
    return orderB - orderA;
};

const getLocalISO = () => new Date().toISOString();

const createSafeHtml = (htmlStr) => {
  const safeStr = htmlStr || '';
  return { 
      __html: window.DOMPurify ? window.DOMPurify.sanitize(safeStr, { 
          ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'u', 'br', 'div', 'span', 'blockquote', 'p', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'img', 'font'], 
          ALLOWED_ATTR: ['style', 'class', 'src', 'alt', 'color', 'width', 'height'] 
      }) : safeStr 
  };
};

const highlightText = (text, query, isTitle = false) => {
  const safeStr = text || '';
  if (!safeStr) return { __html: '' };
  if (!query) return { __html: window.DOMPurify ? window.DOMPurify.sanitize(safeStr.replace(/<img[^>]*>/g, ' [Bild] ')) : safeStr };
  const plainText = safeStr.replace(/<img[^>]*>/g, ' [Bild] ').replace(/<[^>]*>?/gm, '').replace(/\s+/g, ' ').trim();
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  if (!isTitle) {
      const match = regex.exec(plainText);
      if (match) {
         const start = Math.max(0, match.index - 60);
         const end = Math.min(plainText.length, match.index + query.length + 60);
         let snippet = plainText.substring(start, end);
         if (start > 0) snippet = '...' + snippet;
         if (end < plainText.length) snippet = snippet + '...';
         const highlightedSnippet = snippet.split(regex).map((part, i) => part.toLowerCase() === query.toLowerCase() ? `<span class="search-highlight" key="${i}">${part}</span>` : part).join('');
         return { __html: highlightedSnippet };
      }
  }
  const highlighted = plainText.split(regex).map((part, i) => part.toLowerCase() === query.toLowerCase() ? `<span class="search-highlight" key="${i}">${part}</span>` : part).join('');
  return { __html: highlighted };
};

const getCoverImage = (entry) => {
    if (!entry) return null;
    if (entry.images && entry.images.length > 0) return entry.images[0];
    if (entry.text) {
        const match = entry.text.match(/<img[^>]+src="([^">]+)"/);
        if (match) return match[1];
    }
    return null;
};

const encHelper = new TextEncoder();
const decHelper = new TextDecoder();
const cryptoKeyCache = {}; 

const getCryptoKey = async (pin, saltStr) => {
    const cacheKey = pin + saltStr;
    if (cryptoKeyCache[cacheKey]) return cryptoKeyCache[cacheKey];
    const keyMaterial = await window.crypto.subtle.importKey("raw", encHelper.encode(pin), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]);
    const salt = Uint8Array.from(atob(saltStr), c => c.charCodeAt(0));
    const key = await window.crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
    cryptoKeyCache[cacheKey] = key; 
    return key;
};

const encryptData = async (text, pin) => {
    try {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const saltStr = btoa(String.fromCharCode.apply(null, salt));
        const ivStr = btoa(String.fromCharCode.apply(null, iv));
        const key = await getCryptoKey(pin, saltStr);
        const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encHelper.encode(text));
        const bytes = new Uint8Array(encrypted);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return { cipher: btoa(binary), iv: ivStr, salt: saltStr };
    } catch(e) { return null; }
};

const decryptData = async (encryptedObj, pin) => {
    if (!encryptedObj || !pin) return null;
    try {
        const salt = Uint8Array.from(atob(encryptedObj.salt), c => c.charCodeAt(0));
        const iv = Uint8Array.from(atob(encryptedObj.iv), c => c.charCodeAt(0));
        const atobCipher = atob(encryptedObj.cipher);
        const cipher = new Uint8Array(atobCipher.length);
        for (let i = 0; i < atobCipher.length; i++) cipher[i] = atobCipher.charCodeAt(i);
        const key = await getCryptoKey(pin, encryptedObj.salt);
        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, cipher);
        return decHelper.decode(decrypted);
    } catch(e) { return null; }
};

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError(error) { return { hasError: true }; }
  render() { if (this.state.hasError) return <div className="min-h-screen flex items-center justify-center bg-black text-white p-8 text-center"><div><h1 className="text-2xl font-bold mb-4">Ein Moment bitte...</h1><button onClick={() => window.location.reload()} className="px-6 py-3 bg-white text-black font-bold rounded-full">Neu laden</button></div></div>; return this.props.children; }
}

const Icon = ({ name, size = 24, className = '', ...props }) => {
  const spanRef = useRef(null);
  useEffect(() => {
    if (spanRef.current && window.lucide) {
      spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
      window.lucide.createIcons({ root: spanRef.current });
      const svg = spanRef.current.querySelector('svg');
      if (svg) { svg.setAttribute('width', size); svg.setAttribute('height', size); if (className) svg.setAttribute('class', `lucide lucide-${name} ${className}`); }
    }
  }, [name, size, className]);
  return <span ref={spanRef} className="inline-flex items-center justify-center" {...props}></span>;
};

const COLORS = ['#ffffff', '#f8fafc', '#e4e4e7', '#a1a1aa', '#52525b', '#27272a', '#18181b', '#09090b', '#fef08a', '#fbbf24', '#f59e0b', '#d97706', '#fecdd3', '#fb7185', '#f43f5e', '#e11d48', '#bfdbfe', '#3b82f6', '#1d4ed8', '#a7f3d0', '#10b981', '#047857', '#e9d5ff', '#8b5cf6', '#6d28d9'];

const isDarkColor = (color) => {
  if (!color) return true;
  const hex = color.replace('#', '');
  if (hex.length === 6) {
    const r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
    return ((r * 299 + g * 587 + b * 114) / 1000) < 128;
  }
  return true; 
};

const getSubtleBorderColor = (hexColor, isDark) => {
    if (!hexColor) return isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
    const cleanHex = hexColor.replace('#', '');
    if (cleanHex.length === 6) {
        const r = parseInt(cleanHex.slice(0, 2), 16), g = parseInt(cleanHex.slice(2, 4), 16), b = parseInt(cleanHex.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${isDark ? 0.15 : 0.25})`;
    }
    return isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
};

const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

const initDB = () => {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('LegacyVisionDB', 4);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('entries')) db.createObjectStore('entries', { keyPath: 'id' });
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
};

const EntryCard = ({ entry, onClick, isGridView, userColor, isDarkTheme, searchQuery, onMoveUp, onMoveDown, showMoveControls }) => {
    if (!entry) return null;
    const coverUrl = getCoverImage(entry);
    const hasImages = !!coverUrl;
    const cardBgClass = entry.manifested ? 'bg-amber-50/30 dark:bg-amber-900/20 border-amber-400 dark:border-amber-500 border-2 shadow-lg shadow-amber-500/20' : (isDarkTheme ? 'bg-zinc-900 border-zinc-800 border' : 'bg-white border-slate-100 border shadow-sm');
    const isCapsuleLocked = entry.unlockDate;
    return (
      <div onClick={() => onClick(entry, false)} className={`group relative rounded-[2rem] overflow-hidden cursor-pointer hover:shadow-md transition-all duration-300 active:scale-[0.98] ${cardBgClass} ${isGridView ? 'flex flex-col h-full' : ''}`}>
        {entry.manifested && <div className="absolute top-4 right-4 z-20 bg-amber-400 text-amber-950 text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1"><Icon name="sparkles" size={12}/> Highlight</div>}
        {hasImages && <div className="w-full relative bg-slate-100 dark:bg-zinc-800"><img src={coverUrl} className="w-full h-auto block" alt="Cover" /></div>}
        <div className="p-6 relative z-10 flex-1 flex flex-col">
          <div className="flex items-center justify-between mb-3 gap-2">
              <div className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest opacity-50 flex-wrap flex-1">
                <span>{safeParseDate(entry.date).toLocaleDateString('de-DE')}</span>
                {!isGridView && <><span>•</span><span>{entry.category || 'Allgemein'}</span></>}
                {isCapsuleLocked && <><span className="text-indigo-500 flex items-center gap-1 ml-auto"><Icon name="clock" size={12}/> {new Date(entry.unlockDate).toLocaleDateString('de-DE')}</span></>}
              </div>
              {showMoveControls && (
                  <div className="flex gap-1 shrink-0 z-20 ml-2">
                      <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); onMoveUp(); }} className="w-8 h-8 bg-white/80 dark:bg-black/80 backdrop-blur rounded-full flex items-center justify-center shadow-sm text-slate-600 dark:text-slate-300 hover:text-accent transition-colors"><Icon name="chevron-up" size={16}/></button>
                      <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); onMoveDown(); }} className="w-8 h-8 bg-white/80 dark:bg-black/80 backdrop-blur rounded-full flex items-center justify-center shadow-sm text-slate-600 dark:text-slate-300 hover:text-accent transition-colors"><Icon name="chevron-down" size={16}/></button>
                  </div>
              )}
          </div>
          <h3 className={`font-extrabold ${isGridView ? 'text-xl' : 'text-2xl'} leading-tight tracking-tight mb-3 line-clamp-2 text-slate-900 dark:text-white group-hover:text-accent transition-colors`} dangerouslySetInnerHTML={highlightText(entry.title || 'Ohne Titel', searchQuery, true)} />
          {!isGridView && (entry.tags || entry.people || entry.rating > 0 || (entry.locations && entry.locations.length > 0)) && (
             <div className="flex flex-wrap gap-1.5 mb-4">
                {entry.tags && entry.tags.split(',').filter(x=>x.trim()).map((t, i) => <span key={i} className="px-2 py-0.5 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-md text-[10px] font-bold flex items-center gap-1"><Icon name="tag" size={10}/> {t.trim()}</span>)}
                {entry.locations && entry.locations.length > 0 && entry.locations.map((loc, i) => <span key={i} className="px-2 py-0.5 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800 rounded-md text-[10px] font-bold flex items-center gap-1"><Icon name="map-pin" size={10}/> {loc.name}</span>)}
             </div>
          )}
          {!isCapsuleLocked && entry.text && !isGridView && <div className="text-[1.05rem] leading-[1.8] opacity-90 legacy-editor-content text-slate-800 dark:text-slate-200 line-clamp-3" dangerouslySetInnerHTML={highlightText(entry.text, searchQuery, false)} />}
        </div>
      </div>
    );
};

const TimelineSwipeableEntry = ({ entry, onClick, onMoveUp, onMoveDown, onArchivePrompt, onTrashPrompt }) => {
    const [offsetX, setOffsetX] = useState(0);
    const startX = useRef(null);
    const coverUrl = getCoverImage(entry);

    const handleTouchStart = (evt) => { startX.current = evt.touches[0].clientX; };
    const handleTouchMove = (evt) => {
        if (startX.current === null) return;
        const diff = evt.touches[0].clientX - startX.current;
        if (diff > 100) setOffsetX(100); else if (diff < -100) setOffsetX(-100); else setOffsetX(diff);
    };
    const handleTouchEnd = () => {
        if (offsetX > 60) onArchivePrompt(entry); else if (offsetX < -60) onTrashPrompt(entry);
        setOffsetX(0); startX.current = null;
    };

    return (
        <div className="relative w-full rounded-2xl overflow-hidden bg-slate-200 dark:bg-zinc-800 border border-slate-100 dark:border-zinc-800/50">
            <div className="absolute inset-0 flex justify-between items-center px-4">
                <div className="text-emerald-600 font-bold flex items-center gap-2 text-sm"><Icon name="archive" size={16}/> Archiv</div>
                <div className="text-rose-600 font-bold flex items-center gap-2 text-sm">Löschen <Icon name="trash-2" size={16}/></div>
            </div>
            <div style={{ transform: `translateX(${offsetX}px)`, transition: 'transform 0.2s ease-out' }} 
                 onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
                 className="relative z-10 w-full bg-white dark:bg-zinc-900 shadow-sm flex items-center p-3">
                <div onClick={() => onClick(entry)} className="flex-1 flex items-center gap-4 cursor-pointer overflow-hidden">
                    {coverUrl ? <img src={coverUrl} className="w-14 h-14 rounded-xl object-cover shrink-0" /> : <div className="w-14 h-14 rounded-xl bg-slate-100 dark:bg-zinc-800 flex items-center justify-center shrink-0"><Icon name="book" size={24} className="opacity-40" /></div>}
                    <div className="overflow-hidden">
                        <h4 className="font-bold text-sm text-accent truncate">{entry.title || 'Ohne Titel'}</h4>
                        <p className="text-[10px] opacity-60 font-bold tracking-widest uppercase mt-1">{safeParseDate(entry.date).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})}</p>
                    </div>
                </div>
                <div className="flex gap-1 ml-2">
                    <button onClick={(e) => { e.stopPropagation(); onMoveUp(); }} className="w-8 h-8 bg-slate-50 dark:bg-zinc-800 rounded-full flex items-center justify-center"><Icon name="chevron-up" size={16}/></button>
                    <button onClick={(e) => { e.stopPropagation(); onMoveDown(); }} className="w-8 h-8 bg-slate-50 dark:bg-zinc-800 rounded-full flex items-center justify-center"><Icon name="chevron-down" size={16}/></button>
                </div>
            </div>
        </div>
    );
};

function App() {
  const [db, setDb] = useState(null);
  const [authUser, setAuthUser] = useState(null);
  const [fb, setFb] = useState(null);
  const [user, setUser] = useState({ name: '', motto: '', pin: '', avatar: null, nameColor: '#f59e0b', textColor: null, isDark: true, appBgColor: null, cloudSync: true, biometric: false, uiScale: 1 });
  const [entries, setEntries] = useState([]);
  const [view, setView] = useState('loading');
  const [isLoaded, setIsLoaded] = useState(false);
  const [isGridView, setIsGridView] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [activeCategory, setActiveCategory] = useState('Alle');
  const [isSearchOpen, setIsSearchOpen] = useState(false);
  const [dialog, setDialog] = useState(null);
  const [picker, setPicker] = useState(null);
  const [viewingEntry, setViewingEntry] = useState(null);
  const [showEditor, setShowEditor] = useState(false);
  const [showTimeline, setShowTimeline] = useState(false);
  const [timelineMonth, setTimelineMonth] = useState(new Date());
  const [timelineSelectedDate, setTimelineSelectedDate] = useState(null);
  const [touchStart, setTouchStart] = useState(null);
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState(false);
  const [isSpeaking, setIsSpeaking] = useState(false);
  const [isRecording, setIsRecording] = useState(false);
  const [burnText, setBurnText] = useState('');
  const [isBurning, setIsBurning] = useState(false);
  const [isDrawing, setIsDrawing] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [title, setTitle] = useState('');
  const [text, setText] = useState('');
  const [selectedImages, setSelectedImages] = useState([]);
  const [audioUrl, setAudioUrl] = useState(null);
  const [isManifested, setIsManifested] = useState(false);
  const [category, setCategory] = useState('Allgemein');
  const [rating, setRating] = useState(0);
  const [tags, setTags] = useState('');
  const [people, setPeople] = useState('');
  const [locations, setLocations] = useState([]);
  const [unlockDate, setUnlockDate] = useState('');
  const [autoSaveStatus, setAutoSaveStatus] = useState('');
  const editorRef = useRef(null);
  const canvasRef = useRef(null);
  const mapRef = useRef(null);
  const isDirtyRef = useRef(false);
  const mapInstance = useRef(null);

  // DARK MODE SYNC
  useEffect(() => {
    if (user.isDark) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
    document.body.style.backgroundColor = user.appBgColor || (user.isDark ? '#000000' : '#f8fafc');
  }, [user.isDark, user.appBgColor]);

  useEffect(() => {
    document.documentElement.style.fontSize = `${(user.uiScale || 1) * 100}%`;
  }, [user.uiScale]);

  const loadLocalEntries = async (pin) => {
      const currentDb = await ensureDb();
      if (!currentDb) return;
      const tx = currentDb.transaction('entries', 'readonly');
      const req = tx.objectStore('entries').getAll();
      req.onsuccess = () => {
          let loaded = req.result || [];
          setEntries(loaded.sort(sortEntriesChronological));
      };
  };

  const ensureDb = async () => { if (db) return db; const d = await initDB(); setDb(d); return d; };

  useEffect(() => {
      const saved = safeStorageGet('legacy_user');
      if (saved) {
          const u = JSON.parse(saved);
          setUser(u);
          if (u.pin) setView('pin_entry'); else setView('dashboard');
          loadLocalEntries();
      } else { setView('onboarding'); }
      setIsLoaded(true);
  }, []);

  const handleUnlockSubmit = (pin) => {
      if (pin === user.pin) { setView('dashboard'); setPinInput(''); }
      else { setPinError(true); setTimeout(() => setPinError(false), 800); setPinInput(''); }
  };

  const saveToDB = async (entry) => {
      const d = await ensureDb();
      const tx = d.transaction('entries', 'readwrite');
      tx.objectStore('entries').put(entry);
      setEntries(prev => {
          const next = prev.filter(e => e.id !== entry.id);
          return [...next, entry].sort(sortEntriesChronological);
      });
  };

  const deleteFromDB = async (id) => {
      const d = await ensureDb();
      d.transaction('entries', 'readwrite').objectStore('entries').delete(id);
      setEntries(prev => prev.filter(e => e.id !== id));
  };

  const checkSaveEntry = (close = false) => {
      const content = editorRef.current?.innerHTML || text;
      const id = editingId || generateId();
      const newEntry = {
          id, title, text: content, images: selectedImages, audio: audioUrl, manifested: isManifested,
          category, rating, tags, people, locations, unlockDate, archived: false, trashed: false,
          date: editingId ? entries.find(e=>e.id===editingId).date : getLocalISO(),
          orderTimestamp: editingId ? entries.find(e=>e.id===editingId).orderTimestamp : getLocalISO()
      };
      saveToDB(newEntry);
      isDirtyRef.current = false;
      if (close) { setViewingEntry(newEntry); setShowEditor(false); }
      else { setAutoSaveStatus('Gespeichert'); setTimeout(()=>setAutoSaveStatus(''), 2000); }
  };

  const moveEntry = (index, direction, list) => {
      if (index + direction < 0 || index + direction >= list.length) return;
      const current = list[index];
      const target = list[index + direction];
      const newOrder = target.orderTimestamp || target.date;
      const oldOrder = current.orderTimestamp || current.date;
      saveToDB({ ...current, orderTimestamp: newOrder });
      saveToDB({ ...target, orderTimestamp: oldOrder });
  };

  const handleOpenEntry = (entry) => {
      if (entry.unlockDate && new Date() < new Date(entry.unlockDate)) {
          showDialog({ title: 'Zeitkapsel versiegelt', message: 'Dieser Inhalt öffnet sich erst am ' + new Date(entry.unlockDate).toLocaleDateString(), icon: 'lock' });
          return;
      }
      setViewingEntry(entry);
  };

  const showDialog = (opts) => setDialog(opts);

  const visibleEntries = useMemo(() => {
    return entries.filter(e => {
        if (!e || e.trashed || e.archived) return false;
        if (searchQuery && !(e.title.toLowerCase().includes(searchQuery.toLowerCase()) || e.text.toLowerCase().includes(searchQuery.toLowerCase()))) return false;
        if (activeCategory !== 'Alle' && e.category !== activeCategory) return false;
        return true;
    });
  }, [entries, searchQuery, activeCategory]);

  const renderEntries = [...visibleEntries].sort(sortEntriesChronological);

  // SWIPE IM VIEWER LOGIK
  const handleTouchEnd = (e) => {
      if (!touchStart || !viewingEntry) return;
      const distance = touchStart - e.changedTouches[0].clientX;
      const idx = renderEntries.findIndex(ex => ex.id === viewingEntry.id);
      if (distance > 50 && idx < renderEntries.length - 1) setViewingEntry(renderEntries[idx + 1]);
      else if (distance < -50 && idx > 0) setViewingEntry(renderEntries[idx - 1]);
      setTouchStart(null);
  };

  const getCalendarDays = (monthDate) => {
      const year = monthDate.getFullYear(), month = monthDate.getMonth();
      const first = new Date(year, month, 1), last = new Date(year, month + 1, 0);
      let startIdx = first.getDay() - 1; if (startIdx === -1) startIdx = 6;
      const days = [];
      for (let i = 0; i < startIdx; i++) days.push(null);
      for (let i = 1; i <= last.getDate(); i++) {
          const d = new Date(year, month, i);
          const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
          days.push({ day: i, date: d, dateStr: dStr });
      }
      return days;
  };

  if (view === 'loading') return <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-black"><div className="w-8 h-8 border-4 border-slate-300 border-t-black dark:border-t-white rounded-full animate-spin"></div></div>;

  if (view === 'pin_entry') return (
      <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 dark:bg-black">
          <div className="bg-white dark:bg-zinc-900 p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
              <Icon name="lock" size={48} className="mx-auto mb-6 opacity-80" />
              <h2 className="text-2xl font-bold mb-6">Legacy entsperren</h2>
              <input type="password" inputMode="numeric" autoFocus value={pinInput} onChange={e=>setPinInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleUnlockSubmit(pinInput)} className="w-full p-4 text-center text-3xl tracking-[1em] rounded-2xl bg-slate-100 dark:bg-zinc-800 outline-none mb-6" placeholder="••••" />
              <button onClick={()=>handleUnlockSubmit(pinInput)} className="w-full py-4 bg-black dark:bg-white text-white dark:text-black rounded-2xl font-bold">Entsperren</button>
          </div>
      </div>
  );

  if (view === 'onboarding') return (
      <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 dark:bg-black">
          <div className="max-w-sm w-full text-center">
              <h1 className="text-3xl font-extrabold mb-8">Willkommen</h1>
              <input type="text" value={user.name} onChange={e=>setUser({...user, name: e.target.value})} className="w-full p-4 rounded-2xl text-center bg-white dark:bg-zinc-900 shadow-sm outline-none mb-6" placeholder="Dein Name" />
              <button onClick={()=>{if(user.name){safeStorageSet('legacy_user', JSON.stringify(user)); setView('dashboard');}}} className="w-full py-4 bg-black dark:bg-white text-white dark:text-black rounded-2xl font-bold">Starten</button>
          </div>
      </div>
  );

  return (
    <ErrorBoundary>
      <div className="min-h-screen pb-safe relative">
        <header className="sticky top-0 z-30 bg-white/80 dark:bg-black/80 backdrop-blur-2xl border-b border-slate-200/50 dark:border-zinc-800/50 px-6 py-4 flex justify-between items-center no-print">
          <div className="flex items-center gap-3">
             <div className="w-10 h-10 rounded-full bg-slate-100 dark:bg-zinc-800 flex items-center justify-center border-2 overflow-hidden" style={{ borderColor: user.nameColor }}>
                {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover"/> : <Icon name="user" size={20}/>}
             </div>
             <h1 className="text-lg font-bold">{user.name}</h1>
          </div>
          <div className="flex gap-2">
            <button onClick={()=>setShowTimeline(true)} className="p-2.5 bg-slate-100 dark:bg-zinc-900 rounded-full"><Icon name="calendar-days" size={18}/></button>
            <button onClick={()=>setIsSearchOpen(!isSearchOpen)} className="p-2.5 bg-slate-100 dark:bg-zinc-900 rounded-full"><Icon name="search" size={18}/></button>
            {view !== 'dashboard' && <button onClick={()=>setView('dashboard')} className="p-2.5 bg-slate-100 dark:bg-zinc-900 rounded-full"><Icon name="x" size={18}/></button>}
          </div>
          {isSearchOpen && <div className="absolute top-full left-0 right-0 p-4 bg-white/95 dark:bg-black/95 shadow-xl"><input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Suchen..." className="w-full p-4 rounded-2xl bg-slate-100 dark:bg-zinc-900 outline-none" /></div>}
        </header>

        <main className="p-4 sm:p-6 max-w-2xl mx-auto floating-nav-spacing">
          {view === 'dashboard' && (
             <div className={`grid gap-6 ${isGridView ? 'grid-cols-2' : 'grid-cols-1'}`}>
                {renderEntries.map((e, idx) => (
                  <EntryCard key={e.id} entry={e} onClick={handleOpenEntry} isGridView={isGridView} isDarkTheme={user.isDark} onMoveUp={()=>moveEntry(idx, -1, renderEntries)} onMoveDown={()=>moveEntry(idx, 1, renderEntries)} showMoveControls={!isGridView && !searchQuery} />
                ))}
             </div>
          )}
          {view === 'settings' && (
             <div className="space-y-6">
                <div className="p-6 bg-white dark:bg-zinc-900 rounded-[2rem] shadow-sm">
                   <h2 className="font-bold mb-4">Design</h2>
                   <div className="flex gap-2 mb-4">
                      <button onClick={()=>setUser({...user, isDark: false})} className={`flex-1 py-3 rounded-xl ${!user.isDark ? 'bg-black text-white' : 'bg-slate-100 dark:bg-zinc-800'}`}>Hell</button>
                      <button onClick={()=>setUser({...user, isDark: true})} className={`flex-1 py-3 rounded-xl ${user.isDark ? 'bg-white text-black' : 'bg-slate-100 dark:bg-zinc-800'}`}>Dunkel</button>
                   </div>
                </div>
                <button onClick={()=>{localStorage.removeItem('legacy_user'); window.location.reload();}} className="w-full py-4 bg-rose-500 text-white rounded-2xl font-bold">Logout & Reset</button>
             </div>
          )}
        </main>

        <nav className={`floating-nav ${viewingEntry || showEditor ? 'hidden' : ''}`}>
           <div className="flex justify-between items-center h-[72px] px-6">
              <button onClick={()=>setIsGridView(!isGridView)} className="p-2 text-slate-400"><Icon name={isGridView ? "list" : "layout-grid"} size={26} /></button>
              <button onClick={()=>{setEditingId(null); setTitle(''); setText(''); setSelectedImages([]); setShowEditor(true);}} className="w-16 h-16 -translate-y-4 rounded-2xl text-white shadow-xl flex items-center justify-center" style={{ backgroundColor: user.nameColor }}><Icon name="plus" size={32}/></button>
              <button onClick={()=>setView('settings')} className="p-2 text-slate-400"><Icon name="settings" size={26}/></button>
           </div>
        </nav>

        {/* ZEITREISE KALENDER */}
        <div className={`fixed inset-0 z-[150] bg-slate-50 dark:bg-black flex flex-col ${showTimeline ? 'flex' : 'hidden'}`}>
           <header className="p-4 flex justify-between items-center pt-safe">
              <h2 className="text-2xl font-extrabold text-accent">Zeitreise</h2>
              <button onClick={()=>setShowTimeline(false)} className="p-2 bg-slate-200 dark:bg-zinc-800 rounded-full"><Icon name="x" size={20}/></button>
           </header>
           <div className="flex-1 overflow-y-auto p-4">
              <div className="flex justify-between items-center mb-6">
                 <button onClick={()=>setTimelineMonth(new Date(timelineMonth.getFullYear(), timelineMonth.getMonth()-1, 1))}><Icon name="chevron-left"/></button>
                 <h3 className="font-bold">{timelineMonth.toLocaleDateString('de-DE', { month:'long', year:'numeric' })}</h3>
                 <button onClick={()=>setTimelineMonth(new Date(timelineMonth.getFullYear(), timelineMonth.getMonth()+1, 1))}><Icon name="chevron-right"/></button>
              </div>
              <div className="grid grid-cols-7 gap-2">
                 {getCalendarDays(timelineMonth).map((day, i) => {
                    if (!day) return <div key={i} />;
                    const dayEntries = entries.filter(e => !e.trashed && safeParseDate(e.date).toDateString() === day.date.toDateString());
                    const cover = dayEntries.length > 0 ? getCoverImage(dayEntries[0]) : null;
                    return (
                       <button key={day.dateStr} onClick={()=>setTimelineSelectedDate(day.dateStr)} className="aspect-square relative rounded-full overflow-hidden bg-slate-200 dark:bg-zinc-800 flex items-center justify-center">
                          {cover ? <img src={cover} className="w-full h-full object-cover"/> : <span className="text-xs opacity-0">{day.day}</span>}
                          {dayEntries.length > 0 && <div className="absolute bottom-1 w-1 h-1 bg-accent rounded-full"/>}
                       </button>
                    );
                 })}
              </div>
              {timelineSelectedDate && (
                 <div className="mt-8 space-y-4">
                    {entries.filter(e => safeParseDate(e.date).toDateString() === new Date(timelineSelectedDate).toDateString()).map(e => (
                       <div key={e.id} onClick={()=>{setShowTimeline(false); handleOpenEntry(e);}} className="p-4 bg-white dark:bg-zinc-900 rounded-2xl flex items-center gap-4 cursor-pointer">
                          <img src={getCoverImage(e)} className="w-12 h-12 rounded-lg object-cover" />
                          <span className="font-bold">{e.title}</span>
                       </div>
                    ))}
                 </div>
              )}
           </div>
        </div>

        {/* VIEWER MODAL */}
        {viewingEntry && (
           <div className="fixed inset-0 z-[100] bg-white dark:bg-black overflow-y-auto" onTouchStart={e=>setTouchStart(e.touches[0].clientX)} onTouchEnd={handleTouchEnd}>
              <header className="sticky top-0 p-4 flex justify-between items-center bg-white/90 dark:bg-black/90 backdrop-blur-md z-50">
                 <button onClick={()=>setViewingEntry(null)} className="p-2"><Icon name="arrow-left"/></button>
                 <button onClick={()=>{setEditingId(viewingEntry.id); setTitle(viewingEntry.title); setText(viewingEntry.text); setSelectedImages(viewingEntry.images||[]); setShowEditor(true);}} className="font-bold" style={{color:user.nameColor}}>Bearbeiten</button>
              </header>
              <div className="p-6 max-w-2xl mx-auto">
                 {getCoverImage(viewingEntry) && <img src={getCoverImage(viewingEntry)} className="w-full rounded-[2rem] mb-8 shadow-lg" />}
                 <h1 className="text-4xl font-extrabold mb-4">{viewingEntry.title}</h1>
                 <p className="opacity-50 text-sm mb-8">{safeParseDate(viewingEntry.date).toLocaleDateString('de-DE')}</p>
                 <div className="legacy-content text-lg leading-relaxed" dangerouslySetInnerHTML={createSafeHtml(viewingEntry.text)} />
              </div>
           </div>
        )}

        {/* EDITOR MODAL */}
        {showEditor && (
           <div className="fixed inset-0 z-[200] bg-white dark:bg-black flex flex-col">
              <header className="p-4 flex justify-between items-center border-b border-slate-100 dark:border-zinc-900">
                 <button onClick={()=>checkSaveEntry(true)} className="p-2"><Icon name="arrow-left"/></button>
                 <button onClick={()=>checkSaveEntry(true)} className="px-6 py-2 rounded-xl text-white font-bold" style={{backgroundColor:user.nameColor}}>Sichern</button>
              </header>
              <div className="p-4 overflow-y-auto flex-1">
                 <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Titel..." className="w-full text-3xl font-extrabold outline-none bg-transparent mb-6" />
                 <div ref={editorRef} contentEditable className="outline-none min-h-[50vh] text-lg" dangerouslySetInnerHTML={{__html: text}} />
              </div>
           </div>
        )}

        {dialog && (
           <div className="fixed inset-0 z-[300] bg-black/60 backdrop-blur-md flex items-center justify-center p-6" onClick={()=>setDialog(null)}>
              <div className="bg-white dark:bg-zinc-900 p-8 rounded-[2.5rem] w-full max-w-sm text-center" onClick={e=>e.stopPropagation()}>
                 <h3 className="text-xl font-bold mb-4">{dialog.title}</h3>
                 <p className="opacity-70 mb-8">{dialog.message}</p>
                 <button onClick={()=>setDialog(null)} className="w-full py-4 bg-black dark:bg-white text-white dark:text-black rounded-2xl font-bold">Okay</button>
              </div>
           </div>
        )}
      </div>
    </ErrorBoundary>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
