                   <div key={e.id} className="page-break-after" style={{ marginBottom: '60px', paddingTop: '20px' }}>
                       <div style={{ textAlign: 'center', marginBottom: '30px', paddingBottom: '20px', borderBottom: '1px solid rgba(0,0,0,0.1)' }}>
                           <h1 style={{ fontSize: '36px', fontWeight: 'bold', marginBottom: '10px', fontFamily: 'Inter, sans-serif' }}>{e.title || 'Ohne Titel'}</h1>
                           <p style={{ opacity: 0.6, fontWeight: 'bold', textTransform: 'uppercase', letterSpacing: '2px', fontSize: '12px' }}>
                               {safeParseDate(e.date || getLocalISO()).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })} • {e.category || 'Allgemein'}
                           </p>
                           <div style={{ display: 'flex', justifyContent: 'center', gap: '15px', flexWrap: 'wrap', marginTop: '15px', fontSize: '12px' }}>
                               {e.tags && <span style={{ color: '#3b82f6', fontWeight: 'bold' }}>Tags: {e.tags}</span>}
                               {e.people && <span style={{ color: '#6366f1', fontWeight: 'bold' }}>Personen: {e.people}</span>}
                               {e.locations && e.locations.map((loc, i) => (
                                   <span key={i} style={{ color: '#059669', fontWeight: 'bold' }}>Ort: {loc.name} • {loc.time} {loc.weather ? `• ${loc.weather}` : ''}</span>
                               ))}
                           </div>
                       </div>
                       {e.images && e.images.length > 0 && <img src={e.images[0]} style={{ width: '100%', maxHeight: '500px', objectFit: 'contain', marginBottom: '30px', borderRadius: '16px' }} alt="Cover" />}
                       <div className="text-[1.05rem] leading-[1.8] font-medium legacy-content text-slate-800 dark:text-slate-200" dangerouslySetInnerHTML={createSafeHtml(e.text)}></div>
                   </div>
               ))}
            </div>
          </div>
          );
        })()}

        {/* --- EDITOR MODAL --- */}
        <div className={`fixed inset-0 z-[200] flex-col overflow-hidden bg-white dark:bg-black ${showEditor ? 'flex' : 'hidden'}`}>
            
            <header className="flex-none flex justify-between items-center p-4 sm:p-6 shrink-0 z-50 pt-safe bg-white/95 dark:bg-black/95 border-b border-slate-100 dark:border-zinc-900">
                <button onClick={()=>checkSaveEntry(true)} className="p-3 bg-slate-100 dark:bg-zinc-900 rounded-2xl text-slate-900 dark:text-white hover:scale-105 active:scale-95 transition-transform"><Icon name="arrow-left" size={22}/></button>
                <div className="flex items-center gap-4">
                    <span className="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">{autoSaveStatus}</span>
                    <button onClick={()=>checkSaveEntry(false)} className="px-6 py-3 bg-accent text-white rounded-2xl font-bold text-sm shadow-xl shadow-accent/20 hover:scale-105 active:scale-95 transition-transform" style={{ backgroundColor: user.nameColor || '#000000', color: isDarkColor(user.nameColor || '#000000') ? '#ffffff' : '#000000' }}>Sichern</button>
                </div>
            </header>

            <div className="flex-none px-4 sm:px-8 pt-6 pb-2 shrink-0 bg-white dark:bg-black z-40 border-b-[3px] border-slate-200 dark:border-zinc-800 focus-within:border-accent transition-colors">
              <input type="text" placeholder="Titel der Vision..." value={title} onChange={e=>{setTitle(e.target.value); isDirtyRef.current=true;}} className="w-full bg-transparent text-3xl sm:text-4xl font-extrabold tracking-tighter outline-none pb-3 placeholder-slate-300 dark:placeholder-zinc-700 text-slate-900 dark:text-white" />
            </div>

            <div className="flex-none flex items-center gap-2 p-2 px-4 overflow-x-auto hide-scrollbar border-b border-slate-100 dark:border-zinc-900 bg-slate-50 dark:bg-zinc-950 shrink-0 shadow-sm z-40">
                <EdBtn cmd="formatBlock" arg="H1" txt="H1" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="formatBlock" arg="H2" txt="H2" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="formatBlock" arg="P" txt="T" isDirtyRef={isDirtyRef} />
                <div className="w-px bg-slate-200 dark:bg-zinc-800 h-6 mx-1 shrink-0"></div>
                <EdBtn cmd="bold" icon="bold" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="italic" icon="italic" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="formatBlock" arg="blockquote" icon="quote" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="insertOrderedList" icon="list-ordered" isDirtyRef={isDirtyRef} />
                <EdBtn cmd="insertUnorderedList" icon="list" isDirtyRef={isDirtyRef} />
                <div className="w-px bg-slate-200 dark:bg-zinc-800 h-6 mx-1 shrink-0"></div>
                <label className="p-2.5 bg-white dark:bg-zinc-900 rounded-xl text-slate-500 hover:text-accent transition-colors shadow-sm cursor-pointer flex items-center justify-center relative overflow-hidden shrink-0 border border-slate-100 dark:border-zinc-800" title="Cover Bild hochladen"><Icon name="image" size={18} /><input type="file" accept="image/*" multiple onChange={e=>handleFileUpload(e,'image')} className="absolute opacity-0 w-[200%] h-[200%] top-0 left-0 cursor-pointer" /></label>
                <button onClick={() => setIsDrawing(true)} className="p-2.5 bg-white dark:bg-zinc-900 rounded-xl text-slate-500 hover:text-accent transition-colors shadow-sm shrink-0 border border-slate-100 dark:border-zinc-800"><Icon name="pen-tool" size={18} /></button>
                <button onClick={isRecording ? stopRecording : startRecording} className={`p-2.5 rounded-xl transition-colors shadow-sm shrink-0 border border-slate-100 dark:border-zinc-800 ${isRecording ? 'bg-rose-500 text-white animate-pulse' : 'bg-white dark:bg-zinc-900 text-slate-500 hover:text-accent'}`}>{isRecording ? <Icon name="square" size={18}/> : <Icon name="mic" size={18}/>}</button>
                <div className="w-px bg-slate-200 dark:bg-zinc-800 h-6 mx-1 shrink-0"></div>
                <button onClick={()=>{setIsManifested(!isManifested); isDirtyRef.current=true;}} className={`p-2.5 rounded-xl transition-colors shadow-sm shrink-0 border ${isManifested ? 'bg-amber-50 dark:bg-amber-500/10 text-amber-500 border-amber-200 dark:border-amber-900/50' : 'bg-white dark:bg-zinc-900 text-slate-500 hover:text-amber-500 border-slate-100 dark:border-zinc-800'}`}><Icon name="sparkles" size={18}/></button>
                <div className="w-px bg-slate-200 dark:bg-zinc-800 h-6 mx-1 shrink-0"></div>
                {EDITOR_COLORS.map(c => <button key={c} onMouseDown={e=>{e.preventDefault(); document.execCommand('foreColor', false, c); isDirtyRef.current=true;}} className="w-8 h-8 rounded-full border-2 shadow-sm shrink-0 transition-transform hover:scale-110 active:scale-95" style={{backgroundColor: c, borderColor: isDarkColor(c) ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.1)'}}></button> )}
            </div>
            
            <div className="flex-auto overflow-y-auto relative bg-white dark:bg-black custom-scrollbar">
              <div className="p-4 md:p-8 max-w-3xl mx-auto w-full flex flex-col">
                  {selectedImages.length > 0 && (
                      <div className="mb-8 w-full flex flex-col items-center">
                          <div className="relative w-full h-48 sm:h-64 rounded-[2rem] overflow-hidden shadow-sm group border border-slate-200 dark:border-zinc-800 shrink-0 bg-slate-100 dark:bg-zinc-800 flex items-center justify-center">
                              <img src={selectedImages[0]} className="w-full h-full object-contain" />
                              <button onClick={()=>{setSelectedImages(prev=>prev.slice(1)); isDirtyRef.current=true;}} className="absolute top-4 right-4 p-3 bg-black/60 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-md"><Icon name="x" size={16}/></button>
                          </div>
                          {selectedImages.length > 1 && (
                              <div className="flex gap-3 mt-4 overflow-x-auto hide-scrollbar snap-x w-full max-w-full">
                                  {selectedImages.slice(1).map((img, i) => (
                                      <div key={i+1} className="relative w-24 h-24 rounded-2xl overflow-hidden shadow-sm shrink-0 snap-start group border border-slate-200 dark:border-zinc-800 bg-slate-100 dark:bg-zinc-800">
                                          <img src={img} className="w-full h-full object-contain" />
                                          <button onClick={()=>{setSelectedImages(prev=>prev.filter((_,idx)=>idx!==i+1)); isDirtyRef.current=true;}} className="absolute top-1 right-1 p-1 bg-black/60 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-md"><Icon name="x" size={10}/></button>
                                      </div>
                                  ))}
                              </div>
                          )}
                      </div>
                  )}

                  {pillarGuidance && (
                      <div className="p-4 rounded-3xl bg-amber-50 dark:bg-amber-500/10 border border-amber-100 dark:border-amber-900/30 text-amber-700 dark:text-amber-400 font-medium text-sm mb-6 flex gap-4 leading-relaxed">
                          <Icon name="book-open" size={24} className="shrink-0 mt-0.5 opacity-80" /> {pillarGuidance}
                      </div>
                  )}

                  {audioUrl && (
                      <div className="mb-6 p-4 rounded-2xl bg-slate-50 dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 relative w-full">
                         <span className="text-[10px] font-bold uppercase tracking-widest opacity-50 mb-3 block">Audio-Log</span>
                         <audio src={audioUrl} controls className="w-full" />
                         <button onClick={()=>{setAudioUrl(null); isDirtyRef.current=true;}} className="absolute top-4 right-4 p-2 bg-slate-200 dark:bg-zinc-800 rounded-full text-slate-500 hover:text-rose-500"><Icon name="x" size={14}/></button>
                      </div>
                  )}

                  <div 
                      key={editingId || 'new_entry'}
                      ref={editorRef} 
                      contentEditable 
                      onClick={handleEditorClick}
                      onPaste={handleEditorPaste}
                      onInput={handleEditorInput} 
                      className="outline-none text-[1.05rem] leading-[1.8] font-medium legacy-editor-content text-slate-800 dark:text-slate-200 pb-8 min-h-full w-full" 
                      data-placeholder="Was wirst du hinterlassen? Du kannst auch Sticker per Tastatur einfügen..." 
                      dangerouslySetInnerHTML={{__html: text}} 
                  />
              </div>
            </div>

            <div className="flex-none p-3 border-t border-slate-100 dark:border-zinc-900 bg-white/95 dark:bg-black/95 backdrop-blur-xl shrink-0 flex items-center gap-3 overflow-x-auto hide-scrollbar z-50 pb-safe shadow-[0_-4px_6px_rgba(0,0,0,0.02)]">
               <button onClick={()=>setPicker({title:'Kategorie', currentValue: category, options: CATEGORIES.map(c=>({label:c, value:c})), onSelect: (v)=>{setCategory(v); isDirtyRef.current=true;}})} className="h-10 px-4 rounded-xl bg-slate-50 dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 text-xs font-bold flex items-center gap-2 shrink-0">{category} <Icon name="chevron-down" size={12}/></button>
               <div className="h-10 flex items-center gap-1 bg-slate-50 dark:bg-zinc-900 px-3 rounded-xl border border-slate-200 dark:border-zinc-800 shrink-0">
                  {[1,2,3,4,5].map(star => <Icon key={star} name="star" size={14} className={`cursor-pointer transition-colors ${rating >= star ? 'text-amber-500 fill-amber-500' : 'text-slate-300 dark:text-zinc-700'}`} onClick={() => {setRating(rating === star ? 0 : star); isDirtyRef.current=true;}} />)}
               </div>
               <div className="h-10 flex items-center bg-slate-50 dark:bg-zinc-900 px-3 rounded-xl border border-slate-200 dark:border-zinc-800 shrink-0 min-w-[120px]">
                   <Icon name="tag" size={12} className="text-slate-400 mr-2 shrink-0" />
                   <input type="text" placeholder="Tags (Komma...)" value={tags} onChange={e=>{setTags(e.target.value); isDirtyRef.current=true;}} className="bg-transparent border-none outline-none text-xs font-bold placeholder:opacity-50 w-full text-slate-900 dark:text-white" />
               </div>
               <div className="h-10 flex items-center bg-slate-50 dark:bg-zinc-900 px-3 rounded-xl border border-slate-200 dark:border-zinc-800 shrink-0 min-w-[120px]">
                   <Icon name="user" size={12} className="text-slate-400 mr-2 shrink-0" />
                   <input type="text" placeholder="Personen..." value={people} onChange={e=>{setPeople(e.target.value); isDirtyRef.current=true;}} className="bg-transparent border-none outline-none text-xs font-bold placeholder:opacity-50 w-full text-slate-900 dark:text-white" />
               </div>
               <div className={`h-10 relative px-4 rounded-xl border text-xs font-bold flex items-center gap-2 shrink-0 cursor-pointer overflow-hidden ${unlockDate ? 'bg-indigo-50 dark:bg-indigo-500/10 border-indigo-200 dark:border-indigo-900/50 text-indigo-600 dark:text-indigo-400' : 'bg-slate-50 dark:bg-zinc-900 border-slate-200 dark:border-zinc-800 text-slate-900 dark:text-white'}`}>
                  <Icon name="calendar-clock" size={14}/> {unlockDate ? new Date(unlockDate).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' }) : 'Zeitsiegel'}
                  <input type="date" value={unlockDate} onChange={e=>{setUnlockDate(e.target.value); isDirtyRef.current=true;}} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10" />
               </div>
               {locations.map((loc, idx) => (
                   <div key={idx} className="h-10 px-4 rounded-xl border border-emerald-300 dark:border-emerald-700/50 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-400 text-xs font-bold flex items-center gap-2 shrink-0">
                       <Icon name="map-pin" size={14}/> {loc.name} • {loc.time} {loc.weather ? `• ${loc.weather}` : ''}
                       <button onClick={(e) => { e.stopPropagation(); setLocations(prev => prev.filter((_, i) => i !== idx)); isDirtyRef.current=true; }} className="ml-1 opacity-60 hover:opacity-100 hover:text-rose-500 transition-colors"><Icon name="x" size={14}/></button>
                   </div>
               ))}
               <button onClick={async ()=>{
                   if(!("geolocation" in navigator)){showDialog({title:'Fehler', message:'Ortung nicht unterstützt.'}); return;}
                   navigator.geolocation.getCurrentPosition(async (p) => { 
                       const lat = p.coords.latitude; const lng = p.coords.longitude; let locName = "GPS Standort"; let formattedTime = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + " Uhr"; let wStr = "";
                       try { const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`); const geoData = await geoRes.json(); if(geoData && geoData.address) { locName = geoData.address.city || geoData.address.town || geoData.address.village || geoData.address.road || "Unbekannter Ort"; } } catch(e) {}
                       try { const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`); const data = await res.json(); const temp = Math.round(data.current_weather.temperature); const wcode = data.current_weather.weathercode; wStr = `${temp}°C`; if (wcode === 0) wStr += ' ☀️'; else if (wcode <= 3) wStr += ' ⛅'; else if (wcode <= 48) wStr += ' ☁️'; else if (wcode <= 67) wStr += ' 🌧️'; else if (wcode <= 79) wStr += ' 🌨️'; else if (wcode <= 99) wStr += ' ⛈️'; } catch(e) {}
                       const newLoc = {lat, lng, name: locName, time: formattedTime, weather: wStr}; setLocations(prev => [...prev, newLoc]); isDirtyRef.current=true; 
                       showDialog({title:'GPS erfasst', message:`Ort (${locName}) und Wetter wurden um ${formattedTime} gesichert.`, icon:'map-pin'}); 
                   }, ()=>showDialog({title:'Fehler', message:'Ortung fehlgeschlagen.'}));
               }} className={`h-10 px-4 rounded-xl border text-xs font-bold flex items-center gap-2 shrink-0 bg-slate-50 dark:bg-zinc-900 border-slate-200 dark:border-zinc-800 text-slate-900 dark:text-white hover:bg-slate-100 dark:hover:bg-zinc-800 transition-colors`}><Icon name="plus" size={14}/> GPS hinzufügen</button>
            </div>
        </div>

        {isDrawing && (
          <div className="fixed inset-0 z-[300] bg-slate-900 flex flex-col no-print">
            <header className="flex justify-between items-center p-4 bg-slate-950 text-white pt-safe border-b border-white/10">
              <button onClick={() => setIsDrawing(false)} className="p-3 bg-white/10 rounded-2xl hover:bg-white/20 transition-colors"><Icon name="x"/></button>
              <span className="font-bold">Zeichnen</span>
              <button onClick={() => {
                  if(canvasRef.current) {
                      const base64 = canvasRef.current.toDataURL();
                      if (editorRef.current) {
                          editorRef.current.focus();
                          document.execCommand('insertHTML', false, `<span class="inline-img-wrapper" contenteditable="false"><img src="${base64}" /><span class="delete-img-btn">X</span></span>&nbsp;`);
                          isDirtyRef.current = true;
                          checkSaveEntry(false);
                      }
                      setIsDrawing(false);
                  }
              }} className="px-6 py-2 bg-accent text-black font-bold rounded-2xl">Fertig</button>
            </header>
            <div className="flex-1 bg-white relative touch-none">
              <canvas ref={canvasRef} className="absolute inset-0 w-full h-full cursor-crosshair touch-none" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
            </div>
            <div className="p-4 pb-safe bg-slate-950 flex justify-center border-t border-white/10">
              <button onClick={() => {
                  if(canvasRef.current){
                      const ctx = canvasRef.current.getContext('2d');
                      ctx.fillStyle = user.isDark ? '#18181b' : '#ffffff';
                      ctx.fillRect(0,0,canvasRef.current.width, canvasRef.current.height);
                  }
              }} className="p-4 bg-white/10 rounded-2xl text-white hover:bg-white/20"><Icon name="eraser"/></button>
            </div>
          </div>
        )}

        {picker && (
          <div className="fixed inset-0 z-[250] flex items-end sm:items-center justify-center p-4 bg-black/60 backdrop-blur-xl animate-fade-in no-print" onClick={() => setPicker(null)}>
            <div className="w-full max-w-sm rounded-[2.5rem] shadow-2xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 animate-slide-up flex flex-col overflow-hidden max-h-[70vh]" onClick={e => e.stopPropagation()}>
              <div className="p-6 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center">
                 <h3 className="font-extrabold text-xl tracking-tight">{picker.title}</h3>
                 <button onClick={()=>setPicker(null)} className="p-2 rounded-full bg-slate-100 dark:bg-zinc-800"><Icon name="x" size={20}/></button>
              </div>
              <div className="overflow-y-auto custom-scrollbar p-3 space-y-1">
                 {picker.options.map(opt => (
                    <button key={opt.value} onClick={()=>{picker.onSelect(opt.value); setPicker(null);}} className={`w-full text-left p-5 rounded-[1.5rem] font-bold text-sm flex justify-between items-center transition-all ${picker.currentValue===opt.value ? 'text-white dark:text-black shadow-md scale-[1.02]' : 'hover:bg-slate-50 dark:hover:bg-zinc-800'}`} style={picker.currentValue === opt.value ? { backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000') } : {}}>
                       {opt.label} {picker.currentValue===opt.value && <Icon name="check" size={18}/>}
                    </button>
                 ))}
              </div>
            </div>
          </div>
        )}

        {dialog && (
          <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/60 backdrop-blur-xl animate-fade-in no-print" onClick={() => setDialog(null)}>
            <div className="w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 animate-slide-up" onClick={e => e.stopPropagation()}>
              {dialog.icon && <div className={`w-20 h-20 bg-slate-50 dark:bg-zinc-950 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-sm border border-slate-100 dark:border-zinc-800 ${dialog.iconColor || 'text-slate-900 dark:text-white'}`}><Icon name={dialog.icon} size={32}/></div>}
              <h3 className="text-2xl font-extrabold tracking-tight mb-3">{dialog.title}</h3>
              <p className="text-sm font-medium opacity-70 mb-8 leading-relaxed px-2" dangerouslySetInnerHTML={{__html: dialog.message}}></p>
              <div className="flex flex-col gap-3 w-full">
                <button onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); setDialog(null); }} className="w-full py-4 rounded-2xl font-bold shadow-md active:scale-95 transition-transform" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}>{dialog.confirmLabel || 'Okay'}</button>
                {dialog.onCancel && <button onClick={() => { if(dialog.onCancel) dialog.onCancel(); setDialog(null); }} className="w-full py-4 rounded-2xl font-bold bg-slate-100 dark:bg-zinc-800 active:scale-95 transition-transform">Abbrechen</button>}
              </div>
            </div>
          </div>
        )}
      </div>
    </ErrorBoundary>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<script>
  if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(reg => console.log('SW Aktiv')).catch(err => console.warn('SW Registrierung übersprungen'));
    });
  }
</script>
</body>
</html>
