<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const safeStorageGet = (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } };
const safeStorageSet = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };

const createSafeHtml = (htmlStr) => {
  return { __html: window.DOMPurify ? window.DOMPurify.sanitize(htmlStr, { ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'u', 'br', 'div', 'span', 'blockquote', 'p', 'ul', 'ol', 'li', 'h1', 'h2', 'h3'], ALLOWED_ATTR: ['style', 'class', 'dir'] }) : htmlStr };
};

// --- Web Crypto API Helper (100% untouched) ---
const encHelper = new TextEncoder();
const decHelper = new TextDecoder();
const cryptoKeyCache = {}; 

const getCryptoKey = async (pin, saltStr) => {
    const cacheKey = pin + saltStr;
    if (cryptoKeyCache[cacheKey]) return cryptoKeyCache[cacheKey];
    const keyMaterial = await window.crypto.subtle.importKey("raw", encHelper.encode(pin), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]);
    const salt = Uint8Array.from(atob(saltStr), c => c.charCodeAt(0));
    const key = await window.crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
    );
    cryptoKeyCache[cacheKey] = key;
    return key;
};

const encryptData = async (text, pin) => {
    try {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const saltStr = btoa(String.fromCharCode(...salt));
        const ivStr = btoa(String.fromCharCode(...iv));
        const key = await getCryptoKey(pin, saltStr);
        const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encHelper.encode(text));
        return { cipher: btoa(String.fromCharCode(...new Uint8Array(encrypted))), iv: ivStr, salt: saltStr };
    } catch(e) { return null; }
};

const decryptData = async (encryptedObj, pin) => {
    if (!encryptedObj || !pin) return null;
    try {
        const key = await getCryptoKey(pin, encryptedObj.salt);
        const iv = Uint8Array.from(atob(encryptedObj.iv), c => c.charCodeAt(0));
        const cipher = Uint8Array.from(atob(encryptedObj.cipher), c => c.charCodeAt(0));
        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, cipher);
        return decHelper.decode(decrypted);
    } catch(e) { return null; }
};

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  render() {
    if (this.state.hasError) {
      return (
        <div className="min-h-screen flex items-center justify-center bg-black text-white p-8 text-center">
          <div>
            <h1 className="text-2xl font-bold mb-4">Ein Moment bitte...</h1>
            <p className="opacity-70 mb-8">Die App hat sich verschluckt. Bitte lade die Seite neu.</p>
            <button type="button" onClick={() => window.location.reload()} className="px-6 py-3 bg-white text-black font-bold rounded-full shadow-lg">Neu laden</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const Icon = ({ name, size = 24, className = '', ...props }) => {
  const spanRef = useRef(null);
  useEffect(() => {
    const renderIcon = () => {
      if (spanRef.current && window.lucide) {
        spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
        window.lucide.createIcons({ root: spanRef.current });
        const svg = spanRef.current.querySelector('svg');
        if (svg) { svg.setAttribute('width', size); svg.setAttribute('height', size); if (className) svg.setAttribute('class', `lucide lucide-${name} ${className}`); }
      }
    };
    if (window.lucide) renderIcon(); else setTimeout(renderIcon, 100);
  }, [name, size, className]);
  return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} {...props}></span>;
};

const COLORS = ['#ffffff', '#e4e4e7', '#a1a1aa', '#52525b', '#27272a', '#18181b', '#09090b', '#fbbf24', '#f59e0b', '#d97706', '#fb7185', '#f43f5e', '#e11d48', '#3b82f6', '#10b981'];
const isDarkColor = (color) => {
  if (!color) return true;
  const hex = color.replace('#', '');
  if (hex.length === 6) {
    const r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
    return ((r * 299 + g * 587 + b * 114) / 1000) < 128;
  }
  return true; 
};

const CATEGORIES = ['Tagebuch', 'Ideen', 'Gesundheit', 'Vision', 'Ziele'];
const MOODS = [
  { id: 'smile', label: 'Strahlend', color: 'text-amber-500', iconName: 'smile' },
  { id: 'coffee', label: 'Fokussiert', color: 'text-blue-500', iconName: 'coffee' },
  { id: 'cloud-lightning', label: 'Stürmisch', color: 'text-rose-500', iconName: 'cloud-lightning' },
  { id: 'frown', label: 'Nachdenklich', color: 'text-slate-500', iconName: 'frown' }
];

const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

const initDB = () => {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('LegacyVisionDB', 4);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('entries')) db.createObjectStore('entries', { keyPath: 'id' });
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
};

function App() {
  const [db, setDb] = useState(null);
  const [fb, setFb] = useState(null);
  const [authUser, setAuthUser] = useState(null);
  
  const [entries, setEntries] = useState([]);
  const [user, setUser] = useState({ name: '', appName: '', motto: '', pin: '', avatar: null, nameColor: '#f59e0b', isDark: true, appBgColor: null, cloudSync: false });
  const [view, setView] = useState('loading'); 
  const [isLoaded, setIsLoaded] = useState(false);
  
  // Modern Auth State
  const [authEmail, setAuthEmail] = useState('');
  const [authPassword, setAuthPassword] = useState('');
  const [authError, setAuthError] = useState('');
  const [authMsg, setAuthMsg] = useState('');
  const [authMode, setAuthMode] = useState('login'); // login, register, reset

  // General State
  const [searchQuery, setSearchQuery] = useState('');
  const [activeCategory, setActiveCategory] = useState('Alle');
  const [isSearchOpen, setIsSearchOpen] = useState(false);
  const [dialog, setDialog] = useState(null);

  const [viewingEntry, setViewingEntry] = useState(null);
  const [showEditor, setShowEditor] = useState(false);
  
  const [unlockTarget, setUnlockTarget] = useState(null);
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState(false);

  // Editor State
  const [editingId, setEditingId] = useState(null);
  const [title, setTitle] = useState('');
  const [text, setText] = useState(''); 
  const [selectedColor, setSelectedColor] = useState(COLORS[8]);
  const [selectedImages, setSelectedImages] = useState([]); 
  const [isLocked, setIsLocked] = useState(false);
  const [isManifested, setIsManifested] = useState(false);
  const [category, setCategory] = useState(CATEGORIES[0]);
  const [mood, setMood] = useState(null);
  const [zenMode, setZenMode] = useState(false);

  const editorRef = useRef(null);
  const isDirtyRef = useRef(false);

  // Initialize Firebase & Auth
  useEffect(() => {
    const initFB = async () => {
       try {
          const firebaseConfig = {
            apiKey: "AIzaSyBs7DoO5z8cuIc3DtdArgorKRx_FX7JX-U",
            authDomain: "tagebuch-og.firebaseapp.com",
            projectId: "tagebuch-og",
            storageBucket: "tagebuch-og.firebasestorage.app",
            messagingSenderId: "418864246292",
            appId: "1:418864246292:web:957b604fe7ce4380c24101"
          };
          
          const nativeImport = new Function('url', 'return import(url)');
          const { initializeApp } = await nativeImport('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
          const { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendEmailVerification, sendPasswordResetEmail } = await nativeImport('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
          const { getFirestore, collection, doc, setDoc, deleteDoc } = await nativeImport('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
          
          const app = initializeApp(firebaseConfig);
          const auth = getAuth(app);
          const firestoreDb = getFirestore(app);
          
          setFb({ db: firestoreDb, auth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendEmailVerification, sendPasswordResetEmail, collection, doc, setDoc, deleteDoc });

          onAuthStateChanged(auth, (u) => {
             if (u) {
                 if (u.emailVerified) {
                     setAuthUser(u);
                     const savedStr = localStorage.getItem('legacy_user');
                     if (savedStr) {
                         const parsed = JSON.parse(savedStr);
                         if (parsed.pin) {
                             setUser(parsed);
                             setView(parsed.name ? 'dashboard' : 'onboarding');
                         } else {
                             setView('pin_entry');
                         }
                     } else {
                         setView('pin_entry');
                     }
                 } else {
                     signOut(auth);
                     setAuthUser(null);
                     setView('auth');
                 }
             } else {
                 setAuthUser(null);
                 setView('auth');
             }
          });
       } catch(e) { console.error("Firebase Init Error", e); }
    };
    initFB();
  }, []);

  // Initialize DB
  useEffect(() => {
    const loadApp = async () => {
      try {
        const database = await initDB();
        setDb(database);
        const transaction = database.transaction('entries', 'readonly');
        const request = transaction.objectStore('entries').getAll();

        request.onsuccess = async () => {
          let loadedEntries = request.result || [];
          
          const savedUser = safeStorageGet('legacy_user');
          let currentUser = user;
          if (savedUser) {
             currentUser = { ...user, ...JSON.parse(savedUser) };
             setUser(currentUser);
          }

          if (currentUser.pin) {
            loadedEntries = await Promise.all(loadedEntries.map(async (e) => {
              if (e.locked && e.encryptedData) {
                const decStr = await decryptData(e.encryptedData, currentUser.pin);
                if (decStr) {
                  try {
                    const parsed = JSON.parse(decStr);
                    return { ...e, text: parsed.text, title: parsed.title };
                  } catch(err){}
                }
              }
              return e;
            }));
          }
          
          setEntries(loadedEntries.sort((a,b) => new Date(b.orderTimestamp || b.date) - new Date(a.orderTimestamp || a.date)));
          setIsLoaded(true);
        };
      } catch (e) {
        setIsLoaded(true);
      }
    };
    loadApp();
  }, []);

  // Auth Handlers (Double Opt-In & Reset)
  const handleAuth = async () => {
      setAuthError(''); setAuthMsg('');
      if (!fb || !authEmail) { setAuthError('Bitte fülle alle Felder aus.'); return; }
      
      try {
          if (authMode === 'login') {
              if (!authPassword) { setAuthError('Passwort fehlt.'); return; }
              const cred = await fb.signInWithEmailAndPassword(fb.auth, authEmail, authPassword);
              if (!cred.user.emailVerified) {
                  setAuthError('Bitte bestätige zuerst deine E-Mail-Adresse (Double Opt-In).');
                  await fb.signOut(fb.auth);
              }
          } else if (authMode === 'register') {
              if (!authPassword) { setAuthError('Passwort fehlt.'); return; }
              const cred = await fb.createUserWithEmailAndPassword(fb.auth, authEmail, authPassword);
              await fb.sendEmailVerification(cred.user);
              setAuthMsg('Erfolg! Bitte prüfe deine E-Mails und klicke auf den Bestätigungslink.');
              await fb.signOut(fb.auth); // Logout until verified
              setAuthMode('login');
          } else if (authMode === 'reset') {
              await fb.sendPasswordResetEmail(fb.auth, authEmail);
              setAuthMsg('Link zum Zurücksetzen des Passworts wurde gesendet.');
              setAuthMode('login');
          }
      } catch (e) {
          let errorMsg = 'Ein Fehler ist aufgetreten.';
          if (e.code === 'auth/email-already-in-use') errorMsg = 'Diese E-Mail wird bereits verwendet.';
          else if (e.code === 'auth/invalid-email') errorMsg = 'Die E-Mail-Adresse ist ungültig.';
          else if (e.code === 'auth/weak-password') errorMsg = 'Passwort zu schwach (min. 6 Zeichen).';
          else if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') errorMsg = 'E-Mail oder Passwort falsch.';
          setAuthError(errorMsg);
      }
  };

  const handleLogout = async () => {
      if(fb) {
          await fb.signOut(fb.auth);
          setUser({ name: '', appName: '', motto: '', pin: '', avatar: null, nameColor: '#f59e0b', isDark: true, appBgColor: null, cloudSync: false });
          localStorage.removeItem('legacy_user');
          setEntries([]);
          setView('auth');
      }
  };

  // App Theme Sync
  useEffect(() => {
    const metaThemeColor = document.getElementById("meta-theme-color");
    if (user.isDark) {
      document.documentElement.classList.add('dark');
      if (metaThemeColor) metaThemeColor.setAttribute("content", "#000000");
    } else {
      document.documentElement.classList.remove('dark');
      if (metaThemeColor) metaThemeColor.setAttribute("content", "#f8fafc");
    }
  }, [user.isDark]);

  const saveToDB = async (entry, forcePin = null) => {
    const activePin = forcePin || user.pin;
    let dbEntry = { ...entry };
    try {
        if (dbEntry.locked && activePin) {
            const payload = JSON.stringify({ text: dbEntry.text || '', title: dbEntry.title || '' });
            dbEntry.encryptedData = await encryptData(payload, activePin);
            dbEntry.text = ''; 
            dbEntry.title = 'Verschlüsselter Eintrag';
        } else if (!dbEntry.locked) {
            dbEntry.encryptedData = null; 
        }
    } catch(e) {}

    try {
      if (db) {
        const tx = db.transaction('entries', 'readwrite');
        tx.objectStore('entries').put(dbEntry); 
        tx.oncomplete = () => {
          setEntries(prev => {
            const exists = prev.find(e => e.id === entry.id);
            if (exists) return prev.map(e => e.id === entry.id ? entry : e).sort((a,b) => new Date(b.orderTimestamp || b.date) - new Date(a.orderTimestamp || a.date));
            return [entry, ...prev].sort((a,b) => new Date(b.orderTimestamp || b.date) - new Date(a.orderTimestamp || a.date));
          });
        };
      }
    } catch (e) {}
  };

  const deleteFromDB = async (id) => {
    if (!db) return;
    const tx = db.transaction('entries', 'readwrite');
    tx.objectStore('entries').delete(id);
    tx.oncomplete = () => { setEntries(prev => prev.filter(e => e.id !== id)); };
  };

  const checkSaveEntry = (closeAndRead = false) => {
    try {
        const entryId = editingId || generateId();
        const currentText = editorRef.current ? editorRef.current.innerHTML : (text || '');
        const titleSafe = title || '';
        
        const isEmpty = !titleSafe.trim() && !currentText.replace(/<[^>]*>?/gm, '').trim() && (!selectedImages || selectedImages.length === 0);
        
        if (isEmpty && closeAndRead) {
          closeEditor(entries.find(e => e.id === editingId) || null);
          return;
        }

        const newEntry = {
          id: entryId, title: titleSafe || 'Ohne Titel', text: currentText, color: selectedColor, images: selectedImages,
          locked: isLocked, archived: false, manifested: isManifested, category, mood,
          date: editingId ? (entries.find(e => e.id === editingId)?.date || new Date().toISOString()) : new Date().toISOString(),
          orderTimestamp: editingId ? (entries.find(e => e.id === editingId)?.orderTimestamp || new Date().toISOString()) : new Date().toISOString(),
        };
        
        saveToDB(newEntry);
        if (closeAndRead) closeEditor(newEntry); 
        else { setEditingId(entryId); isDirtyRef.current = false; }
    } catch (err) { if (closeAndRead) closeEditor(entries.find(e => e.id === editingId) || null); }
  };

  const closeEditor = (savedEntry = null) => {
    setShowEditor(false);
    setViewingEntry(savedEntry);
  };

  const openEditor = (entry = null) => {
    isDirtyRef.current = false;
    if (entry && entry.id) {
      setEditingId(entry.id); setTitle(entry.title || ''); setText(entry.text || ''); 
      setSelectedColor(entry.color); setSelectedImages(entry.images || []);
      setIsLocked(entry.locked || false); setIsManifested(entry.manifested || false);
      setCategory(entry.category || CATEGORIES[0]); setMood(entry.mood || null);
    } else {
      setEditingId(null); setTitle(''); setText('');
      setSelectedColor(user.isDark ? COLORS[8] : COLORS[0]); setSelectedImages([]); 
      setIsLocked(view === 'vault'); setIsManifested(false);
      setCategory(activeCategory === 'Alle' ? CATEGORIES[0] : activeCategory); setMood(null);
    }
    setZenMode(false); setShowEditor(true);
  };

  const showDialog = (options) => { setDialog({ type: 'alert', confirmLabel: 'Okay', ...options }); };

  const triggerUnlock = (entry) => {
    if (!user.pin) { showDialog({ title: 'PIN fehlt', message: 'Bitte richte zuerst eine PIN in den Einstellungen ein.', icon: 'key' }); setView('settings'); return; }
    setUnlockTarget(entry); setPinInput(''); setPinError(false);
  };

  const submitPin = () => {
    if (pinInput === user.pin) { setViewingEntry(unlockTarget); setUnlockTarget(null); setPinInput(''); }
    else { setPinError(true); setTimeout(() => setPinError(false), 800); setPinInput(''); }
  };

  const visibleEntries = useMemo(() => {
    return entries.filter(e => {
      const q = searchQuery.toLowerCase();
      const matchesSearch = e.title.toLowerCase().includes(q) || (e.text && e.text.toLowerCase().includes(q));
      if (searchQuery && !matchesSearch) return false;
      const matchesCategory = activeCategory === 'Alle' || e.category === activeCategory;
      if (!searchQuery && !matchesCategory) return false;
      
      if (view === 'dashboard') return !e.locked && !e.archived;
      if (view === 'vault') return e.locked && !e.archived;
      if (view === 'archive') return e.archived;
      return false;
    });
  }, [entries, searchQuery, activeCategory, view]);

  // Handle Input in Editor
  useEffect(() => {
    if (showEditor && editorRef.current && editorRef.current.innerHTML !== text) {
        editorRef.current.innerHTML = text || '';
    }
  }, [showEditor, editingId]); 

  // --- UI RENDERERS ---

  if (view === 'loading' || !isLoaded) return <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-black"><div className="w-12 h-12 border-4 border-slate-300 dark:border-zinc-800 border-t-black dark:border-t-white rounded-full animate-spin"></div></div>;

  if (view === 'auth') {
    return (
      <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 dark:bg-black text-slate-900 dark:text-white selection:bg-slate-200 dark:selection:bg-zinc-800">
        <div className="max-w-sm w-full space-y-10 animate-slide-up z-10">
          <div className="text-center space-y-3">
            <div className="w-16 h-16 bg-black dark:bg-white rounded-2xl mx-auto flex items-center justify-center shadow-lg">
                <Icon name="book-open" size={32} className="text-white dark:text-black" />
            </div>
            <h1 className="text-3xl font-extrabold tracking-tight">Legacy</h1>
            <p className="text-sm opacity-60 font-medium">Dein Leben. Dein Vermächtnis.</p>
          </div>

          <div className="space-y-4">
            {authError && <div className="p-4 bg-rose-50 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400 rounded-2xl text-sm font-semibold text-center border border-rose-100 dark:border-rose-500/20">{authError}</div>}
            {authMsg && <div className="p-4 bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 rounded-2xl text-sm font-semibold text-center border border-emerald-100 dark:border-emerald-500/20">{authMsg}</div>}
            
            <input type="email" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} className="w-full p-4 rounded-2xl outline-none text-base font-medium bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 focus:border-slate-400 dark:focus:border-zinc-600 transition-colors placeholder:opacity-40" placeholder="E-Mail Adresse" />
            
            {authMode !== 'reset' && (
                <input type="password" value={authPassword} onChange={e=>setAuthPassword(e.target.value)} className="w-full p-4 rounded-2xl outline-none text-base font-medium bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 focus:border-slate-400 dark:focus:border-zinc-600 transition-colors placeholder:opacity-40" placeholder="Passwort" />
            )}

            <button onClick={handleAuth} className="w-full py-4 rounded-2xl font-bold text-base bg-black dark:bg-white text-white dark:text-black hover:scale-[1.02] active:scale-95 transition-all shadow-md mt-2">
              {authMode === 'login' ? 'Einloggen' : authMode === 'register' ? 'Account erstellen' : 'Link anfordern'}
            </button>

            <div className="flex flex-col gap-2 pt-4">
                {authMode === 'login' ? (
                    <>
                        <button onClick={() => { setAuthMode('register'); setAuthError(''); setAuthMsg(''); }} className="text-sm font-semibold text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors">Neuen Account erstellen</button>
                        <button onClick={() => { setAuthMode('reset'); setAuthError(''); setAuthMsg(''); }} className="text-xs font-medium text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">Passwort vergessen?</button>
                    </>
                ) : (
                    <button onClick={() => { setAuthMode('login'); setAuthError(''); setAuthMsg(''); }} className="text-sm font-semibold text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors">Zurück zum Login</button>
                )}
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (view === 'pin_entry') {
    return (
      <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 dark:bg-black text-slate-900 dark:text-white">
        <div className="max-w-sm w-full space-y-8 animate-slide-up text-center">
          <Icon name="lock" size={48} className="mx-auto mb-2 opacity-80" />
          <h1 className="text-2xl font-bold tracking-tight">Tresor entsperren</h1>
          <p className="opacity-60 text-sm font-medium px-4">Gib deine PIN ein, um dein lokales Journal zu entschlüsseln.</p>
          <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-zinc-800">
             <input type="password" inputMode="numeric" pattern="[0-9]*" autoFocus value={newPinInput} onChange={(e) => setNewPinInput(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') { const newUserObj = {...user, pin: newPinInput}; setUser(newUserObj); safeStorageSet('legacy_user', JSON.stringify(newUserObj)); setView(newUserObj.name ? 'dashboard' : 'onboarding'); } }}
                    className="w-full p-4 text-center text-3xl tracking-[1em] rounded-2xl outline-none mb-6 bg-slate-100 dark:bg-zinc-800 border-none focus:ring-2 focus:ring-slate-300 dark:focus:ring-zinc-600 transition-all placeholder:opacity-30" placeholder="••••" />
             <button onClick={() => { const newUserObj = {...user, pin: newPinInput}; setUser(newUserObj); safeStorageSet('legacy_user', JSON.stringify(newUserObj)); setView(newUserObj.name ? 'dashboard' : 'onboarding'); }} className="w-full py-4 font-bold rounded-2xl bg-black dark:bg-white text-white dark:text-black hover:scale-[1.02] active:scale-95 transition-all shadow-md">Entsperren</button>
             <button onClick={handleLogout} className="mt-6 w-full py-2 text-xs font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition-opacity">Abmelden</button>
          </div>
        </div>
      </div>
    );
  }

  if (view === 'onboarding') {
    return (
      <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 dark:bg-black text-slate-900 dark:text-white">
        <div className="max-w-sm w-full space-y-8 animate-slide-up text-center">
          <Icon name="sparkles" size={48} className="mx-auto mb-2 opacity-80" />
          <h1 className="text-3xl font-extrabold tracking-tight">Willkommen</h1>
          <p className="opacity-60 font-medium">Wie möchtest du in deinem Journal genannt werden?</p>
          <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-zinc-800">
            <input type="text" value={user.name} onChange={(e) => setUser({...user, name: e.target.value})} className="w-full p-4 rounded-2xl outline-none text-lg font-bold text-center bg-slate-100 dark:bg-zinc-800 border-none focus:ring-2 focus:ring-slate-300 dark:focus:ring-zinc-600 transition-all mb-6 placeholder:opacity-30" placeholder="Dein Name" />
            <button type="button" onClick={() => { if(user.name.trim()) { safeStorageSet('legacy_user', JSON.stringify(user)); setView('dashboard'); } }} className="w-full py-4 rounded-2xl font-bold text-base bg-black dark:bg-white text-white dark:text-black hover:scale-[1.02] active:scale-95 transition-all shadow-md">Journal beginnen</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <ErrorBoundary>
      <div className="min-h-screen pb-safe">

        {/* --- MAIN HEADER --- */}
        <header className="sticky top-0 z-30 bg-white/80 dark:bg-black/80 backdrop-blur-xl border-b border-slate-200 dark:border-zinc-800 px-6 py-4 flex justify-between items-center transition-colors duration-300 no-print">
          <div className="flex items-center gap-3 overflow-hidden">
            {view === 'settings' ? <h1 className="text-xl font-bold tracking-tight">Einstellungen</h1> :
             view === 'archive' ? <h1 className="text-xl font-bold tracking-tight">Archiv</h1> :
             view === 'vault' ? <h1 className="text-xl font-bold tracking-tight flex items-center gap-2"><Icon name="lock" size={20}/> Tresor</h1> :
            (
              <>
                <div className="w-10 h-10 rounded-full bg-slate-200 dark:bg-zinc-800 flex items-center justify-center shrink-0 shadow-sm overflow-hidden">
                  {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover"/> : <Icon name="user" size={20} className="opacity-50"/>}
                </div>
                <div className="flex flex-col">
                  <h1 className="text-lg font-bold tracking-tight leading-tight">{user.name}</h1>
                  {user.motto && <p className="text-[10px] font-medium opacity-60 truncate max-w-[150px]">{user.motto}</p>}
                </div>
              </>
            )}
          </div>
          <div className="flex gap-2 items-center">
            {view === 'dashboard' && (
              <>
                <button type="button" onClick={() => setIsSearchOpen(!isSearchOpen)} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="search" size={18}/></button>
                <button type="button" onClick={() => setView('settings')} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="settings" size={18}/></button>
              </>
            )}
            {view !== 'dashboard' && <button type="button" onClick={() => setView('dashboard')} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="x" size={18} /></button>}
          </div>

          {/* Search Dropdown */}
          {isSearchOpen && view === 'dashboard' && (
            <div className="absolute top-full left-0 right-0 p-4 bg-white/90 dark:bg-black/90 backdrop-blur-2xl border-b border-slate-200 dark:border-zinc-800 shadow-xl animate-slide-up z-50">
              <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Suchen..." autoFocus className="w-full p-4 rounded-2xl bg-slate-100 dark:bg-zinc-900 border-none outline-none font-medium focus:ring-2 focus:ring-slate-300 dark:focus:ring-zinc-700 transition-shadow" />
            </div>
          )}
        </header>

        {/* --- MAIN FEED --- */}
        <main className="p-4 sm:p-6 max-w-2xl mx-auto min-h-[70vh] floating-nav-spacing relative z-10 no-print">
          
          {view === 'dashboard' && !searchQuery && (
            <div className="flex overflow-x-auto gap-2 pb-2 mb-6 custom-scrollbar hide-scrollbar">
              {['Alle', ...CATEGORIES].map(cat => (
                <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold transition-all ${activeCategory === cat ? 'bg-black dark:bg-white text-white dark:text-black shadow-md' : 'bg-slate-100 dark:bg-zinc-900 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-zinc-800'}`}>
                  {cat}
                </button>
              ))}
            </div>
          )}

          {visibleEntries.length === 0 && !searchQuery && (
            <div className="flex flex-col items-center justify-center py-32 text-center opacity-40 animate-fade-in">
              <Icon name={view === 'vault' ? "lock" : "book-open"} size={48} className="mb-4"/>
              <p className="text-lg font-bold">{view === 'vault' ? 'Tresor leer.' : view === 'archive' ? 'Archiv leer.' : 'Noch keine Einträge.'}</p>
            </div>
          )}

          <div className="flex flex-col gap-6">
            {renderEntries.map(entry => {
              const hasImages = entry.images && entry.images.length > 0;
              const isDarkTheme = user.isDark;
              const cardBgClass = isDarkTheme ? 'bg-zinc-900 border-zinc-800' : 'bg-white border-slate-100 shadow-sm';

              return (
                <div key={entry.id} onClick={() => entry.locked ? triggerUnlock(entry) : setViewingEntry(entry)} className={`group relative rounded-3xl overflow-hidden cursor-pointer border transition-all duration-300 active:scale-[0.98] ${cardBgClass}`}>
                  
                  {entry.manifested && (
                    <div className="absolute top-4 right-4 z-20 bg-amber-400 text-amber-950 text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1">
                      <Icon name="sparkles" size={12}/> Highlight
                    </div>
                  )}

                  {hasImages && (
                    <div className="w-full aspect-video relative overflow-hidden bg-slate-100 dark:bg-zinc-800">
                      <img src={entry.images[0]} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="Cover" />
                      <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent pointer-events-none" />
                    </div>
                  )}

                  <div className="p-6 relative z-10">
                    <div className="flex items-center gap-2 mb-3 text-[10px] font-bold uppercase tracking-widest opacity-50">
                      <span>{new Date(entry.date).toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' })}</span>
                      <span>•</span>
                      <span>{entry.category}</span>
                      {entry.locked && <><span className="text-rose-500 flex items-center gap-1 ml-auto"><Icon name="lock" size={12}/> Tresor</span></>}
                    </div>

                    <h3 className={`font-extrabold text-2xl leading-tight tracking-tight mb-2 line-clamp-2 ${hasImages && entry.locked ? 'text-slate-900 dark:text-white' : ''}`} dangerouslySetInnerHTML={highlightText(entry.title, searchQuery)} />
                    
                    {!entry.locked && entry.text && (
                      <div className="text-sm font-medium leading-relaxed opacity-70 line-clamp-3 mb-4" dangerouslySetInnerHTML={highlightText(entry.text, searchQuery)} />
                    )}

                    {entry.locked && (
                       <div className="text-sm font-medium leading-relaxed opacity-40 italic mb-4">Inhalt durch Tresor-PIN geschützt.</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </main>

        {/* --- FLOATING BOTTOM NAV --- */}
        {!showEditor && !viewingEntry && (
          <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs backdrop-blur-2xl bg-white/80 dark:bg-zinc-900/80 border border-slate-200/50 dark:border-zinc-700/50 rounded-[2rem] shadow-2xl flex justify-between items-center px-2 py-2 z-40 transition-all duration-500 no-print">
            <button onClick={() => setView('dashboard')} className={`flex-1 flex flex-col items-center justify-center py-2 transition-all rounded-2xl ${view === 'dashboard' ? 'text-black dark:text-white bg-slate-100 dark:bg-zinc-800' : 'text-slate-400 hover:text-slate-900 dark:hover:text-white'}`}>
              <Icon name="layout-grid" size={22} />
            </button>
            <button onClick={() => openEditor()} className="flex-none mx-2 w-14 h-14 rounded-full bg-black dark:bg-white text-white dark:text-black shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-transform shrink-0">
              <Icon name="plus" size={28} />
            </button>
            <button onClick={() => setView('vault')} className={`flex-1 flex flex-col items-center justify-center py-2 transition-all rounded-2xl ${view === 'vault' ? 'text-rose-500 bg-rose-50 dark:bg-rose-500/10' : 'text-slate-400 hover:text-rose-500'}`}>
              <Icon name="lock" size={22} />
            </button>
          </nav>
        )}

        {/* --- VIEWER --- */}
        {viewingEntry && !showEditor && (
           <div className="fixed inset-0 z-50 overflow-y-auto bg-white dark:bg-black animate-fade-in custom-scrollbar flex flex-col">
             <div className="sticky top-0 z-50 flex justify-between items-center py-4 px-6 bg-white/90 dark:bg-black/90 backdrop-blur-md border-b border-slate-100 dark:border-zinc-900 shrink-0">
               <button onClick={() => setViewingEntry(null)} className="p-3 rounded-full bg-slate-100 dark:bg-zinc-900 hover:scale-105 transition-transform"><Icon name="arrow-left" size={20}/></button>
               <button onClick={() => { const e = viewingEntry; setViewingEntry(null); openEditor(e); }} className="px-5 py-2.5 rounded-full font-bold text-sm bg-slate-100 dark:bg-zinc-900 hover:scale-105 transition-transform">Bearbeiten</button>
             </div>
             <div className="max-w-2xl w-full mx-auto p-6 sm:p-12 pb-32">
                {viewingEntry.images && viewingEntry.images.length > 0 && (
                  <img src={viewingEntry.images[0]} className="w-full rounded-3xl mb-8 object-cover shadow-sm border border-slate-100 dark:border-zinc-800" alt="Cover" />
                )}
                <h1 className="text-4xl sm:text-5xl font-extrabold mb-6 tracking-tight leading-tight">{viewingEntry.title}</h1>
                <div className="flex gap-4 mb-10 text-xs font-bold uppercase tracking-widest opacity-50">
                  <span>{new Date(viewingEntry.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })}</span>
                  <span>•</span><span>{viewingEntry.category}</span>
                </div>
                <div className="text-lg leading-relaxed font-medium opacity-90 legacy-content" dangerouslySetInnerHTML={createSafeHtml(viewingEntry.text)} />
             </div>
           </div>
        )}

        {/* --- EDITOR --- */}
        {showEditor && (
          <div className="fixed inset-0 z-50 flex flex-col bg-white dark:bg-black animate-fade-in sm:p-6">
            <div className="relative w-full h-full max-w-3xl mx-auto flex flex-col bg-white dark:bg-zinc-950 sm:rounded-[2.5rem] sm:border border-slate-200 dark:border-zinc-800 overflow-hidden shadow-2xl">
              
              <div className="flex justify-between items-center px-4 py-3 sm:px-6 sm:py-4 border-b border-slate-100 dark:border-zinc-900 shrink-0 bg-white/90 dark:bg-zinc-950/90 backdrop-blur-md z-20">
                <button onClick={() => checkSaveEntry(true)} className="p-3 rounded-full hover:bg-slate-100 dark:hover:bg-zinc-800 transition-colors"><Icon name="arrow-left" size={24}/></button>
                <div className="flex gap-2">
                   <button onClick={() => { setIsLocked(!isLocked); isDirtyRef.current = true; }} className={`p-3 rounded-full transition-colors ${isLocked ? 'bg-rose-500/20 text-rose-500' : 'hover:bg-slate-100 dark:hover:bg-zinc-800 opacity-60 hover:opacity-100'}`}><Icon name="lock" size={20}/></button>
                   <button onClick={() => { setIsManifested(!isManifested); isDirtyRef.current = true; }} className={`p-3 rounded-full transition-colors ${isManifested ? 'bg-amber-400/20 text-amber-500' : 'hover:bg-slate-100 dark:hover:bg-zinc-800 opacity-60 hover:opacity-100'}`}><Icon name="sparkles" size={20}/></button>
                   <button onClick={() => checkSaveEntry(false)} className="px-6 py-2.5 rounded-full font-bold shadow-sm bg-black dark:bg-white text-white dark:text-black hover:scale-105 transition-transform text-sm">Sichern</button>
                </div>
              </div>

              <div className="flex flex-col shrink-0 px-6 sm:px-10 pt-6 pb-2 z-10">
                 <input type="text" placeholder="Ein brillianter Gedanke..." value={title} onChange={(e) => { setTitle(e.target.value); isDirtyRef.current = true; }} className="w-full bg-transparent text-3xl sm:text-4xl font-extrabold tracking-tight outline-none placeholder:opacity-30 mb-2" />
              </div>

              <div className="flex-1 overflow-y-auto px-6 sm:px-10 pb-32 overscroll-contain">
                {selectedImages.length > 0 && (
                   <div className="grid grid-cols-2 gap-3 mb-6">
                      {selectedImages.map((imgSrc, i) => (
                         <div key={i} className="relative w-full aspect-square rounded-3xl overflow-hidden border border-slate-100 dark:border-zinc-800">
                            <img src={imgSrc} className="w-full h-full object-cover"/>
                            <button onClick={() => setSelectedImages(prev => prev.filter((_,idx) => idx !== i))} className="absolute top-2 right-2 bg-black/60 p-2 rounded-full text-white backdrop-blur-md"><Icon name="x" size={14}/></button>
                         </div>
                      ))}
                   </div>
                )}
                <div ref={editorRef} contentEditable suppressContentEditableWarning data-placeholder="Lass es fließen..." onInput={(e) => { setText(e.currentTarget.innerHTML); isDirtyRef.current = true; }} className="w-full min-h-[50vh] bg-transparent text-lg leading-relaxed font-medium outline-none empty:before:content-[attr(data-placeholder)] legacy-editor-content opacity-90" />
              </div>

              <div className="absolute bottom-0 left-0 right-0 bg-slate-50 dark:bg-zinc-900 border-t border-slate-200 dark:border-zinc-800 p-4 flex justify-between items-center pb-[env(safe-area-inset-bottom,16px)]">
                 <div className="flex gap-2">
                    <label className="p-3.5 rounded-full bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 shadow-sm cursor-pointer hover:scale-105 transition-transform"><Icon name="image" size={20}/><input type="file" accept="image/*" multiple onChange={(e) => {
                       const files = Array.from(e.target.files);
                       files.forEach(file => {
                           const reader = new FileReader();
                           reader.onload = (evt) => { setSelectedImages(p => [...p, evt.target.result]); isDirtyRef.current = true; };
                           reader.readAsDataURL(file);
                       });
                    }} className="hidden" /></label>
                 </div>
              </div>
            </div>
          </div>
        )}

        {/* --- DIALOGS & PIN UNLOCK --- */}
        {dialog && (
          <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/40 backdrop-blur-xl animate-fade-in" onClick={() => setDialog(null)}>
            <div className="w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 animate-slide-up" onClick={e => e.stopPropagation()}>
              <h3 className="text-xl font-bold mb-3">{dialog.title}</h3>
              <p className="text-sm font-medium opacity-70 mb-6">{dialog.message}</p>
              <button onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); setDialog(null); }} className="w-full py-4 rounded-xl font-bold text-white bg-black dark:bg-white dark:text-black">{dialog.confirmLabel || 'Okay'}</button>
            </div>
          </div>
        )}

        {unlockTarget && (
          <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/60 backdrop-blur-xl animate-fade-in" onClick={() => setUnlockTarget(null)}>
            <div className="w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 animate-slide-up" onClick={e => e.stopPropagation()}>
              <div className="w-16 h-16 bg-slate-100 dark:bg-zinc-800 rounded-full mx-auto flex items-center justify-center mb-4"><Icon name="lock" size={28}/></div>
              <h3 className="text-2xl font-bold tracking-tight mb-2">Tresor entsperren</h3>
              <p className="text-sm font-medium opacity-60 mb-6 truncate">"{unlockTarget.title}"</p>
              <input type="password" inputMode="numeric" autoFocus value={pinInput} onChange={e=>setPinInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitPin()} className={`w-full p-4 text-center text-2xl tracking-[1em] rounded-2xl outline-none mb-4 bg-slate-50 dark:bg-zinc-950 border-2 transition-colors ${pinError ? 'border-rose-500' : 'border-transparent focus:border-slate-300 dark:focus:border-zinc-700'}`} placeholder="••••" />
              <button onClick={submitPin} className="w-full py-4 rounded-xl font-bold text-white bg-black dark:bg-white dark:text-black">Öffnen</button>
            </div>
          </div>
        )}

        {/* --- SETTINGS VIEW --- */}
        {view === 'settings' && (
           <div className="max-w-md mx-auto p-6 animate-slide-up space-y-6 pb-32">
              <div className="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                 <h2 className="text-base font-bold mb-4 flex items-center gap-2"><Icon name="user" size={18}/> Profil</h2>
                 <input type="text" value={user.name} onChange={e=>setUser({...user, name: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border-none outline-none font-bold text-lg mb-4" placeholder="Dein Name" />
                 <textarea value={user.motto} onChange={e=>setUser({...user, motto: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border-none outline-none font-medium text-sm resize-none h-24" placeholder="Lebensmotto..." />
              </div>
              <div className="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                 <h2 className="text-base font-bold mb-4 flex items-center gap-2"><Icon name="moon" size={18}/> Design</h2>
                 <div className="flex p-1 bg-slate-100 dark:bg-zinc-950 rounded-2xl">
                    <button onClick={() => setUser({...user, isDark: false})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${!user.isDark ? 'bg-white shadow-sm text-black' : 'text-slate-500'}`}>Hell</button>
                    <button onClick={() => setUser({...user, isDark: true})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${user.isDark ? 'bg-zinc-800 shadow-sm text-white' : 'text-slate-500'}`}>Dunkel</button>
                 </div>
              </div>
              <div className="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                 <h2 className="text-base font-bold mb-4 flex items-center gap-2"><Icon name="key" size={18}/> Sicherheit</h2>
                 <input type="password" inputMode="numeric" value={user.pin} onChange={e=>setUser({...user, pin: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border-none outline-none font-bold text-center tracking-[1em] mb-4" placeholder="Tresor-PIN" />
              </div>
              <button onClick={handleLogout} className="w-full p-4 rounded-2xl font-bold text-rose-500 bg-rose-50 dark:bg-rose-500/10 border border-rose-100 dark:border-rose-900/30 active:scale-95 transition-transform flex items-center justify-center gap-2"><Icon name="log-out" size={18}/> Abmelden</button>
           </div>
        )}

      </div>
    </ErrorBoundary>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
