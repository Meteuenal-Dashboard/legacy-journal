            <div className="w-16 h-16 bg-black dark:bg-white rounded-2xl mx-auto flex items-center justify-center shadow-lg"><Icon name="book-open" size={32} className="text-white dark:text-black" /></div>
            <h1 className="text-3xl font-extrabold tracking-tight">Legacy</h1>
            <p className="text-sm opacity-60 font-medium">Dein Leben. Dein Vermächtnis.</p>
          </div>
          <div className="space-y-4">
            {authError && <div className="p-4 bg-rose-50 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400 rounded-2xl text-sm font-semibold text-center border border-rose-100 dark:border-rose-500/20">{authError}</div>}
            {authMsg && <div className="p-4 bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 rounded-2xl text-sm font-semibold text-center border border-emerald-100 dark:border-emerald-500/20">{authMsg}</div>}
            <input type="email" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} className="w-full p-4 rounded-2xl outline-none text-base font-medium bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 focus:border-slate-400 dark:focus:border-zinc-600 transition-colors placeholder:opacity-40" placeholder="E-Mail Adresse" />
            {authMode !== 'reset' && <input type="password" value={authPassword} onChange={e=>setAuthPassword(e.target.value)} className="w-full p-4 rounded-2xl outline-none text-base font-medium bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 focus:border-slate-400 dark:focus:border-zinc-600 transition-colors placeholder:opacity-40" placeholder="Passwort" />}
            <button onClick={handleAuth} className="w-full py-4 rounded-2xl font-bold text-base bg-black dark:bg-white text-white dark:text-black hover:scale-[1.02] active:scale-95 transition-all shadow-md mt-2">{authMode === 'login' ? 'Einloggen' : authMode === 'register' ? 'Account erstellen' : 'Link anfordern'}</button>
            <div className="flex flex-col gap-2 pt-4">
                {authMode === 'login' ? (
                    <><button onClick={() => { setAuthMode('register'); setAuthError(''); setAuthMsg(''); }} className="text-sm font-semibold text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors">Neuen Account erstellen</button><button onClick={() => { setAuthMode('reset'); setAuthError(''); setAuthMsg(''); }} className="text-xs font-medium text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">Passwort vergessen?</button></>
                ) : (
                    <button onClick={() => { setAuthMode('login'); setAuthError(''); setAuthMsg(''); }} className="text-sm font-semibold text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors">Zurück zum Login</button>
                )}
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (view === 'pin_entry') {
    return (
      <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 dark:bg-black text-slate-900 dark:text-white">
        <div className="max-w-sm w-full space-y-8 animate-slide-up text-center">
          <Icon name="lock" size={48} className="mx-auto mb-2 opacity-80" />
          <h1 className="text-2xl font-bold tracking-tight">Tresor entsperren</h1>
          <p className="opacity-60 text-sm font-medium px-4">Gib deine PIN ein, um dein lokales Journal zu entschlüsseln.</p>
          <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-zinc-800">
             <input type="password" inputMode="numeric" pattern="[0-9]*" autoFocus value={newPinInput} onChange={(e) => setNewPinInput(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') { const newUserObj = {...user, pin: newPinInput}; setUser(newUserObj); safeStorageSet('legacy_user', JSON.stringify(newUserObj)); setView(newUserObj.name ? 'dashboard' : 'onboarding'); } }} className="w-full p-4 text-center text-3xl tracking-[1em] rounded-2xl outline-none mb-6 bg-slate-100 dark:bg-zinc-800 border-none focus:ring-2 focus:ring-slate-300 dark:focus:ring-zinc-600 transition-colors placeholder:opacity-30" placeholder="••••" />
             <button onClick={() => { const newUserObj = {...user, pin: newPinInput}; setUser(newUserObj); safeStorageSet('legacy_user', JSON.stringify(newUserObj)); setView(newUserObj.name ? 'dashboard' : 'onboarding'); }} className="w-full py-4 font-bold rounded-2xl bg-black dark:bg-white text-white dark:text-black hover:scale-[1.02] active:scale-95 transition-transform shadow-md mb-3">Entsperren</button>
             
             {/* Biometric Fallback UI in PIN view if enabled */}
             {safeStorageGet('legacy_bio_pin') && (
                <button onClick={handleBiometricUnlock} className="w-full py-4 font-bold rounded-2xl bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 hover:scale-[1.02] active:scale-95 transition-transform shadow-sm flex items-center justify-center gap-2 mb-3"><Icon name="fingerprint" size={20}/> Biometrisch entsperren</button>
             )}

             <button onClick={handleLogout} className="mt-4 w-full py-2 text-xs font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition-opacity">Abmelden</button>
          </div>
        </div>
      </div>
    );
  }

  if (view === 'onboarding') {
    return (
      <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 dark:bg-black text-slate-900 dark:text-white">
        <div className="max-w-sm w-full space-y-8 animate-slide-up text-center">
          <Icon name="sparkles" size={48} className="mx-auto mb-2 opacity-80" />
          <h1 className="text-3xl font-extrabold tracking-tight">Willkommen</h1>
          <p className="opacity-60 font-medium">Wie möchtest du in deinem Journal genannt werden?</p>
          <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-zinc-800">
            <input type="text" value={user.name} onChange={(e) => setUser({...user, name: e.target.value})} className="w-full p-4 rounded-2xl outline-none text-lg font-bold text-center bg-slate-100 dark:bg-zinc-800 border-none focus:ring-2 focus:ring-slate-300 dark:focus:ring-zinc-600 transition-colors mb-6 placeholder:opacity-30" placeholder="Dein Name" />
            <button type="button" onClick={() => { if(user.name.trim()) { safeStorageSet('legacy_user', JSON.stringify(user)); setView('dashboard'); } }} className="w-full py-4 rounded-2xl font-bold text-base bg-black dark:bg-white text-white dark:text-black hover:scale-[1.02] active:scale-95 transition-all shadow-md">Journal beginnen</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <ErrorBoundary>
      <div className="min-h-screen pb-safe">

        {/* --- MAIN HEADER --- */}
        <header className="sticky top-0 z-30 bg-white/80 dark:bg-black/80 backdrop-blur-xl border-b border-slate-200 dark:border-zinc-800 px-6 py-4 flex justify-between items-center transition-colors duration-300 no-print">
          <div className="flex items-center gap-3 overflow-hidden">
            {view === 'archive' ? <h1 className="text-xl font-bold tracking-tight">Archiv</h1> :
             view === 'menu' ? <h1 className="text-xl font-bold tracking-tight">Entdecken</h1> :
             view === 'wisdom' ? <h1 className="text-xl font-bold tracking-tight">Buch der Weisheit</h1> :
             view === 'burn' ? <h1 className="text-xl font-bold tracking-tight text-rose-500">Katharsis</h1> :
             view === 'quotes' ? <h1 className="text-xl font-bold tracking-tight">Erkenntnisse</h1> :
             view === 'map' ? <h1 className="text-xl font-bold tracking-tight text-amber-500">Lebenskarte</h1> :
             view === 'vault' ? <h1 className="text-xl font-bold tracking-tight flex items-center gap-2"><Icon name="lock" size={20}/> Tresor</h1> :
             view === 'settings' ? <h1 className="text-xl font-bold tracking-tight flex items-center gap-2">Einstellungen</h1> :
            (
              <>
                <div className="w-10 h-10 rounded-full bg-slate-200 dark:bg-zinc-800 flex items-center justify-center shrink-0 shadow-sm overflow-hidden" style={{ borderColor: user.nameColor, borderWidth: '2px' }}>
                  {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover"/> : <Icon name="user" size={20} className="opacity-50 text-slate-900 dark:text-white"/>}
                </div>
                <div className="flex flex-col">
                  <h1 className="text-lg font-bold tracking-tight leading-tight">{user.name}</h1>
                  {user.motto && <p className="text-[10px] font-medium opacity-60 truncate max-w-[150px]">{user.motto}</p>}
                </div>
              </>
            )}
          </div>
          <div className="flex gap-2 items-center">
            {view === 'dashboard' && (
              <>
                <button type="button" onClick={() => setIsSearchOpen(!isSearchOpen)} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="search" size={18}/></button>
                <button type="button" onClick={() => setView('menu')} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="menu" size={18}/></button>
              </>
            )}
            {view !== 'dashboard' && <button type="button" onClick={() => setView('dashboard')} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="x" size={18} /></button>}
          </div>

          {isSearchOpen && view === 'dashboard' && (
            <div className="absolute top-full left-0 right-0 p-4 bg-white/90 dark:bg-black/90 backdrop-blur-2xl border-b border-slate-200 dark:border-zinc-800 shadow-xl animate-slide-up z-50">
              <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Suchen..." autoFocus className="w-full p-4 rounded-2xl bg-slate-100 dark:bg-zinc-900 border-none outline-none font-medium focus:ring-2 focus:ring-slate-300 dark:focus:ring-zinc-700 transition-shadow" />
            </div>
          )}
        </header>

        {/* --- MAIN FEED & VIEWS --- */}
        <main className={`p-4 sm:p-6 max-w-2xl mx-auto min-h-[70vh] relative z-10 no-print ${view === 'map' ? 'h-[85vh] flex flex-col' : 'floating-nav-spacing'}`}>
          
          {view === 'menu' && (
            <div className="grid grid-cols-2 gap-4 sm:gap-6 animate-slide-up">
              <button onClick={() => setView('wisdom')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><Icon name="book-open" size={32} className="text-amber-500" /><span className="font-bold text-sm">Weisheit</span></button>
              <button onClick={() => setView('map')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><Icon name="map" size={32} className="text-emerald-500" /><span className="font-bold text-sm">Lebenskarte</span></button>
              <button onClick={() => setView('burn')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><Icon name="flame" size={32} className="text-rose-500" /><span className="font-bold text-sm">Katharsis</span></button>
              <button onClick={() => setView('quotes')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><Icon name="quote" size={32} className="text-indigo-500" /><span className="font-bold text-sm">Erkenntnisse</span></button>
              <button onClick={() => setView('archive')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><Icon name="archive" size={32} className="opacity-50" /><span className="font-bold text-sm">Archiv</span></button>
              <button onClick={() => setView('settings')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><Icon name="settings" size={32} className="opacity-50" /><span className="font-bold text-sm">Einstellungen</span></button>
            </div>
          )}

          {/* --- SETTINGS VIEW --- */}
          {view === 'settings' && (
             <div className="animate-slide-up space-y-6 pb-48">
                <div className="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                   <h2 className="text-base font-bold mb-4 flex items-center gap-2"><Icon name="user" size={18}/> Profil</h2>
                   <div className="flex flex-col sm:flex-row items-center gap-5 mb-6">
                       <div className="relative shrink-0">
                           <div className="w-24 h-24 rounded-full overflow-hidden border-4 shadow-sm flex items-center justify-center bg-slate-100 dark:bg-zinc-800" style={{ borderColor: user.nameColor }}>
                               {user.avatar ? <img src={user.avatar} alt="Avatar" className="w-full h-full object-cover scale-[1.02]" /> : <Icon name="user" size={40} className="opacity-30 text-slate-900 dark:text-white" />}
                           </div>
                       </div>
                       <label className="w-full sm:flex-1 py-3 px-4 rounded-xl cursor-pointer shadow-sm font-bold text-sm text-center border border-slate-200 dark:border-zinc-700 bg-white dark:bg-zinc-800 hover:scale-[1.02] transition-transform">
                           Profilbild ändern <input type="file" accept="image/*" onChange={handleAvatarUpload} className="hidden" />
                       </label>
                   </div>
                   <input type="text" value={user.name} onChange={e=>setUser({...user, name: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border-none outline-none font-bold text-lg mb-4 focus:ring-2 focus:ring-slate-200 dark:focus:ring-zinc-700" placeholder="Dein Name" />
                   <textarea value={user.motto} onChange={e=>setUser({...user, motto: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border-none outline-none font-medium text-sm resize-none h-24 focus:ring-2 focus:ring-slate-200 dark:focus:ring-zinc-700" placeholder="Lebensmotto..." />
                </div>

                <div className="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                   <h2 className="text-base font-bold mb-4 flex items-center gap-2"><Icon name="moon" size={18}/> Design & Farben</h2>
                   <div className="flex p-1 bg-slate-100 dark:bg-zinc-950 rounded-2xl mb-6">
                      <button onClick={() => setUser({...user, isDark: false})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-colors ${!user.isDark ? 'bg-white shadow-sm text-black' : 'text-slate-500'}`}>Hell</button>
                      <button onClick={() => setUser({...user, isDark: true})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-colors ${user.isDark ? 'bg-zinc-800 shadow-sm text-white' : 'text-slate-500'}`}>Dunkel</button>
                   </div>
                   
                   <span className="text-xs font-bold uppercase tracking-widest opacity-60 mb-2 block">Hintergrund (App)</span>
                   <div className="flex flex-wrap gap-2 mb-6">
                      <button onClick={() => setUser({...user, appBgColor: null})} className={`w-8 h-8 rounded-full border-2 transition-transform flex items-center justify-center ${!user.appBgColor ? 'border-slate-400 dark:border-zinc-500 scale-110 shadow-md' : 'border-transparent hover:scale-110'}`} style={{ backgroundColor: user.isDark ? '#000000' : '#f8fafc' }}><Icon name="slash" size={14} className="opacity-50" /></button>
                      {COLORS.map(color => (
                          <button key={color} onClick={() => setUser({...user, appBgColor: color})} className={`w-8 h-8 rounded-full border-2 transition-transform ${user.appBgColor === color ? 'border-slate-400 dark:border-zinc-500 scale-125 shadow-md' : 'border-transparent hover:scale-110'}`} style={{ backgroundColor: color }} />
                      ))}
                   </div>

                   <span className="text-xs font-bold uppercase tracking-widest opacity-60 mb-2 block">Schriftfarbe</span>
                   <div className="flex flex-wrap gap-2">
                      <button onClick={() => setUser({...user, textColor: null})} className={`w-8 h-8 rounded-full border-2 transition-transform flex items-center justify-center ${!user.textColor ? 'border-slate-400 dark:border-zinc-500 scale-110 shadow-md' : 'border-transparent hover:scale-110'}`} style={{ backgroundColor: user.isDark ? '#ffffff' : '#0f172a' }}><Icon name="slash" size={14} className={user.isDark ? 'text-black' : 'text-white'} /></button>
                      {COLORS.map(color => (
                          <button key={color} onClick={() => setUser({...user, textColor: color, nameColor: color})} className={`w-8 h-8 rounded-full border-2 transition-transform ${user.textColor === color ? 'border-slate-400 dark:border-zinc-500 scale-125 shadow-md' : 'border-transparent hover:scale-110'}`} style={{ backgroundColor: color }} />
                      ))}
                   </div>
                </div>
                
                <div className="p-6 rounded-[2rem] bg-blue-50 dark:bg-blue-500/10 border border-blue-100 dark:border-blue-500/20 shadow-sm">
                   <h2 className="text-base font-bold mb-2 flex items-center gap-2 text-blue-600 dark:text-blue-400"><Icon name="cloud" size={18}/> Verschlüsselter Cloud-Tresor</h2>
                   <p className="text-xs font-medium opacity-70 mb-4">Deine Daten werden AES-GCM verschlüsselt gesichert.</p>
                   <button onClick={() => {
                      if (!user.pin) { showDialog({title:'PIN fehlt', message:'Bitte lege zuerst eine PIN fest.'}); return; }
                      setUser({...user, cloudSync: !user.cloudSync});
                      if (!user.cloudSync) { entries.forEach(e=>syncSingleEntryToCloud(e)); syncProfileToCloud({...user, cloudSync:true}); }
                   }} className={`w-full p-4 rounded-2xl font-bold text-sm transition-transform hover:scale-[1.02] shadow-sm mb-3 ${user.cloudSync ? 'bg-blue-600 text-white' : 'bg-white dark:bg-zinc-900 text-slate-700 dark:text-white'}`}>{user.cloudSync ? 'Cloud Sync ist Aktiv' : 'Cloud Sync aktivieren'}</button>
                   <button onClick={performCloudSync} className="w-full p-4 rounded-2xl font-bold text-sm bg-white dark:bg-zinc-900 text-blue-600 dark:text-blue-400 hover:scale-[1.02] shadow-sm transition-transform flex items-center justify-center gap-2">{syncingCloud ? 'Lädt...' : <><Icon name="download-cloud" size={18}/> Aus der Cloud wiederherstellen</>}</button>
                </div>

                <div className="p-6 rounded-[2rem] bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-100 dark:border-indigo-500/20 shadow-sm">
                   <h2 className="text-base font-bold mb-2 flex items-center gap-2 text-indigo-600 dark:text-indigo-400"><Icon name="archive" size={18}/> Ewigkeits-Archiv (ZIP)</h2>
                   <p className="text-xs font-medium opacity-70 mb-4">Exportiert alle deine Einträge als simple, für immer lesbare Textdateien (.md) und extrahiert alle Bilder.</p>
                   <button onClick={exportEternityArchive} className="w-full p-4 rounded-2xl font-bold text-sm bg-indigo-600 text-white hover:scale-[1.02] shadow-sm transition-transform flex items-center justify-center gap-2 mb-3"><Icon name="folder-down" size={18}/> Als ZIP speichern</button>
                </div>

                <div className="p-6 rounded-[2rem] bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-100 dark:border-emerald-500/20 shadow-sm">
                   <h2 className="text-base font-bold mb-2 flex items-center gap-2 text-emerald-600 dark:text-emerald-400"><Icon name="smartphone" size={18}/> P2P Transfer (Ohne Cloud)</h2>
                   <p className="text-xs font-medium opacity-70 mb-4">Scanne einen QR Code mit deinem neuen Handy, um Daten direkt zu senden.</p>
                   {!peerId ? (
                      <button onClick={() => {
                         const peer = new window.Peer(); setSyncStatus('WebRTC wird vorbereitet...');
                         peer.on('open', (id) => { setPeerId(id); setSyncStatus('Scanne den Code mit dem neuen Gerät.'); });
                         peer.on('connection', (c) => { setSyncStatus('Verbunden! Sende...'); c.on('data', (d) => { if(d==='request_data'){c.send(JSON.stringify({user,entries})); setSyncStatus('Erledigt!'); setTimeout(()=>{setPeerId(null);}, 4000);} }); });
                         setPeerInstance(peer);
                      }} className="w-full p-4 rounded-2xl font-bold text-sm bg-emerald-600 text-white hover:scale-[1.02] shadow-sm transition-transform flex items-center justify-center gap-2"><Icon name="qr-code" size={18}/> QR-Code generieren</button>
                   ) : (
                      <div className="bg-white dark:bg-zinc-900 p-4 rounded-2xl flex flex-col items-center">
                         <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?import=' + peerId)}`} className="w-40 h-40 mb-3 rounded-lg" />
                         <p className="text-xs font-bold text-emerald-600 mb-3 animate-pulse">{syncStatus}</p>
                         <button onClick={()=>{peerInstance?.destroy(); setPeerId(null); setSyncStatus('');}} className="text-xs font-bold opacity-50">Abbrechen</button>
                      </div>
                   )}
                </div>

                <div className="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                   <h2 className="text-base font-bold mb-4 flex items-center gap-2"><Icon name="key" size={18}/> Sicherheit & PIN</h2>
                   
                   {!user.pin ? (
                       <div className="space-y-4">
                           <p className="text-sm font-medium opacity-70">Lege eine PIN fest, um den Tresor zu nutzen.</p>
                           <input type="password" inputMode="numeric" value={newPinInput} onChange={e=>setNewPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border-none outline-none font-bold text-center tracking-[1em]" placeholder="Neue PIN" />
                           <input type="password" inputMode="numeric" value={confirmPinInput} onChange={e=>setConfirmPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border-none outline-none font-bold text-center tracking-[1em]" placeholder="Wiederholen" />
                           <button onClick={handleSavePin} className="w-full py-4 rounded-xl font-bold" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}>PIN speichern</button>
                       </div>
                   ) : (
                       isChangingPin ? (
                           <div className="space-y-4">
                               <input type="password" inputMode="numeric" value={oldPinInput} onChange={e=>setOldPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border-none outline-none font-bold text-center tracking-[1em]" placeholder="Alte PIN" />
                               <input type="password" inputMode="numeric" value={newPinInput} onChange={e=>setNewPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border-none outline-none font-bold text-center tracking-[1em]" placeholder="Neue PIN" />
                               <input type="password" inputMode="numeric" value={confirmPinInput} onChange={e=>setConfirmPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border-none outline-none font-bold text-center tracking-[1em]" placeholder="Wiederholen" />
                               <div className="flex gap-2">
                                   <button onClick={() => setIsChangingPin(false)} className="flex-1 py-4 rounded-xl font-bold bg-slate-100 dark:bg-zinc-800">Abbrechen</button>
                                   <button onClick={handleSavePin} className="flex-1 py-4 rounded-xl font-bold" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}>Speichern</button>
                               </div>
                           </div>
                       ) : (
                           <div className="flex justify-between items-center p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950">
                               <div className="flex items-center gap-3">
                                   <Icon name="check-circle" size={20} className="text-emerald-500" />
                                   <span className="font-bold text-sm">PIN Aktiv</span>
                               </div>
                               <button onClick={() => setIsChangingPin(true)} className="px-4 py-2 rounded-lg font-bold text-xs bg-white dark:bg-zinc-800 shadow-sm" style={{ color: user.nameColor }}>Ändern</button>
                           </div>
                       )
                   )}

                   {/* Biometric Toggle */}
                   {window.PublicKeyCredential && user.pin && !isChangingPin && (
                       <div className="flex justify-between items-center mt-6 p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-slate-100 dark:border-zinc-800">
                           <div className="flex items-center gap-3">
                               <Icon name="fingerprint" size={20} className={user.biometric ? 'text-indigo-500' : 'text-slate-400'}/>
                               <div>
                                   <div className="font-bold text-sm">Biometrie</div>
                                   <div className="text-[10px] opacity-60">TouchID / FaceID</div>
                               </div>
                           </div>
                           <button onClick={toggleBiometric} className={`w-12 h-6 rounded-full transition-colors relative ${user.biometric ? 'bg-indigo-500' : 'bg-slate-300 dark:bg-zinc-700'}`}>
                               <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${user.biometric ? 'left-7' : 'left-1'}`} />
                           </button>
                       </div>
                   )}
                </div>
                <button onClick={handleLogout} className="w-full p-4 rounded-2xl font-bold text-rose-500 bg-rose-50 dark:bg-rose-500/10 border border-rose-100 dark:border-rose-900/30 active:scale-95 transition-transform flex items-center justify-center gap-2"><Icon name="log-out" size={18}/> Abmelden</button>
             </div>
          )}

          {view === 'map' && (
             <div className="flex-1 flex flex-col gap-4 animate-fade-in pb-24 h-full">
                <div className="flex-1 relative rounded-[2rem] overflow-hidden shadow-lg border border-slate-200 dark:border-zinc-800 bg-slate-100 dark:bg-zinc-900">
                    <div ref={mapRef} className="absolute inset-0 w-full h-full"></div>
                </div>
                <div className="p-4 bg-white/90 dark:bg-black/90 backdrop-blur-md rounded-2xl shadow-sm border border-slate-200 dark:border-zinc-800 flex justify-between items-center shrink-0">
                    <div className="font-bold text-sm">Orte deines Lebens</div>
                    <div className="text-xs opacity-70 font-bold">{entries.filter(e => e.location).length} Markierungen</div>
                </div>
             </div>
          )}

          {view === 'burn' && (
            <div className="flex flex-col items-center justify-center min-h-[50vh] text-center animate-fade-in relative">
              {isBurning && <div className="absolute inset-0 bg-rose-500/10 animate-pulse rounded-3xl pointer-events-none" />}
              <Icon name="flame" size={64} className={`mb-6 ${isBurning ? 'text-rose-500 animate-flame' : 'text-slate-300 dark:text-zinc-700'}`} />
              <p className="opacity-60 mb-8 max-w-sm">Schreibe auf, was dich belastet. Wir übergeben es den Flammen. Es wird nirgendwo gespeichert.</p>
              <textarea value={burnText} onChange={e=>setBurnText(e.target.value)} disabled={isBurning} className="w-full p-6 rounded-3xl bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 focus:border-rose-500 h-48 outline-none resize-none transition-all text-lg font-medium shadow-sm" placeholder="Lass es los..." />
              <button onClick={triggerBurn} disabled={!burnText || isBurning} className="mt-6 px-8 py-4 bg-rose-600 text-white rounded-2xl font-bold shadow-lg shadow-rose-600/20 hover:scale-105 transition-transform disabled:opacity-50">Dem Feuer übergeben</button>
            </div>
          )}

          {view === 'wisdom' && (
             <div className="animate-slide-up space-y-6 pb-24">
                <div className="p-6 rounded-3xl border text-center" style={{ backgroundColor: `${user.nameColor}15`, borderColor: `${user.nameColor}30` }}>
                   <h3 className="font-bold mb-2" style={{ color: user.nameColor }}>Fortschritt deines Vermächtnisses</h3>
                   <div className="flex justify-between text-sm font-bold opacity-70 mb-2" style={{ color: user.nameColor }}><span>{completedPillars} von {totalPillars}</span><span>{progressPercent}%</span></div>
                   <div className="w-full h-2 rounded-full overflow-hidden" style={{ backgroundColor: `${user.nameColor}30` }}><div className="h-full transition-all duration-1000" style={{width:`${progressPercent}%`, backgroundColor: user.nameColor }}></div></div>
                </div>
                {['Fundament', 'Kommunikation', 'Struktur', 'Tiefe', 'Anpassung'].map(phase => (
                   <div key={phase} className="space-y-3">
                      <h4 className="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-zinc-500 ml-2">{phase}</h4>
                      {PILLARS.filter(p=>p.phase===phase).map(pillar => {
                         const isCompleted = entries.some(e => e.title === pillar.title);
                         return (
                           <button key={pillar.id} onClick={() => openEditor(null, pillar)} className="w-full text-left p-5 rounded-3xl bg-white dark:bg-zinc-900 border shadow-sm flex gap-4 hover:scale-[1.02] transition-transform" style={{ borderColor: getSubtleBorderColor(user.nameColor, user.isDark) }}>
                              <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${isCompleted ? 'text-white' : 'bg-slate-100 dark:bg-zinc-800 text-slate-400'}`} style={isCompleted ? { backgroundColor: user.nameColor } : {}}><Icon name={isCompleted?"check":"pen-tool"} size={16}/></div>
                              <div><div className="font-bold text-sm mb-1">{pillar.title}</div><div className="text-xs opacity-60 line-clamp-2 leading-relaxed">{pillar.desc}</div></div>
                           </button>
                         )
                      })}
                   </div>
                ))}
             </div>
          )}

          {view === 'quotes' && (
             <div className="animate-slide-up space-y-4 pb-24">
                {allQuotes.length === 0 ? (
                   <div className="text-center py-20 opacity-40"><Icon name="quote" size={48} className="mx-auto mb-4"/><p className="font-bold">Noch keine Erkenntnisse zitiert.</p></div>
                ) : (
                   allQuotes.map(q => (
                      <div key={q.id} onClick={()=>{const e=entries.find(x=>x.id===q.entryId); if(e){setView('dashboard'); handleOpenEntry(e);}}} className="p-6 rounded-3xl bg-white dark:bg-zinc-900 border shadow-sm cursor-pointer hover:scale-[1.02] transition-transform" style={{ borderColor: getSubtleBorderColor(user.nameColor, user.isDark) }}>
                         <Icon name="quote" size={20} className="mb-4 opacity-50" style={{ color: user.nameColor }} />
                         <p className="text-lg font-serif italic font-medium leading-relaxed mb-4">"{q.text}"</p>
                         <div className="text-xs font-bold uppercase tracking-widest opacity-40">{q.title} • {new Date(q.date).toLocaleDateString('de-DE')}</div>
                      </div>
                   ))
                )}
             </div>
          )}

          {['dashboard', 'vault', 'archive'].includes(view) && !searchQuery && (
            <div className="flex overflow-x-auto gap-2 pb-2 mb-6 custom-scrollbar hide-scrollbar">
              {['Alle', ...CATEGORIES].map(cat => (
                <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold transition-colors ${activeCategory === cat ? 'text-white dark:text-black shadow-md' : 'bg-slate-100 dark:bg-zinc-900 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-zinc-800'}`} style={activeCategory === cat ? { backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000') } : {}}>
                  {cat}
                </button>
              ))}
            </div>
          )}

          {view === 'dashboard' && !searchQuery && (
             <div className="mb-8 p-6 rounded-3xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm flex flex-col justify-center animate-fade-in">
                <div className="flex justify-between items-center mb-4"><span className="font-bold text-xs uppercase tracking-widest opacity-50">30-Tage Aktivität</span><Icon name="activity" size={16} className="opacity-30" /></div>
                <div className="flex gap-1 justify-between items-end h-10">
                   {heatmapData.map((d, i) => (
                      <div key={i} className="flex-1 rounded-sm transition-colors" style={{ height: d.count===0?'20%':`${Math.min(100, 20+(d.count*40))}%`, backgroundColor: d.count===0 ? (user.isDark?'#27272a':'#f1f5f9') : (user.nameColor || '#f59e0b') }} />
                   ))}
                </div>
             </div>
          )}

          {['dashboard', 'vault', 'archive'].includes(view) && visibleEntries.length === 0 && !searchQuery && (
            <div className="flex flex-col items-center justify-center py-32 text-center opacity-40 animate-fade-in">
              <Icon name={view === 'vault' ? "lock" : "book-open"} size={48} className="mb-4"/>
              <p className="text-lg font-bold">{view === 'vault' ? 'Tresor leer.' : view === 'archive' ? 'Archiv leer.' : 'Noch keine Einträge.'}</p>
            </div>
          )}

          {['dashboard', 'vault', 'archive'].includes(view) && (
            <div className={`grid gap-6 pb-24 ${isGridView && view === 'dashboard' ? 'grid-cols-2' : 'grid-cols-1'}`}>
              {renderEntries.map(entry => {
                const hasImages = entry.images && entry.images.length > 0;
                const isDarkTheme = user.isDark;
                const cardBgClass = isDarkTheme ? 'bg-zinc-900' : 'bg-white shadow-md';
                const isCapsuleLocked = entry.unlockDate;

                return (
                  <div key={entry.id} onClick={() => handleOpenEntry(entry)} className={`group relative rounded-3xl overflow-hidden cursor-pointer border transition-transform active:scale-[0.98] ${cardBgClass} ${isGridView ? 'flex flex-col' : ''}`} style={{ borderColor: getSubtleBorderColor(user.nameColor, user.isDark) }}>
                    
                    {entry.manifested && (
                      <div className="absolute top-4 right-4 z-20 bg-amber-400 text-amber-950 text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1">
                        <Icon name="sparkles" size={12}/> Highlight
                      </div>
                    )}

                    {hasImages && (
                      <div className="w-full aspect-video relative overflow-hidden bg-slate-100 dark:bg-zinc-800">
                        <img src={entry.images[0]} className="w-full h-full object-cover" alt="Cover" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent pointer-events-none" />
                      </div>
                    )}

                    <div className="p-6 relative z-10 flex-1 flex flex-col">
                      <div className="flex items-center gap-2 mb-3 text-[10px] font-bold uppercase tracking-widest opacity-50">
                        <span>{new Date(entry.date).toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' })}</span>
                        {!isGridView && <><span>•</span><span>{entry.category}</span></>}
                        {isCapsuleLocked && <><span className="text-indigo-500 flex items-center gap-1 ml-auto"><Icon name="clock" size={12}/> {new Date(entry.unlockDate).toLocaleDateString('de-DE')}</span></>}
                        {entry.locked && !isCapsuleLocked && <><span className="text-rose-500 flex items-center gap-1 ml-auto"><Icon name="lock" size={12}/> Tresor</span></>}
                        {entry.audio && <><span className="text-emerald-500 flex items-center ml-1"><Icon name="mic" size={12}/></span></>}
                        {entry.location && <><span className="text-amber-500 flex items-center ml-1"><Icon name="map-pin" size={12}/></span></>}
                      </div>

                      <h3 className={`font-extrabold ${isGridView ? 'text-xl' : 'text-2xl'} leading-tight tracking-tight mb-2 line-clamp-2 ${hasImages && (entry.locked || isCapsuleLocked) ? 'text-slate-900 dark:text-white' : ''}`} dangerouslySetInnerHTML={highlightText(entry.title, searchQuery)} />
                      
                      {!entry.locked && !isCapsuleLocked && entry.text && !isGridView && (
                        <div className="text-sm font-medium leading-relaxed opacity-70 line-clamp-3 mb-4" dangerouslySetInnerHTML={highlightText(entry.text, searchQuery)} />
                      )}

                      {(entry.locked || isCapsuleLocked) && !isGridView && (
                         <div className="text-sm font-medium leading-relaxed opacity-40 italic mb-4">
                            {isCapsuleLocked ? 'Inhalt durch Zeitsiegel geschützt.' : 'Inhalt durch Tresor-PIN geschützt.'}
                         </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </main>

        {/* --- FLOATING BOTTOM NAV --- */}
        {!showEditor && !viewingEntry && (
          <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs backdrop-blur-2xl bg-white/90 dark:bg-zinc-900/90 border border-slate-200/50 dark:border-zinc-700/50 rounded-[2rem] shadow-2xl flex justify-between items-center px-2 py-2 z-40 no-print">
            <button onClick={() => { if(view==='dashboard') setIsGridView(!isGridView); else setView('dashboard'); }} className={`flex-1 flex flex-col items-center justify-center py-2 transition-colors rounded-2xl ${view === 'dashboard' ? 'bg-slate-100 dark:bg-zinc-800 shadow-inner' : 'opacity-60 hover:opacity-100'}`} style={view === 'dashboard' ? { color: user.nameColor || '#000000' } : { color: 'inherit' }}>
              <Icon name={isGridView && view === 'dashboard' ? "list" : "layout-grid"} size={22} />
            </button>
            <button onClick={() => openEditor()} className="flex-none mx-2 w-14 h-14 rounded-full text-white dark:text-black shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-transform shrink-0" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000') }}>
              <Icon name="plus" size={28} />
            </button>
            <button onClick={() => setView('vault')} className={`flex-1 flex flex-col items-center justify-center py-2 transition-colors rounded-2xl ${view === 'vault' ? 'bg-rose-50 dark:bg-rose-500/10 text-rose-500 shadow-inner' : 'text-slate-400 hover:text-rose-500'}`}>
              <Icon name="lock" size={22} />
            </button>
          </nav>
        )}

        {/* --- VIEWER --- */}
        {viewingEntry && !showEditor && (
           <div className="fixed inset-0 z-50 overflow-y-auto bg-white dark:bg-black animate-fade-in custom-scrollbar flex flex-col screen-only" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
             <div className="sticky top-0 z-40 flex justify-between items-center py-4 px-6 bg-white/90 dark:bg-black/90 backdrop-blur-md border-b border-slate-100 dark:border-zinc-900 shrink-0 no-print">
               <div className="flex gap-2">
                 <button onClick={() => {setViewingEntry(null); setCurrentViewerImgIdx(0);}} className="p-3 rounded-full bg-slate-100 dark:bg-zinc-900 hover:scale-105 transition-transform"><Icon name="arrow-left" size={20}/></button>
                 {getAllBookEntries(getBookRoot(viewingEntry.id)?.id || viewingEntry.id).length > 1 && (
                     <button onClick={() => setShowTimeline(true)} className="p-3 rounded-full bg-slate-100 dark:bg-zinc-900 hover:scale-105 transition-transform" style={{ color: user.nameColor }}><Icon name="calendar-days" size={20}/></button>
                 )}
               </div>
               <div className="flex gap-2">
                 <button onClick={() => window.print()} className="p-3 rounded-full bg-slate-100 dark:bg-zinc-900 hover:scale-105 transition-transform text-slate-500"><Icon name="printer" size={20}/></button>
                 <button onClick={() => handleReadAloud(viewingEntry)} className={`p-3 rounded-full transition-transform ${isSpeaking ? 'text-white animate-pulse' : 'bg-slate-100 dark:bg-zinc-900 hover:scale-105'}`} style={isSpeaking ? { backgroundColor: user.nameColor } : {}}><Icon name={isSpeaking ? "volume-2" : "volume-1"} size={20}/></button>
                 <button onClick={() => { const e = viewingEntry; setViewingEntry(null); setTimeout(() => openEditor(e), 10); }} className="px-5 py-2.5 rounded-full font-bold text-sm bg-slate-100 dark:bg-zinc-900 hover:scale-105 transition-transform" style={{ color: user.nameColor }}>Bearbeiten</button>
               </div>
             </div>

             {/* Print Title & TOC */}
             <div className="print-only">
                 <div className="print-title-page">
                    <h1 style={{fontSize: '56px', marginBottom: '20px', fontFamily: 'Georgia, serif'}}>{user.appName || 'Legacy Vision Journal'}</h1>
                    <h3 style={{fontSize: '24px', opacity: 0.6}}>Verfasst von {user.name}</h3>
                    <p style={{marginTop: '40px', fontStyle: 'italic'}}>{user.motto}</p>
                    <p style={{position: 'absolute', bottom: '40px'}}>Generiert am {new Date().toLocaleDateString('de-DE')}</p>
                 </div>
                 <div className="print-toc">
                    <h2 style={{fontSize: '32px', marginBottom: '30px', borderBottom: '1px solid #000', paddingBottom: '10px'}}>Inhaltsverzeichnis</h2>
                    <ul style={{listStyle: 'none', padding: 0}}>
                        {getAllBookEntries(getBookRoot(viewingEntry.id)?.id || viewingEntry.id).map((e, idx) => (
                            <li key={idx} style={{marginBottom: '15px', fontSize: '18px'}}><strong>{idx+1}.</strong> {e.title}</li>
                        ))}
                    </ul>
                 </div>
             </div>

             {/* Single Entry View */}
             <div className="max-w-2xl w-full mx-auto p-6 sm:p-12 pb-32">
                {viewingEntry.images && viewingEntry.images.length > 0 && (
                  <div className="relative w-full aspect-video rounded-3xl overflow-hidden shadow-sm border border-slate-100 dark:border-zinc-800 mb-8 group bg-slate-100 dark:bg-zinc-900">
                      <img src={viewingEntry.images[currentViewerImgIdx]} className="w-full h-full object-cover transition-transform duration-700" alt="Cover" />
                      {viewingEntry.images.length > 1 && (
                          <>
                              <button onClick={(e) => { e.stopPropagation(); setCurrentViewerImgIdx(p => (p - 1 + viewingEntry.images.length) % viewingEntry.images.length); }} className="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 text-white p-3 rounded-full opacity-0 group-hover:opacity-100 transition-opacity no-print"><Icon name="chevron-left" size={24}/></button>
                              <button onClick={(e) => { e.stopPropagation(); setCurrentViewerImgIdx(p => (p + 1) % viewingEntry.images.length); }} className="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 text-white p-3 rounded-full opacity-0 group-hover:opacity-100 transition-opacity no-print"><Icon name="chevron-right" size={24}/></button>
                              <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 bg-black/30 px-3 py-1.5 rounded-full backdrop-blur-sm no-print">
                                  {viewingEntry.images.map((_, i) => <div key={i} className={`w-2 h-2 rounded-full transition-colors ${i === currentViewerImgIdx ? 'bg-white' : 'bg-white/40'}`} />)}
                              </div>
                          </>
                      )}
                  </div>
                )}

                <h1 className="text-4xl sm:text-5xl font-extrabold mb-6 tracking-tight leading-tight">{viewingEntry.title}</h1>
                <div className="flex gap-4 mb-6 text-xs font-bold uppercase tracking-widest opacity-50">
                  <span>{new Date(viewingEntry.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })}</span>
                  <span>•</span><span>{viewingEntry.category}</span>
                  {viewingEntry.location && <span className="flex items-center gap-1 text-amber-500"><Icon name="map-pin" size={14}/> GPS-Siegel</span>}
                </div>
                
                {/* Meta-Data Pills */}
                <div className="flex flex-wrap gap-2 mb-10 no-print">
                    {viewingEntry.tags && viewingEntry.tags.split(',').map(t => t.trim()).filter(t=>t).map((t, i) => (
                        <span key={i} className="px-3 py-1 bg-blue-600 text-white rounded-lg text-xs font-bold flex items-center gap-1"><Icon name="tag" size={12}/> {t}</span>
                    ))}
                    {viewingEntry.people && viewingEntry.people.split(',').map(p => p.trim()).filter(p=>p).map((p, i) => (
                        <span key={i} className="px-3 py-1 bg-indigo-600 text-white rounded-lg text-xs font-bold flex items-center gap-1"><Icon name="user" size={12}/> {p}</span>
                    ))}
                    {viewingEntry.weather && (
                        <span className="px-3 py-1 bg-orange-500 text-white rounded-lg text-xs font-bold flex items-center gap-1 w-full sm:w-auto"><Icon name="sun" size={12}/> {viewingEntry.weather}</span>
                    )}
                    {viewingEntry.rating > 0 && (
                        <div className="flex items-center gap-1 ml-auto">
                            {[1,2,3,4,5].map(star => <Icon key={star} name="star" size={16} className={viewingEntry.rating >= star ? 'text-amber-500 fill-amber-500' : 'text-slate-300'} />)}
                        </div>
                    )}
                </div>

                <div className="text-lg leading-relaxed font-medium opacity-90 legacy-content" dangerouslySetInnerHTML={createSafeHtml(viewingEntry.text)} />
                {viewingEntry.audio && <div className="mt-8 p-4 rounded-2xl bg-slate-100 dark:bg-zinc-900 no-print"><audio src={viewingEntry.audio} controls className="w-full" /></div>}
                
                <div className="mt-16 pt-8 border-t border-slate-200 dark:border-zinc-800 flex justify-center no-print">
                    <button onClick={() => startNewChapter(viewingEntry)} className="px-6 py-3 font-bold rounded-2xl flex items-center gap-2 hover:scale-105 transition-transform shadow-md" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}><Icon name="plus" size={20}/> Neue Seite anfügen</button>
                </div>
             </div>
           </div>
        )}

        {/* --- TIMELINE / ZEITREISE (Calendar Style) --- */}
        {showTimeline && viewingEntry && !showEditor && (() => {
           const bookRoot = getBookRoot(viewingEntry.id);
           const bookEntries = getAllBookEntries(bookRoot?.id || viewingEntry.id);
           
           const daysInMonth = new Date(timelineMonth.getFullYear(), timelineMonth.getMonth() + 1, 0).getDate();
           const firstDay = new Date(timelineMonth.getFullYear(), timelineMonth.getMonth(), 1).getDay();
           const emptySlots = (firstDay + 6) % 7; 
           const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

           const entriesOnSelectedDate = timelineSelectedDate ? bookEntries.filter(e => new Date(e.date).toDateString() === timelineSelectedDate) : [];

           return (
             <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex justify-end animate-fade-in no-print" onClick={() => setShowTimeline(false)}>
                <div className="w-full max-w-sm h-full bg-white dark:bg-zinc-950 shadow-2xl animate-slide-up flex flex-col" onClick={e=>e.stopPropagation()}>
                   <div className="p-6 border-b border-slate-100 dark:border-zinc-900 flex justify-between items-center shrink-0">
                      <h3 className="font-bold text-xl flex items-center gap-2" style={{ color: user.nameColor }}><Icon name="calendar-days" /> Zeitreise</h3>
                      <button onClick={()=>setShowTimeline(false)} className="p-2 rounded-full bg-slate-100 dark:bg-zinc-900"><Icon name="x" size={20}/></button>
                   </div>
                   
                   <div className="flex-1 overflow-y-auto custom-scrollbar">
                       <div className="p-6 border-b border-slate-100 dark:border-zinc-900">
                          <div className="flex justify-between items-center mb-6">
                              <button onClick={() => { const d = new Date(timelineMonth); d.setMonth(d.getMonth()-1); setTimelineMonth(d); }} className="p-2 rounded-full bg-slate-100 dark:bg-zinc-900"><Icon name="chevron-left" size={20}/></button>
                              <span className="font-bold text-sm uppercase tracking-widest">{timelineMonth.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' })}</span>
                              <button onClick={() => { const d = new Date(timelineMonth); d.setMonth(d.getMonth()+1); setTimelineMonth(d); }} className="p-2 rounded-full bg-slate-100 dark:bg-zinc-900"><Icon name="chevron-right" size={20}/></button>
                          </div>
                          
                          <div className="grid grid-cols-7 gap-2 text-center">
                              {['Mo','Di','Mi','Do','Fr','Sa','So'].map(d => <div key={d} className="text-[10px] font-bold opacity-50 py-2">{d}</div>)}
                              {Array(emptySlots).fill(null).map((_, i) => <div key={`empty-${i}`} />)}
                              {daysArray.map(day => {
                                  const dateStr = new Date(timelineMonth.getFullYear(), timelineMonth.getMonth(), day).toDateString();
                                  const dayEntry = bookEntries.find(e => new Date(e.date).toDateString() === dateStr);
                                  const hasEntry = !!dayEntry;
                                  const bgImg = dayEntry?.images?.[0] || null;
                                  const isSelected = timelineSelectedDate === dateStr;
                                  
                                  return (
                                      <button key={day} onClick={() => setTimelineSelectedDate(isSelected ? null : dateStr)} className={`relative p-2 text-sm rounded-xl transition-all flex items-center justify-center aspect-square overflow-hidden ${isSelected ? 'shadow-md font-bold scale-110' : ''}`} style={bgImg ? { backgroundImage: `url(${bgImg})`, backgroundSize: 'cover', backgroundPosition: 'center', border: isSelected ? `2px solid ${user.nameColor}` : 'none' } : (isSelected ? { backgroundColor: user.nameColor, color: isDarkColor(user.nameColor) ? '#ffffff' : '#000000' } : { backgroundColor: 'transparent' })}>
                                          {!bgImg && <span>{day}</span>}
                                          {hasEntry && !isSelected && !bgImg && <div className="absolute bottom-1 w-1.5 h-1.5 rounded-full" style={{ backgroundColor: user.nameColor }}></div>}
                                      </button>
                                  );
                              })}
                          </div>
                       </div>

                       <div className="p-4">
                           {!timelineSelectedDate ? (
                               <p className="text-center opacity-40 text-sm font-medium mt-8">Wähle einen markierten Tag aus.</p>
                           ) : entriesOnSelectedDate.length === 0 ? (
                               <p className="text-center opacity-40 text-sm font-medium mt-8">Kein Eintrag an diesem Tag.</p>
                           ) : (
                               <div className="space-y-3">
                                   {entriesOnSelectedDate.map((e) => (
                                       <button key={e.id} onClick={() => { setViewingEntry(e); setShowTimeline(false); }} className={`w-full text-left p-4 rounded-2xl flex items-center gap-4 transition-colors ${viewingEntry.id === e.id ? 'border' : 'bg-slate-50 dark:bg-zinc-900 border border-transparent'}`} style={viewingEntry.id === e.id ? { backgroundColor: `${user.nameColor}20`, borderColor: `${user.nameColor}50` } : {}}>
                                           {e.images && e.images.length > 0 && <img src={e.images[0]} loading="lazy" className="w-12 h-12 rounded-xl object-cover shadow-sm shrink-0" />}
                                           <div className="flex-1 overflow-hidden">
                                               <span className="font-bold text-sm truncate block">{e.title}</span>
                                               <span className="text-[10px] font-bold uppercase tracking-widest opacity-50">{new Date(e.date).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })} Uhr</span>
                                           </div>
                                       </button>
                                   ))}
                               </div>
                           )}
                       </div>
                   </div>
                </div>
             </div>
           );
        })()}

        {/* --- EDITOR --- */}
        {showEditor && (
          <div className="fixed inset-0 z-[150] flex flex-col bg-white dark:bg-black animate-fade-in sm:p-6 no-print">
            <div className="relative w-full h-full max-w-3xl mx-auto flex flex-col bg-white dark:bg-zinc-950 sm:rounded-[2.5rem] sm:border border-slate-200 dark:border-zinc-800 overflow-hidden shadow-2xl">
              
              {/* Toolbar Top - Sticky Header Container */}
              <div className="flex justify-between items-center px-4 py-3 sm:px-6 sm:py-4 border-b border-slate-100 dark:border-zinc-900 shrink-0 bg-white/90 dark:bg-zinc-950/90 backdrop-blur-md z-30">
                <button onClick={() => checkSaveEntry(true)} className="p-3 rounded-full hover:bg-slate-100 dark:hover:bg-zinc-800 transition-colors"><Icon name="arrow-left" size={24}/></button>
                <div className="flex gap-2 items-center">
                   {editingIdRef.current && <button onClick={() => confirmDelete(editingIdRef.current)} className="p-3 rounded-full text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10"><Icon name="trash-2" size={20}/></button>}
                   <button onClick={() => { setIsLocked(!isLocked); isDirtyRef.current = true; }} className={`p-3 rounded-full transition-colors ${isLocked ? 'bg-rose-500/10 text-rose-500' : 'hover:bg-slate-100 dark:hover:bg-zinc-800 opacity-60 hover:opacity-100'}`} title="Tresor-Schutz"><Icon name="lock" size={20}/></button>
                   
                   {/* Geolocation Button */}
                   <button onClick={() => {
                       if(navigator.geolocation) {
                           showDialog({title:'Orte', message:'Position wird ermittelt...', icon:'loader'});
                           navigator.geolocation.getCurrentPosition(pos => {
                               setLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                               isDirtyRef.current = true; setDialog(null);
                               setTimeout(()=>showDialog({title:'Orts-Siegel', message:'Dein Standort wurde verewigt.', icon:'map-pin', iconColor:'text-amber-500'}), 300);
                           }, () => { setDialog(null); showDialog({title:'Fehler', message:'Ortung fehlgeschlagen.', icon:'x'}); });
                       }
                   }} className={`p-3 rounded-full transition-colors ${location ? 'bg-emerald-500/10 text-emerald-500' : 'hover:bg-slate-100 dark:hover:bg-zinc-800 opacity-60 hover:opacity-100'}`} title="Standort verewigen"><Icon name="map-pin" size={20}/></button>

                   <button onClick={() => { setIsManifested(!isManifested); isDirtyRef.current = true; }} className={`p-3 rounded-full transition-colors ${isManifested ? 'bg-amber-400/10 text-amber-500' : 'hover:bg-slate-100 dark:hover:bg-zinc-800 opacity-60 hover:opacity-100'}`} title="Manifestieren"><Icon name="sparkles" size={20}/></button>
                   <button onClick={() => checkSaveEntry(false)} className="px-6 py-2.5 rounded-full font-bold shadow-sm text-sm ml-2 hover:scale-105 transition-transform" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}>Sichern</button>
                </div>
              </div>

              {/* Title & Format Toolbar - Fixiert über dem Text */}
              <div className="flex flex-col shrink-0 px-6 sm:px-10 pt-6 pb-2 z-20 bg-white dark:bg-zinc-950 border-b border-slate-100 dark:border-zinc-900 shadow-sm">
                 {pillarGuidance && <div className="mb-4 p-4 rounded-2xl bg-amber-50 dark:bg-amber-500/10 text-amber-800 dark:text-amber-400 text-sm font-medium flex gap-3"><Icon name="book-open" size={20} className="shrink-0"/>{pillarGuidance}</div>}
                 <input type="text" placeholder="Ein brillianter Gedanke..." value={title} onChange={(e) => { setTitle(e.target.value); isDirtyRef.current = true; }} className="w-full bg-transparent text-3xl sm:text-4xl font-extrabold tracking-tight outline-none placeholder:opacity-30 mb-4" />
                 
                 <div className="sticky top-0 z-50 flex gap-2 mb-2 overflow-x-auto hide-scrollbar items-center bg-slate-100 dark:bg-zinc-900 p-2 rounded-2xl shadow-sm">
                    <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('formatBlock', false, '<h1>'); isDirtyRef.current = true; }} className="px-3 py-1 font-bold text-lg hover:bg-slate-200 dark:hover:bg-zinc-800 rounded-xl transition-colors">H1</button>
                    <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('formatBlock', false, '<h2>'); isDirtyRef.current = true; }} className="px-3 py-1 font-bold text-md hover:bg-slate-200 dark:hover:bg-zinc-800 rounded-xl transition-colors">H2</button>
                    <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('formatBlock', false, '<p>'); isDirtyRef.current = true; }} className="px-3 py-1 font-bold text-sm hover:bg-slate-200 dark:hover:bg-zinc-800 rounded-xl transition-colors" title="Normaler Text">Text</button>
                    <div className="w-px h-6 bg-slate-300 dark:bg-zinc-700 mx-1"></div>
                    <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('bold', false, null); isDirtyRef.current = true; }} className="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="bold" size={18}/></button>
                    <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('italic', false, null); isDirtyRef.current = true; }} className="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="italic" size={18}/></button>
                    <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('insertUnorderedList', false, null); isDirtyRef.current = true; }} className="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="list-todo" size={18}/></button>
                    <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('formatBlock', false, '<blockquote>'); isDirtyRef.current = true; }} className="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors"><Icon name="quote" size={18}/></button>
                    <div className="w-px h-6 bg-slate-300 dark:bg-zinc-700 mx-1"></div>
                    
                    {/* Inline Image Upload */}
                    <label className="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 cursor-pointer text-indigo-500 transition-colors shrink-0" title="Bild in Text">
                       <Icon name="image" size={18}/>
                       <input type="file" accept="image/*" onChange={handleInlineImage} className="hidden"/>
                    </label>

                    <div className="flex gap-1.5 ml-2 shrink-0">
                       {['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'].map(c => (
                          <button key={c} onMouseDown={(e) => { e.preventDefault(); document.execCommand('foreColor', false, c); isDirtyRef.current = true; }} className="w-5 h-5 rounded-full hover:scale-110 transition-transform shadow-sm" style={{backgroundColor: c}}></button>
                       ))}
                    </div>
                 </div>
              </div>

              <div className="flex-1 overflow-y-auto px-6 sm:px-10 pb-32 overscroll-contain flex flex-col relative z-10">
                {selectedImages.length > 0 && (
                   <div className="flex overflow-x-auto hide-scrollbar gap-3 mb-6 snap-x pt-4 shrink-0">
                      {selectedImages.map((imgSrc, i) => (
                         <div key={i} className="relative w-48 h-48 rounded-3xl overflow-hidden border border-slate-100 dark:border-zinc-800 shrink-0 snap-center">
                            <img src={imgSrc} className="w-full h-full object-cover"/>
                            <button onClick={() => setSelectedImages(prev => prev.filter((_,idx) => idx !== i))} className="absolute top-2 right-2 bg-black/60 p-2 rounded-full text-white backdrop-blur-md"><Icon name="x" size={14}/></button>
                         </div>
                      ))}
                   </div>
                )}
                {audioUrl && (
                    <div className="mb-6 p-4 rounded-2xl bg-slate-100 dark:bg-zinc-900 relative mt-4 shrink-0">
                        <audio src={audioUrl} controls className="w-full"/>
                        <button onClick={()=>setAudioUrl(null)} className="absolute -top-2 -right-2 bg-rose-500 text-white p-1 rounded-full shadow-lg"><Icon name="x" size={14}/></button>
                    </div>
                )}
                
                {/* Main Text Editor */}
                <div ref={editorRef} onClick={(e) => {
                    if (e.target.tagName === 'IMG') {
                        const currentWidth = e.target.style.maxWidth;
                        if (currentWidth === '150px') e.target.style.maxWidth = '50%';
                        else if (currentWidth === '50%') e.target.style.maxWidth = '100%';
                        else e.target.style.maxWidth = '150px';
                        isDirtyRef.current = true;
                    }
                }} contentEditable suppressContentEditableWarning data-placeholder="Lass es fließen... (Tippe auf eingefügte Bilder, um sie zu verkleinern/vergrößern)" onInput={() => { isDirtyRef.current = true; }} className="w-full min-h-[50vh] flex-1 bg-transparent text-lg leading-relaxed font-medium outline-none empty:before:content-[attr(data-placeholder)] legacy-editor-content opacity-90 pt-4" />

                {/* Metadata Inputs (Tags, People, Weather, Rating) */}
                <div className="flex flex-col gap-3 mt-4 pt-4 border-t border-slate-100 dark:border-zinc-800 pb-10">
                   <div className="flex items-center gap-2">
                       {[1,2,3,4,5].map(star => (
                           <button key={star} type="button" onClick={() => { setRating(star); isDirtyRef.current=true; }}>
                               <Icon name="star" size={24} className={rating >= star ? 'text-amber-500 fill-amber-500' : 'text-slate-300 dark:text-zinc-700'} />
                           </button>
                       ))}
                   </div>
                   <div className="grid grid-cols-2 gap-3">
                       <input type="text" placeholder="Tags (Komma getrennt)" value={tags} onChange={e => {setTags(e.target.value); isDirtyRef.current=true;}} className="p-3 rounded-xl bg-slate-100 dark:bg-zinc-900 text-sm outline-none" style={{ color: user.textColor || 'inherit' }} />
                       <input type="text" placeholder="Personen (Komma getrennt)" value={people} onChange={e => {setPeople(e.target.value); isDirtyRef.current=true;}} className="p-3 rounded-xl bg-slate-100 dark:bg-zinc-900 text-sm outline-none" style={{ color: user.textColor || 'inherit' }} />
                       <input type="text" placeholder="Wetter (z.B. 27°C, Sonnig)" value={weather} onChange={e => {setWeather(e.target.value); isDirtyRef.current=true;}} className="p-3 rounded-xl bg-slate-100 dark:bg-zinc-900 text-sm outline-none col-span-2" style={{ color: user.textColor || 'inherit' }} />
                   </div>
                </div>
              </div>

              <div className="absolute bottom-0 left-0 right-0 bg-slate-50 dark:bg-zinc-900 border-t border-slate-200 dark:border-zinc-800 p-4 flex justify-between items-center pb-[env(safe-area-inset-bottom,16px)] z-30">
                 <div className="flex gap-2">
                    <label className="p-3.5 rounded-full bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 shadow-sm cursor-pointer hover:scale-105 transition-transform" title="Galerie-Bild"><Icon name="images" size={20}/><input type="file" accept="image/*" multiple onChange={handleFileUpload} className="hidden" /></label>
                    <button onClick={()=>setIsDrawing(true)} className="p-3.5 rounded-full bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 shadow-sm hover:scale-105 transition-transform"><Icon name="pen-tool" size={20}/></button>
                    <button onClick={isRecording?stopRecording:startRecording} className={`p-3.5 rounded-full shadow-sm transition-transform hover:scale-105 ${isRecording?'bg-rose-500 text-white animate-pulse':'bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700'}`}>{isRecording?<Icon name="square" size={20}/>:<Icon name="mic" size={20}/>}</button>
                    
                    {/* Time Capsule Button */}
                    <div className="relative pl-2 ml-2 border-l border-slate-200 dark:border-zinc-700 flex">
                        <label className={`relative p-3.5 rounded-full shadow-sm flex items-center justify-center cursor-pointer transition-transform hover:scale-105 ${unlockDate ? 'text-white border-transparent' : 'bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700'}`} style={unlockDate ? { backgroundColor: user.nameColor } : {}} title="Kryptografische Zeitkapsel">
                           <Icon name="clock" size={20}/>
                           <input type="date" value={unlockDate} onChange={e=>{setUnlockDate(e.target.value); isDirtyRef.current = true;}} className="absolute opacity-0 w-full h-full cursor-pointer" />
                        </label>
                    </div>
                 </div>
                 <div className="flex gap-2">
                    {MOODS.slice(0,3).map(m => (
                       <button key={m.id} onClick={()=>{setMood(mood===m.label?null:m.label); isDirtyRef.current=true;}} className={`p-2.5 rounded-full transition-all ${mood===m.label ? 'bg-white shadow-md scale-110 ' + m.color : 'opacity-40 hover:opacity-100'}`}><Icon name={m.iconName} size={20}/></button>
                    ))}
                 </div>
              </div>
            </div>
          </div>
        )}

        {/* --- CANVAS DRAWING --- */}
        {isDrawing && (
           <div className="fixed inset-0 z-[200] flex flex-col bg-white dark:bg-black animate-fade-in no-print">
              <div className="flex justify-between items-center p-6 border-b border-slate-100 dark:border-zinc-900 bg-slate-50 dark:bg-zinc-950 shrink-0">
                 <button onClick={()=>setIsDrawing(false)} className="p-3 rounded-full bg-slate-200 dark:bg-zinc-800"><Icon name="x" size={20}/></button>
                 <span className="font-bold text-lg">Skizze</span>
                 <button onClick={()=>{if(canvasRef.current){setSelectedImages(p=>[...p, canvasRef.current.toDataURL()]); setIsDrawing(false); isDirtyRef.current=true;}}} className="px-6 py-2 rounded-full font-bold shadow-md text-sm" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}>Fertig</button>
              </div>
              <div className="flex-1 relative touch-none bg-white dark:bg-black">
                 <canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
              </div>
           </div>
        )}

        {/* --- PICKER DIALOG --- */}
        {picker && (
          <div className="fixed inset-0 z-[250] flex items-end sm:items-center justify-center p-4 bg-black/60 backdrop-blur-xl animate-fade-in no-print" onClick={() => setPicker(null)}>
            <div className="w-full max-w-sm rounded-[2.5rem] shadow-2xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 animate-slide-up flex flex-col overflow-hidden max-h-[70vh]" onClick={e => e.stopPropagation()}>
              <div className="p-6 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center">
                 <h3 className="font-bold text-lg">{picker.title}</h3>
                 <button onClick={()=>setPicker(null)} className="p-2 rounded-full bg-slate-100 dark:bg-zinc-800"><Icon name="x" size={20}/></button>
              </div>
              <div className="overflow-y-auto p-4 space-y-2">
                 {picker.options.map(opt => (
                    <button key={opt.value} onClick={()=>{picker.onSelect(opt.value); setPicker(null);}} className={`w-full text-left p-4 rounded-2xl font-bold text-sm flex justify-between transition-all ${picker.currentValue===opt.value ? 'text-white dark:text-black shadow-md' : 'hover:bg-slate-50 dark:hover:bg-zinc-800'}`} style={picker.currentValue === opt.value ? { backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000') } : {}}>
                       {opt.label} {picker.currentValue===opt.value && <Icon name="check" size={16}/>}
                    </button>
                 ))}
              </div>
            </div>
          </div>
        )}

        {/* --- DIALOGS & PIN UNLOCK --- */}
        {dialog && (
          <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/40 backdrop-blur-xl animate-fade-in no-print" onClick={() => setDialog(null)}>
            <div className="w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 animate-slide-up" onClick={e => e.stopPropagation()}>
              {dialog.icon && <Icon name={dialog.icon} size={36} className={`mx-auto mb-4 ${dialog.iconColor || 'text-slate-900 dark:text-white'}`}/>}
              <h3 className="text-xl font-bold mb-3">{dialog.title}</h3>
              <p className="text-sm font-medium opacity-70 mb-6">{dialog.message}</p>
              <div className="flex gap-2">
                  {dialog.onCancel && <button onClick={() => { if(dialog.onCancel) dialog.onCancel(); setDialog(null); }} className="w-full py-4 rounded-xl font-bold bg-slate-100 dark:bg-zinc-800">Abbrechen</button>}
                  <button onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); setDialog(null); }} className="w-full py-4 rounded-xl font-bold" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}>{dialog.confirmLabel || 'Okay'}</button>
              </div>
            </div>
          </div>
        )}

        {unlockTarget && (
          <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/60 backdrop-blur-xl animate-fade-in no-print" onClick={() => setUnlockTarget(null)}>
            <div className="w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 animate-slide-up" onClick={e => e.stopPropagation()}>
              <div className="w-16 h-16 bg-slate-100 dark:bg-zinc-800 rounded-full mx-auto flex items-center justify-center mb-4"><Icon name="lock" size={28}/></div>
              <h3 className="text-2xl font-bold tracking-tight mb-2">Tresor entsperren</h3>
              <p className="text-sm font-medium opacity-60 mb-6 truncate">"{unlockTarget.title}"</p>
              <input type="password" inputMode="numeric" autoFocus value={pinInput} onChange={e=>setPinInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitPin()} className={`w-full p-4 text-center text-2xl tracking-[1em] rounded-2xl outline-none mb-4 bg-slate-50 dark:bg-zinc-950 border-2 transition-colors ${pinError ? 'border-rose-500' : 'border-transparent focus:border-slate-300 dark:focus:border-zinc-700'}`} placeholder="••••" />
              <button onClick={submitPin} className="w-full py-4 rounded-xl font-bold mb-3 shadow-md transition-transform hover:scale-105" style={{ backgroundColor: user.nameColor || (user.isDark ? '#ffffff' : '#000000'), color: isDarkColor(user.nameColor || (user.isDark ? '#ffffff' : '#000000')) ? '#ffffff' : '#000000' }}>Öffnen</button>
              {safeStorageGet('legacy_bio_pin') && (
                <button onClick={handleBiometricUnlock} className="w-full py-3 font-bold rounded-xl bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 hover:scale-[1.02] transition-all flex items-center justify-center gap-2"><Icon name="fingerprint" size={18}/> Biometrisch entsperren</button>
              )}
            </div>
          </div>
        )}

      </div>
    </ErrorBoundary>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
