const swCode = `
  const CACHE_NAME = 'legacy-vision-v3';

  self.addEventListener('fetch', e => {
    e.respondWith(caches.match(e.request).then(res => res || fetch(e.request).then(fetchRes => {
        if(e.request.method === 'GET' && e.request.url.startsWith('http')) {
            const resClone = fetchRes.clone();
            caches.open(CACHE_NAME).then(cache => cache.put(e.request, resClone));
        }
        return fetchRes;
    }).catch(() => new Response('Offline', {status: 503}))));
  });
`;
const swBlob = new Blob([swCode], { type: 'application/javascript' });
if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.protocol === 'http:')) {

const createSafeHtml = (htmlStr) => {
  const safeStr = htmlStr || '';
  return { __html: window.DOMPurify ? window.DOMPurify.sanitize(safeStr, { ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'u', 'br', 'div', 'span', 'blockquote', 'p', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'img', 'font'], ALLOWED_ATTR: ['style', 'class', 'dir', 'src', 'alt', 'color', 'width', 'height', 'contenteditable'] }) : safeStr };
};

const highlightText = (text, query) => {
  const safeStr = text || '';
  if (!safeStr) return { __html: '' };
  
  // Entferne komplett den Sticker-Wrapper aus der Vorschau (kein "[Bild]" Text mehr!)
  let textWithoutImages = safeStr.replace(/<span class="inline-img-wrapper"[^>]*>[\s\S]*?<\/span>/gi, '');
  textWithoutImages = textWithoutImages.replace(/<img[^>]*>/gi, ''); 
  
  let safeText = window.DOMPurify ? window.DOMPurify.sanitize(textWithoutImages, { ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'u', 'br', 'div', 'span', 'blockquote', 'p', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'font'], ALLOWED_ATTR: ['style', 'class', 'dir', 'color'] }) : textWithoutImages;
  
  if (!query) return { __html: safeText };
  const plainText = safeText.replace(/<[^>]*>?/gm, '');
  const parts = plainText.split(new RegExp(`(${query})`, 'gi'));
  const highlighted = parts.map((part, i) => part.toLowerCase() === query.toLowerCase() ? `<span class="search-highlight" key="${i}">${part}</span>` : part).join('');
  return { __html: highlighted };
};

const encHelper = new TextEncoder();
const decHelper = new TextDecoder();
const cryptoKeyCache = {}; 

const getCryptoKey = async (pin, saltStr) => {
    const cacheKey = pin + saltStr;
    if (cryptoKeyCache[cacheKey]) return cryptoKeyCache[cacheKey];
    const keyMaterial = await window.crypto.subtle.importKey("raw", encHelper.encode(pin), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]);
    const salt = Uint8Array.from(atob(saltStr), c => c.charCodeAt(0));
    const key = await window.crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
    cryptoKeyCache[cacheKey] = key; return key;
};

const encryptData = async (text, pin) => {
    try {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const saltStr = btoa(String.fromCharCode(...salt));
        const ivStr = btoa(String.fromCharCode(...iv));
        const key = await getCryptoKey(pin, saltStr);
        const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encHelper.encode(text));
        return { cipher: btoa(String.fromCharCode(...new Uint8Array(encrypted))), iv: ivStr, salt: saltStr };
    } catch(e) { return null; }
};

const decryptData = async (encryptedObj, pin) => {
    if (!encryptedObj || !pin) return null;
    try {
        const key = await getCryptoKey(pin, encryptedObj.salt);
        const iv = Uint8Array.from(atob(encryptedObj.iv), c => c.charCodeAt(0));
        const cipher = Uint8Array.from(atob(encryptedObj.cipher), c => c.charCodeAt(0));
        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, cipher);
        return decHelper.decode(decrypted);
    } catch(e) { return null; }
};

function useDebounce(value, delay) {
  const [debouncedValue, setDebouncedValue] = useState(value);
  useEffect(() => {
    const handler = setTimeout(() => { setDebouncedValue(value); }, delay);
    return () => clearTimeout(handler);
  }, [value, delay]);
  return debouncedValue;
}

const initDB = () => {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('LegacyVisionDB', 5);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('entries')) {
        const store = db.createObjectStore('entries', { keyPath: 'id' });
        store.createIndex('date', 'date', { unique: false });
        store.createIndex('category', 'category', { unique: false });
        store.createIndex('trashed', 'trashed', { unique: false });
      }
    };
    request.onsuccess = () => resolve(request.result);

  });

const SwipeableTimelineEntry = ({ entry, onArchive, onTrash, onClick, showDialog }) => {
    const [offsetX, setOffsetX] = useState(0);
    const startX = useRef(null);

    const handleTouchStart = (evt) => { startX.current = evt.touches[0].clientX; };
    const handleTouchMove = (evt) => {
        if (startX.current === null) return;
        const diff = evt.touches[0].clientX - startX.current;
        if (diff > 120) setOffsetX(120); else if (diff < -120) setOffsetX(-120); else setOffsetX(diff);
    };
    const handleTouchEnd = () => {
        if (offsetX > 60) { onArchive(entry); showDialog({title: 'Archiviert', message: 'Der Eintrag wurde ins Archiv verschoben.', icon: 'archive', iconColor: 'text-emerald-500'}); }
        else if (offsetX < -60) { onTrash(entry); showDialog({title: 'Papierkorb', message: 'Der Eintrag wurde gelöscht.', icon: 'trash-2', iconColor: 'text-rose-500'}); }
        setOffsetX(0); startX.current = null;
    };

    const inlineImg = extractFirstImage(entry.text);
    const displayImg = entry.images && entry.images.length > 0 ? entry.images[0] : inlineImg;

    return html`
        <div className="relative w-full rounded-2xl overflow-hidden bg-slate-200 dark:bg-zinc-800 shrink-0">
            <div className="absolute inset-0 flex justify-between items-center px-6">
                <div className="text-emerald-600 font-bold flex items-center gap-2 opacity-80"><${Icon} name="archive" size=${18}/> Archiv</div>
                <div className="text-rose-600 font-bold flex items-center gap-2 opacity-80">Löschen <${Icon} name="trash-2" size=${18}/></div>
            </div>
            <button 
                onTouchStart=${handleTouchStart} onTouchMove=${handleTouchMove} onTouchEnd=${handleTouchEnd} onClick=${() => onClick(entry)} 
                style=${{ transform: `translateX(${offsetX}px)`, transition: startX.current === null ? 'transform 0.2s cubic-bezier(0.16, 1, 0.3, 1)' : 'none' }}
                className="relative z-10 w-full text-left p-4 rounded-2xl flex items-center gap-4 bg-slate-50 dark:bg-zinc-900 shadow-sm border border-slate-100 dark:border-zinc-800"
            >
                ${displayImg && html`<img src=${displayImg} className="w-12 h-12 rounded-xl object-cover shadow-sm shrink-0 pointer-events-none" />`}
                <div className="flex-1 overflow-hidden pointer-events-none">
                    <span className="font-bold text-sm truncate block">${entry.title || 'Ohne Titel'}</span>
                    <span className="text-[10px] font-bold uppercase tracking-widest opacity-50">${new Date(entry.date).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })} Uhr</span>
                </div>
            </button>
        </div>
    `;
};

          <h1 className="text-3xl font-extrabold">Willkommen</h1>
          <input type="text" value=${user.name} onChange=${e => setUser({...user, name: e.target.value})} className="w-full p-4 rounded-2xl text-center text-lg font-bold bg-slate-100 dark:bg-zinc-800 outline-none border border-slate-100 dark:border-zinc-800" placeholder="Dein Name" />
          <button onClick=${() => { if(user.name) { safeStorageSet('legacy_user', JSON.stringify(user)); setView('dashboard'); } }} className="w-full py-4 rounded-2xl font-bold bg-black dark:bg-white text-white dark:text-black">Beginnen</button>
        </div>
      </div>
    `;
  }

  return html`
    <div className="min-h-screen pb-safe">
      <header className="sticky top-0 z-30 bg-white/80 dark:bg-black/80 backdrop-blur-xl border-b border-slate-100 dark:border-zinc-800 px-6 py-4 flex justify-between items-center no-print transition-colors duration-300">
        <div className="flex items-center gap-3 overflow-hidden">
          ${view === 'archive' ? html`<h1 className="text-xl font-bold tracking-tight">Archiv</h1>` :
            view === 'trash' ? html`<h1 className="text-xl font-bold tracking-tight text-rose-500">Papierkorb</h1>` :
            view === 'menu' ? html`<h1 className="text-xl font-bold tracking-tight">Entdecken</h1>` :
            view === 'wisdom' ? html`<h1 className="text-xl font-bold tracking-tight">Buch der Weisheit</h1>` :
            view === 'burn' ? html`<h1 className="text-xl font-bold tracking-tight text-rose-500">Katharsis</h1>` :
            view === 'quotes' ? html`<h1 className="text-xl font-bold tracking-tight">Erkenntnisse</h1>` :
            view === 'map' ? html`<h1 className="text-xl font-bold tracking-tight text-amber-500">Lebenskarte</h1>` :
            view === 'vault' ? html`<h1 className="text-xl font-bold tracking-tight flex items-center gap-2"><${Icon} name="lock" size=${20}/> Tresor</h1>` :
            view === 'settings' ? html`<h1 className="text-xl font-bold tracking-tight">Einstellungen</h1>` : html`
            <div className="w-10 h-10 rounded-full border-2 overflow-hidden bg-slate-200 dark:bg-zinc-800 flex items-center justify-center shrink-0" style=${{borderColor: user.nameColor}}>
              ${user.avatar ? html`<img src=${user.avatar} className="w-full h-full object-cover"/>` : html`<${Icon} name="user" size=${20}/>`}
            </div>
            <div className="flex flex-col">
               <h1 className="text-lg font-bold">${user.name}</h1>
               ${user.motto && html`<p className="text-[10px] font-medium opacity-60 truncate max-w-[150px]">${user.motto}</p>`}
            </div>
          `}
        </div>
        <div className="flex gap-2">
          <button onClick=${() => { setViewingEntry(null); setShowTimeline(true); }} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800"><${Icon} name="calendar-days" size=${18}/></button>
          ${view === 'dashboard' && html`
             <button onClick=${() => setIsSearchOpen(!isSearchOpen)} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800"><${Icon} name="search" size=${18}/></button>
             <button onClick=${() => setView('menu')} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800"><${Icon} name="menu" size=${18}/></button>
          `}
          ${view !== 'dashboard' && html`<button onClick=${() => setView('dashboard')} className="p-2.5 rounded-full bg-slate-100 dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800"><${Icon} name="x" size=${18}/></button>`}
        </div>
        ${isSearchOpen && view === 'dashboard' && html`
          <div className="absolute top-full left-0 right-0 p-4 bg-white/90 dark:bg-black/90 backdrop-blur-2xl shadow-xl z-50 border-b border-slate-100 dark:border-zinc-800 animate-slide-up">
            <input type="text" value=${searchQuery} onChange=${e=>setSearchQuery(e.target.value)} placeholder="Suchen..." autoFocus className="w-full p-4 rounded-2xl bg-slate-100 dark:bg-zinc-900 outline-none border border-slate-100 dark:border-zinc-800" />
          </div>
        `}
      </header>

      <main className="p-4 sm:p-6 max-w-2xl mx-auto min-h-[70vh] floating-nav-spacing relative z-10 no-print">
        ${view === 'menu' && html`
            <div className="grid grid-cols-2 gap-4 sm:gap-6 animate-slide-up">
              <button onClick=${() => setView('wisdom')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><${Icon} name="book-open" size=${32} className="text-amber-500" /><span className="font-bold text-sm">Weisheit</span></button>
              <button onClick=${() => setView('map')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><${Icon} name="map" size=${32} className="text-emerald-500" /><span className="font-bold text-sm">Lebenskarte</span></button>
              <button onClick=${() => setView('burn')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><${Icon} name="flame" size=${32} className="text-rose-500" /><span className="font-bold text-sm">Katharsis</span></button>
              <button onClick=${() => setView('quotes')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><${Icon} name="quote" size=${32} className="text-indigo-500" /><span className="font-bold text-sm">Erkenntnisse</span></button>
              <button onClick=${() => setView('archive')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><${Icon} name="archive" size=${32} className="opacity-50" /><span className="font-bold text-sm">Archiv</span></button>
              <button onClick=${() => setView('trash')} className="p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><${Icon} name="trash-2" size=${32} className="text-rose-400" /><span className="font-bold text-sm text-rose-500">Papierkorb</span></button>
              <button onClick=${() => setView('settings')} className="col-span-2 p-6 rounded-3xl flex flex-col items-center gap-3 bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105 transition-transform"><${Icon} name="settings" size=${32} className="opacity-50" /><span className="font-bold text-sm">Einstellungen</span></button>
            </div>
        `}

        ${view === 'wisdom' && html`
            <div className="animate-slide-up space-y-6 pb-24">
                <div className="p-6 rounded-3xl border border-slate-100 dark:border-zinc-800 text-center" style=${{ backgroundColor: user.nameColor+'15' }}>
                   <h3 className="font-bold mb-2" style=${{ color: user.nameColor }}>Fortschritt deines Vermächtnisses</h3>
                   <div className="flex justify-between text-sm font-bold opacity-70 mb-2" style=${{ color: user.nameColor }}><span>${completedPillars} von ${totalPillars}</span><span>${progressPercent}%</span></div>
                   <div className="w-full h-2 rounded-full overflow-hidden border border-slate-100 dark:border-zinc-800" style=${{ backgroundColor: user.nameColor+'30' }}><div className="h-full transition-all duration-1000" style=${{width: progressPercent+'%', backgroundColor: user.nameColor }}></div></div>
                </div>
                ${['Fundament', 'Kommunikation', 'Struktur', 'Tiefe', 'Anpassung'].map(phase => html`
                   <div key=${phase} className="space-y-3">
                      <h4 className="text-xs font-bold uppercase tracking-widest text-slate-400 ml-2">${phase}</h4>
                      ${PILLARS.filter(p=>p.phase===phase).map(pillar => {
                          const isCompleted = entries.some(e => e.title === pillar.title && !e.trashed);
                          return html`
                            <button key=${pillar.id} onClick=${() => openEditor(null, pillar)} className="w-full text-left p-5 rounded-3xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm flex gap-4 hover:scale-[1.02] transition-transform">
                               <div className="w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${isCompleted ? 'text-white border-none' : 'bg-slate-100 dark:bg-zinc-800 text-slate-400 border border-slate-100 dark:border-zinc-800'}" style=${isCompleted ? { backgroundColor: user.nameColor } : {}}><${Icon} name=${isCompleted?"check":"pen-tool"} size=${16}/></div>
                               <div><div className="font-bold text-sm mb-1">${pillar.title}</div><div className="text-xs opacity-60 line-clamp-2 leading-relaxed">${pillar.desc}</div></div>
                            </button>
                          `
                      })}
                   </div>
                `)}
            </div>
        `}

        ${view === 'burn' && html`
            <div className="flex flex-col items-center justify-center min-h-[50vh] text-center animate-fade-in relative">
              ${isBurning && html`<div className="absolute inset-0 bg-rose-500/10 animate-pulse rounded-3xl pointer-events-none" />`}
              <${Icon} name="flame" size=${64} className="mb-6 ${isBurning ? 'text-rose-500 animate-flame' : 'text-slate-300 dark:text-zinc-700'}" />
              <p className="opacity-60 mb-8 max-w-sm">Schreibe auf, was dich belastet. Wir übergeben es den Flammen. Es wird nirgendwo gespeichert.</p>
              <textarea value=${burnText} onChange=${e=>setBurnText(e.target.value)} disabled=${isBurning} className="w-full p-6 rounded-3xl bg-white dark:bg-zinc-900 border border-slate-200 outline-none resize-none transition-all text-lg font-medium shadow-sm h-48 focus:border-rose-500" placeholder="Lass es los..." />
              <button onClick=${triggerBurn} disabled=${!burnText || isBurning} className="mt-6 px-8 py-4 bg-rose-600 text-white rounded-2xl font-bold shadow-lg hover:scale-105 disabled:opacity-50 border border-transparent">Dem Feuer übergeben</button>
            </div>
        `}

        ${view === 'quotes' && html`
            <div className="animate-slide-up space-y-4 pb-24">
                ${allQuotes.length === 0 ? html`
                   <div className="text-center py-20 opacity-40"><${Icon} name="quote" size=${48} className="mx-auto mb-4"/><p className="font-bold">Noch keine Erkenntnisse zitiert.</p></div>
                ` : allQuotes.map(q => html`
                   <div key=${q.id} onClick=${()=>{const e=entries.find(x=>x.id===q.entryId); if(e){setView('dashboard'); handleOpenEntry(e);}}} className="p-6 rounded-3xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm cursor-pointer hover:scale-[1.02] transition-transform">
                      <${Icon} name="quote" size=${20} className="mb-4 opacity-50" style=${{ color: user.nameColor }} />
                      <p className="text-lg font-serif italic font-medium leading-relaxed mb-4">"${q.text}"</p>
                      <div className="text-xs font-bold uppercase tracking-widest opacity-40">${q.title} • ${new Date(q.date).toLocaleDateString('de-DE')}</div>
                   </div>
                `)}
            </div>
        `}

        ${['dashboard', 'vault', 'archive'].includes(view) && !searchQuery && html`
          <div className="flex overflow-x-auto gap-2 pb-2 mb-6 custom-scrollbar">
            ${['Alle', ...CATEGORIES].map(cat => html`
              <button key=${cat} onClick=${() => setActiveCategory(cat)} className="px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold transition-colors border border-slate-100 dark:border-zinc-800 ${activeCategory === cat ? 'text-white shadow-md' : 'bg-slate-100 dark:bg-zinc-900'}" style=${activeCategory === cat ? { backgroundColor: user.nameColor, borderColor: 'transparent' } : {}}>${cat}</button>
            `)}
          </div>
        `}

        ${view === 'dashboard' && !searchQuery && html`
             <div className="mb-8 p-6 rounded-3xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm flex flex-col justify-center animate-fade-in">
                <div className="flex justify-between items-center mb-4"><span className="font-bold text-xs uppercase tracking-widest opacity-50">30-Tage Aktivität</span><${Icon} name="activity" size=${16} className="opacity-30" /></div>
                <div className="flex gap-1 justify-between items-end h-10">
                   ${heatmapData.map((d, i) => html`
                      <div key=${i} className="flex-1 rounded-sm transition-colors border border-slate-100 dark:border-zinc-800" style=${{ height: d.count===0?'20%':`${Math.min(100, 20+(d.count*40))}%`, backgroundColor: d.count===0 ? 'transparent' : (user.nameColor || '#f59e0b') }} />
                   `)}
                </div>
             </div>
        `}

        ${view === 'settings' && html`
           <div className="animate-slide-up space-y-6 pb-48">
              <div className="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                 <h2 className="text-base font-bold mb-4 flex items-center gap-2"><${Icon} name="user" size=${18}/> Profil</h2>
                 <div className="flex flex-col sm:flex-row items-center gap-5 mb-6">
                    <div className="relative shrink-0 w-24 h-24 rounded-full overflow-hidden shadow-sm flex items-center justify-center bg-slate-100 dark:bg-zinc-800 border-2" style=${{ borderColor: user.nameColor }}>
                       ${user.avatar ? html`<img src=${user.avatar} className="w-full h-full object-cover scale-[1.02]" />` : html`<${Icon} name="user" size=${40} className="opacity-30" />`}
                    </div>
                    <label className="w-full sm:flex-1 py-3 px-4 rounded-xl cursor-pointer shadow-sm font-bold text-sm text-center border border-slate-100 dark:border-zinc-800 bg-white dark:bg-zinc-800 hover:scale-[1.02] transition-transform">
                       Profilbild ändern <input type="file" accept="image/*" onChange=${(e) => handleFileUpload(e, 'image')} className="hidden" />
                    </label>
                 </div>
                 <input type="text" value=${user.name} onChange=${e=>setUser({...user, name: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 outline-none font-bold text-lg mb-4 border border-slate-100 dark:border-zinc-800" placeholder="Dein Name" />
                 <textarea value=${user.motto} onChange=${e=>setUser({...user, motto: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 outline-none font-medium text-sm resize-none h-24 border border-slate-100 dark:border-zinc-800" placeholder="Lebensmotto..." />
              </div>

              <div className="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                 <h2 className="font-bold mb-4 flex items-center gap-2"><${Icon} name="moon" size=${18}/> Design & Farben</h2>
                 <div className="flex gap-2 mb-6">
                    <button onClick=${() => setUser({...user, isDark: false})} className="flex-1 py-3 rounded-xl font-bold bg-slate-100 dark:bg-zinc-800 border border-slate-100 dark:border-zinc-800 ${!user.isDark ? 'shadow-inner' : 'opacity-60'}">Hell</button>
                    <button onClick=${() => setUser({...user, isDark: true})} className="flex-1 py-3 rounded-xl font-bold bg-slate-100 dark:bg-zinc-800 border border-slate-100 dark:border-zinc-800 ${user.isDark ? 'shadow-inner' : 'opacity-60'}">Dunkel</button>
                 </div>
                 <span className="text-xs font-bold uppercase tracking-widest opacity-60 mb-2 block">Schriftfarbe</span>
                 <div className="flex flex-wrap gap-2">
                    ${COLORS.map(color => html`<button key=${color} onClick=${() => setUser({...user, nameColor: color, textColor: color})} className="w-8 h-8 rounded-full border-2 transition-transform ${user.nameColor === color ? 'scale-125' : ''}" style=${{ backgroundColor: color, borderColor: user.nameColor === color ? 'rgba(0,0,0,0.1)' : 'transparent' }}></button>`)}
                 </div>
              </div>

              <div className="p-6 rounded-[2rem] bg-blue-50 dark:bg-blue-500/10 border border-slate-100 dark:border-zinc-800 shadow-sm">
                 <h2 className="text-base font-bold mb-2 flex items-center gap-2 text-blue-600 dark:text-blue-400"><${Icon} name="cloud" size=${18}/> Cloud-Tresor</h2>
                 <p className="text-xs font-medium opacity-70 mb-4">AES-GCM verschlüsselt gesichert.</p>
                 <button onClick=${() => { if (!user.pin) { showDialog({title:'PIN fehlt', message:'Bitte lege zuerst eine PIN fest.'}); return; } setUser({...user, cloudSync: !user.cloudSync}); if (!user.cloudSync) { entries.forEach(e=>syncSingleEntryToCloud(e)); syncProfileToCloud({...user, cloudSync:true}); } }} className="w-full p-4 rounded-2xl font-bold text-sm shadow-sm mb-3 transition-transform hover:scale-[1.02] border border-slate-100 dark:border-zinc-800 ${user.cloudSync ? 'bg-blue-600 text-white' : 'bg-white dark:bg-zinc-900'}">${user.cloudSync ? 'Cloud Sync ist Aktiv' : 'Cloud Sync aktivieren'}</button>
                 <button onClick=${performCloudSync} className="w-full p-4 rounded-2xl font-bold text-sm bg-white dark:bg-zinc-900 text-blue-600 dark:text-blue-400 hover:scale-[1.02] transition-transform flex items-center justify-center gap-2 border border-slate-100 dark:border-zinc-800">${syncingCloud ? 'Lädt...' : html`<${React.Fragment}><${Icon} name="download-cloud" size=${18}/> Aus Cloud laden</${React.Fragment}>`}</button>
              </div>

              <div className="p-6 rounded-[2rem] bg-indigo-50 dark:bg-indigo-500/10 border border-slate-100 dark:border-zinc-800 shadow-sm">
                 <h2 className="text-base font-bold mb-2 flex items-center gap-2 text-indigo-600 dark:text-indigo-400"><${Icon} name="archive" size=${18}/> Ewigkeits-Archiv (ZIP)</h2>
                 <p className="text-xs font-medium opacity-70 mb-4">Exportiert alle deine Einträge als simple Textdateien (.md) und extrahiert Bilder.</p>
                 <button onClick=${exportEternityArchive} className="w-full p-4 rounded-2xl font-bold text-sm bg-indigo-600 text-white hover:scale-[1.02] transition-transform flex items-center justify-center gap-2 border border-transparent"><${Icon} name="folder-down" size=${18}/> Als ZIP speichern</button>
              </div>

              <div className="p-6 rounded-[2rem] bg-emerald-50 dark:bg-emerald-500/10 border border-slate-100 dark:border-zinc-800 shadow-sm">
                 <h2 className="text-base font-bold mb-2 flex items-center gap-2 text-emerald-600 dark:text-emerald-400"><${Icon} name="smartphone" size=${18}/> P2P Transfer</h2>
                 <p className="text-xs font-medium opacity-70 mb-4">Scanne einen QR Code mit neuem Gerät für direkten Transfer.</p>
                 ${!peerId ? html`
                    <button onClick=${() => { const peer = new window.Peer(); setSyncStatus('WebRTC wird vorbereitet...'); peer.on('open', (id) => { setPeerId(id); setSyncStatus('Scanne den Code mit dem neuen Gerät.'); }); peer.on('connection', (c) => { setSyncStatus('Verbunden! Sende...'); c.on('data', (d) => { if(d==='request_data'){c.send(JSON.stringify({user,entries})); setSyncStatus('Erledigt!'); setTimeout(()=>{setPeerId(null);}, 4000);} }); }); setPeerInstance(peer); }} className="w-full p-4 rounded-2xl font-bold text-sm bg-emerald-600 text-white hover:scale-[1.02] transition-transform flex items-center justify-center gap-2 border border-transparent"><${Icon} name="qr-code" size=${18}/> QR-Code generieren</button>
                 ` : html`
                    <div className="bg-white dark:bg-zinc-900 p-4 rounded-2xl flex flex-col items-center border border-slate-100 dark:border-zinc-800">
                       <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?import=' + peerId)}" className="w-40 h-40 mb-3 rounded-lg border border-slate-100 dark:border-zinc-800" />
                       <p className="text-xs font-bold text-emerald-600 mb-3 animate-pulse">${syncStatus}</p>
                       <button onClick=${()=>{peerInstance?.destroy(); setPeerId(null); setSyncStatus('');}} className="text-xs font-bold opacity-50 border border-transparent">Abbrechen</button>
                    </div>
                 `}
              </div>

              <div className="p-6 rounded-[2rem] bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 shadow-sm">
                 <h2 className="text-base font-bold mb-4 flex items-center gap-2"><${Icon} name="key" size=${18}/> Sicherheit & PIN</h2>
                 ${!user.pin ? html`
                    <div className="space-y-4">
                       <input type="password" inputMode="numeric" value=${newPinInput} onChange=${e=>setNewPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 outline-none text-center tracking-[1em] border border-slate-100 dark:border-zinc-800" placeholder="Neue PIN" />
                       <input type="password" inputMode="numeric" value=${confirmPinInput} onChange=${e=>setConfirmPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 outline-none text-center tracking-[1em] border border-slate-100 dark:border-zinc-800" placeholder="Wiederholen" />
                       <button onClick=${handleSavePin} className="w-full py-4 rounded-xl font-bold border border-transparent" style=${{ backgroundColor: user.nameColor, color: isDarkColor(user.nameColor)?'#fff':'#000' }}>PIN speichern</button>
                    </div>
                 ` : isChangingPin ? html`
                    <div className="space-y-4">
                       <input type="password" inputMode="numeric" value=${oldPinInput} onChange=${e=>setOldPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 outline-none text-center tracking-[1em] border border-slate-100 dark:border-zinc-800" placeholder="Alte PIN" />
                       <input type="password" inputMode="numeric" value=${newPinInput} onChange=${e=>setNewPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 outline-none text-center tracking-[1em] border border-slate-100 dark:border-zinc-800" placeholder="Neue PIN" />
                       <input type="password" inputMode="numeric" value=${confirmPinInput} onChange=${e=>setConfirmPinInput(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 outline-none text-center tracking-[1em] border border-slate-100 dark:border-zinc-800" placeholder="Wiederholen" />
                       <div className="flex gap-2">
                          <button onClick=${() => setIsChangingPin(false)} className="flex-1 py-4 rounded-xl font-bold bg-slate-100 dark:bg-zinc-800 border border-slate-100 dark:border-zinc-800">Abbrechen</button>
                          <button onClick=${handleSavePin} className="flex-1 py-4 rounded-xl font-bold border border-transparent" style=${{ backgroundColor: user.nameColor, color: isDarkColor(user.nameColor)?'#fff':'#000' }}>Speichern</button>
                       </div>
                    </div>
                 ` : html`
                    <div className="flex justify-between items-center p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-slate-100 dark:border-zinc-800">
                       <div className="flex items-center gap-3"><${Icon} name="check-circle" size=${20} className="text-emerald-500" /><span className="font-bold text-sm">PIN Aktiv</span></div>
                       <button onClick=${() => setIsChangingPin(true)} className="px-4 py-2 rounded-lg font-bold text-xs bg-white dark:bg-zinc-800 shadow-sm border border-slate-100 dark:border-zinc-800" style=${{ color: user.nameColor }}>Ändern</button>
                    </div>
                 `}
                 ${window.PublicKeyCredential && user.pin && !isChangingPin && html`
                    <div className="flex justify-between items-center mt-6 p-4 rounded-2xl bg-slate-50 dark:bg-zinc-950 border border-slate-100 dark:border-zinc-800">
                       <div className="flex items-center gap-3"><${Icon} name="fingerprint" size=${20} className=${user.biometric ? 'text-indigo-500' : 'text-slate-400'}/><div><div className="font-bold text-sm">Biometrie</div><div className="text-[10px] opacity-60">TouchID / FaceID</div></div></div>
                       <button onClick=${toggleBiometric} className="w-12 h-6 rounded-full transition-colors relative border border-slate-100 dark:border-zinc-800 ${user.biometric ? 'bg-indigo-500' : 'bg-slate-300 dark:bg-zinc-700'}"><div className="w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${user.biometric ? 'left-7' : 'left-1'}" /></button>
                    </div>
                 `}
              </div>

                               `)}
                               <button onClick=${() => { setShowTimeline(false); openEditor(null, null, timelineSelectedDate); }} className="w-full flex items-center justify-center gap-2 p-4 bg-slate-100 dark:bg-zinc-800 rounded-2xl font-bold text-sm hover:scale-[1.02] mt-4 border border-slate-100 dark:border-zinc-800" style=${{color: user.nameColor}}><${Icon} name="plus" size=${18}/> Neuer Eintrag für diesen Tag</button>

                      <button onClick=${() => handleReadAloud(viewingEntry)} className="p-3 rounded-full transition-transform border border-slate-100 dark:border-zinc-800 ${isSpeaking ? 'text-white animate-pulse' : 'bg-slate-100 dark:bg-zinc-900'}" style=${isSpeaking ? { backgroundColor: user.nameColor } : {}}><${Icon} name=${isSpeaking ? "volume-2" : "volume-1"} size=${20}/></button>

                            <button onClick=${(e) => { e.stopPropagation(); setCurrentViewerImgIdx(p => (p - 1 + viewingEntry.images.length) % viewingEntry.images.length); }} className="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 text-white p-3 rounded-full opacity-0 group-hover:opacity-100 transition-opacity no-print border border-transparent"><${Icon} name="chevron-left" size=${24}/></button>
                            <button onClick=${(e) => { e.stopPropagation(); setCurrentViewerImgIdx(p => (p + 1) % viewingEntry.images.length); }} className="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 text-white p-3 rounded-full opacity-0 group-hover:opacity-100 transition-opacity no-print border border-transparent"><${Icon} name="chevron-right" size=${24}/></button>
                            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 bg-black/30 px-3 py-1.5 rounded-full backdrop-blur-sm no-print">
                               ${viewingEntry.images.map((_, i) => html`<div key=${i} className="w-2 h-2 rounded-full transition-colors border border-transparent ${i === currentViewerImgIdx ? 'bg-white' : 'bg-white/40'}" />`)}
                            </div>
                         `}
                      </div>
                   `}
                   <h1 className="text-4xl sm:text-5xl font-extrabold mb-6 tracking-tight leading-tight">${viewingEntry.title || 'Ohne Titel'}</h1>

                      ${viewingEntry.people && viewingEntry.people.split(',').map(p => p.trim()).filter(p=>p).map((p, i) => html`<span key=${i} className="px-3 py-1 bg-indigo-600 text-white rounded-lg text-xs font-bold flex items-center gap-1"><${Icon} name="user" size=${12}/> ${p}</span>`)}
                      ${viewingEntry.weather && html`<span className="px-3 py-1 bg-orange-500 text-white rounded-lg text-xs font-bold flex items-center gap-1 w-full sm:w-auto"><${Icon} name="sun" size=${12}/> ${viewingEntry.weather}</span>`}
                      ${viewingEntry.rating > 0 && html`<div className="flex items-center gap-1 ml-auto">${[1,2,3,4,5].map(star => html`<${Icon} key=${star} name="star" size=${16} className=${viewingEntry.rating >= star ? 'text-amber-500 fill-amber-500' : 'text-slate-300'} />`)}</div>`}
                   </div>

                   <div className="text-lg leading-relaxed font-medium opacity-90 legacy-content" dangerouslySetInnerHTML=${createSafeHtml(viewingEntry.text)} />
                   ${viewingEntry.audio && html`<div className="mt-8 p-4 rounded-2xl bg-slate-100 dark:bg-zinc-900 no-print border border-slate-100 dark:border-zinc-800"><audio src=${viewingEntry.audio} controls className="w-full" /></div>`}
                   
                   <div className="mt-16 pt-8 border-t border-slate-100 dark:border-zinc-800 flex justify-center no-print">
                      <button onClick=${() => startNewChapter(viewingEntry)} className="px-6 py-3 font-bold rounded-2xl flex items-center gap-2 hover:scale-105 shadow-md border border-transparent" style=${{ backgroundColor: user.nameColor, color: isDarkColor(user.nameColor) ? '#ffffff' : '#000000' }}><${Icon} name="plus" size=${20}/> Neue Seite anfügen</button>
                   </div>

                    ${user.motto && html`<p style=${{marginTop: '40px', fontStyle: 'italic'}}>${user.motto}</p>`}
                    <p style=${{position: 'absolute', bottom: '40px', left: 0, right: 0, textAlign: 'center'}}>Generiert am ${new Date().toLocaleDateString('de-DE')}</p>
                 </div>

                    <h2 style=${{fontSize: '32px', marginBottom: '30px', borderBottom: '1px solid #000', paddingBottom: '10px', fontFamily: 'Georgia, serif'}}>Inhaltsverzeichnis</h2>
                    <ul style=${{listStyle: 'none', padding: 0}}>
                        ${allBookEntries.map((e, idx) => html`<li key=${idx} style=${{marginBottom: '15px', fontSize: '18px'}}><strong>${idx+1}.</strong> ${e.title || 'Ohne Titel'}</li>`)}

                 </div>
                 <div className="print-book-content">
                    ${allBookEntries.map((e, idx) => html`
                        <div key=${e.id} className="page-break-after" style=${{marginBottom: '60px', paddingTop: '20px'}}>
                            <div style=${{textAlign: 'center', marginBottom: '30px', paddingBottom: '20px', borderBottom: '1px solid rgba(0,0,0,0.1)'}}>
                                <h1 style=${{fontSize: '36px', fontFamily: 'Georgia, serif', fontWeight: 'bold', marginBottom: '10px'}}>${e.title || 'Ohne Titel'}</h1>
                                <p style=${{opacity: 0.6, fontWeight: 'bold', textTransform: 'uppercase', letterSpacing: '2px', fontSize: '12px'}}>${new Date(e.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })} • ${e.category}</p>
                            </div>

                            <div className="text-lg leading-relaxed legacy-content" dangerouslySetInnerHTML=${createSafeHtml(e.text)}></div>
                        </div>
                    `)}
                 </div>
             </div>
          `;
      })()}

      ${showEditor && html`
        <div className="fixed inset-0 z-[150] flex flex-col bg-white dark:bg-black animate-fade-in no-print h-[100dvh]">
          <div className="w-full h-full max-w-3xl mx-auto flex flex-col bg-white dark:bg-zinc-950 overflow-hidden shadow-2xl relative border-l border-r border-slate-100 dark:border-zinc-800">
             <div className="flex justify-between items-center px-4 py-3 sm:px-6 sm:py-4 border-b border-slate-100 dark:border-zinc-800 shrink-0 bg-white/90 dark:bg-zinc-950/90 backdrop-blur-md z-40 relative">
                <button onClick=${() => checkSaveEntry(true)} className="p-3 rounded-full hover:bg-slate-100 dark:hover:bg-zinc-800 border border-transparent"><${Icon} name="arrow-left" size=${24}/></button>
                <div className="flex gap-2 items-center">
                   ${autoSaveStatus === 'Gespeichert' && html`<div className="w-3 h-3 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,1)] mr-1" title="Gespeichert"></div>`}
                   ${editingState.id && html`<button onClick=${() => showDialog({title:'In den Papierkorb?', message:'Wird in Papierkorb verschoben.', icon:'trash-2', onConfirm:()=>{saveToDB({...currentEntryRef.current, trashed: true}); setShowEditor(false);}})} className="p-3 rounded-full text-slate-400 hover:text-rose-500 hover:bg-rose-50 border border-transparent"><${Icon} name="trash-2" size=${20}/></button>`}
                   <button onClick=${() => { setEditingState(p=>({...p, isLocked: !p.isLocked})); currentEntryRef.current.isLocked = !editingState.isLocked; isDirtyRef.current = true; checkSaveEntry(false); }} className="p-3 rounded-full border border-transparent ${editingState.isLocked ? 'bg-rose-500/10 text-rose-500' : 'opacity-60'}"><${Icon} name="lock" size=${20}/></button>
                   <button onClick=${() => {
                       if(navigator.geolocation) {
                           showDialog({title:'Orte & Wetter', message:'Lade GPS...', icon:'loader'});
                           navigator.geolocation.getCurrentPosition(async pos => {
                               const lat = pos.coords.latitude; const lng = pos.coords.longitude;
                               setEditingState(p=>({...p, location: {lat,lng}})); currentEntryRef.current.location = {lat,lng}; isDirtyRef.current = true;
                               try {
                                   const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
                                   const data = await res.json();
                                   if(data && data.current_weather) {
                                       const wStr = Math.round(data.current_weather.temperature) + "°C";
                                       setEditingState(p=>({...p, weather: wStr})); currentEntryRef.current.weather = wStr;
                                   }
                               } catch(e) {}
                               setDialog(null); checkSaveEntry(false); showDialog({title:'Orts-Siegel', message:'Ort verewigt.', icon:'map-pin'});
                           }, () => { setDialog(null); showDialog({title:'Fehler', message:'Ortung fehlgeschlagen.', icon:'x'}); });
                       }
                   }} className="p-3 rounded-full border border-transparent ${editingState.location ? 'bg-emerald-500/10 text-emerald-500' : 'opacity-60'}"><${Icon} name="map-pin" size=${20}/></button>
                   <button onClick=${() => { setEditingState(p=>({...p, isManifested: !p.isManifested})); currentEntryRef.current.isManifested = !editingState.isManifested; isDirtyRef.current = true; checkSaveEntry(false); }} className="p-3 rounded-full border border-transparent ${editingState.isManifested ? 'bg-amber-400/10 text-amber-500' : 'opacity-60'}"><${Icon} name="sparkles" size=${20}/></button>
                   <button onClick=${() => checkSaveEntry(true)} className="px-6 py-2.5 rounded-full font-bold shadow-sm text-sm ml-2 hover:scale-105 border border-transparent" style=${{ backgroundColor: user.nameColor, color: isDarkColor(user.nameColor)?'#ffffff':'#000000' }}>Speichern</button>
                </div>
             </div>

             <div className="flex flex-col shrink-0 px-6 sm:px-10 pt-6 pb-2 z-40 bg-white dark:bg-zinc-950 border-b border-slate-100 dark:border-zinc-800 relative">
                ${editingState.pillarGuidance && html`<div className="mb-4 p-4 rounded-2xl bg-amber-50 dark:bg-amber-500/10 text-amber-800 text-sm font-medium flex gap-3 border border-amber-200"><${Icon} name="book-open" size=${20} className="shrink-0"/>${editingState.pillarGuidance}</div>`}
                <input type="text" placeholder="Ein brillianter Gedanke..." value=${editingState.title} onChange=${e => { setEditingState({...editingState, title: e.target.value}); currentEntryRef.current.title = e.target.value; isDirtyRef.current = true; checkSaveEntry(false); }} className="w-full bg-transparent text-3xl sm:text-4xl font-extrabold tracking-tight outline-none mb-4 border border-transparent" />
                
                <div className="flex gap-2 mb-2 overflow-x-auto hide-scrollbar items-center bg-slate-100 dark:bg-zinc-900 p-2 rounded-2xl border border-slate-100 dark:border-zinc-800">
                   <button onMouseDown=${e => { e.preventDefault(); document.execCommand('formatBlock', false, '<h1>'); isDirtyRef.current = true; checkSaveEntry(false); }} className="px-3 py-1 font-bold text-lg rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 border border-transparent">H1</button>
                   <button onMouseDown=${e => { e.preventDefault(); document.execCommand('formatBlock', false, '<h2>'); isDirtyRef.current = true; checkSaveEntry(false); }} className="px-3 py-1 font-bold text-md rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 border border-transparent">H2</button>
                   <button onMouseDown=${e => { e.preventDefault(); document.execCommand('formatBlock', false, 'p'); isDirtyRef.current = true; checkSaveEntry(false); }} className="px-3 py-1 font-bold text-sm rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 border border-transparent">Text</button>
                   <div className="w-px h-6 bg-slate-300 dark:bg-zinc-700 mx-1"></div>
                   <button onMouseDown=${e => { e.preventDefault(); document.execCommand('bold', false, null); isDirtyRef.current = true; checkSaveEntry(false); }} className="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 border border-transparent"><${Icon} name="bold" size=${18}/></button>
                   <button onMouseDown=${e => { e.preventDefault(); document.execCommand('italic', false, null); isDirtyRef.current = true; checkSaveEntry(false); }} className="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 border border-transparent"><${Icon} name="italic" size=${18}/></button>
                   <button onMouseDown=${e => { e.preventDefault(); document.execCommand('insertUnorderedList', false, null); isDirtyRef.current = true; checkSaveEntry(false); }} className="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 border border-transparent"><${Icon} name="list-todo" size=${18}/></button>
                   <button onMouseDown=${e => { e.preventDefault(); document.execCommand('formatBlock', false, 'blockquote'); isDirtyRef.current = true; checkSaveEntry(false); }} className="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 border border-transparent"><${Icon} name="quote" size=${18}/></button>
                   <div className="w-px h-6 bg-slate-300 dark:bg-zinc-700 mx-1"></div>
                   <label htmlFor="inline-image-upload" className="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-800 cursor-pointer text-indigo-500 shrink-0 border border-transparent"><${Icon} name="image" size=${18}/><input id="inline-image-upload" type="file" accept="image/*" onChange=${handleInlineImage} className="hidden"/></label>
                   <div className="flex gap-1.5 ml-2 shrink-0">
                      ${['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'].map(c => html`<button key=${c} onMouseDown=${e => { e.preventDefault(); document.execCommand('foreColor', false, c); isDirtyRef.current = true; checkSaveEntry(false); }} className="w-5 h-5 rounded-full hover:scale-110 shadow-sm border border-transparent" style=${{backgroundColor: c}}></button>`)}
                   </div>
                   <button onClick=${() => setPicker({ title: 'Kategorie', currentValue: editingState.category, options: CATEGORIES.map(c=>({label:c,value:c})), onSelect: (v)=>{setEditingState(p=>({...p, category: v})); currentEntryRef.current.category = v; isDirtyRef.current=true; checkSaveEntry(false);} })} className="px-4 py-2 rounded-xl bg-white dark:bg-zinc-800 shadow-sm font-bold text-[10px] uppercase tracking-widest ml-auto shrink-0 border border-slate-100 dark:border-zinc-800" style=${{ color: user.nameColor }}>${editingState.category}</button>
                </div>
             </div>

             <div className="flex-1 overflow-y-auto px-6 sm:px-10 pt-4 pb-12 relative z-10 block">
                ${editingState.selectedImages.length > 0 && html`
                   <div className="flex overflow-x-auto hide-scrollbar gap-3 mb-6 snap-x shrink-0">
                      ${editingState.selectedImages.map((imgSrc, i) => html`
                         <div key=${i} className="relative w-48 h-48 rounded-3xl overflow-hidden border border-slate-100 dark:border-zinc-800 shrink-0 snap-center">
                            <img src=${imgSrc} className="w-full h-full object-cover"/>
                            <button onClick=${() => { setEditingState(p => { const newImgs = p.selectedImages.filter((_,idx)=>idx!==i); currentEntryRef.current.selectedImages=newImgs; return {...p, selectedImages:newImgs}; }); isDirtyRef.current = true; checkSaveEntry(false); }} className="absolute top-2 right-2 bg-black/60 p-2 rounded-full text-white border border-transparent"><${Icon} name="x" size=${14}/></button>
                         </div>
                      `)}
                   </div>
                `}
                ${editingState.audioUrl && html`
                    <div className="mb-6 p-4 rounded-2xl bg-slate-100 dark:bg-zinc-900 relative mt-4 shrink-0 border border-slate-100 dark:border-zinc-800">
                        <audio src=${editingState.audioUrl} controls className="w-full"/>
                        <button onClick=${()=>{setEditingState(p=>({...p, audioUrl: null})); currentEntryRef.current.audioUrl = null; isDirtyRef.current = true; checkSaveEntry(false);}} className="absolute -top-2 -right-2 bg-rose-500 text-white p-1 rounded-full shadow-lg border border-transparent"><${Icon} name="x" size=${14}/></button>
                    </div>
                `}
                
                <div ref=${editorRef} contentEditable suppressContentEditableWarning data-placeholder="Lass es fließen..." 
                     onClick=${(e) => {
                         const btn = e.target.closest('.delete-img-btn');
                         if (btn) {
                             const wrapper = btn.closest('.inline-img-wrapper');
                             if (wrapper) {
                                 wrapper.remove();
                                 currentEntryRef.current.text = e.currentTarget.innerHTML;
                                 setEditingState(p => ({...p, text: e.currentTarget.innerHTML}));
                                 isDirtyRef.current = true;
                                 checkSaveEntry(false);
                             }
                         }
                     }}
                     onInput=${e => { currentEntryRef.current.text = e.currentTarget.innerHTML; isDirtyRef.current = true; }} 
                     className="w-full min-h-[250px] bg-transparent text-lg leading-relaxed font-medium outline-none empty:before:content-[attr(data-placeholder)] legacy-editor-content pt-4 pb-12 border border-transparent" />

                <div className="flex flex-col gap-3 mt-4 pt-4 border-t border-slate-100 dark:border-zinc-800 pb-10">
                   <div className="flex items-center gap-2">
                       ${[1,2,3,4,5].map(star => html`<button key=${star} type="button" onClick=${() => { setEditingState(p=>({...p, rating: star})); currentEntryRef.current.rating = star; isDirtyRef.current=true; checkSaveEntry(false); }} className="border border-transparent"><${Icon} name="star" size=${24} className=${editingState.rating >= star ? 'text-amber-500 fill-amber-500' : 'text-slate-300 dark:text-zinc-700'} /></button>`)}
                   </div>
                   <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                       <div className="flex flex-col"><label className="text-[10px] font-bold uppercase opacity-50 mb-1">Tags (Komma getrennt)</label><input type="text" value=${editingState.tags} onChange=${e => {setEditingState(p=>({...p, tags: e.target.value})); currentEntryRef.current.tags = e.target.value; isDirtyRef.current=true;}} onBlur=${() => checkSaveEntry(false)} className="p-3 rounded-xl bg-slate-100 dark:bg-zinc-900 text-sm outline-none border border-slate-100 dark:border-zinc-800" /></div>
                       <div className="flex flex-col"><label className="text-[10px] font-bold uppercase opacity-50 mb-1">Personen</label><input type="text" value=${editingState.people} onChange=${e => {setEditingState(p=>({...p, people: e.target.value})); currentEntryRef.current.people = e.target.value; isDirtyRef.current=true;}} onBlur=${() => checkSaveEntry(false)} className="p-3 rounded-xl bg-slate-100 dark:bg-zinc-900 text-sm outline-none border border-slate-100 dark:border-zinc-800" /></div>
                       <div className="flex flex-col sm:col-span-2"><label className="text-[10px] font-bold uppercase opacity-50 mb-1">Wetter</label><input type="text" value=${editingState.weather} onChange=${e => {setEditingState(p=>({...p, weather: e.target.value})); currentEntryRef.current.weather = e.target.value; isDirtyRef.current=true;}} onBlur=${() => checkSaveEntry(false)} className="p-3 rounded-xl bg-slate-100 dark:bg-zinc-900 text-sm outline-none border border-slate-100 dark:border-zinc-800" /></div>
                   </div>
                </div>
             </div>

             <div className="shrink-0 bg-slate-50 dark:bg-zinc-900 border-t border-slate-100 dark:border-zinc-800 p-4 flex justify-between items-center pb-[env(safe-area-inset-bottom,16px)] z-30">
                <div className="flex gap-2">
                   <label htmlFor="cover-upload" className="p-3.5 rounded-full bg-white dark:bg-zinc-800 border border-slate-100 dark:border-zinc-800 shadow-sm cursor-pointer hover:scale-105"><${Icon} name="images" size=${20}/><input id="cover-upload" type="file" accept="image/*" multiple onChange=${(e) => handleFileUpload(e, 'image')} className="hidden" /></label>
                   <button onClick=${()=>setIsDrawing(true)} className="p-3.5 rounded-full bg-white dark:bg-zinc-800 border border-slate-100 dark:border-zinc-800 shadow-sm hover:scale-105"><${Icon} name="pen-tool" size=${20}/></button>
                   <button onClick=${isRecording?stopRecording:startRecording} className="p-3.5 rounded-full shadow-sm hover:scale-105 border ${isRecording?'bg-rose-500 text-white animate-pulse border-transparent':'bg-white dark:bg-zinc-800 border-slate-100 dark:border-zinc-800'}">${isRecording?html`<${Icon} name="square" size=${20}/>`:html`<${Icon} name="mic" size=${20}/>`}</button>
                   
                   <div className="relative pl-2 ml-2 border-l border-slate-100 dark:border-zinc-800 flex">
                       <label className="relative p-3.5 rounded-full shadow-sm flex items-center justify-center cursor-pointer hover:scale-105 border ${editingState.unlockDate ? 'text-white border-transparent' : 'bg-white dark:bg-zinc-800 border-slate-100 dark:border-zinc-800'}" style=${editingState.unlockDate ? { backgroundColor: user.nameColor } : {}}>
                          <${Icon} name="clock" size=${20}/>
                          <input type="date" value=${editingState.unlockDate} onChange=${e=>{setEditingState(p=>({...p, unlockDate: e.target.value})); currentEntryRef.current.unlockDate = e.target.value; isDirtyRef.current = true; checkSaveEntry(false);}} className="absolute opacity-0 w-full h-full cursor-pointer border border-transparent" />
                       </label>
                   </div>
                </div>
                <div className="flex gap-2">
                   ${MOODS.slice(0,3).map(m => html`<button key=${m.id} onClick=${()=>{const nM = editingState.mood===m.label?null:m.label; setEditingState(p=>({...p, mood: nM})); currentEntryRef.current.mood = nM; isDirtyRef.current=true; checkSaveEntry(false);}} className="p-2.5 rounded-full transition-all border border-transparent ${editingState.mood===m.label ? 'bg-white shadow-md scale-110 ' + m.color : 'opacity-40'}"><${Icon} name=${m.iconName} size=${20}/></button>`)}
                </div>
             </div>
          </div>
        </div>
      `}

      ${isDrawing && html`
         <div className="fixed inset-0 z-[200] flex flex-col bg-white dark:bg-black animate-fade-in no-print">
            <div className="flex justify-between items-center p-6 border-b border-slate-100 dark:border-zinc-800 bg-slate-50 dark:bg-zinc-950 shrink-0">
               <button onClick=${()=>setIsDrawing(false)} className="p-3 rounded-full bg-slate-200 dark:bg-zinc-800 border border-transparent"><${Icon} name="x" size=${20}/></button>
               <span className="font-bold text-lg">Skizze</span>
               <button onClick=${()=>{if(canvasRef.current){
                   setEditingState(p=>{ const newImgs = [...p.selectedImages, canvasRef.current.toDataURL()]; currentEntryRef.current.selectedImages = newImgs; return {...p, selectedImages: newImgs}; }); 
                   setIsDrawing(false); isDirtyRef.current=true; checkSaveEntry(false);
               }}} className="px-6 py-2 rounded-full font-bold shadow-md text-sm border border-transparent" style=${{ backgroundColor: user.nameColor, color: isDarkColor(user.nameColor)?'#fff':'#000' }}>Fertig</button>
            </div>
            <div className="flex-1 relative touch-none bg-white dark:bg-black">
               <canvas ref=${canvasRef} className="absolute inset-0 w-full h-full touch-none" onMouseDown=${startDrawing} onMouseMove=${draw} onMouseUp=${stopDrawing} onMouseLeave=${stopDrawing} onTouchStart=${startDrawing} onTouchMove=${draw} onTouchEnd=${stopDrawing} />
            </div>
         </div>
      `}

      ${picker && html`
        <div className="fixed inset-0 z-[250] flex items-end sm:items-center justify-center p-4 bg-black/60 backdrop-blur-xl animate-fade-in no-print" onClick=${() => setPicker(null)}>
          <div className="w-full max-w-sm rounded-[2.5rem] shadow-2xl bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 animate-slide-up flex flex-col overflow-hidden max-h-[70vh]" onClick=${e => e.stopPropagation()}>
            <div className="p-6 border-b border-slate-100 dark:border-zinc-800 flex justify-between items-center"><h3 className="font-bold text-lg">${picker.title}</h3><button onClick=${()=>setPicker(null)} className="p-2 rounded-full bg-slate-100 dark:bg-zinc-800 border border-transparent"><${Icon} name="x" size=${20}/></button></div>
            <div className="overflow-y-auto p-4 space-y-2">
               ${picker.options.map(opt => html`
                  <button key=${opt.value} onClick=${()=>{picker.onSelect(opt.value); setPicker(null);}} className="w-full text-left p-4 rounded-2xl font-bold text-sm flex justify-between transition-all border border-transparent ${picker.currentValue===opt.value ? 'text-white' : 'hover:bg-slate-50'}" style=${picker.currentValue === opt.value ? { backgroundColor: user.nameColor } : {}}>
                     ${opt.label} ${picker.currentValue===opt.value && html`<${Icon} name="check" size=${16}/>`}
                  </button>
               `)}
            </div>
          </div>
        </div>
      `}
    </div>
  `;
}

const root = createRoot(document.getElementById('root'));
root.render(html`<${App} />`);
</script>
</body>
</html>
